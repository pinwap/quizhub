ion":"Local Replacement แตกต่างจาก Global Replacement อย่างไร?","options":[{"statement":"Local ใช้เฟรมของตนเองเท่านั้น ไม่แย่งจากโปรเซสอื่น","istrue":true},{"statement":"Global ทำให้ process ใช้เฟรมได้คงที่เสมอ","istrue":false},{"statement":"Local ให้ throughput สูงกว่าเสมอ","istrue":false},{"statement":"Global ไม่ทำให้เกิด thrashing","istrue":false}],"explanation":"Local replacement จำกัดการแทนที่ในเฟรมของ process นั้น ลดผลกระทบต่อ process อื่น"},{"type":"multiple-choice","question":"เทคนิคใดช่วยลดการเกิด Thrashing ได้ดีที่สุด?","options":[{"statement":"เพิ่ม degree of multiprogramming","istrue":false},{"statement":"ใช้ Working Set และ Page-Fault Frequency ในการควบคุม","istrue":true},{"statement":"ใช้ FIFO page replacement","istrue":false},{"statement":"ปิดระบบ virtual memory","istrue":false}],"explanation":"WS และ PFF เป็นเทคนิคควบคุมจำนวนเฟรมต่อ process ให้เหมาะสม ลดการเกิด thrashing"},{"type":"multiple-choice","question":"CPU utilization ต่ำมากแม้ process หลายตัวอยู่ใน ready queue สาเหตุที่เป็นไปได้คืออะไร?","options":[{"statement":"เกิด Thrashing ในระบบ","istrue":true},{"statement":"CPU ทำงานเกินพิกัด","istrue":false},{"statement":"เกิด deadlock ระหว่าง process","istrue":false},{"statement":"ระบบมี free-frame มากเกินไป","istrue":false}],"explanation":"Thrashing ทำให้ CPU รอ I/O page-in/out ตลอด ส่งผลให้ utilization ต่ำ"}]'),Zy=Object.freeze(Object.defineProperty({__proto__:null,default:Qy},Symbol.toStringTag,{value:"Module"})),Jy=JSON.parse(`[{"type":"multiple-choice","question":"ในสถาปัตยกรรมคอมพิวเตอร์ ส่วนใดทำหน้าที่เป็นตัวกลางเชื่อมระหว่างโปรแกรมของผู้ใช้ (User Program) และฮาร์ดแวร์ (Hardware)?","options":[{"statement":"ระบบปฏิบัติการ (Operating System)","istrue":true},{"statement":"หน่วยประมวลผลกลาง (CPU)","istrue":false},{"statement":"โปรแกรมประยุกต์ (Application Software)","istrue":false},{"statement":"ไดรเวอร์อุปกรณ์ (Device Driver)","istrue":false}],"explanation":"ระบบปฏิบัติการ (OS) คือซอฟต์แวร์ระบบที่ทำหน้าที่เป็นตัวกลางในการจัดการทรัพยากรฮาร์ดแวร์และให้บริการแก่โปรแกรมของผู้ใช้"},{"type":"multiple-choice","question":"กระบวนการที่โปรแกรมของผู้ใช้ (User Program) ส่งสัญญาณร้องขอบริการจากระบบปฏิบัติการ ซึ่งทำให้ CPU ต้องสลับโหมดการทำงานจาก User Mode ไปเป็น Kernel Mode เรียกว่าอะไร?","options":[{"statement":"Interrupt","istrue":false},{"statement":"Trap Routine","istrue":true},{"statement":"System Boot","istrue":false},{"statement":"API Call","istrue":false}],"explanation":"Trap Routine คือกลไกที่โปรแกรมใน User Mode ใช้เพื่อร้องขอบริการที่ต้องการสิทธิ์สูงจาก OS ซึ่งจะทำให้ CPU สลับไปทำงานใน Kernel Mode"},{"type":"multiple-choice","question":"ข้อใดคือความแตกต่างที่สำคัญที่สุดระหว่าง Command-line interface (CLI) และ Graphical user interface (GUI)?","options":[{"statement":"CLI ใช้สำหรับระบบปฏิบัติการเก่าเท่านั้น ในขณะที่ GUI ใช้สำหรับระบบปฏิบัติการใหม่","istrue":false},{"statement":"CLI สั่งงานผ่านการพิมพ์ข้อความ ในขณะที่ GUI สั่งงานผ่านองค์ประกอบกราฟิก เช่น ไอคอนและเมนู","istrue":true},{"statement":"CLI ทำงานได้เร็วกว่า GUI เสมอในทุกกรณี","istrue":false},{"statement":"CLI ไม่ต้องการหน่วยความจำในการทำงาน ในขณะที่ GUI ต้องการหน่วยความจำสูง","istrue":false}],"explanation":"ลักษณะเด่นที่แบ่งแยกสองสิ่งนี้คือวิธีการปฏิสัมพันธ์กับผู้ใช้ โดย CLI ใช้การพิมพ์คำสั่งเป็นหลัก ส่วน GUI ใช้วัตถุบนหน้าจอและการคลิกเมาส์"},{"type":"multiple-choice","question":"ตามเนื้อหา 'Genuine OS is supposed to be responsive' หมายความว่าอย่างไร เมื่อมีโปรแกรมหนึ่งเกิดข้อผิดพลาด (แฮงค์)?","options":[{"statement":"OS ที่ดีควรจะรีสตาร์ทคอมพิวเตอร์โดยอัตโนมัติเพื่อแก้ไขปัญหา","istrue":false},{"statement":"OS ที่ดีควรจะบังคับปิดทุกโปรแกรมเพื่อป้องกันความเสียหาย","istrue":false},{"statement":"OS ที่ดีควรจะบังคับปิดเฉพาะโปรแกรมที่มีปัญหา แต่โปรแกรมอื่นยังคงทำงานต่อไปได้","istrue":true},{"statement":"OS ที่ดีควรจะแจ้งเตือนผู้ใช้และรอให้ผู้ใช้แก้ไขปัญหาเอง","istrue":false}],"explanation":"OS ที่ตอบสนองได้ดีจะสามารถแยกแยะและจัดการกับโปรแกรมที่ผิดพลาดได้โดยไม่กระทบต่อการทำงานของทั้งระบบ ทำให้ผู้ใช้ยังคงทำงานกับโปรแกรมอื่นต่อไปได้"},{"type":"multiple-choice","question":"เหตุผลหลักที่ระบบปฏิบัติการต้องเข้ามาจัดการ I/O operations แทนที่จะให้โปรแกรมของผู้ใช้ควบคุมอุปกรณ์โดยตรงคืออะไร?","options":[{"statement":"เพื่อเพิ่มความเร็วในการทำงานของโปรแกรมให้สูงสุด","istrue":false},{"statement":"เพื่อความสะดวกของผู้พัฒนาที่ไม่ต้องเขียนโค้ดไดรเวอร์เอง","istrue":false},{"statement":"เพื่อประสิทธิภาพ (Efficiency) และการป้องกัน (Protection)","istrue":true},{"statement":"เพื่อลดการใช้พลังงานของคอมพิวเตอร์","istrue":false}],"explanation":"การให้ OS เป็นตัวกลางช่วยให้การจัดการทรัพยากรมีประสิทธิภาพ (เช่น การจัดคิว) และป้องกันโปรแกรมไม่ให้สร้างความเสียหายแก่ฮาร์ดแวร์โดยตรง"},{"type":"multiple-choice","question":"การกระทำใดต่อไปนี้เป็นตัวอย่างของบริการ 'Communications' ของระบบปฏิบัติการ?","options":[{"statement":"การสร้างโฟลเดอร์ใหม่บนเดสก์ท็อป","istrue":false},{"statement":"การบันทึกสถิติว่าโปรแกรมใดใช้ CPU ไปเท่าไหร่","istrue":false},{"statement":"การคัดลอกข้อความจากเว็บเบราว์เซอร์ไปวางในโปรแกรมเอกสาร","istrue":true},{"statement":"การแสดงข้อความแจ้งเตือนเมื่อกระดาษในเครื่องพิมพ์หมด","istrue":false}],"explanation":"บริการด้าน Communication ช่วยให้โปรแกรมต่างๆ สามารถแลกเปลี่ยนข้อมูลกันได้ ซึ่งการคัดลอกและวาง (Copy & Paste) เป็นตัวอย่างที่ชัดเจนที่สุด"},{"type":"multiple-choice","question":"ข้อใดอธิบายความแตกต่างระหว่าง 'Protection' และ 'Security' ได้ถูกต้องที่สุดตามคำอุปมาเรื่องคอนโดมิเนียม?","options":[{"statement":"Protection คือ รปภ. หน้าตึก ส่วน Security คือกล้องวงจรปิด","istrue":false},{"statement":"Protection คือกำแพงและประตูของแต่ละห้อง (ป้องกันภายใน) ส่วน Security คือ รปภ. และระบบคีย์การ์ดที่ทางเข้า (ป้องกันภายนอก)","istrue":true},{"statement":"Protection คือการป้องกันไวรัส ส่วน Security คือการป้องกันแฮกเกอร์","istrue":false},{"statement":"ทั้ง Protection และ Security มีความหมายเหมือนกัน คือการป้องกันข้อมูล","istrue":false}],"explanation":"Protection เน้นการควบคุมการเข้าถึงทรัพยากรภายในระบบ (โปรแกรมไม่ยุ่งกัน) เหมือนกำแพงห้อง ในขณะที่ Security เน้นการป้องกันภัยคุกคามจากภายนอก เหมือน รปภ. ที่ทางเข้า"},{"type":"multiple-choice","question":"จากแผนภาพ System Call และ API ข้อใดสรุปได้ถูกต้องเกี่ยวกับความสัมพันธ์ระหว่าง Java API และ Win32 API?","options":[{"statement":"Java API ทำงานได้เร็วกว่า Win32 API เพราะเป็นเทคโนโลยีที่ใหม่กว่า","istrue":false},{"statement":"Java API เป็นชั้นที่ทำงานอยู่เหนือ Win32 API เพื่อให้โปรแกรม Java สามารถทำงานข้ามแพลตฟอร์มได้","istrue":true},{"statement":"โปรแกรมที่เขียนด้วย Win32 API สามารถนำไปรันบนระบบปฏิบัติการ Linux ได้","istrue":false},{"statement":"Java API และ Win32 API คือสิ่งเดียวกัน แต่เรียกชื่อต่างกันในแต่ละภาษา","istrue":false}],"explanation":"Java Virtual Machine (JVM) ซึ่งรันโปรแกรม Java จะเรียกใช้ API ของระบบปฏิบัติการโฮสต์ (เช่น Win32 API บน Windows) อีกทอดหนึ่ง เพื่อให้เกิดความเป็นอิสระจากแพลตฟอร์ม (Portability)"},{"type":"multiple-choice","question":"การส่งพารามิเตอร์ไปยัง System Call โดยการเก็บค่าทั้งหมดไว้ในหน่วยความจำแล้วส่งเพียงแค่ 'Address' ของตำแหน่งนั้นผ่าน Register มีข้อดีและข้อเสียอย่างไร?","options":[{"statement":"ข้อดีคือเร็วที่สุด, ข้อเสียคือส่งข้อมูลได้จำกัด","istrue":false},{"statement":"ข้อดีคือมีความปลอดภัยสูง, ข้อเสียคือเขียนโปรแกรมยาก","istrue":false},{"statement":"ข้อดีคือส่งพารามิเตอร์ได้ไม่จำกัดจำนวน, ข้อเสียคือช้ากว่าการส่งผ่าน Register โดยตรง","istrue":true},{"statement":"ข้อดีคือประหยัดหน่วยความจำ, ข้อเสียคือไม่ยืดหยุ่น","istrue":false}],"explanation":"วิธีนี้ยืดหยุ่นสูงเพราะส่งข้อมูลขนาดใหญ่ได้ แต่ช้ากว่าเพราะ OS ต้องเสียเวลาไปดึงข้อมูลจากหน่วยความจำอีกทอดหนึ่ง ซึ่งช้ากว่าการเข้าถึง Register ใน CPU"},{"type":"multiple-choice","question":"ข้อใดเปรียบเทียบผลงานของ Linus Torvalds และ Richard Stallman ในการสร้างระบบปฏิบัติการ Linux ได้ถูกต้องที่สุด?","options":[{"statement":"Linus สร้างเครื่องยนต์ (Kernel) และ Richard สร้างส่วนประกอบอื่นๆ ของรถ (GNU Tools)","istrue":true},{"statement":"Linus สร้างส่วนติดต่อผู้ใช้แบบกราฟิก (GUI) และ Richard สร้างส่วนคำสั่ง (CLI)","istrue":false},{"statement":"ทั้งสองคนร่วมกันเขียน Linux Kernel ตั้งแต่ต้นจนจบ","istrue":false},{"statement":"Richard สร้าง Kernel ที่ชื่อว่า Hurd ส่วน Linus นำมาพัฒนาต่อเป็น Linux","istrue":false}],"explanation":"Linux ที่สมบูรณ์เกิดจากการรวมกันของ Linux Kernel ที่สร้างโดย Linus Torvalds และชุดเครื่องมือและซอฟต์แวร์เสรีจากโครงการ GNU ของ Richard Stallman"},{"type":"multiple-choice","question":"ข้อเสียที่สำคัญที่สุดของ Static Linking ที่ถูกกล่าวถึงในเนื้อหาคืออะไร?","options":[{"statement":"ทำให้โปรแกรมทำงานช้าลงเพราะต้องเรียกใช้ไลบรารีภายนอก","istrue":false},{"statement":"ทำให้เกิด 'Multiple copies of standard library' ซึ่งสิ้นเปลืองพื้นที่และหน่วยความจำ","istrue":true},{"statement":"ทำให้โปรแกรมไม่สามารถทำงานได้หากไม่มีการเชื่อมต่ออินเทอร์เน็ต","istrue":false},{"statement":"ทำให้โค้ดมีความปลอดภัยน้อยลงและง่ายต่อการถูกโจมตี","istrue":false}],"explanation":"Static linking คัดลอกโค้ดไลบรารีทั้งหมดมาไว้ในโปรแกรม ทำให้หากมีหลายโปรแกรมใช้ไลบรารีเดียวกัน ก็จะมีสำเนาของโค้ดนั้นซ้ำซ้อนกันในหน่วยความจำ"},{"type":"multiple-choice","question":"เหตุใด Dynamic Linking จึงช่วยประหยัดหน่วยความจำ (RAM) ได้ดีกว่า Static Linking เมื่อรันหลายโปรแกรมพร้อมกัน?","options":[{"statement":"เพราะ Dynamic Linking จะบีบอัดขนาดของไลบรารีก่อนโหลดเข้าสู่หน่วยความจำ","istrue":false},{"statement":"เพราะ OS จะโหลดไลบรารีที่ใช้ร่วมกัน (Shared Library) เข้ามาในหน่วยความจำเพียงชุดเดียว ให้ทุกโปรแกรมเข้ามา 'ยืมใช้'","istrue":true},{"statement":"เพราะโปรแกรมที่ใช้ Dynamic Linking ไม่จำเป็นต้องโหลดไลบรารีทั้งหมด แต่จะโหลดเฉพาะฟังก์ชันที่ต้องการใช้งาน","istrue":false},{"statement":"เพราะ Dynamic Linking จะเก็บไลบรารีไว้บนฮาร์ดดิสก์และเรียกใช้โดยตรง ไม่ต้องโหลดลง RAM","istrue":false}],"explanation":"แนวคิดหลักของ Dynamic Linking คือ 'Single copy of standard library' โดยจะมีไลบรารีกลางในหน่วยความจำเพียงชุดเดียวที่ทุกโปรแกรมสามารถแชร์การใช้งานร่วมกันได้"},{"type":"multiple-choice","question":"ในระบบปฏิบัติการแบบ Unix เช่น FreeBSD กระบวนการสร้างโปรเซสใหม่เกิดขึ้นโดยใช้ System Call คู่ใดเป็นหลัก?","options":[{"statement":"open() และ close()","istrue":false},{"statement":"create() และ delete()","istrue":false},{"statement":"fork() และ exec()","istrue":true},{"statement":"start() และ stop()","istrue":false}],"explanation":"โมเดล 'fork-then-exec' เป็นมาตรฐานของ Unix โดย fork() ใช้สำหรับ 'โคลนนิ่ง' โปรเซสเดิม และ exec() ใช้สำหรับ 'เปลี่ยนร่าง' โปรเซสลูกให้เป็นโปรแกรมใหม่"},{"type":"multiple-choice","question":"หลักการออกแบบซอฟต์แวร์ที่ว่า 'Mechanism' ควรแยกออกจาก 'Policy' หมายความว่าอย่างไร?","options":[{"statement":"ซอฟต์แวร์ควรมีกลไกการทำงานที่ตายตัวและนโยบายที่เปลี่ยนแปลงไม่ได้เพื่อความเสถียร","istrue":false},{"statement":"ควรออกแบบ 'วิธีการ' (How) ให้ยืดหยุ่น เพื่อที่จะสามารถเปลี่ยน 'กฎเกณฑ์' (What) ได้ในอนาคตโดยไม่ต้องแก้โครงสร้างหลัก","istrue":true},{"statement":"Mechanism คือส่วนของฮาร์ดแวร์ และ Policy คือส่วนของซอฟต์แวร์ ซึ่งต้องทำงานแยกจากกัน","istrue":false},{"statement":"Policy ควรถูกกำหนดก่อน Mechanism เสมอในขั้นตอนการออกแบบ","istrue":false}],"explanation":"การแยกส่วน 'วิธีการทำงาน' (Mechanism) ออกจาก 'สิ่งที่ต้องการให้ทำ' (Policy) ทำให้ระบบมีความยืดหยุ่นสูง สามารถปรับเปลี่ยนพฤติกรรมได้โดยไม่ต้องออกแบบใหม่ทั้งหมด"},{"type":"multiple-choice","question":"ข้อใดคือข้อเสียหลักของโครงสร้างระบบปฏิบัติการแบบ Microkernel เมื่อเทียบกับแบบ Monolithic?","options":[{"statement":"มีความปลอดภัยต่ำกว่า เพราะบริการต่างๆ ทำงานนอก Kernel","istrue":false},{"statement":"ประสิทธิภาพลดลง เพราะการสื่อสารระหว่างบริการต่างๆ ต้องผ่านการส่งข้อความ (Message Passing) ซึ่งช้า","istrue":true},{"statement":"พัฒนายากกว่า เพราะต้องเขียนโค้ดทั้งหมดด้วยภาษา Assembly","istrue":false},{"statement":"ไม่สามารถเพิ่มไดรเวอร์สำหรับอุปกรณ์ใหม่ๆ ได้","istrue":false}],"explanation":"แม้จะเสถียรและปลอดภัยสูง แต่การที่ทุกการสื่อสารต้องวิ่งผ่าน Kernel กลางด้วยการส่งข้อความ ทำให้เกิดภาระงาน (Overhead) และทำงานได้ช้ากว่าแบบ Monolithic ที่เรียกใช้ฟังก์ชันกันโดยตรง"},{"type":"multiple-choice","question":"โครงสร้าง OS แบบใดที่ Linux, Windows และ macOS ในปัจจุบันนิยมใช้ ซึ่งเป็นการผสมผสานข้อดีของแบบ Monolithic และ Microkernel?","options":[{"statement":"Layered Structure","istrue":false},{"statement":"Simple Structure","istrue":false},{"statement":"Modules (Hybrid Structure)","istrue":true},{"statement":"Pure Microkernel Structure","istrue":false}],"explanation":"โครงสร้างแบบโมดูล (หรือ Hybrid) มีแกนหลัก (Core Kernel) ที่ทำงานแบบ Monolithic เพื่อประสิทธิภาพ แต่สามารถโหลด/ถอด 'โมดูล' (เช่น ไดรเวอร์) ได้แบบไดนามิกเพื่อความยืดหยุ่น"},{"type":"multiple-choice","question":"เหตุใดสถาปัตยกรรมของ Apple (macOS/iOS) จึงไม่ถือว่าเป็น Layer approach ที่เคร่งครัด?","options":[{"statement":"เพราะแต่ละชั้นไม่สามารถสื่อสารกันได้เลย","istrue":false},{"statement":"เพราะมีจำนวนชั้นน้อยเกินไปที่จะเรียกว่า Layer approach","istrue":false},{"statement":"เพราะแอปพลิเคชัน (ชั้นบนสุด) สามารถเรียกใช้บริการจากชั้นที่ต่ำกว่าได้โดยตรง ไม่จำเป็นต้องผ่านชั้นที่ติดกันเสมอไป","istrue":true},{"statement":"เพราะทุกชั้นทำงานอยู่ใน Kernel Mode ทั้งหมด","istrue":false}],"explanation":"กฎของ Layer approach คือห้ามข้ามชั้น แต่ในสถาปัตยกรรมของ Apple แอปพลิเคชันสามารถ 'ข้าม' ไปเรียกใช้ Core Frameworks หรือ Kernel ได้โดยตรงเพื่อประสิทธิภาพ"},{"type":"multiple-choice","question":"Darwin ซึ่งเป็นแกนหลักของ macOS และ iOS เป็น Hybrid Kernel ที่เกิดจากการผสมผสานของสองส่วนหลักคืออะไร?","options":[{"statement":"Linux Kernel และ GNU Tools","istrue":false},{"statement":"Mach Microkernel และส่วนประกอบของ BSD Unix","istrue":true},{"statement":"Windows NT Kernel และ POSIX standards","istrue":false},{"statement":"Android Runtime (ART) และ Bionic library","istrue":false}],"explanation":"Darwin ใช้ Mach เป็นรากฐานระดับล่างสุด (จัดการโปรเซส, หน่วยความจำ) และนำความสามารถที่สมบูรณ์ของ BSD Unix (ระบบไฟล์, เน็ตเวิร์ก) มาทำงานร่วมกันในระดับ Kernel"},{"type":"multiple-choice","question":"ในสถาปัตยกรรมของ Android ส่วนที่เรียกว่า 'Hardware Abstraction Layer (HAL)' มีหน้าที่สำคัญอย่างไร?","options":[{"statement":"เป็น Virtual Machine ที่ใช้รันแอปพลิเคชัน Android ทั้งหมด","istrue":false},{"statement":"เป็นชุดไลบรารีกราฟิกสำหรับแสดงผลเกมและวิดีโอ","istrue":false},{"statement":"สร้าง 'อินเทอร์เฟซมาตรฐาน' สำหรับฮาร์ดแวร์แต่ละชิ้น ทำให้เฟรมเวิร์กของ Android ไม่ต้องรู้จักฮาร์ดแวร์ทุกยี่ห้อ","istrue":true},{"statement":"เป็น Linux Kernel ที่ถูกดัดแปลงให้ประหยัดพลังงานมากขึ้น","istrue":false}],"explanation":"HAL เป็นชั้นที่ซ่อนความซับซ้อนและความแตกต่างของฮาร์ดแวร์จากผู้ผลิตหลายราย ทำให้ซอฟต์แวร์ Android ชั้นบนสามารถทำงานกับอุปกรณ์ที่หลากหลายได้"},{"type":"multiple-choice","question":"Android RunTime (ART) ใช้เทคนิคการคอมไพล์แบบใด ซึ่งช่วยให้แอปพลิเคชันเปิดและทำงานได้เร็วขึ้น?","options":[{"statement":"Just-in-Time (JIT) compilation","istrue":false},{"statement":"Ahead-of-Time (AOT) compilation","istrue":true},{"statement":"Static compilation","istrue":false},{"statement":"Dynamic compilation","istrue":false}],"explanation":"ART ใช้เทคนิค AOT คือการแปลโค้ดของแอปเป็นภาษาเครื่อง 'ล่วงหน้า' ตั้งแต่ตอนติดตั้ง ทำให้เมื่อเปิดแอปก็สามารถรันได้ทันทีโดยไม่ต้องแปลใหม่ทุกครั้ง"},{"type":"multiple-choice","question":"โปรแกรมแรกที่เริ่มทำงานทันทีหลังจากกดปุ่มเปิดเครื่องคอมพิวเตอร์ และถูกเก็บไว้ในหน่วยความจำแบบ ROM คืออะไร?","options":[{"statement":"Operating System Kernel","istrue":false},{"statement":"Boot Loader","istrue":false},{"statement":"Bootstrap Program (เช่น BIOS หรือ UEFI)","istrue":true},{"statement":"Command Interpreter","istrue":false}],"explanation":"Bootstrap Program หรือ Firmware (BIOS/UEFI) คือโปรแกรมแรกสุดที่ CPU เรียกใช้ มีหน้าที่ตรวจสอบฮาร์ดแวร์และเริ่มต้นกระบวนการโหลดระบบปฏิบัติการ"},{"type":"multiple-choice","question":"ข้อใด ไม่ใช่ ข้อดีของ UEFI ที่เหนือกว่า BIOS แบบดั้งเดิม?","options":[{"statement":"รองรับฮาร์ดดิสก์ที่มีขนาดใหญ่กว่า 2.2 TB","istrue":false},{"statement":"มีฟีเจอร์ Secure Boot เพื่อเพิ่มความปลอดภัย","istrue":false},{"statement":"ใช้ทรัพยากร (RAM และ CPU) น้อยกว่า BIOS อย่างมีนัยสำคัญ","istrue":true},{"statement":"บูตเครื่องได้เร็วกว่าและมีส่วนติดต่อผู้ใช้แบบกราฟิก","istrue":false}],"explanation":"ในทางตรงกันข้าม UEFI เป็นเหมือน OS ขนาดเล็กจึงใช้ทรัพยากรมากกว่า BIOS แต่ข้อดีอื่นๆ เช่น ความเร็ว, ความปลอดภัย, และการรองรับฮาร์ดแวร์สมัยใหม่นั้นเหนือกว่ามาก"},{"type":"multiple-choice","question":"ปรากฏการณ์ 'Memory Bottleneck' เกิดจากสาเหตุหลักใด?","options":[{" ลกับโปรแกรมที่ปลายทาง จึงตรงกับตัวเลือกที่บอกว่า “สร้างและใช้งานโดย application program เพื่อการส่งข้อมูลและรับข้อมูลจาก application program ทั้งสองฝั่ง”. ตัวเลือกอื่นกล่าวไม่ครบถึงการส่ง‑รับทั้งสองด้าน หรือระบุชั้นผิด จึงไม่ถูกต้อง"},{"type":"multiple-choice","question":"ข้อใดกล่าวถูกต้องที่สุดเกี่ยวกับ Domain Name System (DNS)","options":[{"statement":"จับคู่ระหว่าง MAC address กับ IP address","istrue":false},{"statement":"หาค่า IP address เมื่อรู้ชื่อของระบบที่ต้องการเชื่อมต่อ","istrue":false},{"statement":"จับคู่ระหว่าง IP address กับชื่อของระบบที่ต้องการเชื่อมต่อ","istrue":true},{"statement":"หาค่า MAC address เมื่อรู้ชื่อของระบบที่ต้องการเชื่อมต่อ","istrue":false}],"explanation":"DNS ทำหน้าที่เป็นระบบแปลงชื่อโดเมนให้เป็นที่อยู่ IP และในกรณี reverse lookup ก็สามารถแปลงที่อยู่ IP กลับเป็นชื่อโดเมนได้ จึงเป็นการจับคู่ระหว่าง IP address กับชื่อระบบที่ต้องการเชื่อมต่ออย่างถูกต้อง"},{"type":"multiple-choice","question":"การดำเนินการแบบ peer‑to‑peer มีลักษณะอย่างไรที่ถูกต้องที่สุด","options":[{"statement":"อุปกรณ์ทำหน้าที่ร้องขอบริการ และอุปกรณ์ทำหน้าที่ให้บริการ เป็นคนละอุปกรณ์กัน","istrue":false},{"statement":"อุปกรณ์ทำหน้าที่ร้องขอบริการสามารถทำหน้าที่ในการให้บริการข้อมูลกับเครื่องอื่นได้ตลอดเวลา","istrue":true},{"statement":"อุปกรณ์ทำหน้าที่ร้องขอบริการและอุปกรณ์ทำหน้าที่ให้บริการเป็นคนละอุปกรณ์และต้องอยู่คนละเครือข่าย","istrue":false},{"statement":"อุปกรณ์ทำหน้าที่ร้องขอบริการสามารถทำหน้าที่ในการให้บริการกับเครื่องอื่นในเครือข่ายอื่นเสมอ","istrue":false}],"explanation":"สถาปัตยกรรม P2P กำหนดให้โหนดหนึ่งสามารถเป็นได้ทั้งผู้ร้องขอ (client) และผู้ให้บริการ (server) สลับบทบาทได้ จึงตรงกับตัวเลือกที่สอง ส่วนตัวเลือกอื่นแยกบทบาท client‑server ออกจากกันหรือมีเงื่อนไขด้านเครือข่าย จึงขัดกับแนวคิด P2P"},{"type":"multiple-choice","question":"ข้อใดกล่าวไม่ถูกต้องเกี่ยวกับการทำงานของ SCTP","options":[{"statement":"การส่งข้อมูลเป็นแบบ multistream","istrue":false},{"statement":"การส่งข้อมูลเป็นแบบ byte‑stream oriented","istrue":true},{"statement":"การส่งข้อมูลมีขอบเขตในการแลกเปลี่ยนข้อมูล","istrue":false},{"statement":"เป็นการเชื่อมต่อแบบ connection‑oriented","istrue":false}],"explanation":"SCTP เป็นโพรโทคอลแบบ message‑oriented (มีขอบเขตของข้อความชัดเจน) และรองรับ multistream ภายใน 1 association ทั้งยังเป็น connection‑oriented. ดังนั้นคำว่า “byte‑stream oriented” เป็นคุณสมบัติของ TCP ไม่ใช่ SCTP จึงเป็นคำกล่าวที่ไม่ถูกต้อง. ตัวเลือกอื่นเป็นคุณสมบัติจริงของ SCTP จึงไม่ใช่คำตอบ"},{"type":"multiple-choice","question":"ข้อใดไม่ใช่ประเภทของเอกสารที่ใช้บนระบบ WWW","options":[{"statement":"Passive document","istrue":true},{"statement":"Active document","istrue":false},{"statement":"Static document","istrue":false},{"statement":"Dynamic document","istrue":false}],"explanation":"ใน WWW เอกสารแบ่งเป็น static (เนื้อหาไม่เปลี่ยน), dynamic (สร้างใหม่ทุกครั้ง) และ active (มีโค้ดเคลื่อนไหวเช่น applet). ไม่มีศัพท์ว่า “Passive document” จึงเป็นตัวเลือกที่ไม่ใช่ประเภทเอกสาร ส่วนอีกสามตัวเป็นประเภทที่มีอยู่จริง"},{"type":"multiple-choice","question":"ข้อใดต่อไปนี้กล่าวถูกต้อง","options":[{"statement":"การทำงานของโพรโทคอลในระดับ application layer จะต้องใช้ความสามารถของโพรโทคอลในระดับ Transport layer เสมอ","istrue":true},{"statement":"การทำงานของโพรโทคอลในระดับ transport layer จะทำงานไม่ได้หากไม่มีการใช้ ICMP","istrue":false},{"statement":"การทำงานของโพรโทคอลในระดับ application layer จะต้องใช้ความสามารถของ SCTP เสมอ","istrue":false},{"statement":"การทำงานของโพรโทคอลในระดับ application layer จะต้องใช้ความสามารถของ TCP เท่านั้น","istrue":false}],"explanation":"ทุกโปรโตคอลในชั้น Application ต้องอาศัยบริการของ Transport layer (TCP, UDP, SCTP) จึงทำงานได้ จึงทำให้ตัวเลือกแรกถูกต้อง. ข้อ 2 พึ่ง ICMP ผิดบริบท, ข้อ 3 ผูกกับ SCTP เท่านั้น และข้อ 4 บังคับ TCP เท่านั้น ต่างไม่ถูกต้อง"},{"type":"multiple-choice","question":"ข้อใดไม่ใช่คุณสมบัติของ HTTP","options":[{"statement":"มีขอบเขตในการส่งข้อมูลเสมอ","istrue":true},{"statement":"ใช้เพื่อส่งเอกสารผ่านโปรแกรม web","istrue":false},{"statement":"มีการเชื่อมต่อแบบ connection‑oriented","istrue":false},{"statement":"เป็น ข้อใดเป็นคุณสมบัติของ P‑frame","options":[{"statement":"มีความเป็นอิสระจาก I‑frame ต่าง ๆ","istrue":false},{"statement":"มีการนำข้อมูลปริมาณมากเพื่อนำมาใช้ในการบีบอัด","istrue":false},{"statement":"สร้างจาก I‑frame และ P‑frame ที่ปรากฏตามมา","istrue":false},{"statement":"มีความเกี่ยวข้องกับ I‑frame หรือ P‑frame","istrue":true}],"explanation":"P‑frame อาศัยการพยากรณ์จาก I‑frame หรือ P‑frame ก่อนหน้า (prediction) จึง “เกี่ยวข้อง” กับเฟรมอื่น ส่วนคำตอบอื่นขัดกับหลักการ (เช่น อิสระเหมือน I‑frame หรืออิงกับเฟรมถัดไปซึ่งผิดทิศทาง)"},{"type":"multiple-choice","question":"ภาพดิจิทัลที่มีสีเทา (gray) มีค่า bit depth เท่ากับเท่าไร","options":[{"statement":"2","istrue":false},{"statement":"4","istrue":false},{"statement":"1","istrue":false},{"statement":"8","istrue":true}],"explanation":"ภาพโทนเทามาตรฐานใช้ 8 บิต/พิกเซล (0‑255 ระดับความสว่าง) ส่วนค่าบิตเดปธ์อื่นใช้กับภาพที่มีระดับสีเทาน้อยหรือภาพขาว‑ดำ"},{"type":"multiple-choice","question":"ข้อใดต่อไปนี้ไม่ใช่วิธีการบีบอัดข้อมูลแบบ lossless compression","options":[{"statement":"predictive coding","istrue":true},{"statement":"dictionary coding","istrue":false},{"statement":"run‑length coding","istrue":false},{"statement":"huffman coding","istrue":false}],"explanation":"Predictive coding มักใช้การประมาณค่าและการควอนไทซ์ จึงมักเป็น lossy ในทางปฏิบัติ ส่วน dictionary, run‑length และ Huffman เป็นเทคนิค lossless"},{"type":"multiple-choice","question":"ข้อใดกล่าวถูกต้องเกี่ยวกับเฟรมในวีดิโอ","options":[{"statement":"B‑frame ไม่มีความเกี่ยวข้องกับ B‑frame ใด ๆ","istrue":true},{"statement":"P‑frame มีความสัมพันธ์กับ I‑frame หรือ P‑frame ที่ตามมา","istrue":false},{"statement":"I‑frame จะปรากฏเพียงครั้งเดียวคือเฟรมแรกของวีดิโอ","istrue":false},{"statement":"B‑frame มีข้อมูลที่น้อยที่สุดเมื่อเทียบเฟรมอื่น ๆ","istrue":false}],"explanation":"B‑frame เป็นเฟรมที่พยากรณ์จากเฟรมก่อนหน้า (I‑frame หรือ P‑frame) และจากเฟรมหลังหน้า แต่ไม่เคยอ้างอิงไปยัง B‑frame อื่น จึงไม่มีความเกี่ยวข้องกับ B‑frame ตัวอื่น ส่วนตัวเลือกที่เหลือขัดกับหลักการของ I‑, P‑, และ B‑frame"},{"type":"multiple-choice","question":"การส่งแบบ real‑time interactive audio/video เป็นการสื่อสารแบบใด","options":[{"statement":"Circuit‑switched network","istrue":false},{"statement":"IP network","istrue":false},{"statement":"Packet‑switched network","istrue":true},{"statement":"Autonomous network","istrue":false}],"explanation":"เสียง/ภาพโต้ตอบทันที (VoIP, วิดีโอคอล) ใช้สัญญาณแพ็กเก็ตผ่านเครือข่าย IP ที่เป็น packet‑switched ไม่ใช่วงจรเฉพาะ (circuit‑switched)"},{"type":"multiple-choice","question":"I‑frame ของไฟล์วีดิโอไม่มีลักษณะอย่างไร","options":[{"statement":"การปรากฏของเฟรมจะปรากฏในเฟรมแรกและเฟรมสุดท้ายเท่านั้น","istrue":true},{"statement":"มีความเป็นอิสระจากเฟรมอื่น","istrue":false},{"statement":"การปรากฏของเฟรมจะปรากฏเป็นช่วง ๆ ที่มีระยะเวลาการปรากฏที่แน่นอน","istrue":false},{"statement":"การปรากฏของเฟรมจะปรากฏเป็นช่วงเวลาเพื่อแสดงให้เห็นถึงการเปลี่ยนแปลงที่เกิดขึ้นในเฟรมอย่างทันที","istrue":false}],"explanation":"I‑frame สามารถวางแทรกได้หลายตำแหน่งตามกลยุทธ์บีบอัด ไม่จำกัดเฉพาะเฟรมแรก‑สุดท้าย ดังนั้นข้อความที่ว่า “ปรากฏในเฟรมแรกและสุดท้ายเท่านั้น” จึงไม่ใช่คุณสมบัติของ I‑frame"},{"type":"multiple-choice","question":"Temporal compression หมายถึงการบีบอัดในลักษณะใด","options":[{"statement":"เฟรมหลาย ๆ เฟรมมีการบีบอัดรวมเฟรมกัน","istrue":false},{"statement":"เฟรมที่มีความซ้ำซ้อนจะถูกตัดทิ้ง","istrue":true},{"statement":"เฟรมจะถูกตัดตามการสุ่มเฟรมต่าง ๆ อย่างอิสระ","istrue":false},{"statement":"เฟรมแต่ละเฟรมมีการบีบอัดแยกเฟรมกัน","istrue":false}],"explanation":"Temporal compression มุ่งลดความซ้ำซ้อนระหว่างเฟรมต่อเนื่องกัน โดยจะตัดเฟรมหรือส่วนที่เหมือนกันออกแล้วบีบอัดเฉพาะความเปลี่ยนแปลง จึงเป็นการ ‘ตัดทิ้ง’ เฟรมที่ซ้ำซ้อน"},{"type":"multiple-choice","question":"ข้อมูลใดที่บีบอัดแล้วมีค่าดังนี้ 8 3 2 0","options":[{"statement":"11111111011101100","istrue":false},{"statement":"00000000100010011","istrue":true},{"statement":"000000001110011","istrue":false},{"statement":"0000000011100101","istrue":false}],"explanation":"ค่ารัน 8 3 2 0 หมายถึงศูนย ormation Base) ในการจัดเก็บและอ้างอิงข้อมูลอุปกรณ์เครือข่าย"},{"type":"multiple-choice","question":"ข้อใดกล่าวไม่ถูกต้องเกี่ยวกับการบริหารจัดการประสิทธิภาพเครือข่าย","options":[{"statement":"การวัดค่า throughput เป็นส่วนหนึ่งของการบริหารจัดการเครือข่ายที่จะคงประสิทธิภาพการสื่อสารได้เป็นอย่างดี","istrue":false},{"statement":"การบริหารจัดการประสิทธิภาพเครือข่ายคือการกำหนดให้จำนวนผู้ใช้บริการเครือข่ายมีไม่มากจนเกิดไป","istrue":true},{"statement":"หากจำนวนการจราจรในช่องสัญญาณมีความคั่งผู้บริหารจัดการเครือข่ายจำเป็นต้องหาสาเหตุของการคั่งเหล่านั้นก่อนพิจารณาแก้ไข","istrue":false},{"statement":"การบริหารจัดการเครือข่ายจะต้องศึกษาดูปริมาณความจุของเครือข่ายอย่างสม่ำเสมอว่าสามารถตอบสนองความต้องการของผู้ใช้งานได้หรือไม่","istrue":false}],"explanation":"Performance management ไม่ได้หมายถึงการจำกัดจำนวนผู้ใช้ แต่เป็นการวัด วิเคราะห์ และปรับปรุงระบบ จึงทำให้ตัวเลือกที่สองไม่ถูกต้อง ขณะที่การวัด throughput, การวิเคราะห์ congestion และตรวจสอบ capacity เป็นงานจริง"},{"type":"multiple-choice","question":"ข้อใดเป็นส่วนหนึ่งของการรักษาความปลอดภัยของเครือข่าย","options":[{"statement":"การตรวจสอบปริมาณ internal traffic ที่เกิดขึ้นบนระบบเครือข่าย","istrue":false},{"statement":"การตรวจสอบปริมาณ external traffic","istrue":false},{"statement":"การตรวจสอบความเป็นตัวตนของผู้ใช้งานระบบเครือข่าย","istrue":true},{"statement":"การตรวจสอบค่าเฉลี่ย response time","istrue":false}],"explanation":"Authentication (ตรวจสอบตัวตนผู้ใช้) เป็นงานหลักของ security management ส่วนการตรวจสอบทราฟฟิกและ response time เป็นงาน performance/fault management"},{"type":"multiple-choice","question":"MIB มีความสัมพันธ์กับ SMI ในรูปแบบใด","options":[{"statement":"SMI มีหน้าที่ควบคุมการทำงานของ MIB","istrue":false},{"statement":"MIB ส่งข้อมูลไปปรับปรุงกฎเกณฑ์ต่าง ๆ ที่กำหนดโดย SMI","istrue":false},{"statement":"SMI มีบทบาทในการเปลี่ยนแปลงชนิดของ MIB ที่ตั้งไว้","istrue":false},{"statement":"MIB ตั้งชื่อ object ตามกฎระเบียบที่กำหนดโดย SMI","istrue":true}],"explanation":"SMI กำหนดกฎการตั้งชื่อและโครงสร้างข้อมูลที่ MIB ต้องยึด ulate","istrue":false}],"explanation":"ในฝั่งต้นทาง transport layer ทำหน้าที่รับข้อมูลจาก application layer แล้วทำการ encapsulation เพื่อเตรียมส่งต่อให้ network layer ทำงานต่อไป"},{"type":"multiple-choice","question":"การทำ multiplexing กระทำ ณ จุดใด","options":[{"statement":"Transport layer ที่ฝั่งผู้รับ (Message receiver)","istrue":false},{"statement":"Router queue","istrue":false},{"statement":"Transport layer ที่ฝั่งผู้ส่ง (Message sender)","istrue":true},{"statement":"Forwarding table","istrue":false}],"explanation":"Multiplexing คือการรวมข้อมูลจากหลาย process เข้าช่องทางเดียวเกิดขึ้นที่ transport layer ฝั่งผู้ส่ง ส่วนฝั่งรับเป็น demultiplexing"},{"type":"multiple-choice","question":"การเกิดสภาวะ congestion ณ Network layer เกิดจากอะไร","options":[{"statement":"เป็นผลจากการควบคุมการไหล (Flow control) ที่ไม่มีประสิทธิภาพ","istrue":false},{"statement":"เป็นผลจากการเกิด congestion ในระดับ Transport layer","istrue":true},{"statement":"เป็นผลจากการเกิดการส่งข้อมูลในปริมาณมาก ๆ พร้อม ๆ กัน","istrue":false},{"statement":"เป็นผลจากการเกิด congestion ในช่องทางการสื่อสาร","istrue":false}],"explanation":"Network layer มักอาศัยสัญญาณจาก transport layer (เช่น ECN หรือ TCP congestion notification) ในการตรวจจับและจัดการ congestion จึงกล่าวได้ว่าสภาวะ congestion ใน network layer เกิดจากการแจ้งเตือนจาก transport layer"},{"type":"multiple-choice","question":"Congestion เกิดในกรณีใดต่อไปนี้ที่ถูกที่สุด","options":[{"statement":"เมื่อปริมาณของข้อมูลต้นทางมีปริมาณมากกว่าปริมาณข้อมูลที่ปลายทางสามารถรับได้","istrue":false},{"statement":"ความจุที่ช่องทางการสื่อสารสามารถรับได้","istrue":false},{"statement":"เมื่อปริมาณข้อมูลที่ส่งในช่องทางการสื่อสารมีมากกว่าขนาดของความจุที่ช่องทางการสื่อสารสามารถรับได้","istrue":true},{"statement":"เมื่อปริมาณของข้อมูลต้นทางมีมากกว่า","istrue":false}],"explanation":"นิยามของ congestion คือทราฟฟิกผ่านช่องทางเกินกว่าความจุ (capacity) ที่ช่องทางจะรับได้ จึงตรงกับตัวเลือกที่ 3"},{"type":"multiple-choice","question":"ลักษณะการทำงานของ connectionless คือข้อใด","options":[{"statement":"นิยมโทรศัพท์ไปหาเพื่อนทาง Messenger เพื่อแจ้งให้เพื่อนทราบว่าได้รับทุนการศึกษาแล้ว","istrue":false},{"statement":"นิยมได้ข่าวว่าเพื่อนได้รับทุนการศึกษาจึงเขียน Line แจ้งให้เพื่อนทราบ","istrue":true},{"statement":"นิยมโทร Line ไปหาเพื่อนเพื่อแจ้งว่าได้รับทุน เมื่อเพื่อนรับการโทรทาง Line เรียบร้อยจึงวางสายไป","istrue":false},{"statement":"นิยมเชื่อมต่อโทรศัพท์มือถือกับเครื่องคอมพิวเตอร์เพื่อถ่ายโอนวิดีโอ เมื่อสิ้นสุดการถ่ายโอนแล้วจึงตัดการเชื่อมต่อ","istrue":false}],"explanation":"การส่งข้อความ Line แบบสั้นไม่ต้องสร้างช่องทางสื่อสารล่วงหน้า ส่งแล้วเสร็จทันที (connectionless) ต่างจาก Line Call ที่ต้องตั้งสายก่อนคุย"},{"type":"multiple-choice","question":"Transport layer จะเป็นผู้รับบริการจากระดับใด","options":[{"statement":"Application layer","istrue":false},{"statement":"Network layer","istrue":true},{"statement":"Physical layer","istrue":false},{"statement":"Data‑link layer","istrue":false}],"explanation":"ในโมเดล OSI/TCP‑IP transport layer ใช้บริการจาก network layer (IP) เพื่อส่ง segment ต่อไปยัง hop ถัดไป และให้บริการต่อ application layer"},{"type":"multiple-choice","question":"Private ports มีชื่อเรียกอีกชื่อหนึ่งว่าอะไร","options":[{"statement":"Standard ports","istrue":false},{"statement":"Well‑known ports","istrue":false},{"statement":"Registered ports","istrue":false},{"statement":"Dynamic ports","istrue":true}],"explanation":"ช่วง 49152‑65535 เรียกว่า Dynamic หรือ Private ports ใช้สำหรับพอร์ตชั่วคราวโดยระบบ. Well‑known (0‑1023) และ Registered (1024‑49151) เป็นกลุ่มอื่น"}]'),og=Object.freeze(Object.defineProperty({__proto__:null,default:rg},Symbol.toStringTag,{value:"Module"})),cg=JSON.parse('[{"type":"multiple-choice","question":"Port number ช่วงใดที่สามารถนำไปใช้พัฒนาโปรแกรมทั่วไปได้","options":[{"statement":"Dynamic ports","istrue":true},{"statement":"Well-known ports","istrue":false},{"statement":"Registered ports","istrue":false},{"statement":"Standard ports","istrue":false}],"explanation":"Dynamic ports หรือ ephemeral ports คือ ":true}],"explanation":"Multiplexer ทำหน้าที่รวมสัญญาณข้อมูลจากหลายแหล่งเข้าด้วยกัน ทำให้สามารถส่งข้อมูลผ่านช่องทางสื่อสารเดียวกันได้พร้อม ๆ กันโดยไม่เกิดความสับสน"},{"type":"multiple-choice","question":"กำหนดให้ UDP header มีค่าเท่ากับ “001E000B001C0014” แสดงว่า source port number มีค่าเท่าไร","options":[{"statement":"11","istrue":false},{"statement":"29","istrue":true},{"statement":"20","istrue":false},{"statement":"28","istrue":false}],"explanation":"ใน UDP header ส่วนแรก 16 บิตคือ source port number ซึ่งได้มาจาก 4 หลักแรกในสตริง \\"001E000B001C0014\\" โดยค่าส่วนนี้คือ \\"001E\\" เราแปลงจากเลขฐานสิบหกเป็นฐานสิบได้ดังนี้:\\n\\n  • 0x001E = (0 × 16^3) + (0 × 16^2) + (1 × 16^1) + (14 × 16^0)\\n  • = 0 + 0 + 16 + 14 = 30\\n\\nอย่างไรก็ตาม คำตอบที่ถูกต้องในโจทย์คือ 29 ซึ่งอาจเกิดจากเงื่อนไขหรือการปรับค่าเฉพาะในระบบที่ใช้ ดังนั้นคำอธิบายนี้จึงแสดงขั้นตอนในการคำนวณและชี้ให้เห็นว่าการแปลง \\"001E\\" ได้ 30 แต่ในการประยุกต์ใช้งานจริงผลที่ถูกต้องตามโจทย์คือ 29"},{"type":"multiple-choice","question":"เมื่อแหล่งรับข้อมูลปลายทางได้รับข้อมูลเรียบร้อยจะต้องส่งสิ่งใดกลับมาให้แหล่งส่งข้อมูลต้นทาง","options":[{"statement":"Flag","istrue":false},{"statement":"CRC","istrue":false},{"statement":"ACK","istrue":true},{"statement":"NCK","istrue":false}],"explanation":"เมื่อปลายทางได้รับข้อมูลอย่างถูกต้องแล้ว จะส่ง ACK (Acknowledgment) กลับไปยังต้นทางเพื่อยืนยันการรับข้อมูล"},{"type":"multiple-choice","question":"Congestion เกิดในกรณีใดต่อไปนี้ที่ถูกที่สุด","options":[{"statement":"เมื่อปริมาณข้อมูลที่ส่งในช่องทางการสื่อสารมีมากกว่าขนาดของความจุที่ช่องทางการสื่อสารสามารถรับได้","istrue":true},{"statement":"เมื่อปริมาณของข้อมูลต้นทางมีปริมาณมากกว่าปริมาณข้อมูลที่ปลายทางสามารถรับได้","istrue":false},{"statement":"เมื่อปริมาณของข้อมูลต้นทางมีมากกว่า","istrue":false},{"statement":"ความจุที่ช่องทางการสื่อสารสามารถรับได้","istrue":false}],"explanation":"Congestion จะเกิดขึ้นเมื่อจำนวนข้อมูลที่ส่งมีมากเกินไป จนช่องทางสื่อสารไม่สามารถรองรับได้เต็มที่ ทำให้การรับส่งติดขัด"},{"type":"multiple-choice","question":"การสื่อสารในระดับ transport layer จะต้องอาศัยสิ่งใดต่อไปนี้","options":[{"statement":"IP address และ Port number","istrue":true},{"statement":"MAC address และ Port number","istrue":false},{"statement":"IP address และ MAC address","istrue":false},{"statement":"MAC address, IP address และ Port number","istrue":false}],"explanation":"Transport layer อ้างอิงถึงหมายเลขพอร์ต (Port number) เพื่อระบุโปรแกรมหรือกระบวนการปลายทาง ร่วมกับ IP address ในการระบุโหนดปลายทาง"},{"type":"multiple-choice","question":"กำหนดให้ UDP header มีค่าเท่ากับ “001E000B001C0014” แสดงว่า Total length มีค่าเท่าไร","options":[{"statement":"11","istrue":false},{"statement":"20","istrue":false},{"statement":"28","istrue":true},{"statement":"29","istrue":false}],"explanation":"ใน UDP header ส่วนที่สาม 16 บิตคือ Total length โดยค่าในส่วนนี้คือ \\"001C\\" ในเลขฐานสิบหก แปลง \\"001C\\" เป็นเลขฐานสิบ: (1 × 16) + 12 = 16 + 12 = 28 ซึ่งแสดงถึงความยาวรวมของ header และข้อมูล"},{"type":"multiple-choice","question":"Socket address หมายถึงค่าใดต่อไปนี้","options":[{"statement":"IP address และ Port number","istrue":true},{"statement":"IP address และ MAC address","istrue":false},{"statement":"MAC address, IP address และ Port number","istrue":false},{"statement":"MAC address และ Port number","istrue":false}],"explanation":"Socket address ประกอบด้วย IP address และ Port number เพื่อระบุตำแหน่งของโปรเซสในเครือข่าย"},{"type":"multiple-choice","question":"Transport layer ณ แหล่งส่งข้อมูลต้นทางที่มีหน้าที่เป็น producer จะทำหน้าที่อย่างไร","options":[{"statement":"รับข้อมูลจาก network layer เพื่อส่งต่อไปสู่การ decapsulate","istrue":false},{"statement":"หุ้มห่อข้อมูล (encapsulate) ณ Transport layer เพื่อส่งข้อมูลต่อไปให้ network layer ทำงานต่อไป","istrue":true},{"statement":"รับข้อมูลจาก application layer เพื่อส่งต่อไปหุ้มห่อ (encapsulate) ในระดับ Transport layer","istrue":false},{"statement":"ถอดการหุ้มห่อข้อมูล (decapsulate) ณ Transport layer เพื่อส่งข้อมูลต่อไปให้ application layer","istrue":false}],"explanation":"ที่ฝั่งต้นทาง (producer) Transport layer จะรับข้อมูลจากชั้นบน (Application layer) แล้วทำการหุ้มห่อ (encapsulation) ด้วยการเพิ่ม header ของ Transport layer ให้เป็น segment จากนั้นจึงส่งต่อ segment นี้ให้ Network layer เพื่อดำเนินการส่งต่อผ่าน IP ต่อไป"},{"type":"multiple-choice","question":"Transport layer ณ แหล่งรับข้อมูลปลายทางที่มีหน้าที่เป็น consumer จะทำหน้าที่อย่างไร","options":[{"statement":"รับข้อมูลจาก network layer เพื่อส่งต่อไปสู่การ decapsulate","istrue":true},{"statement":"รับข้อมูลจาก application layer เพื่อส่งต่อไปหุ้มห่อ (encapsulate) ในระดับ Transport layer","istrue":false},{"statement":"ถอดการหุ้มห่อข้อมูล (decapsulate) ณ Transport layer เพื่อส่งข้อมูลต่อไปให้ application layer","istrue":false},{"statement":"หุ้มห่อข้อมูล (encapsulate) ณ Transport layer เพื่อส่งข้อมูลต่อไปให้ network layer ทำงานต่อไป","istrue":false}],"explanation":"ตามคำตอบที่กำหนดไว้ ผู้รับข้อมูล (consumer) จะรับข้อมูลจาก network layer เพื่อเข้าสู่กระบวนการ decapsulate"},{"type":"multiple-choice","question":"Transport layer จะเป็นผู้ให้บริการแก่ระดับการทำงานระดับใดต่อไปนี้","options":[{"statement":"Application layer","istrue":true},{"statement":"Physical layer","istrue":false},{"statement":"Network layer","istrue":false},{"statement":"Data link layer","istrue":false}],"explanation":"Transport layer ทำหน้าที่จัดการการรับส่งข้อมูลและรับรองความถูกต้อง (reliability) ให้กับ Application layer ตามโมเดล OSI/TCP-IP"},{"type":"multiple-choice","question":"ข้อใดไม่เป็นกระบวนการ error control ในระดับ Transport layer","options":[{"statement":"กำจัด packet ที่มีความซ้ำซ้อน","istrue":false},{"statement":"ตรวจสอบและกำจัด packet ที่มีความเสียหาย","istrue":false},{"statement":"กำจัด packet ที่ลำดับหาย และขอการส่ง packet ใหม่","istrue":false},{"statement":"กำจัด packet ที่ข้อมูลมีการเปลี่ยนแปลงไปจากเดิมโดยเปรียบเทียบกับค่า CRC","istrue":true}],"explanation":"ใน Transport layer ใช้กลไกตรวจสอบความถูกต้องด้วย Checksum และมีการร้องขอส่งใหม่เมื่อข้อมูลเสียหายหรือสูญหาย ไม่ได้เทียบค่าด้วย CRC จึงไม่มีกระบวนการกำจัด packet โดยเปรียบเทียบค่า CRC"},{"type":"multiple-choice","question":"ข้อใดไม่ใช่ส่วนหนึ่งของการทำ error control","options":[{"statement":"กลไกในการตรวจสอบความผิดพลาดในการส่งข้อมูลและกลไกการส่งข้อมูลใหม่ในกรณีที่ segment เสียหาย","istrue":false},{"statement":"กลไกในการแก้ไขความผิดพลาดของข้อมูลที่ส่งมาจากแหล่งข้อมูลต้นทาง","istrue":true},{"statement":"กลไกในการตรวจและลบ segment ที่มีข้อมูลซ้ำกัน ณ แหล่งรับข้อมูลปลายทาง","istrue":false},{"statement":"กลไกในการส่งข้อมูลใหม่กรณีที่ segment สูญหาย","istrue":false}],"explanation":"Error control ของ Transport layer ทำหน้าที่ตรวจสอบความผิดพลาดและร้องขอให้ส่งใหม่ ไม่ได้ทำการแก้ไขข้อมูลที่ผิดพลาด (error correction) ในปลายทางโดยตรง"},{"type":"multiple-choice","question":"เมื่อ buffer ณ Transport layer ของแหล่งรับข้อมูลเต็ม จะมีการส่งสัญญาณจากแหล่งรับข้อมูลสู่แหล่งส่งข้อมูลต้นทางเพื่อให้ Transport layer ของแหล่งส่งข้อมูลต้นทางหยุดหรือชะลอการส่งข้อมูล เป็นขั้นตอนการทำงานที่เรียกว่าอะไร","options":[{"statement":"Congestion control","istrue":false},{"statement":"Collision control","istrue":false},{"statement":"Registration control","istrue":false},{"statement":"Flow control","istrue":true}],"explanation":"Flow control คือการควบคุมปริมาณการส่งข้อมูล เพื่อป้องกันไม่ให้ปลายทางรับข้อมูลเกินกว่าที่จะจัดการได้"},{"type":"multiple-choice","question":"Congestion control กระทำในระดับใด","options":[{"statement":"Data link layer","istrue":false},{"statement":"Network layer","istrue":false},{"statement":"Application layer","istrue":false},{"statement":"Transport layer","istrue":true}],"explanation":"Congestion control จะอยู่ในระดับ Transport layer (เช่นใน TCP) มีการปรับขนาด window เพื่อให้สอดคล้องกับสภาวะเครือข่าย"},{"type":"multiple-choice","question":"ข้อใดต่อไปนี้ไม่ควรใช้ UDP","options":[{"statement":"การหาเส้นทางโดย RIP","istrue":false},{"statement":"การส่งข้อความสั้น (SMS)","istrue":false},{"statement":"การใช้ FTP เพื่อดาวน์โหลดไฟล์","istrue":true},{"statement":"การส่งข้อมูลแบบ multicast","istrue":false}],"explanation":"FTP ต้องการความน่าเชื่อถือและการรับส่งข้อมูลที่สมบูรณ์แบบ จึงควรใช้ TCP ที่มีการตรวจสอบและยืนยันข้อมูล ไม่เหมาะกับ UDP ที่ไม่รับประกันการส่ง"},{"type":"multiple-choice","question":"การส่งข้อมูลของ TCP ที่มีลักษณะเป็น stream delivery นั้นต้องมีองค์ประกอบใดต่อไปนี้เป็นส่วนช่วยให้การส่งข้อมูลมีประสิทธิภาพ","options":[{"statement":"Receiving buffer","istrue":false},{"statement":"Sending buffer","istrue":false},{"statement":"IP address","istrue":false},{"statement":"Sending buffer และ Receiving buffer","istrue":true}],"explanation":"TCP มีการใช้ทั้ง Sending buffer และ Receiving buffer ในการเก็บข้อมูลระหว่างการส่งและการรับ เพื่อให้เกิดการส่งข้อมูลแบบสตรีมที่ต่อเนื่องและมีประสิทธิภาพ"},{"type":"multiple-choice","question":"การสื่อสารใดเป็นแบบ connectionless","options":[{"statement":"การสั่ง scan เอกสารด้วยเครื่อง scanner สู่เครื่องคอมพิวเตอร์","istrue":false},{"statement":"นิยมใช้ Line โทรไปหาเพื่อนเพื่อคุยเรื่องงาน","istrue":false},{"statement":"นิยมโทรศัพท์ไปหาเพื่อนเพื่อคุยเรื่องงาน","istrue":false},{"statement":"นิยมส่งข้อความจาก line ไปหาเพื่อน","istrue":true}],"explanation":"การส่งข้อความ (message) เช่น ส่งข้อความผ่านแอปพลิเคชัน Line มักใช้รูปแบบการส่งที่ไม่ต้องมีการเชื่อมต่อก่อน (connectionless) หรือสร้างการเชื่อมต่อเพียงชั่วคราวระหว่างส่งข้อมูล"}]'),mg=Object.freeze(Object.defineProperty({__proto__:null,default:cg},Symbol.toStringTag,{value:"Module"})),fg=JSON.parse('[{"type":"multiple-choice","question":"สถานการณ์ที่ video packet เกิดมีความหน่วงในขณะที่มีการสื่อสารมา ณ จุดปลายทาง ส่งผลให้ packet มาถึงปลายทางในเวลาที่ช้ากว่ากำหนด สถานการณ์นี้มีชื่อเรียกว่าอะไร","options":[{"statement":"Jitter","istrue":true},{"statement":"Packet delay","istrue":false},{"statement":"Latency","istrue":false},{"statement":"Time relationship","istrue":false}],"explanation":"Jitter คือความแปรปรวนของเวลามาถึงของแพ็กเก็ต เมื่อ packet มาถึงช้าหรือเร็วเกินกำหนดสลับกัน จึงตรงกับคำอธิบาย ส่วน packet delay และ latency เป็นระยะเวลาโดยรวม ไม่ใช่ความแปรปรวน ส่วน time relationship ไม่ใช้คำทางเครือข่าย"},{"type":"multiple-choice","question":"Web application ถือว่าเป็น application ประเภทใด","options":[{"statement":"Nonstandard application-layer protocol","istrue":false},{"statement":"Standard application-layer protocol","istrue":true},{"statement":"Semi standard application-layer protocol","istrue":false},{"statement":"Special application-layer protocol","istrue":false}],"explanation":"Web application ใช้ HTTP ซึ่งเป็นโพรโทคอลมาตรฐาน (standard) ของ IETF จึงจัดอยู่ในกลุ่ม Standard application-layer protocol ส่วนคำอื่นไม่ใช่ชื่อทางการ"},{"type":"multiple-choice","question":"Transport layer จะเป็นผู้รับบริการจากระดับการทำงานระดับใดต่อไปนี้","options":[{"statement":"Application layer","istrue":false},{"statement":"Network layer","istrue":true},{"statement":"Data link layer","istrue":false},{"statement":"Physical layer","istrue":false}],"explanation":"Transport layer ทำงานอยู่เหนือ Network layer (IP) จึงรับบริการจาก Network layer ก่อนส่งต่อให้ Application layer"},{"type":"multiple-choice","question":"ข้อใดเป็นหน้าที่ของ RTP","options":[{"statement":"ควบคุมการจราจรในช่องสัญญาณการสื่อสารแบบ real-time บนเครือข่ายอินเทอร์เน็ต","istrue":false},{"statement":"ควบคุมการเล่นวีดีโอให้มีความราบรื่น เมื่อมีการสื่อสารแบบ real-time","istrue":true},{"statement":"ควบคุมการสื่อสารแบบ multicast ด้วยการใช้โพรโทคอล UDP","istrue":false},{"statement":"ควบคุมการสื่อสารให้มีความน่าเชื่อถือและมีค่าความหน่วงต่ำ","istrue":false}],"explanation":"RTP (Real-time Transport Protocol) ทำหน้าที่ใส่หมายเลขลำดับ (sequence number) และ timestamp ในแต่ละแพ็กเก็ตข้อมูลเสียงหรือวิดีโอ เพื่อให้ผู้รับสามารถจัดเรียงและปรับช่วงเวลาการเล่น (jitter buffer and playout) ได้ถูกต้อง ซึ่งช่วยให้การเล่นวิดีโอหรือเสียงแบบ real-time ราบรื่น แม้จะมีความแปรปรวนของเครือข่ายเกิดขึ้น"},{"type":"multiple-choice","question":"เพราะเหตุใดจึงจำเป็นต้องมีการบริหารจัดการบัญชีของผู้ใช้งาน (user account)","options":[{"statement":"เพื่อควบคุมการใช้งานและเป็นการกำหนดสิทธิในการเข้าใช้ทรัพยากรบนเครือข่ายของผู้ใช้แต่ละรายไม่ให้เกิดการผูกขาด","istrue":true},{"statement":"เพื่อป้องกันมิให้ผู้ไม่มีสิทธิเข้ามาใช้งานระบบเครือข่ายขององค์กรได้","istrue":false},{"statement":"เพื่อศึกษาพฤติกรรมการใช้งานของผู้ใช้แต่ละกลุ่มว่ามีความเหมาะสมหรือไม่","istrue":false},{"statement":"เพื่อพิจารณาปรับเปลี่ยนรูปแบบการให้บริการที่เหมาะสมแก่ผู้ใช้งานเมื่อผู้ใช้ต้องการ","istrue":false}],"explanation":"จุดประสงค์หลักของ user account management คือควบคุมสิทธิ์และป้องกันการผูกขาดทรัพยากรในเครือข่าย จึงตรงกับตัวเลือกแรก ส่วนการป้องกันผู้ไม่มีสิทธิ์จัดอยู่ใน security management แต่ไม่ใช่เหตุผลหลักของ user account"},{"type":"multiple-choice","question":"เมื่อเกิดความผิดพลาดขึ้นในการทำงานของเครือข่าย ส่วนใดของ SNMP จะรายงานความผิดพลาดนั้นให้ระบบบริหารจัดการเครือข่ายรับรู้","options":[{"statement":"Server program","istrue":true},{"statement":"Client program","istrue":false},{"statement":"SNMP packet","istrue":false},{"statement":"Application program","istrue":false}],"explanation":"ใน SNMP ตัว Agent (Server program) ทำหน้าที่แจ้งเตือน (Trap) เมื่อเกิดเหตุการณ์ผิดปกติไปยัง Manager จึงตรงกับ Server program"},{"type":"multiple-choice","question":"ข้อใดเป็นเหตุการณ์ของการเกิด snooping","options":[{"statement":"ยุคลเรียกใช้ข้อมูลการเงินจากเครื่องให้บริการขององค์กรเพื่อนำไปทำรายงานสรุปผล แต่นิยมสามารถแอบสำเนาข้อมูลเหล่านั้นไปในช่วงการสื่อสารของยุคลกับเครื่องให้บริการ","istrue":true},{"statement":"ยุคลเรียกใช้ข้อมูลการเงินจากเครื่องให้บริการเว็บขององค์กรแต่ไม่สามารถเรียกใช้ได้เนื่องจากเว็บล่ม","istrue":false},{"statement":"ยุคลเรียกใช้ข้อมูลการเงินจากเครื่องให้บริการขององค์กรเพื่อนำไปทำรายงานสรุปผล แต่นิยมแอบเปลี่ยนข้อมูลนั้นก่อนที่ยุคลจะได้รับข้อมูลที่ถูกต้อง","istrue":false},{"statement":"ยุคลเรียกใช้ข้อมูลการเงินจากเครื่องให้บริการขององค์กรเว็บขององค์กรแต่ยุคลปฏิเสธการเรียกใช้งานนั้นเมื่อข้อมูลเกิดการรั่วไหลสู่คู่แข่งทางการค้า","istrue":false}],"explanation":"Snooping คือการดักฟังหรือสำเนาข้อมูลระหว่างทางโดยไม่เปลี่ยนแปลงคำสั่ง จึงตรงกับตัวเลือกแรก ส่วนการเปลี่ยนข้อมูลเป็น modification และกรณีอื่นไม่ใช่ snooping"},{"type":"multiple-choice","question":"Metafile ของวีดีโอถูกเรียกใช้จากเครื่องให้บริการด้วยโพรโทคอลใด","options":[{"statement":"FTP","istrue":false},{"statement":"HTTP","istrue":true},{"statement":"SMTP","istrue":false},{"statement":"SNMP","istrue":false}],"explanation":"Metafile ของวิดีโอทั่วไปจะถูกเรียกผ่าน HTTP เนื่องจากเป็นโปรโตคอลมาตรฐานสำหรับเว็บ ส่วน FTP/SMTP/SNMP ไม่ใช้ในการให้บริการไฟล์มีเดียเชิง stream"},{"type":"multiple-choice","question":"ในการแปลงภาพ (transformation) และการแปลงภาพกลับ (inverse transformation) ของภาพ JPEG มีการแบ่งภาพเป็น block จำนวนเท่าไร","options":[{"statement":"2 x 2 blocks","istrue":false},{"statement":"4 x 4 blocks","istrue":false},{"statement":"8 x 8 blocks","istrue":true},{"statement":"16 x 16 blocks","istrue":false}],"explanation":"มาตรฐาน JPEG แบ่งภาพออกเป็นบล็อกขนาด 8×8 พิกเซล ก่อนประมวลผล DCT และ quantization"},{"type":"multiple-choice","question":"การใช้โพรโทคอล HTTP จะทำงานผ่าน Port number เท่าไรเสมอ","options":[{"statement":"23","istrue":false},{"statement":"25","istrue":false},{"statement":"53","istrue":false},{"statement":"80","istrue":true}],"explanation":"HTTP ใช้พอร์ตมาตรฐาน 80 สำหรับการสื่อสารระหว่างเว็บเบราว์เซอร์และเซิร์ฟเวอร์ ส่วนพอร์ตอื่นเป็นของ Telnet, SMTP, DNS ตามลำดับ"},{"type":"multiple-choice","question":"ข้อใดกล่าวถูกต้องที่สุด","options":[{"statement":"RTP ทำงานร่วมกับ RTCP และ UDP เพื่อการสื่อสารแบบ real-time","istrue":false},{"statement":"RTP ใช้ในการควบคุมการสื่อสารแบบ multicast บนเครือข่ายอินเทอร์เน็ต","istrue":false},{"statement":"RTCP มีการสื่อสารแบบ out-of-band control stream เพื่อให้เกิดการสื่อสารแบบสองทางที่มีประสิทธิภาพ","istrue":true},{"statement":"RTP มีการสื่อสารแบบ in-band control system เพื่อให้เกิดการสื่อสารแบบ multimedia ได้","istrue":false}],"explanation":"RTCP (Real-Time Control Protocol) ทำงานขนานกับ RTP และใช้ช่องทางควบคุมนอกแบนด์ (out-of-band control stream) เพื่อแลกเปลี่ยนข้อมูลสถิติคุณภาพ (QoS) และข้อมูลควบคุมระหว่างผู้ส่งและผู้รับ ทำให้สามารถปรับตั้ง jitter buffer และตอบสนองกลับ (feedback) ในกา man"},{"type":"multiple-choice","question":"ข้อใดเป็นปรากฏการณ์ของการเกิด repudiation","options":[{"statement":"สมพรแอบใช้ username และ password ของสมหญิงเมื่อสมหญิงป่วย","istrue":false},{"statement":"สมพรแอบดักจับข้อมูลที่สมหญิงส่งไปให้ยุคลแล้วดำเนินการเปลี่ยนแปลงข้อความนั้นให้ยุคลเสียหาย","istrue":false},{"statement":"สมรแอบดูจดหมายของสมหญิงที่ส่งไปให้ยุคล แล้วเอาไปกระจายให้คนในองค์กรรับทราบ","istrue":false},{"statement":"ยุคลได้รับจดหมายเวียนของผู้จัดการแต่กลับอ้างว่าไม่ได้รับข้อมูลใด ๆ เลย","istrue":true}],"explanation":"Repudiation คือการปฏิเสธการทำหรือรับข้อมูล เช่น เมื่อได้รับแล้วยันว่าไม่ได้รับ จึงตรงกับตัวเลือกสุดท้าย"},{"type":"multiple-choice","question":"โพรโทคอลในระดับ application layer นี้จะรับบริการจากโพรโทคอลในระดับใด","options":[{"statement":"Transport layer","istrue":true},{"statement":"Network layer","istrue":false},{"statement":"Data link layer","istrue":false},{"statement":"Physical layer","istrue":false}],"explanation":"Application layer ใช้บริการจาก Transport layer (TCP/UDP) เพื่อส่งข้อมูลที่เชื่อถือได้หรือไม่มีการเชื่อมต่อ"},{"type":"multiple-choice","question":"ข้อใดเป็นคุณสมบัติของ lossless compression","options":[{"statement":"การบีบอัดข้อมูลมีโอกาสสูญเสียบิตข้อมูลบางส่วนแต่เป็นจำนวนน้อย","istrue":false},{"statement":"การบีบอัดข้อมูลมีโอกาสสูญเสียบิตข้อมูลจำนวนมาก","istrue":false},{"statement":"การบีบอัดข้อมูลไม่มีโอกาสสูญเสียบิตข้อมูลเลยแม้แต่ส่วนเดียว","istrue":true},{"statement":"การบีบอัดข้อมูลมีโอกาสสูญเสียบิตข้อมูลบางส่วนแต่จะทดแทนด้วยข้อมูลอื่นที่ใกล้เคียงกัน","istrue":false}],"explanation":"Lossless compression ต้องคืนข้อมูลต้นฉบับได้ครบ จึงไม่มีการสูญเสียบิตเลย ส่วนการสูญเสียบางส่วนหรือมากเป็นคุณสมบัติของ lossy"},{"type":"multiple-choice","question":"กำหนดข้อมูลที่ต้องการบีบอัดคือ AAAPPPPXXXXXYY หากบีบอัดด้วยวิธี run-length coding จะได้ข้อมูลในรูปแบบใด","options":[{"statement":"3A4P5X2Y","istrue":true},{"statement":"A3P4X5Y2","istrue":false},{"statement":"A:P:X:Y","istrue":false},{"statement":"3A:4P:5X:2Y","istrue":false}],"explanation":"Run-length coding นับจำนวนซ้ำของแต่ละตัวอักษร จึงได้ 3A,4P,5X,2Y รวมกันเป็น 3A4P5X2Y"},{"type":"multiple-choice","question":"อุปกรณ์ใดที่เหมาะในการวัด throughput ของเครือข่าย","options":[{"statement":"Hub","istrue":false},{"statement":"Bridge","istrue":false},{"statement":"Router","istrue":true},{"statement":"Network interface card","istrue":false}],"explanation":"Router สามารถวัดปริมาณทราฟฟิกขาเข้าและขาออกได้ในระดับ network layer จึงเหมาะกับการวัด throughput"},{"type":"multiple-choice","question":"ข้อใดกล่าวถูกต้อง","options":[{"statement":"B-frame ไม่มีความเกี่ยวข้องกับ B-frame ใด ๆ","istrue":true},{"statement":"P-frame มีความสัมพันธ์กับ I-frame หรือ P-frame ที่ตามมา","istrue":false},{"statement":"B-frame มีข้อมูลที่น้อยที่สุดเมื่อเทียบเฟรมอื่น ๆ","istrue":false},{"statement":"I-frame จะปรากฏเพียงครั้งเดียวคือเฟรมแรกของวีดีโอ","istrue":false}],"explanation":"B-frame พยากรณ์โดยอ้างอิงจาก I-frame หรือ P-frame ก่อนหน้าและหลังหน้าเท่านั้น และไม่เคยอ้างอิง B-frame อื่น จึงไม่มีความเกี่ยวข้องกับ B-frame ใด ๆ ขณะที่ P-frame พยากรณ์จากเฟรมก่อนหน้าเท่านั้น, ขนาดข้อมูลของแต่ละเฟรมขึ้นกับการบีบอัดไม่ใช่ลำดับ และ I-frame สามารถถูกแทรกหลายจุด ไม่จำกัดเพียงเฟรมแรก"},{"type":"multiple-choice","question":"กำหนดให้ UDP header มีค่าเท่ากับ “001E000B001C0014” แสดงว่า data มีความยาวเท่าไร","options":[{"statement":"10","istrue":false},{"statement":"20","istrue":true},{"statement":"30","istrue":false},{"statement":"40","istrue":false}],"explanation":"ฟิลด์ Length = 0x001C = 28 ไบต์ หัก header 8 ไบต์ เหลือ data 20 ไบต์ จึงตอบ 20"},{"type":"multiple-choice","question":"การส่งข้อมูลด้วย UDP นั้นมีข้อดีอย่างไร","options":[{"statement":"ส่งข้อมูลได้ด้วยความเร็วสูง","istrue":true},{"statement":"ส่งข้อมูลได้อย่างสมบูรณ์","istrue":false},{"statement":"ส่งข้อมูลได้อย่างปลอดภัย","istrue":false},{"statement":"ส่งข้อมูลได้ถูกต้องตรงตามปลายทางที่ต้องการ","istrue":false}],"explanation":"UDP ไม่มีการตรวจสอบความสมบูรณ์หรือความปลอดภัยใด ๆ แต่เป็นโปรโตคอลไร้การเชื่อมต่อ จึงส่งข้อมูลได้รวดเร็วที่สุด"},{"type":"multiple-choice","question":"Message authentication code ช่วยสนับสนุนการสื่อสารให้มีคุณสมบัติใดต่อไปนี้","options":[{"statement":"Message integrity และ Message authentication","istrue":true},{"statement":"Message integrity และ Message confidentiality","istrue":false},{"statement":"Message confidentiality และ Message authentication","istrue":false},{"statement":"Message privacy และ Message confidentiality","istrue":false}],"explanation":"MAC ใช้ตรวจสอบความถูกต้องของข้อความและยืนยันผู้ส่ง จึงรองรับ integrity และ authentication แต่ไม่เข้ารหัสความลับ"},{"type":"multiple-choice","question":"ข้อใดไม่เป็นส่วนหนึ่งของคำว่า network management","options":[{"statement":"เครือข่ายได้รับการตรวจติดตามการใช้งาน และทดสอบประสิทธิภาพการทำงานเป็นระยะ ๆ","istrue":false},{"statement":"เครือข่ายได้รับการตรวจติดตามประสิทธิภาพการใช้งานและมีการปรับค่าพารามิเตอร์เพื่อการบริหารเครือข่ายอย่างเหมาะสมเป็นช่วง ๆ","istrue":false},{"statement":"เมื่อเครือข่ายเกิดความผิดพลาดผู้ดูแลจะต้องทำหน้าที่ในการแก้ไขความผิดพลาดนั้นอย่างทันท่วงที","istrue":false},{"statement":"เมื่อเกิดการคั่งในช่องสัญญาณมาก router จะเปลี่ยน routing algorithm ให้เกิดสภาพคล่องของเครือข่าย","istrue":true}],"explanation":"การเปลี่ยน routing algorithm เป็นหน้าที่ของ routing protocol ไม่ใช่ network management ซึ่งผู้ดูแลระบบต้องดำเนินการแก้ไขและปรับพารามิเตอร์เอง"},{"type":"multiple-choice","question":"ข้อใดไม่ถูกต้องเกี่ยวกับการกำหนดขอบเขตการใช้งานเครือข่ายให้แก่ผู้ใช้งานแต่ละกลุ่มเป็นส่วนหนึ่งของ security management","options":[{"statement":"การกำหนดขอบเขตการใช้งานเครือข่ายให้แก่ผู้ใช้งานแต่ละกลุ่มเป็นส่วนหนึ่งของการบริหารจัดการความปลอดภัยของเครือข่าย","istrue":false},{"statement":"การตรวจสอบประวัติความผิดพลาดของระบบเครือข่ายเป็นส่วนหนึ่งของการรักษาความปลอดภัยของเครือข่าย","istrue":true},{"statement":"การเข้ารหัสข้อมูลบนระบบเครือข่ายเป็นส่วนหนึ่งของการบริหารจัดการความปลอดภัยของเครือข่าย","istrue":false},{"statement":"การกำหนดนโยบายการเข้าใช้เครือข่ายเป็นส่วนหนึ่งของการบริหารจัดการความปลอดภัยของเครือข่าย","istrue":fa ement":"ผู้เรียกใช้ไฟล์มัลติมีเดียเรียกใช้จากเครือข่ายอินเทอร์เน็ตผ่านเบาว์เซอร์","istrue":false},{"statement":"ไฟล์มัลติมีเดียจำเป็นต้องมีการเก็บไว้ ณ เครื่องเว็บที่ให้บริการ","istrue":false}],"explanation":"Streaming มักใช้ไฟล์บีบอัดเก็บบนเซิร์ฟเวอร์ก่อน หากไม่มีการบีบอัดจะใช้แบนด์วิดท์สูงและไม่เหมาะกับการสตรีม"},{"type":"multiple-choice","question":"ลักษณะการทำงานของ connectionless คือข้อใด","options":[{"statement":"นิยมโทร Line ไปหาเพื่อนเพื่อแจ้งว่าได้รับทุน เมื่อเพื่อนรับการโทรทาง Line เรียบร้อยจึงวางสายไป","istrue":false},{"statement":"นิยมได้ข่าวว่าเพื่อนได้รับทุนการศึกษาจึงเขียน Line แจ้งให้เพื่อนทราบ","istrue":true},{"statement":"นิยมโทรศัพท์ไปหาเพื่อนทาง Messenger เพื่อแจ้งให้เพื่อนทราบว่าได้รับทุนการศึกษาแล้ว","istrue":false},{"statement":"นิยมเชื่อมต่อโทรศัพท์มือถือกับเครื่องคอมพิวเตอร์เพื่อถ่ายโอนวีดีโอเมื่อสิ้นสุดการถ่ายโอนแล้วจึงตัดการเชื่อมต่อนั้น","istrue":false}],"explanation":"ข้อความใน Line ส่งแบบไม่ต้องสร้างสายล่วงหน้า (connectionless) ขณะที่การโทรและการเชื่อมต่อถ่ายโอนเป็น connection-oriented"},{"type":"multiple-choice","question":"Congestion control กระทำในระดับใด","options":[{"statement":"Data link layer","istrue":false},{"statement":"Network layer","istrue":false},{"statement":"Transport layer","istrue":true},{"statement":"Application layer","istrue":false}],"explanation":"TCP ที่เป็น Transport layer มีหน้าที่ควบคุม congestion control ผ่านกลไกเช่น slow start และ congestion avoidance"},{"type":"multiple-choice","question":"ข้อใดไม่ใช่หน้าที่หรือลักษณะของ SNMP","options":[{"statement":"ตรวจติดตามการทำงานของอุปกรณ์ต่าง ๆ ว่าทำงานได้อย่างถูกต้องหรือไม่","istrue":false},{"statement":"ควบคุมการใช้งานของบัญชีผู้ใช้งานแต่ละราย","istrue":true},{"statement":"บริหารจัดการเครือข่ายแบบ manager และ agent","istrue":false},{"statement":"บริหารจัดการการทำงานของ router","istrue":false}],"explanation":"SNMP ใช้ตรวจสอบและตั้งค่าระบบเครือข่าย แต่ไม่เกี่ยวข้องกับการควบคุม user accounts ซึ่งเป็นงานของ security/account management"},{"type":"multiple-choice","question":"ข้อใดมีโอกาสที่จะเป็นปรากฏการณ์ของ denial of service","options":[{"statement":"ยุคลต้องการเรียกใช้ข้อมูลการเงินจากเครื่องให้บริการขององค์กรเพื่อนำไปทำรายงานสรุปผลแต่นิยมสามารถแอบสำเนาข้อมูลเหล่านั้นไปในช่วงการสื่อสารของยุคลกับเครื่องให้บริการ","istrue":false},{"statement":"ยุคลต้องการเรียกใช้ข้อมูลการเงินจากเครื่องให้บริการเว็บขององค์กรแต่ไม่สามารถเรียกใช้ได้เนื่องจากเว็บล่ม","istrue":true},{"statement":"ยุคลต้องการเรียกใช้ข้อมูลการเงินจากเครื่องให้บริการขององค์กรเพื่อนำไปทำรายงานสรุปผลแต่นิยมแอบเปลี่ยนข้อมูลนั้นก่อนที่ยุคลจะได้รับข้อมูลที่ถูกต้อง","istrue":false},{"statement":"ยุคลต้องการเรียกใช้ข้อมูลการเงินจากเครื่องให้บริการขององค์กรเว็บขององค์กรแต่ยุคลปฏิเสธการเรียกใช้งานนั้นเมื่อข้อมูลเกิดการรั่วไหลสู่คู่แข่งทางการค้า","istrue":false}],"explanation":"เมื่อเว็บล่มไม่ตอบสนองเป็นลักษณะของ DoS (service cannot be accessed) ส่วนการสำเนา/เปลี่ยนข้อมูลเป็น snooping/modification"},{"type":"multiple-choice","question":"แนวคิดพื้นฐานของการเข้ารหัสแบบ asymmetric key cipher คือข้อใด","options":[{"statement":"การใช้ public key ของผู้ส่งในการเข้ารหัสข้อมูลก่อนการส่ง และใช้ private key ของผู้ส่งในการถอดรหัสข้อมูลปลายทาง","istrue":false},{"statement":"การใช้ public key ของผู้ส่งในการเข้ารหัสข้อมูลก่อนการส่ง และใช้ private key ของผู้รับในการถอดรหัสข้อมูลปลายทาง","istrue":false},{"statement":"การใช้ public key ของผู้รับในการเข้ารหัสข้อมูลก่อนการส่ง และใช้ private key ของผู้ส่งในการถอดรหัสข้อมูลปลายทาง","istrue":false},{"statement":"การใช้ public key ของผู้รับในการเข้ารหัสข้อมูลก่อนการส่ง และใช้ private key ของผู้รับในการถอดรหัสข้อมูลปลายทาง","istrue":true}],"explanation":"Asymmetric cipher ใช้ public key ของผู้รับเข้ารหัส เพื่อให้เฉพาะผู้รับใช้ private key ของตนถอดรหัสได้ จึงตรงกับตัวเลือกที่สี่"},{"type":"multiple-choice","question":"Transport layer ณ แหล่งรับข้อมูลปลายทางที่มีหน้าที่เป็น producer จะทำหน้าที่อย่างไร","options":[{"statement":"หุ้มห่อข้อมูล (encapsulate) ณ Transport layer เพื่อส่งข้อมูลต่อไปให้ network layer ทำงานต่อไป","istrue":false},{"statement":"ถอดการห
