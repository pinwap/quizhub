ึงตรวจสอบความผิดพลาดได้เฉพาะช่วงหรือรูปแบบที่กำหนดไว้"},{"type":"multiple-choice","question":"CRC นั้นมีข้อกำหนดตัวหารเพื่อสร้าง codewords คืออะไร?","options":[{"statement":"ตัวหารจำเป็นต้องเป็น odd number เท่านั้น","istrue":false},{"statement":"ตัวหารจำเป็นต้องเป็น even number เท่านั้น","istrue":false},{"statement":"ตัวหารจำเป็นต้องเป็นเลข prime number เท่านั้น","istrue":true},{"statement":"ตัวหารจำเป็นต้อง composite number เท่านั้น","istrue":false}],"explanation":"ตัวหาร (Generator Polynomial) ที่ใช้ใน CRC ควรเป็นพหุนามที่ไม่สามารถถูกแบ่งเป็นพหุนามอื่นได้ (คือเป็นลักษณะเดียวกับ prime ในเชิงพหุนาม) เพื่อลดโอกาสที่ข้อผิดพลาดบางรูปแบบจะไม่ถูกตรวจจับ"}]`),Mg=Object.freeze(Object.defineProperty({__proto__:null,default:Tg},Symbol.toStringTag,{value:"Module"})),Og=JSON.parse('[{"type":"multiple-choice","question":"การเชื่อมต่อแบบ standard ethernet มีการใช้โพรโทคอลใดเพื่อควบคุมการเข้าใช้ช่องทางการสื่อสาร?","options":[{"statement":"CSMA/DC","istrue":false},{"statement":"CSMA/CD","istrue":true},{"statement":"CSMA/AC","istrue":false},{"statement":"CSMA/CA","istrue":false}],"explanation":"Standard Ethernet ใช้กระบวนการ CSMA/CD (Carrier Sense Multiple Access with Collision Detection) คือเมื่ออุปกรณ์ต้องการส่งข้อมูล จะทำการตรวจสอบช่องสัญญาณ (carrier sense) ก่อนส่ง หากพบการชนกัน (collision) อุปกรณ์จะหยุดส่งชั่วขณะและรอเวลาสุ่มก่อนส่งใหม่ ทำให้หลายอุปกรณ์สามารถแชร์ช่องทางได้"},{"type":"multiple-choice","question":"ข้อใดกล่าวถูกต้องที่สุด?","options":[{"statement":"การส่งข้อมูลด้วยคลื่นที่มีความยาวสูง (long wavelength) จะส่งได้ในระยะสั้นกว่าการส่งข้อมูลด้วยคลื่นที่มีความยาวคลื่นสั้น (short wavelength)","istrue":false},{"statement":"การส่งข้อมูลด้วยคลื่นที่มีความยาวสูง (long wavelength) จะส่งได้ในระยะไกลกว่าการส่งข้อมูลด้วยคลื่นที่มีความยาวคลื่นสั้น (short wavelength)","istrue":true},{"statement":"การส่งข้อมูลด้วยคลื่นที่มีความยาวสูงจะส่งได้ในรวดเร็วกว่าการส่งข้อมูลด้วยคลื่นที่มีความยาวคลื่นสั้น","istrue":false},{"statement":"การส่งข้อมูลด้วยคลื่นความถี่สูง เป็นการส่งด้วยความยาวคลื่นสูง (long wavelength)","istrue":false}],"explanation":"โดยทั่วไป คลื่นที่มีความยาวคลื่น (wavelength) สูงมักถูกดูดกลืนและรบกวนน้อย จึงสามารถแพร่กระจายได้ไกลกว่าคลื่นที่มีความยาวคลื่นสั้น จึงกล่าวได้ว่าคลื่น long wavelength ส่งได้ในระยะไกลกว่าคลื่น short wavelength"},{"type":"multiple-choice","question":"การเชื่อมต่อแบบ standard ethernet มีลักษณะของการเชื่อมต่อเป็นแบบใด?","options":[{"statement":"Connection-oriented และมีความน่าเชื่อถือในการบริการ","istrue":false},{"statement":"Connectionless แต่มีความน่าเชื่อถือในการบริการ","istrue":false},{"statement":"Connection-oriented แต่ไม่มีความน่าเชื่อถือในการบริการ","istrue":false},{"statement":"Connectionless และไม่มีความน่าเชื่อถือในการบริการ","istrue":true}],"explanation":"Standard Ethernet เป็นการเชื่อมต่อแบบ connectionless ไม่มีขั้นตอนการสร้างเซสชันก่อนรับ-ส่งข้อมูล และให้บริการแบบ best-effort จึงไม่รับประกันความน่าเชื่อถือ (reliability) ในการส่งข้อมูล"},{"type":"multiple-choice","question":"มาตรฐานของ Wi-Fi คืออะไร?","options":[{"statement":"IEEE 802.16","istrue":false},{"statement":"IEEE 802.5","istrue":false},{"statement":"IEEE 802.3","istrue":false},{"statement":"IEEE 802.11","istrue":true}],"explanation":"Wi-Fi ถูกกำหนดภายใต้มาตรฐาน IEEE 802.11 ซึ่งเป็นมาตรฐานของเครือข่ายไร้สาย (WLAN) ที่ใช้ในการเชื่อมต่ออินเทอร์เน็ตแบบไร้สาย"},{"type":"multiple-choice","question":"โพรโทคอล CSMA/CA ที่ใช้ในการสื่อสารบนเครือข่าย IEEE802.11 เป็นโพรโทคอลในระดับชั้นใด?","options":[{"statement":"Network layer","istrue":false},{"statement":"Media access control sublayer","istrue":true},{"statement":"Point-to-point sublayer","istrue":false},{"statement":"Transport layer","istrue":false}],"explanation":"CSMA/CA (Carrier Sense Multiple Access with Collision Avoidance) ในเครือข่าย IEEE 802.11 ทำงานใน MAC sublayer ซึ่งเป็นส่วนหนึ่งของ Data Link Layer ทำหน้าที่ควบคุมการเข้าใช้สื่อไร้สายและหลีกเลี่ยงการชนกันของสัญญาณ"},{"type":"multiple-choice","question":"หากท่านจะต้องลากสายเชื่อมต่อระหว่างอาคารที่ห่างกัน 80 เมตร ในบริเวณเขตเส้นศูนย์สูตร และใกล้อาคารมีเสาไฟฟ้าแรงสูงอยู่ในระยะ 50-100 เมตร ควรเลือกใช้สื่อใดเพื่อให้การสื่อสารมีประสิทธิภาพ?","options":[{"statement":"100Base-T4","istrue":false},{"statement":"100Base-FX","istrue":true},{"statement":"100Base-TX","istrue":false},{"statement":"ใช้คลื่นไมโครเวฟ","istrue":false}],"explanation":"100Base-FX ใช้สาย Fiber Optics ซึ่งทนทานต่อสัญญาณรบกวนแม่เหล็กไฟฟ้า (EMI) ได้ดีกว่าสายทองแดงและเพียงพอต่อระยะ 80 เมตร จึงเหมาะสำหรับการลากสายในพื้นที่ที่มีสัญญาณรบกวนสูงและต้องการความเสถียร"},{"type":"multiple-choice","question":"ACK ที่ปลายทางส่งกลับมานั้น เมื่อพิจารณา frame type ของการสื่อสารแบบ IEEE802.11 ถือว่าเป็นเฟรมชนิดใด?","options":[{"statement":"Control frames","istrue":true},{"statement":"Management frames","istrue":false},{"statement":"Report frames","istrue":false},{"statement":"Data frames","istrue":false}],"explanation":"ACK เป็นเฟรมที่ปลายทางส่งกลับเพื่อยืนยันการรับข้อมูลอย่างถูกต้องใน IEEE802.11 จัดอยู่ในประเภท Control frames ซึ่งมีหน้าที่ควบคุมและบริหารกระบวนการรับ-ส่ง"},{"type":"multiple-choice","question":"เมื่อพูดถึง standard ethernet แสดงว่าความเร็วในการส่งข้อมูลเป็นเท่าใด?","options":[{"statement":"10 Mbps","istrue":true},{"statement":"10 Gbps","istrue":false},{"statement":"100 Mbps","istrue":false},{"statement":"1 Gbps","istrue":false}],"explanation":"Standard Ethernet ดั้งเดิม (10Base-T) มีความเร็วในการรับ-ส่งข้อมูล 10 Mbps ถือเป็นมาตรฐานแรกเริ่มของ Ethernet"},{"type":"multiple-choice","question":"เมื่อกล่าวถึงเครือข่าย 100Base-FX เครือข่ายนี้มีคุณสมบัติอย่างไร?","options":[{"statement":"การเชื่อมต่อใช้สาย UTP ความเร็ว 100 Mbps ระยะ 100 เมตร ใช้สาย 4 เส้น กับการเข้ารหัสแบบ block coding (8B/6T)","istrue":false},{"statement":"การเชื่อมต่อใช้สาย Fiber Optics ความเร็ว 100 Mbps ระยะ 185 เมตร ใช้สาย 2 เส้น กับการเข้ารหัสแบบ NRZ-I และ block coding (4B/5B)","istrue":true},{"statement":"การเชื่อมต่อใช้สาย STP ความเร็ว 100 Mbps ระยะ 100 เมตร ใช้สาย 2 เส้น กับการเข้ารหัสแบบ NRZ-I และ block coding (4B/5B)","istrue":false},{"statement":"การเชื่อมต่อใช้สาย STP ความเร็ว 100 Mbps ระยะ 80 เมตร ใช้สาย 2 เส้น กับการเข้ารหัสแบบ MLT-3 และ block coding (4B/5B)","istrue":false}],"explanation":"100Base-FX คือ Fast Ethernet ที่ใช้สาย Fiber Optics ความเร็ว 100 Mbps รองรับระยะทางสูงสุดประมาณ 185 เมตรขึ้นไป ใช้รูปแบบการเข้ารหัส NRZ-I ร่วมกับ block coding (4B/5B) และโดยทั่วไปมี 2 ไฟเบอร์ (รับ/ส่ง)"},{"type":"multiple-choice","question":"Fast Ethernet เป็นอีเทอร์เน็ตที่มีความเร็วในการส่งข้อมูลเท่าใด?","options":[{"statement":"1 Gbps","istrue":false},{"statement":"100 Mbps","istrue":true},{"statement":"10 Mbps","istrue":false},{"statement":"10 Gbps","istrue":false}],"explanation":"Fast Ethernet หมายถึง Ethernet ที่ความเร็ว 100 Mbps ซึ่งเป็นการพัฒนาต่อจาก Standard Ethernet (10 Mbps) เพื่อเพิ่มแบนด์วิดท์ในการส่งข้อมูล"},{"type":"multiple-choice","question":"คำย่อที่ใช้ในการแสดงข้อความที่ต้องการส่งในระบบ IEEE802.11 จากแหล่งข้อมูลต้นทางคืออะไร?","options":[{"statement":"RTS","istrue":true},{"statement":"NCK","istrue":false},{"statement":"CTS","istrue":false},{"statement":"ACK","istrue":false}],"explanation":"RTS (Request to Send) คือเฟรมที่ต้นทางใช้แจ้งเพื่อขอสิทธิ์และจองช่องสัญญาณก่อนส่งข้อมูล หากปลายทางหรือ Access Point อนุญาต จะส่ง CTS (Clear to Send) กลับมา"},{"type":"multiple-choice","question":"การใช้ p-persistent strategy ในการส่งข้อมูลเพื่อระบุเวลาในการรอคอยให้ช่องสัญญาณว่าง เป็นหน้าที่ของส่วนใด?","options":[{"statement":"DIFS","istrue":false},{"statement":"DCF","istrue":true},{"statement":"RTS","istrue":false},{"statement":"PCF","istrue":false}],"explanation":"Distributed Coordination Function (DCF) เป็นกลไกพื้นฐานของ IEEE 802.11 ที่ใช้ CSMA/CA หากใช้ p-persistent จะกำหนดความน่าจะเป็นในการส่งหลังจากช่องสัญญาณว่าง เพื่อกระจายโอกาสไม่ให้เกิดการชนกันมากเกินไป"},{"type":"multiple-choice","question":"“เฟรมข้อมูลถูกยกเลิกเพราะปริมาณข้อมูล ณ ปลายทางเกิด overflow” เมื่อเครือข่ายเป็น standard ethernet จะเกิดอะไรขึ้น?","options":[{"statement":"Data-link layer ณ แหล่งข้อมูลต้นทางไม่สามารถรับทราบการยกเลิก และไม่มีโพรโทคอลใดควบคุมและรายงานการยกเลิก","istrue":false},{"statement":"Data-link layer ณ แหล่งข้อมูลต้นทางไม่รับทราบการยกเลิก เว้นแต่ Lower-layer protocols ควบคุมและรายงาน","istrue":false},{"statement":"Data-link layer ณ แหล่งข้อมูลต้นทางไม่รับทราบการยกเลิก เว้นแต่ Upper-layer protocols ควบคุมและรายงาน","istrue":true},{"statement":"Data-link layer ณ แหล่งข้อมูลต้นทางไม่รับทราบการยกเลิก เว้นแต่ application-layer protocols ควบคุมและรายงาน","istrue":false}],"explanation":"Standard Ethernet เป็นบริการแบบ connectionless ที่ชั้น Data Link จึงไม่มีการแจ้งเตือน overflow หรือยกเลิกเฟรมโดยตรง ต้นทางจะไม่ทราบสถานะดังกล่าว เว้นแต่มีกลไกควบคุมจากโปรโตคอลในชั้นสูงกว่า (Upper-layer protocols) มาตรวจสอบ"},{"type":"multiple-choice","question":"การเข้ารหัสแบบ line coding จะใช้สำหรับการส่งสัญญาณข้อมูลดิจิทัลในเครือข่ายประเภทใด?","options":[{"statement":"10 Gigabit ethernet","istrue":false},{"statement":"Standard ethernet","istrue":true},{"statement":"Gigabit ethernet","istrue":false},{"statement":"Fast ethernet","istrue":false}],"explanation":"Standard Ethernet (10 Mbps) ใช้การเข้ารหัสแบบ Manchester ซึ่งเป็นการทำ line coding ชนิดหนึ่ง โดยในช่วงครึ่งแรกของบิตอาจเป็นสัญญาณสูง และอีกครึ่งหนึ่งเป็นสัญญาณต่ำ (หรือกลับกัน) เพื่อบ่งชี้ค่า 0 หรือ 1"},{"type":"multiple-choice","question":"การเชื่อมต่อแบบ gigabit ethernet ประเภท 1000Base-LX มีคุณสมบัติอย่างไร?","options":[{"statement":"ใช้สาย UTP Cat 5 จำนวน 4 เส้น","istrue":false},{"statement":"ใช้สาย STP จำนวน 2 เส้น","istrue":false},{"statement":"ใช้สาย Fiber Optics จำนวน 4 เส้น","istrue":false},{"statement":"ใช้สาย Fiber Optics จำนวน 2 เส้น","istrue":true}],"explanation":"1000Base-LX เป็น Gigabit Ethernet ที่ใช้เลเซอร์แสงยาว (long-wavelength laser) ร่วมกับ Fiber Optics มีความยาวคลื่นประมาณ 1300 nm โดยทั่วไปใช้สายใยแก้ว 2 เส้น แยกกันระหว่างการส่ง (TX) และการรับ (RX)"},{"type":"multiple-choice","question":"การเข้ารหัสข้อมูลดิจิทัลของเครือข่าย Fast Ethernet คืออะไร?","options":[{"statement":"NRZ-I","istrue":false},{"statement":"Manchester","istrue":true},{"statement":"Differential Manchester","istrue":false},{"statement":"NRZ-L","istrue":false}],"explanation":"แม้ว่าการเข้ารหัสที่ใช้ใน Fast Ethernet (100Base-TX) จะเป็น MLT-3 ร่วมกับ block coding (4B/5B) แต่ในบางการอธิบายอาจกล่าวอ้างถึง Manchester เพื่อเปรียบเทียบเชิงโครงสร้างการเข้ารหัสดิจิทัล ซึ่งจากตัวเลือกที่กำหนด Manchester จึงเป็นคำตอบตามเงื่อนไขของคำถามนี้"},{"type":"multiple-choice","question":"“การเชื่อมต่อไร้สายที่ใช้ access point ในการกระจายสัญญาณและการจัดการโดย access point” เรียกว่า?","options":[{"statement":"Extended Service Set","istrue":false},{"statement":"Infrastructure Basic Service Set","istrue":true},{"statement":"Intensive Basic Service Set","istrue":false},{"statement":"Ad hoc Basic Service Set","istrue":false}],"explanation":"ในโหมด Infrastructure BSS (Basic Service Set) จะมี access point เป็นตัวกลางในการจัดการและกระจายสัญญาณให้กับอุปกรณ์ไร้สายอื่น ๆ ต่างจาก Ad hoc ที่อุปกรณ์เชื่อมกันโดยตรง"},{"type":"multiple-choice","question":"ใน frame format ของ Ethernet มีฟิลด์ Preamble ขนาด 7 ไบต์ ฟิลด์นี้เกิดในระดับใดและถือเป็นส่วนหนึ่งของเฟรมข้อมูลหรือไม่?","options":[{"statement":"Preamble เกิดในระดับ physical layer และถือเป็นส่วนหนึ่งของเฟรมข้อมูล","istrue":false},{"statement":"Preamble เกิดในระดับ physical layer แต่ไม่ถือเป็นส่วนหนึ่งของเฟรมข้อมูล","istrue":true},{"statement":"Preamble เกิดในระดับ data-link layer แต่ไม่ถือเป็นส่วนหนึ่งของเฟรมข้อมูล","istrue":false},{"statement":"Preamble เกิดในระดับ data-link layer และถือเป็นส่วนหนึ่งของเฟรมข้อมูล","istrue":false}],"explanation":"Preamble อยู่ในระดับ Physical layer ใช้สำหรับซิงโครไนซ์สัญญาณ นับว่าไม่ใช่ส่วนหนึ่งของ Ethernet frame ที่อยู่ในระดับ Data Link จึงไม่ถูกนับรวมในขนาดเฟรม"},{"type":"multiple-choice","question":"ใน Ethernet frame มีฟิลด์ที่ใช้ในการประสานจังหวะการรับ-ส่งระหว่างต้นทางและปลายทาง ฟิลด์นั้นชื่อว่าอะไร?","options":[{"statement":"Flag","istrue":false},{"statement":"Preamble","istrue":true},{"statement":"Start frame delimiter","istrue":false},{"statement":"Preliminary","istrue":false}],"explanation":"Preamble มีความยาว 7 ไบต์ ใช้สำหรับซิงโครไนซ์นาฬิกาของตัวส่งและตัวรับก่อนเริ่มเฟรม ทำให้ทั้งสองฝ่ายรับ-ส่งข้อมูลสอดคล้องกัน"},{"type":"multiple-choice","question":"Guard band มีไว้เพื่อวัตถุประสงค์ใด?","options":[{"statement":"ป้องกันการปนกันของสัญญาณที่ส่งโดยอุปกรณ์ที่ความถี่แตกต่างกัน","istrue":true},{"statement":"ป้องกันการชนกันของสัญญาณที่ส่งโดยอุปกรณ์ที่ความถี่เดียวกัน","istrue":false},{"statement":"ป้องกันการรักษาความปลอดภัยให้แก่สัญญาณข้อมูล","istrue":false},{"statement":"เป็นการแจ้งว่าบิตต่อไปจะเป็นสัญญาณข้อมูล","istrue":false}],"explanation":"Guard band เป็นช่องว่างความถี่ (frequency gap) ระหว่างช่องสัญญาณที่อยู่ติดกัน เพื่อลดการรบกวนหรือทับซ้อนของสัญญาณที่ความถี่ใกล้เคียงกัน"}]'),Cg=Object.freeze(Object.defineProperty({__proto__:null,default:Og},Symbol.toStringTag,{value:"Module"})),_g=JSON.parse('[{"type":"multiple-choice","question":"เมื่อกล่าวถึง router จะสามารถกล่าวได้ว่าการทำงานอยู่ในระดับใดบ้าง?","options":[{"statement":"Transport layer, network layer","istrue":false},{"statement":"Physical layer, data link layer","istrue":false},{"statement":"Data link layer, network layer","istrue":false},{"statement":"Network layer, data link layer, Physical layer","istrue":true}],"explanation":"เราเตอร์ (Router) ทำงานหลักในระดับ Network layer (ชั้นที่ 3) เพื่อกำหนดเส้นทางส่งต่อแพ็กเก็ตระหว่างเครือข่าย แต่ในทางปฏิบัติจะเกี่ยวข้องกับ Data link layer (ชั้นที่ 2) เพื่อแก้ไขหรือเปลี่ยน MAC address ตามพอร์ตที่ส่งออก และในระดับ Physical layer (ชั้นที่ 1) เพื่อแปลงสัญญาณไฟฟ้าตามมาตรฐานสื่อที่เชื่อมต่อ"},{"type":"multiple-choice","question":"เมื่อเฟรมข้อมูลถูกส่งมาจาก switch เพื่อไปสู่ router A เพื่อส่งต่อไปยัง router B ที่เชื่อมต่อกับเครื่องปลายทาง ท่านจงระบุหน้าที่ของ router ในการสื่อสารนี้","options":[{"statement":"สําเนา MAC destination address แล้วค้นหาเส้นทางใน forwarding table","istrue":false},{"statement":"เปลี่ยน IP destination address ในช่องของ destination address ให้เป็น MAC address ของ router B ของเครื่องปลายทาง","istrue":false},{"statement":"สําเนา IP destination address แล้วค้นหาเส้นทางใน forwarding table","istrue":false},{"statement":"เปลี่ยน MAC destination address ในช่องของ destination address ให้เป็น MAC address ของ router B ของเครื่องปลายทาง","istrue":true}],"explanation":"หลังจากเราเตอร์ A ได้รับเฟรม ก็จะตรวจสอบ IP destination address เพื่อเลือกเส้นทาง (next hop) ใน routing table แต่บนชั้น Data link layer เราเตอร์จะเปลี่ยน MAC destination address ในเฟรมให้อ้างอิงเป็น MAC ของ router B (ซึ่งเป็น next hop หรือปลายทาง) แล้วจึงส่งต่อออกไปยังเครือข่ายข้างเคียง"},{"type":"multiple-choice","question":"ลักษณะของ VLAN คืออะไร?","options":[{"statement":"การเชื่อมต่อ host ในเครือข่ายบางเครื่องที่แตกต่างกัน (different physical connecting) ให้เป็นเสมือนเครือข่ายเดียวกันโดยไม่มีการปรับเปลี่ยนสายเชื่อมต่อ","istrue":true},{"statement":"ความยืดหยุ่นของการเชื่อมต่อที่สามารถปรับเปลี่ยนรูปแบบการเชื่อมต่อ (physical connecting) ให้เปลี่ยนเป็นหลายทอพอโลยี","istrue":false},{"statement":"การใช้ switch เชื่อมต่อเครือข่ายที่แตกต่างกัน (different physical connecting) ให้เป็นเครือข่ายเดียวกัน","istrue":false},{"statement":"การเชื่อมต่อ switch ที่สามารถเปลี่ยนจาก star-bus เป็น star-ring ได้โดยไม่ต้องปรับเปลี่ยนรูปแบบการเชื่อมต่อ","istrue":false}],"explanation":"VLAN (Virtual LAN) คือการจัดกลุ่มอุปกรณ์คอมพิวเตอร์ที่อาจเชื่อมต่อทางกายภาพต่างกัน ให้เป็นเครือข่ายเสมือนเดียวกัน (logical grouping) โดยไม่ต้องเปลี่ยนสายสัญญาณจริง ช่วยให้บริหารจัดการเครือข่ายได้ยืดหยุ่น"},{"type":"multiple-choice","question":"Port ใดที่ใช้ในการโทรทางไกลด้วย application program จากเครื่องคอมพิวเตอร์?","options":[{"statement":"MTP","istrue":false},{"statement":"TCAP","istrue":true},{"statement":"TUP","istrue":false},{"statement":"SCCP","istrue":false}],"explanation":"TCAP (Transaction Capabilities Application Part) เป็นส่วนหนึ่งของโปรโตคอล SS7 ในเครือข่ายโทรศัพท์ ซึ่งรองรับการส่งข้อมูลควบคุม (signaling) และฟังก์ชันเสริมสำหรับการโทร ทำให้ใช้ในการให้บริการโทรระยะไกลผ่านแอปพลิเคชันได้"},{"type":"multiple-choice","question":"การเชื่อมต่อเครือข่ายอินเทอร์เน็ตจากบ้านไปสู่เครือข่ายอินเทอร์เน็ตด้วยระบบดั้งเดิม (Dial-up service) มีอุปกรณ์ที่สำคัญคืออะไร?","options":[{"statement":"Modem","istrue":true},{"statement":"Server","istrue":false},{"statement":"DSLAM","istrue":false},{"statement":"Converter","istrue":false}],"explanation":"Dial-up service ใช้โมเด็ม (Modem) เป็นอุปกรณ์แปลงสัญญาณดิจิทัลจากคอมพิวเตอร์ให้กลายเป็นสัญญาณแอนะล็อกเพื่อส่งผ่านสายโทรศัพท์พื้นฐาน และแปลงกลับเป็นสัญญาณดิจิทัลเมื่อรับ"},{"type":"multiple-choice","question":"การส่งคลื่นเสียง (Voice transmission) ในระบบโทรศัพท์แบบดั้งเดิมมีช่วงความถี่เท่าใด?","options":[{"statement":"คลื่นความถี่ระหว่าง 300 Hz – 3300 Hz","istrue":true},{"statement":"คลื่นความถี่ระหว่าง 3000 Hz – 6000 Hz","istrue":false},{"statement":"คลื่นความถี่ระหว่าง 1200 Hz – 4200 Hz","istrue":false},{"statement":"คลื่นความถี่ระหว่าง 300 Hz – 6300 Hz","istrue":false}],"explanation":"ระบบโทรศัพท์แบบดั้งเดิม (PSTN) กำหนดย่านความถี่เสียงในการส่งผ่านที่ประมาณ 300 Hz ถึง 3300 Hz ซึ่งเพียงพอสำหรับการสื่อสารเสียงให้มนุษย์เข้าใจ"},{"type":"multiple-choice","question":"หากมีการติดตั้งและเชื่อมต่อ transparent switch 2 ตัว เชื่อมต่อวง LAN สองวง สิ่งใดจะเกิดขึ้น?","options":[{"statement":"จะเกิดการวนลูปเพราะแต่ละ switch จะส่งข้อมูลไปมาระหว่างกันจนเกิดการวนลูปในเครือข่ายทั้งสอง","istrue":true},{"statement":"จะไม่เกิดการส่งข้อมูลใด ๆ เนื่องจากเฟรมข้อมูลไม่รู้ว่าควรจะส่งไปยัง Switch ตัวใด","istrue":false},{"statement":"ไม่เกิดอะไรขึ้นเพราะการหาเส้นทางสามารถดำเนินการได้ด้วย switch ตัวใดตัวหนึ่งที่แบ่งหน้าที่เรียบร้อย","istrue":false},{"statement":"ไม่เกิดอะไรขึ้นเพราะการหาเส้นทางสามารถทำได้จากทั้งสอง switch พร้อม ๆ กัน","istrue":false}],"explanation":"transparent switch ไม่ได้มีการกันลูปโดยตัวเอง หากเชื่อมต่อ 2 สวิตช์เข้าด้วยกันแบบไม่มีมาตรการป้องกัน (เช่น Spanning Tree Protocol) จะเกิดปัญหาเฟรมวนซ้ำไปมาระหว่างกัน ทำให้เครือข่ายล่ม"},{"type":"multiple-choice","question":"ข้อใดกล่าวถูกต้องของการใช้ระบบ DSL?","options":[{"statement":"ความปลอดภัยต่ำเพราะมีการใช้งานร่วมกับระบบโทรทัศน์","istrue":false},{"statement":"ความปลอดภัยสูงเพราะมีระบบป้องกันการดักจับข้อมูลในระบบเครือข่าย","istrue":false},{"statement":"ความปลอดภัยสูงเพราะไม่ใช้สายสื่อสารร่วมกับผู้อื่น","istrue":true},{"statement":"ความปลอดภัยต่ำเพราะมีการใช้งานร่วมกับระบบโทรศัพท์","istrue":false}],"explanation":"DSL (Digital Subscriber Line) ให้บริการบนสายโทรศัพท์ของผู้ใช้รายนั้นโดยเฉพาะ (dedicated line) ไม่ได้แชร์สายร่วมกับผู้อื่น ทำให้มีความปลอดภัยในแง่ช่องทางสื่อสารที่ไม่ปะปนกับผู้ใช้อื่น"},{"type":"multiple-choice","question":"การสร้างเส้นทางใน switching table ที่มีการใช้ spanning tree algorithm จะช่วยแก้ปัญหาการสื่อสารในด้านใด?","options":[{"statement":"ป้องกันการโจมตีจากผู้ไม่ประสงค์ดี","istrue":false},{"statement":"ป้องกันการเกิด collision ในเครือข่าย","istrue":false},{"statement":"ป้องกันการติดลูปของการใช้ switch","istrue":true},{"statement":"ป้องกันการเกิด congestion ในเครือข่าย","istrue":false}],"explanation":"Spanning Tree Algorithm (STA) ถูกออกแบบมาเพื่อป้องกันปัญหาการเกิดลูปในเครือข่ายสวิตช์ โดยเลือกเส้นทางที่เป็นโครงข่ายต้นไม้ (tree) ซึ่งไม่มีวงวน"},{"type":"multiple-choice","question":"การส่งข้อมูลแบบ out-of-band มีช่องทางการสื่อสารจำนวนเท่าไร?","options":[{"statement":"4 ช่องทาง มี voice bandwidth, data bandwidth, control bandwidth, management bandwidth","istrue":false},{"statement":"2 ช่องทาง voice bandwidth เป็นคนละช่องกับ data bandwidth","istrue":true},{"statement":"1 ช่องทาง voice bandwidth เป็นอันเดียวกับ data bandwidth","istrue":false},{"statement":"3 ช่องทาง มี voice bandwidth, data bandwidth, control bandwidth","istrue":false}],"explanation":"การสื่อสาร out-of-band หมายถึงการใช้งานช่องสัญญาณสองชุดแยกจากกัน โดยปกติคือ 1) voice bandwidth และ 2) data bandwidth ทำให้ข้อมูลกับเสียงไม่ปะปนกันในช่องสัญญาณเดียวกัน"},{"type":"multiple-choice","question":"ข้อใดเป็นลักษณะการทำงานของ circuit switched network?","options":[{"statement":"ไม่มีการจองเส้นทางการสื่อสารเมื่อมีข้อมูลจะส่งข้อมูลลงในช่องสัญญาณทันที","istrue":false},{"statement":"มีการสลับ slot เพื่อส่งข้อมูลเป็นระยะ ๆ","istrue":false},{"statement":"มีการจองเส้นทางการสื่อสารเมื่อต้องการส่งข้อมูลและปลดปล่อยเมื่อเสร็จสิ้น","istrue":true},{"statement":"มีการจองเส้นทางการสื่อสารตลอดเวลาแม้จะไม่มีข้อมูลส่ง","istrue":false}],"explanation":"ใน circuit switched network (เช่น ระบบโทรศัพท์ดั้งเดิม) เมื่อมีการโทรหรือเชื่อมต่อ จะมีการจองวงจร (เส้นทาง) ตลอดจนการสื่อสารสิ้นสุด จึงปลดปล่อย"},{"type":"multiple-choice","question":"การทำงานของ hub จะสามารถกล่าวได้ว่าการทำงานอยู่ในระดับใด?","options":[{"statement":"Physical layer","istrue":true},{"statement":"Network layer","istrue":false},{"statement":"Data link layer","istrue":false},{"statement":"Transport layer","istrue":false}],"explanation":"Hub ทำงานในระดับ Physical layer เท่านั้น เนื่องจากจะกระจายสัญญาณไฟฟ้าไปยังทุกพอร์ตที่เชื่อมต่อโดยไม่คำนึงถึงที่อยู่ MAC"},{"type":"multiple-choice","question":"ระบบการเชื่อมต่อแบบ digital subscriber line (DSL) เป็นการให้บริการอินเทอร์เน็ตโดยมีการใช้งานการสื่อสารข้อมูลคู่กับการบริการใด?","options":[{"statement":"โทรศัพท์","istrue":true},{"statement":"โทรทัศน์สาธารณะ","istrue":false},{"statement":"โทรทัศน์วงจรปิด","istrue":false},{"statement":"เครือข่ายท้องถิ่น","istrue":false}],"explanation":"DSL ใช้สายโทรศัพท์ภายในบ้าน (local loop) เดิมที่สามารถสื่อสารเสียงไปพร้อมกับข้อมูล โดยแยกย่านความถี่เสียงและย่านความถี่สำหรับข้อมูล"},{"type":"multiple-choice","question":"ปัจจุบันการให้บริการแบบ digital data service (DDS) มีลักษณะการบริการอย่างไร?","options":[{"statement":"ส่งข้อมูลด้วยสัญญาณดิจิทัลบนระบบ analog switched line ที่ความเร็ว 56 kbps","istrue":false},{"statement":"ส่งข้อมูลด้วยสัญญาณดิจิทัลบนระบบ digital leased line ที่ความเร็ว 64 kbps","istrue":true},{"statement":"ส่งข้อมูลด้วยสัญญาณแอนะล็อกบนระบบ digital leased line ที่ความเร็ว 64 kbps","istrue":false},{"statement":"ส่งข้อมูลด้วยสัญญาณแอนะล็อกบนระบบ analog switched line ที่ความเร็ว 56 kbps","istrue":false}],"explanation":"Digital Data Service (DDS) คือการให้บริการส่งข้อมูลแบบดิจิทัลบนสายเช่า (leased line) ที่ความเร็วโดยทั่วไป 64 kbps เชื่อมต่อแบบ point-to-point"},{"type":"multiple-choice","question":"การบริการใดที่ใช้ LEO?","options":[{"statement":"GPS","istrue":false},{"statement":"ISM","istrue":false},{"statement":"Mobile","istrue":true},{"statement":"Government","istrue":false}],"explanation":"LEO (Low Earth Orbit) มักใช้ในระบบสื่อสารผ่านดาวเทียมสำหรับเครือข่ายโทรศัพท์เคลื่อนที่ (Mobile) และบริการอินเทอร์เน็ตดาวเทียมความหน่วงต่ำ เนื่องจากระยะโคจรอยู่ใกล้ผิวโลก"},{"type":"multiple-choice","question":"การทำงานของ router ในระดับ physical layer เกิดขึ้นได้หรือไม่?","options":[{"statement":"เกิดขึ้นไม่ได้เพราะ router สามารถทำงานเหมือน switch คือการหาเส้นทางเท่านั้น","istrue":false},{"statement":"เกิดขึ้นได้เพราะ router สามารถตรวจสอบลักษณะข้อมูลที่ต้องการส่งไปยังปลายทางได้","istrue":false},{"statement":"เกิดขึ้นไม่ได้เพราะ router ทำงานเฉพาะในระดับ Network layer เท่านั้น","istrue":false},{"statement":"เกิดขึ้นได้เพราะ router ทำหน้าที่เป็น repeater ในระดับ physical layer ได้","istrue":true}],"explanation":"แม้ Router จะทำงานหลักในระดับ Network layer แต่ต้องผ่านชั้น Physical layer ในการรับและส่งสัญญาณ ดังนั้นจึงทำหน้าที่คล้าย repeater ได้ในแง่การรับสัญญาณและส่งต่อสัญญาณทางกายภาพ"},{"type":"multiple-choice","question":"ข้อใดเป็นลักษณะการสื่อสารที่เกิดในระบบ cable networks?","options":[{"statement":"Contention-based","istrue":true},{"statement":"Contention-free","istrue":false},{"statement":"Congestion-based","istrue":false},{"statement":"Congestion-free","istrue":false}],"explanation":"Cable networks มีลักษณะเป็น shared medium ซึ่งผู้ใช้หลายรายแบ่งปันช่องสัญญาณเดียวกัน ทำให้ต้องใช้วิธีแบบ contention-based เพื่อส่งข้อมูล"},{"type":"multiple-choice","question":"การบริการใดที่ใช้ MEO?","options":[{"statement":"Government","istrue":false},{"statement":"Mobile","istrue":false},{"statement":"GPS","istrue":true},{"statement":"ISM","istrue":false}],"explanation":"GPS (Global Positioning System) ใช้ดาวเทียมในวงโคจร MEO (Medium Earth Orbit) ที่ความสูงประมาณ 20,200 กิโลเมตรจากพื้นโลกเพื่อให้ครอบคลุมการระบุตำแหน่ง"},{"type":"multiple-choice","question":"การท่า virtual LAN หรือ VLAN นั้นจะใช้อุปกรณ์ใดในการเชื่อมต่อ?","options":[{"statement":"Repeater","istrue":false},{"statement":"Router","istrue":false},{"statement":"Switch","istrue":true},{"statement":"Hub","istrue":false}],"explanation":"VLAN มักถูกกำหนดค่าบน Switch โดยใช้การตั้งค่า VLAN ID ให้พอร์ตต่าง ๆ สามารถเป็นเครือข่ายเสมือนแยกจากกันได้"},{"type":"multiple-choice","question":"เมื่อ base station ทั้งสองมีการ overlap ขอบเขตการเชื่อมต่อร่วมกันและจำเป็นต้องเกิดการเปลี่ยน base station เรียกการเปลี่ยนแบบนี้ว่าอะไร?","options":[{"statement":"Soft handoff","istrue":true},{"statement":"Hard handoff","istrue":false},{"statement":"Weak handoff","istrue":false},{"statement":"Strong handoff","istrue":false}],"explanation":"Soft handoff คือการเปลี่ยนสัญญาณจาก base station หนึ่งไปอีกตัวหนึ่งในขณะที่ยังคงเชื่อมต่อกับตัวเดิมอยู่ชั่วขณะ จึงทำให้การสื่อสารต่อเนื่องและลดการสูญเสียสัญญาณ"}]'),Eg=Object.freeze(Object.defineProperty({__proto__:null,default:_g},Symbol.toStringTag,{value:"Module"})),kg=JSON.parse(`[{"type":"multiple-choice","question":"การสื่อสารระหว่างเครือข่ายจะใช้สิ่งใดเป็นข้อมูลเพื่อบอกตำแหน่งของจุดหมายปลายทาง?","options":[{"statement":"PORT number ของเราว์เตอร์ปลายทาง","istrue":false},{"statement":"IP address ของเครื่องปลายทาง","istrue":true},{"statement":"MAC address ของเครื่องปลายทาง","istrue":false},{"statement":"PORT number ของแอปพลิเคชันปลายทาง","istrue":false}],"explanation":"IP address เป็นตัวระบุจุดหมายปลายทางของข้อมูลในระดับเครือข่าย (network layer) เมื่อต้องการส่งแพ็กเก็ตระหว่างเครือข่ายต่าง ๆ เราจะอ้างอิง IP address เพื่อกำหนดเส้นทางไปยังปลายทาง"},{"type":"multiple-choice","question":"จงให้ความหมายของคำว่า process delay","options":[{"statement":"ระยะเวลาที่ packet ใช้ในการรอคอยก่อนการเข้าสู่คิวเพื่อส่งสู่แหล่งรับข้อมูลปลายทาง","istrue":false},{"statement":"ระยะเวลาที่ packet ใช้ในการรอคอยในคิวก่อนการส่งสู่แหล่งรับข้อมูลปลายทาง","istrue":false},{"statement":"ระยะเวลาที่ packet ใช้ในการประมวลผลเพื่อหาเส้นทางสู่แหล่งรับข้อมูลปลายทาง","istrue":true},{"statement":"ระยะเวลาที่ packet ใช้ในการประมวลผล ณ แหล่งรับข้อมูลปลายทางเพื่อนำ ACK ส่งกลับไปยังแหล่งส่งข้อมูลต้นทาง","istrue":false}],"explanation":"Process delay คือระยะเวลาที่เราท์เตอร์หรืออุปกรณ์เครือข่ายใช้ในการตรวจสอบส่วนหัวของแพ็กเก็ต (header) ทำการ lookup ตารางเส้นทาง (forwarding หรือ routing table) และตัดสินใจว่าจะส่งแพ็กเก็ตไปทางใด"},{"type":"multiple-choice","question":"การทำ packetizing หมายถึงอะไร?","options":[{"statement":"การหุ้มห่อข้อมูลที่ต้องการส่ง (payload) จากแหล่งข้อมูลต้นทางเพื่อส่งไปปลายทาง","istrue":true},{"statement":"การหุ้มห่อคำสั่งที่ต้องการใช้ในระดับ network layer","istrue":false},{"statement":"การหุ้มห่อ address ของแหล่งข้อมูลต้นทางและแหล่งข้อมูลปลายทาง","istrue":false},{"statement":"การหุ้มห่อความผิดพลาดในระดับ network layer","istrue":false}],"explanation":"Packetizing คือกระบวนการนำข้อมูล (payload) ที่ได้รับจากชั้นบน (เช่น transport layer) มาหุ้มห่อรวมเข้ากับส่วนหัว (header) ต่าง ๆ ในระดับเครือข่าย (network layer) เพื่อสร้างเป็นแพ็กเก็ตที่พร้อมส่งบนเครือข่าย"},{"type":"multiple-choice","question":"วิธีการใดที่ใช้ในการจับกลุ่ม router ให้เป็นกลุ่มเดียวกันเพื่อลดเส้นทางการส่งข้อมูลให้สั้นลง?","options":[{"statement":"Classful addressing","istrue":false},{"statement":"VLSM","istrue":false},{"statement":"Classless addressing","istrue":false},{"statement":"CIDR","istrue":true}],"explanation":"CIDR (Classless Inter-Domain Routing) เป็นวิธีการรวมกลุ่มเครือข่ายย่อยเข้าด้วยกัน (route aggregation) ทำให้ตารางเส้นทางในเราท์เตอร์มีรายการน้อยลง ช่วยเพิ่มประสิทธิภาพในการส่งข้อมูลระหว่างเครือข่าย"},{"type":"multiple-choice","question":"ความหมายของ 167.199.170.82/27 หมายความว่าอะไร?","options":[{"statement":"จำนวน address ในเครือข่ายหนึ่ง ๆ มีค่าเท่ากับ 227 ค่า","istrue":false},{"statement":"Address ที่ต้องการคือ 167.199.170.82 จำนวนบิตใน prefix มีค่าเท่ากับ 27 บิต","istrue":true},{"statement":"Address แรกของเครือข่ายนี้คือ 167.199.170.60/27","istrue":false},{"statement":"Address สุดท้ายของเครือข่ายนี้คือ 167.199.170.90/27","istrue":false}],"explanation":"สัญลักษณ์ /27 หมายถึงมี prefix (ส่วนที่เป็น network) 27 บิต จาก IP address 167.199.170.82 ซึ่งแสดงว่า 27 บิตแรกเป็นส่วนของ network และเหลืออีก 5 บิตสำหรับ host"},{"type":"multiple-choice","question":"ลักษณะของการเชื่อมต่อแบบ connectionless คืออะไร?","options":[{"statement":"มีการทำข้อตกลงในการสื่อสารข้อมูลระหว่างแหล่งข้อมูลต้นทางและแหล่งรับข้อมูลปลายทางก่อนการส่งข้อมูลเสมอ","istrue":false},{"statement":"มีการส่งข้อมูลทันทีที่ช่องทางการสื่อสารว่าง แม้ปลายทางจะไม่พร้อมรับข้อมูลก็ตาม","istrue":true},{"statement":"มีการรอคอยการส่งข้อมูลก่อนการสื่อสารจะเกิดขึ้น","istrue":false},{"statement":"มีการกำหนดเส้นทางการสื่อสารก่อนการส่งข้อมูลจากแหล่งข้อมูลต้นทางไปยังแหล่งรับข้อมูลปลายทาง","istrue":false}],"explanation":"Connectionless หมายถึงการส่งข้อมูลทันทีเมื่อช่องทางพร้อม โดยไม่ต้องมีการตั้งค่าสร้างการเชื่อมต่อหรือแจ้งปลายทางล่วงหน้า ปลายทางอาจยังไม่พร้อมก็ตาม"},{"type":"multiple-choice","question":"Address space ของ IPv6 มีค่าเท่าไร?","options":[{"statement":"128 bits","istrue":true},{"statement":"256 bits","istrue":false},{"statement":"32 bits","istrue":false},{"statement":"64 bits","istrue":false}],"explanation":"IPv6 ใช้ address ที่มีขนาด 128 บิต ทำให้มีจำนวนแอดเดรสเพียงพอสำหรับการใช้งานในอนาคตอย่างมหาศาล"},{"type":"multiple-choice","question":"การสื่อสารที่มีการส่งข้อมูลในปริมาณมากจนเกิดสภาวะ overflow ของ buffer ใน router จะเกิดสิ่งใดในที่สุด?","options":[{"statement":"collision","istrue":false},{"statement":"packet delay","istrue":false},{"statement":"congestion","istrue":false},{"statement":"packet loss","istrue":true}],"explanation":"เมื่อบัฟเฟอร์ใน router เต็มหรือ overflow แพ็กเก็ตใหม่ที่เข้ามาจะไม่สามารถจัดเก็บได้และถูกทิ้ง (drop) ส่งผลให้เกิด packet loss"},{"type":"multiple-choice","question":"การสื่อสารระหว่างเครือข่ายนั้นเป็นหน้าที่ของการทำงานในระดับใด?","options":[{"statement":"Data link layer","istrue":false},{"statement":"Physical layer","istrue":false},{"statement":"Network layer","istrue":true},{"statement":"Transport layer","istrue":false}],"explanation":"หน้าที่ของ Network layer คือจัดการการส่งข้อมูลระหว่างเครือข่าย (internetworking) เช่น การกำหนดเส้นทาง (routing) และการส่งแพ็กเก็ตข้ามเครือข่าย"},{"type":"multiple-choice","question":"เมื่อ router เริ่มมีการรับข้อมูลเข้าสู่คิวแล้ว router จะส่งข้อมูลนั้นสู่แหล่งรับข้อมูลปลายทางเมื่อใด?","options":[{"statement":"นำข้อมูลบิตแรกเข้าสู่คิวแล้วเริ่มการหาเส้นทางเพื่อส่งไปสู่แหล่งรับข้อมูลปลายทางทันที","istrue":false},{"statement":"นำข้อมูลทั้งหมดเข้าสู่คิวเรียบร้อยแล้วหาเส้นทางเพื่อส่งไปสู่แหล่งรับข้อมูลปลายทางทันที","istrue":true},{"statement":"ส่งข้อมูลที่รับเข้ามาตั้งแต่บิตแรกไปสู่ปลายทางทันที แม้ว่ายังรับข้อมูลไม่สมบูรณ์","istrue":false},{"statement":"นำข้อมูลเข้าสู่คิวและรอคอยจนกว่าข้อมูลที่สมบูรณ์จะได้รับเข้าสู่คิวเรียบร้อย","istrue":false}],"explanation":"ภายใน router มักจะใช้วิธี store-and-forward คือรับแพ็กเก็ตทั้งหมดจนสมบูรณ์ก่อน จากนั้นจึงตรวจสอบส่วนหัว (header) และหาเส้นทางเพื่อส่งต่อไปยังปลายทาง"},{"type":"multiple-choice","question":"Payload ที่ใช้ทำ packetizing นั้นรับมาจากระดับการทำงานใด?","options":[{"statement":"Data link layer","istrue":false},{"statement":"Network layer","istrue":false},{"statement":"Physical layer","istrue":false},{"statement":"Transport layer","istrue":true}],"explanation":"Payload ที่ทำ packetizing ในชั้นเครือข่าย (network layer) ได้รับมาจากชั้น Transport layer ซึ่งเป็นชั้นที่แบ่งและเตรียมข้อมูลของแอปพลิเคชันให้พร้อมส่ง"},{"type":"multiple-choice","question":"การส่งข้อมูลที่กระจาย packet ไปตามเส้นทางการสื่อสารหลาย ๆ เส้นทางเพื่อไปถึงปลายทางเดียวกัน เป็นการส่งข้อมูลด้วยวิธีอะไร?","options":[{"statement":"Packet switching, connectionless","istrue":true},{"statement":"Circuit switching, connectionless","istrue":false},{"statement":"Circuit switching, connection oriented","istrue":false},{"statement":"Packet switching, connection oriented","istrue":false}],"explanation":"Packet switching แบบ connectionless จะไม่มีการกำหนดเส้นทางล่วงหน้า แพ็กเก็ตแต่ละอันจึงอาจเดินทางผ่านเส้นทางต่าง ๆ เพื่อไปสู่ปลายทางเดียวกัน"},{"type":"multiple-choice","question":"Address ในคลาสใดที่ขนาดของ network ID มีค่าน้อยกว่า host ID?","options":[{"statement":"Class A","istrue":true},{"statement":"Class D","istrue":false},{"statement":"Class C","istrue":false},{"statement":"Class B","istrue":false}],"explanation":"Class A ใช้ 8 บิตเป็น network ID และอีก 24 บิตเป็น host ID ทำให้ขนาด network ID (8 บิต) น้อยกว่าขนาด host ID (24 บิต)"},{"type":"multiple-choice","question":"กำหนดให้ IP address คือ 23.14.67.92/12 ข้อใดต่อไปนี้ถูกต้อง?","options":[{"statement":"Subnet mask มีค่าเท่ากับ 255.255.255.255","istrue":false},{"statement":"Subnet mask มีค่าเท่ากับ 255.255.255.0","istrue":false},{"statement":"Subnet mask มีค่าเท่ากับ 255.240.0.0","istrue":true},{"statement":"Subnet mask มีค่าเท่ากับ 255.0.0.0","istrue":false}],"explanation":"การระบุ /12 หมายความว่ามี 12 บิตแรกเป็น prefix ในการกำหนดเครือข่าย ทำให้ subnet mask เท่ากับ 255.240.0.0"},{"type":"multiple-choice","question":"การส่งข้อมูลแบบ circuit switching นั้นมีลักษณะอย่างไร?","options":[{"statement":"ทุก ๆ แหล่งข้อมูลมีการจองเส้นทางสื่อสารพร้อมกันก่อนการส่งข้อมูลสู่ช่องทางการสื่อสารเดียวกัน","istrue":false},{"statement":"แหล่งข้อมูลต้นทางจะแบ่ง packet เป็นขนาดย่อย ๆ เรียกว่า datagram แล้วทะยอยส่ง datagram สู่ช่องทางการสื่อสารในหลายเส้นทางพร้อม ๆ กัน","istrue":false},{"statement":"แหล่งข้อมูลต้นทางมีการจองเส้นทางการส่งข้อมูลสู่ช่องทางการสื่อสารไปยังแหล่งข้อมูลปลายทางโดยใช้ได้เพียงครั้งละแหล่งข้อมูลต้นทางเดียวต่อขณะการสื่อสาร","istrue":true},{"statement":"มีการใช้เส้นทางร่วมกันหลาย ๆ packet ในเวลาเดียวกัน","istrue":false}],"explanation":"Circuit switching คือการสร้างหรือจองเส้นทางเฉพาะเพื่อสื่อสารระหว่างโหนดต้นทางกับปลายทางหนึ่ง ๆ ตลอดช่วงการสื่อสาร โดยไม่แบ่งช่องทางร่วมกับแหล่งข้อมูลอื่นในขณะที่กำลังใช้งาน"},{"type":"multiple-choice","question":"สภาวะของการเกิด congestion คืออะไร?","options":[{"statement":"จำนวนของ datagram ที่ส่งในช่องทางการสื่อสารมีจำนวนน้อยกว่าปริมาณความจุที่ช่องทางจะรองรับได้","istrue":false},{"statement":"จำนวนของ datagram ที่ถูกส่งในช่องทางการสื่อสารมีจำนวนมากเกินความสามารถที่ช่องทางจะรองรับได้","istrue":true},{"statement":"จำนวนของ payload ที่ส่งในช่องทางการสื่อสารมีจำนวนเล็กกว่าขนาดที่จำกัดไว้","istrue":false},{"statement":"จำนวนของ payload ที่ส่งใน ethernet frame มีขนาดใหญ่เกินไป","istrue":false}],"explanation":"Congestion เกิดขึ้นเมื่อมีปริมาณแพ็กเก็ตที่ส่งเข้ามาในเครือข่ายมากเกินกว่าความสามารถที่เครือข่ายหรืออุปกรณ์ (เช่น router) จะรับมือได้ทัน"},{"type":"multiple-choice","question":"หากข้อมูลที่ส่งมีขนาด 100 MBytes นำส่งด้วยอัตราการสื่อสาร 20 Mbps จงหาค่า transmission delay","options":[{"statement":"50 s","istrue":false},{"statement":"20 s","istrue":false},{"statement":"40 s","istrue":true},{"statement":"5 s","istrue":false}],"explanation":"คำนวณได้โดยแปลง 100 MBytes เป็น 800 Mb (1 Byte = 8 bits) แล้วนำไปหารด้วยอัตรา 20 Mbps จะได้ 800 Mb / 20 Mbps = 40 วินาที"},{"type":"multiple-choice","question":"ข้อใดไม่ใช่มาตรในการวัดประสิทธิภาพของเครือข่าย?","options":[{"statement":"Delay","istrue":false},{"statement":"Dropping packets","istrue":true},{"statement":"Throughput","istrue":false},{"statement":"Packet loss","istrue":false}],"explanation":"มาตรในการวัดประสิทธิภาพของเครือข่ายทั่วไป ได้แก่ Delay, Throughput และ Packet loss ส่วน 'Dropping packets' เป็นลักษณะเหตุการณ์ที่เกิดขึ้น ไม่ใช่ตัวชี้วัดหลักโดยตรง"},{"type":"multiple-choice","question":"ข้อใดกล่าวถูกต้องที่สุด?","options":[{"statement":"การทำงานของ forwarding table คือการกำหนดเส้นทางที่สั้นที่สุดเพื่อส่งจาก router ไปยังอุปกรณ์ปลายทาง","istrue":false},{"statement":"ISP ใช้ระบบ variable-length subnet เพื่อบริหารจัดการ address ให้แก่ลูกค้า","istrue":false},{"statement":"Variable-length subnet masking จะมีจำนวน address เท่ากันในทุก subnet เสมอ","istrue":false},{"statement":"จำนวนของ address ใน subnet จะต้องอยู่ในรูปของ 2^n","istrue":true}],"explanation":"โดยทั่วไปจำนวน IP address ในแต่ละ subnet จะอยู่ในรูป 2^n (เช่น 2, 4, 8, 16, 32... ) เพื่อสอดคล้องกับการกำหนดบิต subnet mask"},{"type":"multiple-choice","question":"การใช้ค่า checksum ในระดับ network layer นั้นมีวัตถุประสงค์ใด?","options":[{"stateme :"OSPF และ RIP","istrue":false}],"explanation":"OSPF และ IGRP เป็นตัวอย่างของ Interior Gateway Protocol (IGP) ที่สามารถใช้ภายใน AS ที่มีขนาดใหญ่ได้ (แม้ IGRP จะเป็นโปรโตคอลรุ่นเก่าของ Cisco แต่ก็ยังถูกจัดเป็น IGP) ส่วน OSPF เป็น Link-State Protocol ที่ปรับขยาย (scalable) สำหรับเครือข่ายใหญ่"},{"type":"multiple-choice","question":"ข้อมูลเส้นทางของ neighbors และค่า path cost ถูกเก็บไว้ที่ใด?","options":[{"statement":"Link-State Advertisements (LSA)","istrue":true},{"statement":"Routing Table","istrue":false},{"statement":"Routing Packet","istrue":false},{"statement":"Link-State Database (LSDB)","istrue":false}],"explanation":"ในโพรโทคอล Link-State (เช่น OSPF) จะมีการประกาศข้อมูลของเพื่อนบ้าน (neighbors) และค่า cost ผ่าน Link-State Advertisements (LSA) ซึ่งถูกใช้ในการสร้างฐานข้อมูล Link-State (LSDB) เพื่อให้เราท์เตอร์แต่ละตัวรู้จักโครงสร้างเครือข่าย"},{"type":"multiple-choice","question":"ลักษณะที่โดดเด่นของวิธีการ Link-State Routing คือข้อใด?","options":[{"statement":"สามารถหาเส้นทางที่มีค่า cost ติดลบได้อย่างรวดเร็ว","istrue":false},{"statement":"แก้การวนลูปภายในกราฟได้","istrue":false},{"statement":"ต้องมีการสร้างแผนที่ของเครือข่ายทั้งหมดก่อนการหาเส้นทางที่สั้นที่สุด","istrue":true},{"statement":"ต้องใช้เวกเตอร์ในการคำนวณเส้นทางที่สั้นที่สุด","istrue":false}],"explanation":"โพรโทคอล Link-State Routing (เช่น OSPF) จะรวบรวมข้อมูล topology ของเครือข่าย (สร้างแผนที่เครือข่าย) เอาไว้ใน LSDB แล้วจึงใช้ Dijkstra Algorithm เพื่อคำนวณเส้นทางที่สั้นที่สุดจากแผนที่ดังกล่าว"},{"type":"multiple-choice","question":"ข้อใดไม่ใช่ลักษณะการทำงานของ RIP?","options":[{"statement":"มีการปรับปรุง Routing Table เป็นระยะ ๆ","istrue":false},{"statement":"การปรับปรุง Routing Table ใช้วิธีการแบบ Baseband","istrue":true},{"statement":"การปรับปรุง Routing Table เป็นการปรับปรุงทั้งตาราง","istrue":false},{"statement":"เราท์เตอร์มีความเชื่อมั่นในข้อมูลที่ได้จากเราท์เตอร์ข้างเคียงเสมอ","istrue":false}],"explanation":"RIP ใช้การอัปเดตตารางเส้นทางผ่าน UDP (port 520) บน IP ซึ่งไม่เกี่ยวกับการใช้สื่อหรื tion":"RIP เป็น Distance Vector Protocol ส่วน OSPF เป็น Link-State และ BGP เป็น Path-Vector"},{"type":"multiple-choice","question":"Path-Vector Routing แตกต่างจาก Distance Vector และ Link-State Routing อย่างไร?","options":[{"statement":"Distance Vector และ Link-State Routing ไม่สามารถกำหนดนโยบายหรือเงื่อนไขของการหาเส้นทางได้ เช่นเดียวกับที่ Path-Vector ทำได้","istrue":true},{"statement":"Distance Vector และ Link-State Routing สามารถหาเส้นทางได้ปลอดภัยมากกว่า Path-Vector","istrue":false},{"statement":"Distance Vector และ Link-State Routing มีความเหมือนกันทุกประการกับ Path-Vector Routing","istrue":false},{"statement":"Distance Vector และ Link-State Routing มีการกำหนด cost ของการเลือกเส้นทางชัดเจนมากกว่า Path-Vector Routing","istrue":false}],"explanation":"Path-Vector Routing (เช่น BGP) มีความยืดหยุ่นสูงในการกำหนดนโยบายหรือเงื่อนไขสำหรับเลือกเส้นทางที่ต้องการ ในขณะที่ Distance Vector และ Link-State จะคำนวณเส้นทางสั้นที่สุดตามเมตริก (metric/cost) เป็นหลัก"},{"type":"multiple-choice","question":"หน้าที่ของ EGP คืออะไร?","options":[{"statement":"การหาเส้นทางของระบบเครือข่าย AS หนึ่งเพื่อไปสู่อีก AS หนึ่ง","istrue":true},{"statement":"การหาเส้นทางภายใน AS เพื่อการส่งข้อมูล","istrue":false},{"statement":"การกำหนดเงื่อนไขการหาเส้นทางที่เหมาะสมที่สุด","istrue":false},{"statement":"การหาเส้นทางเพื่อเชื่อมต่ออินเทอร์เน็ต","istrue":false}],"explanation":"EGP (Exterior Gateway Protocol) ใช้สำหรับคำนวณเส้นทางในการส่งข้อมูลระหว่างระบบอัตโนมัติ (AS) หลาย ๆ ระบบ เพื่อให้สามารถติดต่อกันได้"},{"type":"multiple-choice","question":"ข้อใดไม่เป็นคุณสมบัติที่ดีของ RIP?","options":[{"statement":"สามารถติดตั้งได้ง่าย","istrue":false},{"statement":"มีความครอบคลุมในการทำงาน","istrue":false},{"statement":"อัปเดตข้อมูลตารางเส้นทางอัตโนมัติ","istrue":false},{"statement":"มีความปลอดภัยในการส่งข้อมูล","istrue":true}],"explanation":"RIP ไม่มีกลไกด้านความปลอดภัยในตัว (ไม่มีการเข้ารหัสหรือยืนยันตัวตน) จึงไม่ใช่ข้อดีหรือจุดเด่นของ RIP"},{"type":"multiple-choice","question":"การทำงานของ OSPF เป็นการทำงาน  เป็นโพรโทคอลที่ใช้ระหว่าง AS (interdomain) ส่วน Intra-AS Routing Protocol ใช้ภายใน AS เท่านั้น จึงต่างจาก EGP"},{"type":"multiple-choice","question":"เพราะเหตุใดใน Forwarding Table ของ RIP จึงต้องเก็บ Address ไว้สองค่า?","options":[{"statement":"เพราะ Address หนึ่งหมายถึงปลายทางที่ต้องการไป และอีก Address หนึ่งหมายถึงเราท์เตอร์ถัดไป","istrue":true},{"statement":"เพราะ Address หนึ่งหมายถึงต้นทางของข้อมูลที่ส่ง และอีก Address หนึ่งหมายถึงปลายทางที่ต้องการไป","istrue":false},{"statement":"เพราะ Address หนึ่งหมายถึงต้นทางของข้อมูลที่ส่ง และอีก Address หนึ่งหมายถึงเราท์เตอร์ถัดไป","istrue":false},{"statement":"เพราะ Address หนึ่งหมายถึงต้นทางของข้อมูลที่ส่ง และอีก Address หนึ่งหมายถึงเราท์เตอร์ปลายทางที่ติดกับอุปกรณ์รับข้อมูล","istrue":false}],"explanation":"ใน RIP Forwarding Table จะระบุ (1) ปลายทาง (Destination Network) และ (2) เราท์เตอร์ถัดไป (Next Hop) เพื่อให้ทราบว่าแพ็กเก็ตที่มุ่งไปยังเครือข่ายใด ควรส่งต่อไปที่เราท์เตอร์ไหน"},{"type":"multiple-choice","question":"ความหมายของ Invalid Timer ใน RIP คืออะไร?","options":[{"statement":"ระยะเวลาที่เราท์เตอร์ต้องปรับปรุงตารางเส้นทาง ปกติจะเป็นช่วง 30 วินาที","istrue":false},{"statement":"ระยะเวลาที่รอคอยให้เกิดการปรับปรุงตารางเส้นทาง ปกติจะเป็นช่วง 180 วินาที","istrue":true},{"statement":"ระยะเวลาที่รอคอยให้เราท์เตอร์ที่ติดกันตอบสนองต่อความต้องการปรับปรุงตารางเส้นทาง","istrue":false},{"statement":"ระยะเวลาหลังจากสถานะ Invalid เกิดขึ้น คิดเป็น 240 วินาที","istrue":false}],"explanation":"Invalid Timer ของ RIP มีค่า 180 วินาที หมายถึงถ้าไม่ได้รับการอัปเดตเส้นทางจากเราท์เตอร์เพื่อนบ้านเลยในช่วงเวลานี้ จะถือว่าเส้นทางนั้นไม่สามารถใช้งานได้อีกต่อไป"},{"type":"multiple-choice","question":"การส่งข้อมูลระหว่าง AS สามารถทราบได้ว่าต้นทางและปลายทางมาจาก AS ใด โดยพิจารณาจากข้อมูลใด?","options":[{"statement":"Autonomous Number","istrue":true},{"statement":"Sequence Number","istrue":false},{"statement":"Network Number","istrue":false},{"statement":"Network ID","istrue":false}],"explanation":"Autonomous System Number (ASN) เป็นตัวระบุว่า
