ารเก็บสะสมไกลโคเจน","istrue":false},{"statement":"ทำให้น้ำตาลค่อยๆ เข้าสู่กระแสเลือดอย่างสม่ำเสมอ ลดการสะสมไขมันส่วนเกิน","istrue":true},{"statement":"ช่วยให้ร่างกายเปลี่ยนน้ำตาลเป็นพลังงานความร้อนได้ทันทีโดยไม่ต้องผ่านเซลล์","istrue":false}],"explanation":"ข้าวกล้องมีค่า GI ต่ำกว่าข้าวขาว ทำให้ระดับน้ำตาลในเลือดเพิ่มขึ้นช้าๆ พลังงานจึงคงที่และไม่กระตุ้นให้อินซูลินเปลี่ยนน้ำตาลส่วนเกินเป็นไขมันสะสมอย่างรวดเร็ว"},{"type":"multiple-choice","question":"เพราะเหตุใดการรับประทานแตงโม (GI=76) จึงควรได้รับความระมัดระวังเท่ากับการรับประทานอาหารประเภทแป้งขัดขาวในมุมมองของการคุมน้ำหนัก","options":[{"statement":"เพราะแตงโมมีสารอาหารหลักเป็นโปรตีนที่ไม่สมบูรณ์","istrue":false},{"statement":"เพราะแตงโมมีค่าดัชนีน้ำตาลสูง ซึ่งทำให้น้ำตาลในเลือดพุ่งสูงขึ้นได้รวดเร็ว","istrue":true},{"statement":"เพราะแตงโมไม่มีใยอาหารชนิดละลายน้ำอยู่เลย","istrue":false},{"statement":"เพราะแตงโมมีกรดไขมันทรานส์แฝงอยู่ตามธรรมชาติ","istrue":false}],"explanation":"แม้จะเป็นผลไม้ แต่แตงโมมีค่า GI สูง (76) ซึ่งจัดอยู่ในเกณฑ์ที่ทำให้น้ำตาลในเลือดสูงขึ้นเร็ว ส่งผลต่อการหลั่งอินซูลินและการสะสมไขมัน"},{"type":"multiple-choice","question":"เหตุผลสำคัญที่สุดที่ร่างกายต้องการไขมันเพื่อส่งเสริม 'ความงาม' จากภายในคือข้อใด","options":[{"statement":"ไขมันช่วยเพิ่มปริมาณอนุมูลอิสระเพื่อกระตุ้นการผลัดเซลล์ผิว","istrue":false},{"statement":"ไขมันช่วยในการดูดซึมวิตามิน A, D, E, K ซึ่งจำเป็นต่อสุขภาพผิว","istrue":true},{"statement":"ไขมันทำหน้าที่เปลี่ยนโปรตีนให้กลายเป็นคาร์โบไฮเดรตเชิงซ้อน","istrue":false},{"statement":"ไขมันลดความจำเป็นในการดื่มน้ำเพื่อหล่อเลี้ยงเซลล์","istrue":false}],"explanation":"วิตามินที่ส่งผลต่อผิวพรรณและการชะลอวัย เช่น วิตามิน E และ A จำเป็นต้องใช้ไขมันเป็นตัวละลายเพื่อให้ร่างกายสามารถดูดซึมไปใช้ประโยชน์ได้"},{"type":"multiple-choice","question":"ข้อใดอธิบายความแตกต่างระหว่าง 'ไขมันอิ่มตัว' และ 'ไขมันทรานส์' ได้ถูกต้องที่สุดในเชิงสุขภาพ","options":[{"statement":"ไขมันอิ่มตัวพบในพืชเท่านั้น ส่วนไขมันทรานส์พบในสัตว์เท่านั้น","istrue":false},{"statement":"ไขมันทรานส์เป็นไขมันธรรมชาติที่จำเป็น ส่วนไขมันอิ่มตัวเป็นไขมันสังเคราะห์","istrue":false},{"statement":"ไขมันอิ่มตัวพบมากในสัตว์และเนย ส่วนไขมันทรานส์มักเกิดจากกระบวนการอุตสาหกรรมและเป็นอันตรายต่อหัวใจ","istrue":true},{"statement":"ทั้งคู่มีโครงสร้างทางเคมีเหมือนกันแต่ให้พลังงานต่างกัน","istrue":false}],"explanation":"ไขมันอิ่มตัวพบได้ในผลิตภัณฑ์จากสัตว์และเนย ส่วนไขมันทรานส์ส่วนใหญ่เป็นไขมันที่ผ่านกระบวนการทางเคมี (Partial Hydrogenation) ซึ่งส่งผลเสียต่อสุขภาพมากกว่า"},{"type":"multiple-choice","question":"หากต้องการลดอาการอักเสบของผิวหนัง (เช่น สิว) ควรเพิ่มการรับประทานอาหารกลุ่มใดและเพราะเหตุใด","options":[{"statement":"โอเมก้า-3 เพราะช่วยลดกระบวนการอักเสบในระดับเซลล์และรักษาสมดุลฮอร์โมน","istrue":true},{"statement":"คาร์โบไฮเดรตเชิงเดี่ยว เพราะช่วยให้เซลล์ได้รับพลังงานในการซ่อมแซมแผลเร็วขึ้น","istrue":false},{"statement":"ไขมันอิ่มตัว เพราะช่วยสร้างชั้นป้องกันเชื้อแบคทีเรียบนผิวหนัง","istrue":false},{"statement":"โปรตีนไม่สมบูรณ์ เพราะช่วยยับยั้งการทำงานของเม็ดเลือดขาว","istrue":false}],"explanation":"กรดไขมันโอเมก้า-3 (EPA/DHA) มีคุณสมบัติเด่นในการต้านการอักเสบและช่วยปรับสมดุลฮอร์โมนที่ส่งผลต่อสุขภาพผิว"},{"type":"multiple-choice","question":"การรับประทานเฉพาะพืชชนิดเดียวเป็นประจำอาจทำให้ร่างกายขาดสารอาหารประเภทใด แม้ว่าพืชชนิดนั้นจะมีโปรตีนสูงก็ตาม","options":[{"statement":"กรดไขมันอิ่มตัว","istrue":false},{"statement":"กรดอะมิโนจำเป็นบางชนิด (Incomplete Protein)","istrue":true},{"statement":"ใยอาหารชนิดไม่ละลายน้ำ","istrue":false},{"statement":"คาร์โบไฮเดรตเชิงซ้อน","istrue":false}],"explanation":"โปรตีนจากพืชมักเป็นโปรตีนที่ไม่สมบูรณ์ (Incomplete Protein) เนื่องจากขาดกรดอะมิโนจำเป็นบางชนิดจากทั้งหมด 9 ชนิด จึงต้องรับประทานพืชหลากหลายชนิดผสมกัน"},{"type":"multiple-choice","question":"สาร 'เซโรโทนิน' ที่ช่วยให้อารมณ์ดีและหลับสบาย มีความสัมพันธ์เชื่อมโยงกับกรดอะมิโนชนิดใด","options":[{"statement":"Leucine","istrue":false},{"statement":"Valine","istrue":false},{"statement":"Tryptophan","istrue":true},{"statement":"Linoleic acid","istrue":false}],"explanation":"Tryptophan เป็นกรดอะมิโนจำเป็นที่เป็นสารตั้งต้นในการผลิตเซโรโทนิน ซึ่งส่งผลต่อการควบคุมอารมณ์และการนอนหลับ"},{"type":"multiple-choice","question":"หากเริ่มรับประทานใยอาหารในปริมาณมากทันทีโดยไม่ค่อยๆ ปรับตัว จะส่งผลเสียอย่างไรต่อระบบทางเดินอาหาร","options":[{"statement":"ทำให้เกิดแก๊สในท้อง ท้องอืด และปวดบีบท้อง","istrue":true},{"statement":"ทำให้ระดับน้ำตาลในเลือดลดต่ำลงจนวูบ","istrue":false},{"statement":"ทำให้ร่างกายไม่สามารถดูดซึมโปรตีนได้เลย","istrue":false},{"statement":"ทำให้หัวใจเต้นเร็วขึ้นผิดปกติ","istrue":false}],"explanation":"การเพิ่มใยอาหารอย่างรวดเร็วเกินไปทำให้จุลินทรีย์ในลำไส้ปรับตัวไม่ทัน ก่อให้เกิดแก๊สจากการหมักหมมและอาการไม่สบายท้อง"},{"type":"multiple-choice","question":"ความแตกต่างในเชิงการทำงานระหว่างใยอาหารชนิดละลายน้ำและชนิดไม่ละลายน้ำคือข้อใด","options":[{"statement":"ชนิดละลายน้ำเน้นเพิ่มกากใย ชนิดไม่ละลายน้ำเน้นดูดซับสารพิษ","istrue":false},{"statement":"ชนิดละลายน้ำช่วยลดคอเลสเตอรอล ชนิดไม่ละลายน้ำช่วยกระตุ้นการขับถ่าย","istrue":true},{"statement":"ชนิดละลายน้ำให้พลังงานสูง ชนิดไม่ละลายน้ำไม่ให้พลังงานเลย","istrue":false},{"statement":"ชนิดละลายน้ำพบในข้าวกล้อง ชนิดไม่ละลายน้ำพบในแอปเปิล","istrue":false}],"explanation":"ใยอาหารชนิดละลายน้ำทำหน้าที่เหมือนเจลช่วยดูดซับสารพิษและลดคอเลสเตอรอล ส่วนชนิดไม่ละลายน้ำช่วยเพิ่มมวลอุจจาระและกระตุ้นการเคลื่อนตัวของลำไส้"},{"type":"multiple-choice","question":"เหตุใดชาวมังสวิรัติจึงมีความเสี่ยงที่จะขาดวิตามิน B12 มากกว่ากลุ่มคนที่รับประทานเนื้อสัตว์","options":[{"statement":"เพราะวิตามิน B12 ถูกทำลายได้ง่ายด้วยความร้อนจากพืช","istrue":false},{"statement":"เพราะพืชส่วนใหญ่มีสารต้านอนุมูลอิสระที่ยับยั้งการทำงานของ B12","istrue":false},{"statement":"เพราะวิตามิน B12 ส่วนใหญ่พบได้ในผลิตภัณฑ์จากสัตว์เท่านั้น","istrue":true},{"statement":"เพราะร่างกายของชาวมังสวิรัติไม่สามารถผลิตน้ำดีเพื่อดูดซึม B12 ได้","istrue":false}],"explanation":"วิตามิน B12 พบได้เกือบทั้งหมดในเนื้อสัตว์ ไข่ และผลิตภัณฑ์จากนม พืชทั่วไปจึงแทบไม่มีวิตามินชนิดนี้"},{"type":"multiple-choice","question":"กลไกการทำงานของ 'สารต้านอนุมูลอิสระ' (Antioxidants) ต่อการชะลอวัยคือข้อใด","options":[{"statement":"การเพิ่มอัตราการเผาผลาญอาหารให้เร็วขึ้นเป็นสองเท่า","istrue":false},{"statement":"การสร้างเกราะป้องกันไม่ให้แสงแดดส่องถึงชั้นเซลล์ผิว","istrue":false},{"statement":"การปกป้องเซลล์จากการถูกทำลายโดยอนุมูลอิสระที่เกิดจากการเผาผลาญและมลภาวะ","istrue":true},{"statement":"การเปลี่ยนสารพิษให้กลายเป็นกรดอะมิโนจำเป็น","istrue":false}],"explanation":"สารต้านอนุมูลอิสระทำหน้าที่ยับยั้งปฏิกิริยาออกซิเดชันที่เกิดจากอนุมูลอิสระ ซึ่งเป็นสาเหตุสำคัญของความเสื่อมของเซลล์และโรคเรื้อรังต่างๆ"},{"type":"multiple-choice","question":"สภาวะ Autophagy หรือ 'การกินตัวเองของเซลล์' จะเกิดขึ้นได้ดีที่สุดภายใต้เงื่อนไขใด","options":[{"statement":"เมื่อรับประทานอาหารครบ 5 หมู่ในปริมาณที่มากพอ","istrue":false},{"statement":"เมื่อระดับอินซูลินต่ำและระดับกลูคากอนสูงจากการอดอาหาร","istrue":true},{"statement":"เมื่อร่างกายได้รับโปรตีนเสริมในรูปแบบเวย์โปรตีน","istrue":false},{"statement":"เมื่อดื่มน้ำในปริมาณมากเกินกว่า 3 ลิตรต่อวัน","istrue":false}],"explanation":"Autophagy ถูกเปิดสวิตช์ด้วยฮอร์โมนกลูคากอน ซึ่งจะหลั่งออกมาเมื่อร่างกายอยู่ในสภาวะขาดสารอาหารหรือการอดอาหาร (Fasting) ส่งผลให้ระดับอินซูลินลดลง"},{"type":"multiple-choice","question":"เหตุใดการรับประทานอาหารมื้อเล็กๆ บ่อยๆ ตลอดทั้งวัน (Snacking) จึงขัดขวางกระบวนการชะลอวัยในระดับเซลล์","options":[{"statement":"ทำให้อินซูลินสูงตลอดเวลา ซึ่งเป็นการปิดกั้นกระบวนการซ่อมแซมและรีไซเคิลเซลล์","istrue":true},{"statement":"ทำให้ร่างกายขาดแคลอรี่สะสมที่จำเป็นต่อการสร้างเซลล์ใหม่","istrue":false},{"statement":"ทำให้กระเพาะอาหารทำงานหนักจนผลิตเอนไซม์ชะลอวัยไม่ได้","istrue":false},{"statement":"ทำให้ร่างกายสูญเสียวิตามินที่ละลายในน้ำไปกับการย่อย","istrue":false}],"explanation":"การกินจุบจิบกระตุ้นให้อินซูลินหลั่งอย่างต่อเนื่อง ซึ่งอินซูลินเป็นสัญญาณที่สั่งให้เซลล์เน้นการเติบโตและสะสม (Anabolic) และยับยั้งการทำความสะอาดตัวเอง (Autophagy)"},{"type":"multiple-choice","question":"ผลการวิจัยจากมหาวิทยาลัยออตตาวาเกี่ยวกับ Autophagy ในระบบหัวใจและหลอดเลือดมีประโยชน์อย่างไร","options":[{"statement":"ช่วยเปลี่ยนกล้ามเนื้อหัวใจให้กลายเป็นเซลล์ที่ใช้พลังงานน้อยลง","istrue":false},{"statement":"ช่วยกำจัดคราบไขมัน (Plaque) โดยการกลืนกินหยดไขมันและนำคอเลสเตอรอลไปทำลาย","istrue":true},{"statement":"ช่วยกระตุ้นการผลิตเม็ดเลือดขาวชนิดใหม่ที่มีอายุยืนยาวขึ้น","istrue":false},{"statement":"ช่วยลดการเต้นของหัวใจในสภาวะพักผ่อน","istrue":false}],"explanation":"Autophagy ในเซลล์หลอดเลือดช่วยทำลายหยดไขมันและคราบพลาคที่เป็นสาเหตุของโรคหลอดเลือดหัวใจอุดตัน"},{"type":"multiple-choice","question":"กรดอะมิโนชนิดใดที่ถูกระบุว่าเป็นตัวขัดขวางการเกิด Autophagy หากได้รับเข้าสู่ร่างกาย","options":[{"statement":"Tryptophan","istrue":false},{"statement":"Valine","istrue":false},{"statement":"Leucine","istrue":true},{"statement":"Linoleic acid","istrue":false}],"explanation":"Leucine เป็นกรดอะมิโนที่เป็นสัญญาณหลักในการกระตุ้นโหมดการเจริญเติบโตของเซลล์ ซึ่งจะไปปิดกั้นกระบวนการ Autophagy โดยตรง"},{"type":"multiple-choice","question":"ความแตกต่างสำคัญระหว่างการลดน้ำหนักแบบจำกัดแคลอรี่ (Dieting) กับการทำ Intermittent Fasting (IF) ในเชิงชีวเคมีคือข้อใด","options":[{"statement":"IF ช่วยเพิ่มระดับ Growth Hormone เพื่อสร้างเซลล์ใหม่ ในขณะที่การลดแคลอรี่เฉลี่ยอาจไม่กระตุ้นเท่า","istrue":true},{"statement":"การลดแคลอรี่ช่วยกระตุ้น Autophagy ได้ดีกว่าการอดอาหารเป็นช่วงเวลา","istrue":false},{"statement":"IF ทำให้ร่างกายสูญเสียมวลกล้ามเนื้อมากกว่าการคุมอาหารปกติ","istrue":false},{"statement":"การลดแคลอรี่ไม่มีผลต่อระดับอินซูลินในกระแสเลือด","istrue":false}],"explanation":"IF เน้นที่การกำหนดเวลาให้อินซูลินต่ำนานพอ ซึ่งช่วยกระตุ้นทั้ง Autophagy และการหลั่ง Growth Hormone เพื่อซ่อมแซมร่างกาย แตกต่างจากการลดแคลอรี่แต่ยังกินบ่อยซึ่งอินซูลินจะไม่ลดต่ำลงพอ"},{"type":"multiple-choice","question":"หากหน้าฉลากขนมปังระบุว่า 'หนึ่งหน่วยบริโภค: 2 แผ่น' และ 'จำนวนหน่วยบริโภคต่อซอง: 5' หากคุณกินหมดซอง คุณจะได้รับสารอาหารเป็นกี่เท่าของที่ระบุในตารางโภชนาการ","options":[{"statement":"2 เท่า","istrue":false},{"statement":"5 เท่า","istrue":true},{"statement":"10 เท่า","istrue":false},{"statement":"เท่าเดิม เพราะฉลากระบุค่าต่อซองอยู่แล้ว","istrue":false}],"explanation":"ข้อมูลสารอาหารในตารางโภชนาการระบุค่าต่อ 'หนึ่งหน่วยบริโภค' ดังนั้นหากกินหมดซองที่มี 5 หน่วยบริโภค ต้องคูณสารอาหารทั้งหมดด้วย 5"},{"type":"multiple-choice","question":"โมเลกุล ATP ($Adenosine \\\\ Triphosphate$) เปรียบเสมือนสิ่งใดในกระบวนการทำงานของเซลล์","options":[{"statement":"วัตถุดิบที่ใช้ก่อสร้างโครงสร้าง","istrue":false},{"statement":"เงินสดที่พร้อมจ่ายเพื่อใช้ในการทำกิจกรรมต่างๆ","istrue":true},{"statement":"ขยะที่เกิดจากการเผาผลาญ","istrue":false},{"statement":"แผนผังในการควบคุมพันธุกรรม","istrue":false}],"explanation":"ATP เป็นหน่วยพลังงานเคมีระดับโมเลกุลที่เซลล์สามารถดึงไปใช้ทำกิจกรรมต่างๆ เช่น การหดตัวของกล้ามเนื้อ ได้ทันทีเปรียบเสมือนเงินสด"},{"type":"multiple-choice","question":"ออร์แกเนลล์ที่มีโครงสร้างผนังสองชั้นและส่วนที่พับไปมาเรียกว่า Cristae มีหน้าที่หลักคืออะไร","options":[{"statement":"กำจัดโปรตีนที่เสื่อมสภาพ","istrue":false},{"statement":"ผลิตพลังงาน ATP ผ่านกระบวนการหายใจระดับเซลล์","istrue":true},{"statement":"สังเคราะห์คาร์โบไฮเดรตเชิงซ้อน","istrue":false},{"statement":"เก็บสะสมวิตามินที่ละลายในไขมัน","istrue":false}],"explanation":"ไมโทคอนเดรียมี Cristae เพื่อเพิ่มพื้นที่ผิวในการทำปฏิกิริยาเคมีเพื่อสร้าง ATP ซึ่งเป็นแหล่งพลังงานหลักของเซลล์"},{"type":"multiple-choice","question":"ในการออกกำลังกายแบบใช้ออกซิเจน (Aerobic) เชื้อเพลิงหลักที่ร่างกายนำมาใช้ผลิตพลังงานคืออะไร","options":[{"statement":"โปรตีนจากกล้ามเนื้อ","istrue":false},{"statement":"น้ำตาลและไกลโคเจน","istrue":true},{"statement":"วิตามินบี 12","istrue":false},{"statement":"กรดแลกติก","istrue":false}],"explanation":"การออกกำลังกายแบบแอโรบิก ร่างกายจะเน้นการเผาผลาญน้ำตาลในเลือดและไกลโคเจนที่สะสมในตับและกล้ามเนื้อเป็นเชื้อเพลิงหลักร่วมกับออกซิเจน"},{"type":"multiple-choice","question":"อาการกล้ามเนื้อล้าหลังจากการออกกำลังกายอย่างหนัก (Anaerobic) เกิดจากการสะสมของสารใด","options":[{"statement":"ATP","istrue":false},{"statement":"คาร์บอนไดออกไซด์","istrue":false},{"statement":"แลกเตต (Lactate)","istrue":true},{"statement":"กลูโคส","istrue":false}],"explanation":"เมื่อร่างกายออกกำลังกายหนักจนใช้ออกซิเจนไม่ทัน จะเกิดกระบวนการหมัก (Fermentation) ที่เปลี่ยน Pyruvate เป็นแลกเตตหรือกรดแลกติก ทำให้เกิดความเมื่อยล้า"},{"type":"multiple-choice","question":"จากทฤษฎี Crossover Effect หากต้องการเน้นการเผาผลาญ 'ไขมัน' เป็นเชื้อเพลิงหลัก ควรออกกำลังกายที่ระดับความเหนื่อยเท่าใด","options":[{"statement":"ต่ำกว่า 65% ของความสามารถสูงสุด","istrue":true},{"statement":"มากกว่า 85% ของความสามารถสูงสุด","istrue":false},{"statement":"ต้องถึงจุดที่ร่างกายผลิตแลกเตตสูงสุดเท่านั้น","istrue":false},{"statement":"ความเหนื่อยระดับใดก็ได้แต่ต้องทำนานกว่า 3 ชั่วโมง","istrue":false}],"explanation":"ทฤษฎี Crossover ระบุว่าที่ความเหนื่อยต่ำ ร่างกายจะใช้ไขมันเป็นพลังงานหลัก แต่เมื่อความเหนื่อยเกิน 65% ร่างกายจะสลับไปใช้คาร์โบไฮเดรตมากขึ้น"},{"type":"multiple-choice","question":"สภาวะ 'After Burn' ส่งผลดีต่อการคุมรูปร่างอย่างไร","options":[{"statement":"ทำให้ร่างกายหยุดการดูดซึมน้ำตาลหลังออกกำลังกาย","istrue":false},{"statement":"ร่างกายยังคงมีการเผาผลาญพลังงานต่อเนื่องแม้จะหยุดออกกำลังกายไปแล้ว","istrue":true},{"statement":"ทำให้กล้ามเนื้อเปลี่ยนเป็นไขมันได้ช้าลง","istrue":false},{"statement":"ช่วยให้ร่างกายหลับลึกขึ้นเพื่อผลิตอินซูลินมากขึ้น","istrue":false}],"explanation":"After Burn (EPOC) คือสภาวะที่ร่างกายต้องใช้พลังงานเพิ่มขึ้นหลังออกกำลังกายเพื่อฟื้นฟูระบบต่างๆ ให้กลับสู่สภาวะปกติ"},{"type":"multiple-choice","question":"ข้อใดคือการประยุกต์ใช้ความรู้เรื่อง GI ในการเลือกอาหารเพื่อรักษาผิวพรรณ","options":[{"statement":"เลือกกินข้าวขาวแทนข้าวกล้องเพื่อความรวดเร็วในการย่อย","istrue":false},{"statement":"เลือกกินถั่วลิสง (GI=7) เป็นของว่างแทนแตงโม (GI=76)","istrue":true},{"statement":"กินอาหารที่มีค่า GI สูงก่อนนอนเพื่อเพิ่มพลังงานในการซ่อมแซมผิว","istrue":false},{"statement":"หลีกเลี่ยงใยอาหารเพื่อให้ดัชนีน้ำตาลคงที่","istrue":false}],"explanation":"ถั่วลิสงมีค่า GI ต่ำมาก ช่วยรักษาระดับน้ำตาลในเลือดให้คงที่ ซึ่งส่งผลดีต่อผิวพรรณและการคุมน้ำหนักมากกว่าอาหาร GI สูงอย่างแตงโม"},{"type":"multiple-choice","question":"หากเปรียบเทียบไมโทคอนเดรียเป็นโรงไฟฟ้า 'สายพานการส่งเชื้อเพลิง' เข้าสู่เตาเผาที่มีออกซิเจนจะผลิตผลพลอยได้เป็นสิ่งใด","options":[{"statement":"แอลกอฮอล์","istrue":false},{"statement":"คาร์บอนไดออกไซด์และน้ำ","istrue":true},{"statement":"กรดไขมันจำเป็น","istrue":false},{"statement":"กากใยอาหาร","istrue":false}],"explanation":"กระบวนการหายใจระดับเซลล์แบบใช้ออกซิเจน จะได้ ATP เป็นพลังงาน และมีผลพลอยได้คือคาร์บอนไดออกไซด์และน้ำ"},{"type":"multiple-choice","question":"โปรตีนสมบูรณ์ (Complete Protein) มีความสำคัญอย่างไรต่อการซ่อมแซมร่างกายเมื่อเทียบกับโปรตีนไม่สมบูรณ์","options":[{"statement":"ให้แคลอรี่สูงกว่า 2 เท่า","istrue":false},{"statement":"มีกรดอะมิโนจำเป็นครบทั้ง 9 ชนิดที่ร่างกายสร้างเองไม่ได้","istrue":true},{"statement":"สามารถละลายในไขมันเพื่อเก็บสะสมได้นานกว่า","istrue":false},{"statement":"ไม่กระตุ้นการหลั่งอินซูลินเลย","istrue":false}],"explanation":"โปรตีนสมบูรณ์จากสัตว์และนมมีกรดอะมิโนจำเป็นครบถ้วน ทำให้ร่างกายนำไปใช้ซ่อมแซมส่วนที่สึกหรอได้ทันทีโดยไม่ต้องหาจากแหล่งอื่นเพิ่ม"},{"type":"multiple-choice","question":"ข้อใดอธิบายบทบาทของโอเมก้า-6 (Linoleic acid) ได้ถูกต้อง","options":[{"statement":"เป็นกรดไขมันที่ร่างกายสร้างเองได้จากน้ำตาล","istrue":false},{"statement":"เป็นกรดไขมันจำเป็นที่ต้องได้รับจากอาหารเท่านั้น","istrue":true},{"statement":"เป็นตัวการหลักที่ทำให้เกิดโรคหัวใจโดยตรง","istrue":false},{"statement":"พบมากในปลาทะเลน้ำลึกเท่านั้น","istrue":false}],"explanation":"Linoleic acid เป็นกรดไขมันจำเป็น (Essential Fatty Acid) ซึ่งร่างกายไม่สามารถสังเคราะห์เองได้ ต้องได้รับจากการบริโภค"},{"type":"multiple-choice","question":"ทำไมการกินอาหารแบบ IF 17/7 จึงช่วยเรื่อง Anti-aging ได้ดีกว่าการกินปกติ","options":[{"statement":"เพราะการอดอาหาร 17 ชั่วโมงนานพอที่จะลดอินซูลินและเปิดสวิตช์ Autophagy","istrue":true},{"statement":"เพราะทำให้ร่างกายได้รับวิตามินเข้มข้นขึ้นใน 7 ชั่วโมง","istrue":false},{"statement":"เพราะช่วงที่อดอาหารร่างกายจะสร้างไขมันทรานส์มาทดแทน","istrue":false},{"statement":"เพราะลดภาระการทำงานของปอดในการแลกเปลี่ยนก๊าซ","istrue":false}],"explanation":"ช่วงเวลาอดอาหารที่นานพอ (17 ชั่วโมง) จะช่วยให้ระดับอินซูลินลดต่ำลงมากพอที่จะเริ่มกระบวนการรีไซเคิลเซลล์ที่เสียหาย"},{"type":"multiple-choice","question":"ในเชิงการวิเคราะห์ หากสกัดใยอาหารด้วยวิธี 'อัลตราโซนิก' (Ultrasonic-assisted) ข้อดีที่เหนือกว่าวิธีดั้งเดิมคืออะไร","options":[{"statement":"ทำให้ใยอาหารเปลี่ยนเป็นโปรตีนได้","istrue":false},{"statement":"ใช้เวลาน้อยลงและลดการใช้สารเคมีที่เป็นพิษ","istrue":true},{"statement":"ทำให้ใยอาหารมีรสหวานขึ้น","istrue":false},{"statement":"สามารถสกัดวิตามิน B12 จากพืชได้","istrue":false}],"explanation":"เทคโนโลยีสมัยใหม่ในการสกัดสารอาหารเน้นที่ความรวดเร็วและเป็นมิตรต่อสิ่งแวดล้อม (Green Extraction) โดยลดการใช้ตัวทำละลายอินทรีย์"},{"type":"multiple-choice","question":"การออกกำลังกายแบบยกน้ำหนัก (Weight Training) จัดเป็นประเภทใดและส่งผลดีต่อโครงสร้างร่างกายอย่างไร","options":[{"statement":"Aerobic - ช่วยเพิ่มความจุของปอด","istrue":false},{"statement":"Anaerobic - ช่วยเพิ่มมวลกล้ามเนื้อและความแข็งแรงของกระดูก","istrue":true},{"statement":"Aerobic - ช่วยเผาผลาญไขมันในขณะทำทันที","istrue":false},{"statement":"Anaerobic - ช่วยลดระดับ Growth Hormone เพื่อการพักผ่อน","istrue":false}],"explanation":"Weight Training เป็นการออกกำลังกายแบบไม่ใช้ออกซิเจนที่เน้นแรงต้าน ซึ่งช่วยกระตุ้นการสร้างโปรตีนในกล้ามเนื้อและเพิ่มความหนาแน่นของมวลกระดูก"},{"type":"multiple-choice","question":"การเปรียบเทียบ Autophagy กับ 'พนักงานทำความสะอาดอาคาร' สื่อถึงสิ่งใดได้ชัดเจนที่สุด","options":[{"statement":"เซลล์จะทำความสะอาดตัวเองเฉพาะตอนที่เรามีงานยุ่งเท่านั้น","istrue":false},{"statement":"หากเราหยุดป้อนขยะใหม่ (หยุดกิน) เซลล์จะมีเวลาไปซ่อมแซมส่วนที่สึกหรอภายใน","istrue":true},{"statement":"พนักงานจะทำงานได้ดีที่สุดเมื่อได้รับน้ำตาลปริมาณมาก","istrue":false},{"statement":"การทำความสะอาดจะทำให้โครงสร้างอาคารอ่อนแอลง","istrue":false}],"explanation":"เมื่อไม่มีอาหารถูกส่งเข้ามา (อินซูลินต่ำ) เซลล์จะหันไปใช้พลังงานจากการย่อยสลายองค์ประกอบที่เสียหายภายในตัวเองเพื่อนำกลับมาใช้ใหม่"},{"type":"multiple-choice","question":"วิตามิน D มีความพิเศษกว่าวิตามินชนิดอื่นๆ ส่วนใหญ่อย่างไร","options":[{"statement":"ร่างกายสามารถสังเคราะห์เองได้บางส่วน (เช่น จากแสงแดด)","istrue":true},{"statement":"เป็นวิตามินเพียงชนิดเดียวที่ไม่ละลายในไขมัน","istrue":false},{"statement":"พบได้ในพืชสีเขียวทุกชนิดในปริมาณสูงมาก","istrue":false},{"statement":"ไม่สำคัญต่อการทำงานของกระดูก","istrue":false}],"explanation":"ร่างกายมนุษย์สามารถผลิตวิตามิน D ได้เองเมื่อผิวหนังได้รับแสง UV ที่เหมาะสม ซึ่งแตกต่างจากวิตามินส่วนใหญ่ที่ต้องกินเข้าไปเท่านั้น"},{"type":"multiple-choice","question":"หากคุณต้องการ 'Renovation' หรือยกเครื่องร่างกายใหม่ การทำ IF ช่วยได้อย่างไรตามแนวทางของดร.รัฐ","options":[{"statement":"ลดการหลั่งฮอร์โมนทุกชนิดเพื่อประหยัดพลังงาน","istrue":false},{"statement":"กระตุ้น Growth Hormone เพื่อสั่งสร้างอะไหล่เซลล์ใหม่มาแทนของเก่าที่ถูกกำจัด","istrue":true},{"statement":"เพิ่มปริมาณไขมันอิ่มตัวเพื่อใช้เป็นเชื้อเพลิงสำรอง","istrue":false},{"statement":"ลดความเร็วในการเต้นของหัวใจเพื่อชะลอการเสื่อมของลิ้นหัวใจ","istrue":false}],"explanation":"กระบวนการฟื้นฟูร่างกายประกอบด้วย 2 ส่วนคือ การกำจัดของเสีย (Autophagy) และการสร้างใหม่ ซึ่งกระตุ้นโดย Growth Hormone ที่จะหลั่งมากขึ้นในช่วงอดอาหาร"},{"type":"multiple-choice","question":"ค่าพลังงาน 9 แคลอรี่ต่อ 1 กรัม เป็นลักษณะเฉพาะของสารอาหารประเภทใด","options":[{"statement":"คาร์โบไฮเดรต","istrue":false},{"statement":"โปรตีน","istrue":false},{"statement":"ไขมัน","istrue":true},{"statement":"ใยอาหาร","istrue":false}],"explanation":"ไขมันเป็นสารอาหารที่ให้พลังงานหนาแน่นที่สุด โดยให้พลังงานสูงถึง 9 kcal/g ในขณะที่โปรตีนและคาร์โบไฮเดรตให้เพียง 4 kcal/g"},{"type":"multiple-choice","question":"เหตุใดการขาดวิตามิน A จึงส่งผลต่อ 'ความงาม' ในแง่ของการมองเห็น","options":[{"statement":"เพราะทำให้ดวงตาเปลี่ยนสี","istrue":false},{"statement":"เพราะอาจทำให้เกิดโรคตาบอดตอนกลางคืน (Night blindness)","istrue":true},{"statement":"เพราะทำให้แววตาดูไม่สดใสเนื่องจากขาดน้ำตาล","istrue":false},{"statement":"เพราะทำให้เกิดรอยตีนกาได้ง่ายขึ้นโดยตรง","istrue":false}],"explanation":"วิตามิน A มีบทบาทสำคัญในการทำงานของจอประสาทตา การขาดวิตามินชนิดนี้จะทำให้ประสิทธิภาพการมองเห็นในที่มืดลดลง"},{"type":"multiple-choice","question":"การเลือกรับประทานเมล็ดเจีย (Chia seeds) ให้ประโยชน์ในด้านใดเด่นที่สุดตามเนื้อหา","options":[{"statement":"เป็นแหล่งของใยอาหารชนิดละลายน้ำและโอเมก้า-3","istrue":true},{"statement":"เป็นแหล่งโปรตีนสมบูรณ์ที่ทดแทนเนื้อแดงได้ 100%","istrue":false},{"statement":"ช่วยเพิ่มระดับน้ำตาลในเลือดได้อย่างรวดเร็วหลังออกกำลังกาย","istrue":false},{"statement":"มีวิตามิน B12 สูงกว่านมวัว","istrue":false}],"explanation":"เมล็ดเจียเป็น Superfood ที่มีทั้งใยอาหารชนิดละลายน้ำ (ที่กลายเป็นเจล) และมีกรดไขมันโอเมก้า-3 จากพืช (ALA) สูง"},{"type":"multiple-choice","question":"ในเชิงการประเมินผล ข้อใดคือสัญญาณว่าระบบ Autophagy ของคุณอาจจะทำงานได้ไม่เต็มที่","options":[{"statement":"คุณรู้สึกอิ่มนานหลังทานข้าวกล้อง","istrue":false},{"statement":"คุณมีการสะสมของโปรตีนที่ผิดปกติในสมอง (เช่น กรณีพาร์กินสัน)","istrue":true},{"statement":"ร่างกายคุณเผาผลาญไขมันเมื่อเหนื่อยน้อยกว่า 65%","istrue":false},{"statement":"คุณสามารถออกกำลังกายแบบแอโรบิกได้นานกว่า 30 นาที","istrue":false}],"explanation":"ความบกพร่องของ Autophagy เชื่อมโยงโดยตรงกับการสะสมของเสียและโปรตีนที่เสียหายในเซลล์ ซึ่งนำไปสู่โรคความเสื่อมของระบบประสาท"},{"type":"multiple-choice","question":"การวิเคราะห์ 'Crossover Effect' ช่วยให้นักออกแบบโปรแกรมออกกำลังกายตัดสินใจเรื่องใดได้แม่นยำที่สุด","options":[{"statement":"การเลือกชนิดของอาหารเสริมวิตามิน","istrue":false},{"statement":"การกำหนดระดับความหนัก (Intensity) เพื่อเลือกใช้แหล่งพลังงานที่ต้องการ","istrue":true},{"statement":"การระบุจำนวนชั่วโมงที่ควรนอนหลับ","istrue":false},{"statement":"การคำนวณปริมาณใยอาหารที่ต้องกินต่อวัน","istrue":false}],"explanation":"ความรู้เรื่องจุดตัดการใช้พลังงานช่วยให้กำหนดได้ว่าควรให้ออกกำลังกายหนักระดับใดเพื่อเน้นเผาผลาญไขมันหรือคาร์โบไฮเดรต"},{"type":"multiple-choice","question":"ในการสร้างเซลล์ผิวใหม่ (Biosynthesis) ร่างกายจำเป็นต้องใช้กรดอะมิโนใดที่ช่วยกระตุ้น Growth Hormone ตามที่ระบุในสไลด์โปรตีน","options":[{"statement":"Valine","istrue":false},{"statement":"Leucine","istrue":true},{"statement":"Tryptophan","istrue":false},{"statement":"Linoleic acid","istrue":false}],"explanation":"Leucine มีบทบาทสำคัญในการควบคุมระดับน้ำตาลในเลือดและกระตุ้นการหลั่ง Growth Hormone ซึ่งจำเป็นต่อการเติบโตของเซลล์"},{"type":"multiple-choice","question":"เหตุใดจึงกล่าวว่า 'ความงามเริ่มต้นที่การจัดการพลังงาน' ในระดับเซลล์","options":[{"statement":"เพราะเซลล์ผิวต้องการ ATP เพื่อใช้ในกระบวนการสร้างเซลล์ใหม่และซ่อมแซม","istrue":true},{"statement":"เพราะการมีพลังงานมากเกินไปจะทำให้ผิวพรรณเปล่งปลั่งโดยธรรมชาติ","istrue":false},{"statement":"เพราะพลังงานจากแสงอาทิตย์สามารถถูกดูดซึมผ่านผิวหนังได้โดยตรง","istrue":false},{"statement":"เพราะการจัดการพลังงานหมายถึงการทาครีมกันแดดให้ถูกวิธี","istrue":false}],"explanation":"กระบวนการ Biosynthesis หรือการสร้างสิ่งใหม่ในร่างกาย เช่น เซลล์ผิวหรือคอลลาเจน ล้วนเป็นกระบวนการที่ต้องใช้พลังงาน ATP ทั้งสิ้น"},{"type":"multiple-choice","question":"คุณลักษณะเด่นของ Complex Carbs ที่เหนือกว่า Simple Carbs ในการคุมรูปร่างคือข้อใด","options":[{"statement":"มีรสชาติที่หวานและอร่อยกว่า","istrue":false},{"statement":"มีใยอาหารสูงและย่อยช้ากว่า ทำให้พลังงานถูกปล่อยออกมาสม่ำเสมอ","istrue":true},{"statement":"เปลี่ยนเป็นไขมันได้เร็วกว่าเพื่อสำรองพลังงาน","istrue":false},{"statement":"ร่างกายไม่ต้องใช้เอนไซม์ในการย่อยเลย","istrue":false}],"explanation":"คาร์โบไฮเดรตเชิงซ้อนมีโครงสร้างโมเลกุลที่ซับซ้อนและมีใยอาหาร ทำให้ร่างกายใช้เวลาย่อยนานกว่า ส่งผลให้ระดับน้ำตาลในเลือดไม่ผันผวน"},{"type":"multiple-choice","question":"หากเปรียบร่างกายเป็น 'รถยนต์ไฮบริด' ตามอุปมาอุปไมยในบทเรียน ช่วงที่รถวิ่งช้าๆ อย่างประหยัด (เหนื่อยน้อย) จะใช้เชื้อเพลิงใด","options":[{"statement":"น้ำมัน (คาร์โบไฮเดรต)","istrue":false},{"statement":"ไฟฟ้า (ไขมัน)","istrue":true},{"statement":"ถ่านหิน (โปรตีน)","istrue":false},{"statement":"น้ำ (วิตามิน)","istrue":false}],"explanation":"ในช่วงที่ร่างกายออกแรงน้อยหรืออยู่ในสภาวะพัก ร่างกายจะเลือกเผาผลาญไขมันซึ่งเป็นแหล่งพลังงานที่ให้ประสิทธิภาพความอึดสูงกว่า"},{"type":"multiple-choice","question":"การทำ IF 5:2 มีรูปแบบการปฏิบัติอย่างไรตามคำแนะนำ","options":[{"statement":"กิน 5 มื้อ และอด 2 มื้อในทุกๆ วัน","istrue":false},{"statement":"กินปกติ 5 วัน และลดแคลอรี่เหลือประมาณ 500 แคลอรี่ในอีก 2 วันของสัปดาห์","istrue":true},{"statement":"ออกกำลังกาย 5 ชั่วโมง และพัก 2 ชั่วโมง","istrue":false},{"statement":"กินเฉพาะพืช 5 วัน และกินเฉพาะเนื้อ 2 วัน","istrue":false}],"explanation":"IF 5:2 คือการกินตามปกติ 5 วัน และมีการจำกัดพลังงานอย่างเคร่งครัด (Fasting days) 2 วันในหนึ่งสัปดาห์เพื่อกระตุ้นระบบซ่อมแซม"},{"type":"multiple-choice","question":"ส่วนของไมโทคอนเดรียที่พับไปมา (Cristae) มีความสำคัญเชิงวิศวกรรมระดับเซลล์อย่างไร","options":[{"statement":"เพื่อใช้ในการดักจับไวรัส","istrue":false},{"statement":"เพื่อเพิ่มพื้นที่ผิวในการผลิต ATP ให้ได้ปริมาณมากที่สุดในพื้นที่จำกัด","istrue":true},{"statement":"เพื่อทำหน้าที่เป็นวาล์วเปิดปิดน้ำตาล","istrue":false},{"statement":"เพื่อป้องกันความร้อนจากการเผาผลาญไม่ให้รั่วไหล","istrue":false}],"explanation":"การพับทบไปมาของเยื่อหุ้มชั้นในช่วยเพิ่มพื้นที่ผิวสำหรับเอนไซม์และกระบวนการถ่ายทอดอิเล็กตรอนในการสร้างพลังงาน"},{"type":"multiple-choice","question":"ทำไมการกินอาหารที่มีโปรตีนสูงจึงช่วยให้ 'อิ่มนานขึ้น' ในมุมมองของสารอาหารหลัก","options":[{"statement":"เพราะโปรตีนจะพองตัวในกระเพาะอาหารมากกว่าใยอาหาร","istrue":false},{"statement":"เพราะโปรตีนกระตุ้นการหลั่งฮอร์โมนความหิวออกมาน้อยกว่าน้ำตาล","istrue":true},{"statement":"เพราะโปรตีนย่อยง่ายที่สุดในบรรดาสารอาหารทั้งหมด","istrue":false},{"statement":"เพราะโปรตีนเปลี่ยนเป็นน้ำตาลในเลือดได้เร็วกว่าคาร์โบไฮเดรต","istrue":false}],"explanation":"โปรตีนมีผลต่อการหลั่งฮอร์โมนที่ควบคุมความอิ่มและความหิวได้ดีกว่าคาร์โบไฮเดรต ทำให้ร่างกายรู้สึกอิ่มนานและลดการกินจุกจิก"},{"type":"multiple-choice","question":"ในกรณีที่ร่างกายขาดออกซิเจนระหว่างออกกำลังกายอย่างหนัก ผลลัพธ์สุดท้ายที่เกิดขึ้นกับ Pyruvate คืออะไร","options":[{"statement":"เข้าสู่ TCA Cycle เพื่อผลิต ATP 36 โมเลกุล","istrue":false},{"statement":"ถูกเปลี่ยนเป็นแลกเตต (Lactate) ผ่านกระบวนการหมัก","istrue":true},{"statement":"สลายกลายเป็นก๊าซออกซิเจนออกมาทางผิวหนัง","istrue":false},{"statement":"ถูกเปลี่ยนเป็นใยอาหารชนิดไม่ละลายน้ำ","istrue":false}],"explanation":"เมื่อไม่มีออกซิเจนเป็นตัวรับอิเล็กตรอนตัวสุดท้ายในไมโทคอนเดรีย เซลล์จะใช้กระบวนการหมักเพื่อผลิตพลังงานเพียงเล็กน้อยและเกิดแลกเตตตามมา"},{"type":"multiple-choice","question":"สไลด์บทนำระบุว่านักชีวเคมีสนใจเรื่อง 'การเจริญสติและสมาธิ' (Mindfulness) เพราะเหตุใดในมุมมองสุขภาพ","options":[{"statement":"เพราะช่วยลดปริมาณแคลอรี่ที่ร่างกายต้องการได้โดยตรง","istrue":false},{"statement":"เพราะส่งผลต่อสภาวะทางชีวเคมีและความสมดุลของร่างกายโดยรวม","istrue":true},{"statement":"เพราะการสมาธิช่วยเพิ่มค่า GI ในอาหารที่กินเข้าไป","istrue":false},{"statement":"เพราะเป็นวิธีเดียวในการสกัดวิตามิน D โดยไม่ใช้แสงแดด","istrue":false}],"explanation":"การเจริญสติส่งผลต่อระบบประสาทและฮอร์โมน ซึ่งเป็นส่วนหนึ่งของการรักษา 'สมดุล (Equilibrium)' ของร่างกายตามหลักชีวเคมี"},{"type":"multiple-choice","question":"ข้อใดสรุปหลักการ 'ความงามแบบยั่งยืน' ตามเนื้อหาทั้งหมดได้ถูกต้องที่สุด","options":[{"statement":"การใช้ผลิตภัณฑ์ความงามราคาแพงควบคู่กับการออกกำลังกายหนักๆ","istrue":false},{"statement":"การรักษาสมดุลพลังงาน เลือกอาหารคุณภาพ และให้ร่างกายได้มีช่วงเวลาซ่อมแซมตัวเอง","istrue":true},{"statement":"การรับประทานวิตามินเสริมปริมาณสูงเพื่อทดแทนมื้ออาหารปกติ","istrue":false},{"statement":"การลดไขมันทุกชนิดออกจากมื้ออาหารเพื่อป้องกันการอุดตัน","istrue":false}],"explanation":"ความงามที่ยั่งยืนเกิดจากการเข้าใจกลไกชีวเคมีของร่างกาย ทั้งการเลือกเชื้อเพลิง (อาหาร GI ต่ำ, ไขมันดี) และการเปิดโอกาสให้เกิดการรีไซเคิลเซลล์ (IF/Autophagy)"}]`),Pg=Object.freeze(Object.defineProperty({__proto__:null,default:Ng},Symbol.toStringTag,{value:"Module"})),zg=JSON.parse(`[{"type":"multiple-choice","question":"เพราะเหตุใด 'ประสาทวิทยาเชิงพฤติกรรม' จึงมีความสำคัญต่อการพัฒนาบุคลิกภาพและความงามจากภายใน","options":[{"statement":"เพราะพฤติกรรมและการแสดงออกเป็นผลมาจากปฏิกิริยาทางเคมีและไฟฟ้าในสมอง","istrue":true},{"statement":"เพราะช่วยให้เราสามารถเปลี่ยนโครงสร้าง DNA ได้ทันทีด้วยการนึกคิด","istrue":false},{"statement":"เพราะเป็นศาสตร์ที่เน้นการใช้เครื่องสำอางปรับเปลี่ยนการทำงานของเซลล์ประสาท","istrue":false},{"statement":"เพราะเน้นการฝึกกล้ามเนื้อใบหน้าให้แสดงอารมณ์ที่ดูดีตลอดเวลา","istrue":false}],"explanation":"ประสาทวิทยาเชิงพฤติกรรมอธิบายว่าพฤติกรรมมนุษย์มีรากฐานมาจากกระบวนการทางชีวภาพในสมอง การเข้าใจกลไกนี้จึงช่วยให้เราปรับปรุงบุคลิกภาพที่ต้นเหตุได้"},{"type":"multiple-choice","question":"ตามหลักการของ Critical Thinking การที่บุคคลหนึ่ง 'ไม่ตัดสินคนจากภายนอก' (Face value) สะท้อนถึงการทำงานของสมองในลักษณะใด","options":[{"statement":"การใช้สัญชาตญาณดิบในการเอาตัวรอด","istrue":false},{"statement":"การประมวลผลผ่านตัวกรองเหตุผลและการทำความเข้าใจบริบทที่อยู่เบื้องหลัง","istrue":true},{"statement":"การปิดการทำงานของระบบประสาทส่วนกลางชั่วคราว","istrue":false},{"statement":"การเน้นใช้สมองซีกขวาเพื่อจินตนาการภาพลักษณ์ใหม่ให้ผู้อื่น","istrue":false}],"explanation":"Critical Thinking คือการก้าวข้ามการตอบสนองตามสัญชาตญาณหรือภาพลักษณ์ภายนอก ไปสู่การใช้เหตุผลวิเคราะห์ความจริงและความสัมพันธ์ของข้อมูล"},{"type":"multiple-choice","question":"ในวงจรการแสดงออกทางพฤติกรรม หากเราต้องการเปลี่ยน 'ผลลัพธ์' (Response) จากการหลบหนีเป็นการเผชิญหน้าตามอุปมาอุปไมยเรื่องคอมพิวเตอร์ เราควรแก้ไขที่จุดใด","options":[{"statement":"การเปลี่ยนสิ่งกระตุ้นจากภายนอกให้ไม่มีความรุนแรง","istrue":false},{"statement":"การปรับเปลี่ยนอัลกอริทึมในส่วนของความคิดและตัวกรองอารมณ์ภายใน","istrue":true},{"statement":"การทุบหน้าจอหรือตอบโต้บุคคลที่เป็นสิ่งกระตุ้นโดยตรง","istrue":false},{"statement":"การเพิ่มความเร็วของระบบประสาทสั่งการเพียงอย่างเดียว","istrue":false}],"explanation":"การเปลี่ยนพฤติกรรมเปรียบเสมือนการแก้ Code ภายในเครื่อง ซึ่งก็คือกระบวนการคิด (Thought) และการรับรู้อารมณ์ (Emotion) ก่อนที่จะแสดงผลออกมา"},{"type":"multiple-choice","question":"เหตุใด 'ความกลัว' (Fear) จึงถูกระบุว่าเป็นรากฐานสำคัญที่ส่งผลต่ออารมณ์และการแสดงออกของมนุษย์","options":[{"statement":"เพราะความกลัวช่วยกระตุ้นการหลั่งสารเซโรโทนินในปริมาณสูง","istrue":false},{"statement":"เพราะความกลัวมักเชื่อมโยงกับสัญชาตญาณการเอาตัวรอดและการปกป้องตัวตน","istrue":true},{"statement":"เพราะความกลัวทำให้สมองซีกซ้ายทำงานได้แม่นยำขึ้น","istrue":false},{"statement":"เพราะความกลัวเป็นอารมณ์เพียงชนิดเดียวที่ไม่มีผลต่อระบบประสาทอัตโนมัติ","istrue":false}],"explanation":"ความกลัว เช่น กลัวไม่ดีพอ หรือกลัวล้มเหลว เป็นปัจจัยพื้นฐานที่สมองใช้ประมวลผลเพื่อเลือกวิธีตอบสนองต่อสถานการณ์ต่างๆ เพื่อความมั่นคงของตนเอง"},{"type":"multiple-choice","question":"ตามบันได 5 ขั้นสู่ความมั่นใจ 'Self-Empathy' ทำหน้าที่เป็นรากฐานสำคัญในด้านใด","options":[{"statement":"การฝึกทักษะการพูดในที่สาธารณะ","istrue":false},{"statement":"การเปิดใจรับฟังและทำความเข้าใจความต่างของผู้อื่นเพื่อสะท้อนกลับมาที่ตนเอง","istrue":true},{"statement":"การเร่งการทำงานของสมองซีกซ้ายในการคำนวณ","istrue":false},{"statement":"การสร้างภาพลักษณ์ภายนอกให้ดูน่าเกรงขาม","istrue":false}],"explanation":"Self-Empathy คือจุดเริ่มต้นที่ทำให้เราเข้าใจความเป็นมนุษย์ที่หลากหลาย ซึ่งจะนำไปสู่การค้นพบตัวตน (Self-Discovery) ในขั้นถัดไป"},{"type":"multiple-choice","question":"พฤติกรรม 'ชอบความรวดเร็ว เปลี่ยนแปลงเก่ง แต่ความอดทนน้อย' ในยุค Fast & Easy ส่งผลต่อการทำงานของสมองอย่างไร","options":[{"statement":"ทำให้สมองส่วนที่ควบคุมความจำระยะยาวมีความจุมากขึ้น","istrue":false},{"statement":"ทำให้วงจรการตอบสนองต่อสิ่งกระตุ้นทำงานเร็วขึ้นแต่ขาดการไตร่ตรองเชิงลึก","istrue":true},{"statement":"ทำให้เส้นประสาท Myelin sheath หนาขึ้นโดยธรรมชาติ","istrue":false},{"statement":"ทำให้ระบบประสาทพาราสิมพาเททิกทำงานตลอดเวลา","istrue":false}],"explanation":"สภาพแวดล้อมที่เน้นความไวหล่อหลอมให้สมองคุ้นชินกับการตอบสนองที่รวดเร็ว (Instant gratification) ซึ่งอาจส่งผลให้ความสามารถในการรอคอยหรือจดจ่อลดลง"},{"type":"multiple-choice","question":"ปรัชญาของเล่าจื๊อที่ว่า 'ความคิดจะกลายเป็นโชคชะตา' อธิบายในเชิงวิทยาศาสตร์ระบบประสาทได้อย่างไร","options":[{"statement":"ความคิดซ้ำๆ จะถูกเก็บไว้ในกระดูกสันหลัง","istrue":false},{"statement":"ความคิดที่เกิดขึ้นบ่อยจะสร้างโครงข่ายเส้นประสาทที่แข็งแรงจนเป็นพฤติกรรมอัตโนมัติ","istrue":true},{"statement":"ความคิดไม่มีผลต่อร่างกายจนกว่าจะมีการพูดออกมา","istrue":false},{"statement":"ความคิดเป็นเพียงคลื่นไฟฟ้าชั่วคราวที่ไม่สามารถเปลี่ยนบุคลิกภาพได้","istrue":false}],"explanation":"กระบวนการคิดซ้ำๆ ส่งผลให้เกิดความแข็งแรงของจุดเชื่อมต่อประสาท (Synaptic plasticity) จนกลายเป็นนิสัยและบุคลิกภาพที่กำหนดวิถีชีวิตในที่สุด"},{"type":"multiple-choice","question":"บุคคลที่ถนัดการใช้สมอง 'ซีกขวา' (Right Brain) จะมีลักษณะเด่นในการทำงานอย่างไร","options":[{"statement":"เน้นการวิเคราะห์ข้อมูลตัวเลขอย่างเป็นลำดับขั้นตอน","istrue":false},{"statement":"ชอบมองภาพรวม ใช้จินตนาการ และให้ความสำคัญกับความรู้สึก","istrue":true},{"statement":"ยึดถือระเบียบวินัยและกฎเกณฑ์ที่เป็นความจริงเท่านั้น","istrue":false},{"statement":"สื่อสารด้วยภาษาที่ตรงไปตรงมาและเน้นข้อเท็จจริง","istrue":false}],"explanation":"สมองซีกขวาทำงานเด่นในด้านมิติสัมพันธ์ ศิลปะ จินตนาการ และการประมวลผลข้อมูลในเชิงองค์รวม (Holistic)"},{"type":"multiple-choice","question":"ปรากฏการณ์ Epigenetics (เหนือพันธุกรรม) อธิบายความเชื่อมโยงระหว่าง 'อารมณ์' และ 'ความงาม' ได้อย่างไร","options":[{"statement":"อารมณ์ที่ดีสามารถเปลี่ยนลำดับเบสในสาย DNA ได้โดยตรง","istrue":false},{"statement":"สภาวะทางจิตใจสามารถเปิดหรือปิดสวิตช์การแสดงออกของยีนที่ส่งผลต่อสุขภาพเซลล์","istrue":true},{"statement":"ยีนจะทำงานเหมือนเดิมเสมอไม่ว่าเราจะรู้สึกอย่างไร","istrue":false},{"statement":"อารมณ์ส่งผลเฉพาะต่อผิวหนังชั้นนอกแต่ไม่ถึงระดับพันธุกรรม","istrue":false}],"explanation":"Epigenetics ศึกษาว่าปัจจัยภายนอกและสภาวะจิตใจมีอิทธิพลต่อการแสดงออกของยีน (Gene expression) ซึ่งส่งผลต่อความเสื่อมหรือความแข็งแรงของเซลล์ในร่างกาย"},{"type":"multiple-choice","question":"การฝึกสมาธิเพื่อปรับสมดุลระหว่างสมองซีกซ้ายและซีกขวาส่งผลดีต่อ 'วุฒิภาวะ' (Maturity) อย่างไร","options":[{"statement":"ทำให้เราใช้เหตุผลควบคุมจินตนาการได้อย่างเด็ดขาด","istrue":false},{"statement":"ช่วยให้การประมวลผลข้อมูลทั้งด้านตรรกะและความรู้สึกเป็นไปอย่างสอดประสานกัน","istrue":true},{"statement":"ช่วยลดการทำงานของสมองซีกซ้ายเพื่อให้ซีกขวาทำงานเพียงด้านเดียว","istrue":false},{"statement":"ทำให้เราจำข้อมูลตัวเลขได้ดีขึ้นโดยไม่ใช้ความรู้สึก","istrue":false}],"explanation":"วุฒิภาวะที่สมดุลเกิดจากการใช้ทั้งเหตุผล (ซีกซ้าย) และความเข้าใจทางอารมณ์ (ซีกขวา) ร่วมกันในการตัดสินใจและการแสดงออก"},{"type":"multiple-choice","question":"ระบบประสาทส่วนปลาย (Peripheral NS) ส่วนที่เรียกว่า SNS (Somatic NS) มีหน้าที่หลักคืออะไร","options":[{"statement":"ควบคุมการเต้นของหัวใจและการย่อยอาหารอัตโนมัติ","istrue":false},{"statement":"ควบคุมการขยับกล้ามเนื้อภายใต้อำนาจจิตใจ เช่น การสั่งให้เดิน","istrue":true},{"statement":"ประมวลผลข้อมูลความทรงจำระยะยาวในสมอง","istrue":false},{"statement":"สร้างสารสื่อประสาทประเภทเอนดอร์ฟิน","istrue":false}],"explanation":"SNS ทำหน้าที่ควบคุมการเคลื่อนไหวของกล้ามเนื้อลายที่เราสามารถบังคับหรือสั่งการได้ตามความต้องการ"},{"type":"multiple-choice","question":"ในสถานการณ์ที่เรารู้สึกโกรธจนหัวใจเต้นเร็ว ระบบประสาทส่วนใดกำลังทำงานเด่นชัด (Dominant)","options":[{"statement":"Parasympathetic NS (พักและย่อย)","istrue":false},{"statement":"Sympathetic NS (สู้หรือหนี)","istrue":true},{"statement":"Somatic NS (สั่งการกล้ามเนื้อลาย)","istrue":false},{"statement":"Central NS (สมองและไขสันหลัง)","istrue":false}],"explanation":"ระบบซิมพาเททิกจะทำงานเมื่อร่างกายเผชิญความเครียดหรืออันตราย เพื่อเตรียมพร้อมในการต่อสู้หรือวิ่งหนี"},{"type":"multiple-choice","question":"เพราะเหตุใดการทำสมาธิจึงถูกเปรียบเทียบว่าเป็นการ 'เปิด' ระบบพาราสิมพาเททิก (Parasympathetic NS)","options":[{"statement":"เพราะช่วยให้ร่างกายเข้าสู่โหมดผ่อนคลาย ลดอัตราการเต้นของหัวใจ และช่วยการซ่อมแซม","istrue":true},{"statement":"เพราะช่วยเพิ่มระดับความดันเลือดให้สูงขึ้นเพื่อความตื่นตัว","istrue":false},{"statement":"เพราะทำให้ระบบย่อยอาหารหยุดทำงานชั่วคราวเพื่อประหยัดพลังงาน","istrue":false},{"statement":"เพราะส่งเสริมให้ร่างกายมีการตอบสนองแบบ 'สู้หรือหนี' ได้เร็วขึ้น","istrue":false}],"explanation":"พาราสิมพาเททิกเป็นระบบที่ทำงานในสภาวะพักผ่อน (Rest and Digest) การทำสมาธิช่วยเหนี่ยวนำให้ระบบนี้ทำงานเพื่อฟื้นฟูร่างกาย"},{"type":"multiple-choice","question":"ส่วนประกอบของเซลล์ประสาทที่ทำหน้าที่เป็น 'ฉนวน' เพื่อให้สัญญาณไฟฟ้าวิ่งได้เร็วขึ้นคือข้อใด","options":[{"statement":"Dendrite","istrue":false},{"statement":"Soma","istrue":false},{"statement":"Myelin sheath","istrue":true},{"statement":"Axon terminal","istrue":false}],"explanation":"เยื่อไมอีลิน (Myelin sheath) เป็นสารจำพวกไขมันที่หุ้มล้อมรอบแอกซอน ช่วยเพิ่มความเร็วในการส่งกระแสประสาท"},{"type":"multiple-choice","question":"กลไก 'Reuptake' ในจุดเชื่อมต่อประสาทมีความสำคัญอย่างไรต่อระบบสื่อสารในสมอง","options":[{"statement":"เป็นการทำลายสารสื่อประสาททิ้งทั้งหมดเพื่อป้องกันความจำเสื่อม","istrue":false},{"statement":"เป็นการดูดกลับสารสื่อประสาทเข้าสู่เซลล์เดิมเพื่อนำไปรีไซเคิลและป้องกันสัญญาณค้าง","istrue":true},{"statement":"เป็นการแพร่กระจายสารสื่อประสาทออกไปนอกระบบเลือด","istrue":false},{"statement":"เป็นการเร่งให้เอนไซม์มาย่อยสลายสารสื่อประสาทให้เร็วขึ้น","istrue":false}],"explanation":"Reuptake ช่วยรักษาสมดุลของปริมาณสารสื่อประสาทในช่องว่างไซแนปส์ ไม่ให้มีการส่งสัญญาณค้างนานเกินไป"},{"type":"multiple-choice","question":"สมดุลระหว่าง 'Glutamate' และ 'GABA' เปรียบได้กับอุปกรณ์ชิ้นส่วนใดในรถยนต์","options":[{"statement":"ไฟหน้าและไฟท้าย","istrue":false},{"statement":"คันเร่งและเบรก","istrue":true},{"statement":"พวงมาลัยและเกียร์","istrue":false},{"statement":"ถังน้ำมันและไอเสีย","istrue":false}],"explanation":"Glutamate ทำหน้าที่กระตุ้น (คันเร่ง) ขณะที่ GABA ทำหน้าที่ยับยั้ง (เบรก) เพื่อให้การทำงานของสมองมีเสถียรภาพ"},{"type":"multiple-choice","question":"ภาวะที่มี Glutamate มากเกินไป (Excessive) ในสมองจะส่งผลกระทบอย่างไรต่อร่างกาย","options":[{"statement":"ทำให้เกิดความรู้สึกเคลิ้มสุข (Euphoria)","istrue":false},{"statement":"นำไปสู่ความวิตกกังวล ความคิดฟุ้งซ่าน และอาจทำลายเซลล์ประสาท","istrue":true},{"statement":"ช่วยให้นอนหลับได้ลึกและยาวนานขึ้น","istrue":false},{"statement":"ลดโอกาสการเป็นโรคไมเกรนอย่างชัดเจน","istrue":false}],"explanation":"การกระตุ้นจาก Glutamate ที่มากเกินไปส่งผลให้เซลล์ประสาททำงานหนักเกิน (Excitotoxicity) นำไปสู่ความเครียดและเซลล์ตาย"},{"type":"multiple-choice","question":"หากบุคคลหนึ่งพยายามแสวงหาความสุขจาก 'ยาเสพติด' ในทางประสาทวิทยาอาจวิเคราะห์ได้ว่าเขากำลังมีปัญหาที่สารสื่อประสาทชนิดใด","options":[{"statement":"Norepinephrine ต่ำเกินไป","istrue":false},{"statement":"Dopamine ไม่สมดุลหรือระบบรับรางวัลทำงานบกพร่อง","istrue":true},{"statement":"GABA มีปริมาณมากเกินปกติ","istrue":false},{"statement":"Nitric Oxide ไม่เพียงพอ","istrue":false}],"explanation":"โดพามีนเป็นสารที่ควบคุมระบบรางวัล (Reward system) การติดยาเสพติดเป็นการกระตุ้นระบบนี้จากภายนอกเพื่อชดเชยความบกพร่องภายใน"},{"type":"multiple-choice","question":"กลไกการทำงานของ 'Endorphins' ในการระงับความเจ็บปวดคือข้อใด","options":[{"statement":"การเข้าไปทำลายเซลล์ประสาทที่ส่งความรู้สึกเจ็บปวด","istrue":false},{"statement":"การไปจับกับตัวรับเพื่อบล็อกสาร Substance P ไม่ให้ส่งสัญญาณความปวดไปที่สมอง","istrue":true},{"statement":"การเปลี่ยนความเจ็บปวดให้กลายเป็นสารอาหารแก่สมอง","istrue":false},{"statement":"การลดปริมาณออกซิเจนในกระแสเลือดเพื่อลดการรับรู้","istrue":false}],"explanation":"เอ็นดอร์ฟินทำหน้าที่เป็นยาแก้ปวดตามธรรมชาติ โดยการยับยั้งการส่งสัญญาณความเจ็บปวด (Substance P) ผ่านตัวรับฝิ่น (Opiate receptors)"},{"type":"multiple-choice","question":"กิจกรรม 'การกอด' (Hugging) หรือการนวด ช่วยส่งเสริมความงามและความสุขผ่านฮอร์โมนชนิดใด","options":[{"statement":"Adrenaline","istrue":false},{"statement":"Oxytocin","istrue":true},{"statement":"Glutamate","istrue":false},{"statement":"Prolactin","istrue":false}],"explanation":"ออกซีโทซินหรือฮอร์โมนแห่งความรักจะหลั่งออกมาเมื่อมีการสัมผัสทางกายที่อบอุ่น ช่วยสร้างความผูกพันและลดความเครียด"},{"type":"multiple-choice","question":"สภาวะที่ Serotonin ต่ำเกินไป (Low Serotonin) มักจะแสดงอาการทางกายที่เห็นได้ชัดในระบบใด","options":[{"statement":"ระบบไหลเวียนโลหิต (ความดันต่ำ)","istrue":false},{"statement":"ระบบขับถ่าย (ท้องผูก) และระบบการนอน (นอนไม่หลับ)","istrue":true},{"statement":"ระบบภูมิคุ้มกัน (เป็นหวัดง่าย)","istrue":false},{"statement":"ระบบกล้ามเนื้อ (ตะคริว)","istrue":false}],"explanation":"เซโรโทนินมีบทบาทสำคัญทั้งในสมองและทางเดินอาหาร การขาดสารนี้จึงส่งผลต่อทั้งอารมณ์ การนอน และการเคลื่อนไหวของลำไส้"},{"type":"multiple-choice","question":"ความแตกต่างสำคัญระหว่าง 'ความเศร้าทั่วไป' และ 'ภาวะซึมเศร้า' ตามหลักจิตวิทยาคือข้อใด","options":[{"statement":"ความเศร้าทั่วไปรักษายากกว่าซึมเศร้า","istrue":false},{"statement":"ในความเศร้าทั่วไป บุคคลยังคงมีความรู้สึกเห็นคุณค่าในตนเอง (Self-esteem) หลงเหลืออยู่","istrue":true},{"statement":"ภาวะซึมเศร้าจะเกิดขึ้นเพียง 1-2 วันแล้วหายไปเอง","istrue":false},{"statement":"ความเศร้าทั่วไปจำเป็นต้องใช้ไฟฟ้ากระตุ้นสมองในการรักษา","istrue":false}],"explanation":"ความเศร้ามักเกิดตามสถานการณ์และสลับกับความรู้สึกดีๆ ได้ แต่ภาวะซึมเศร้าจะดิ่งลึก ต่อเนื่อง และทำลายความมั่นใจในตนเองอย่างรุนแรง"},{"type":"multiple-choice","question":"เพราะเหตุใด 'ผู้หญิง' จึงมีแนวโน้มถูกวินิจฉัยว่าเป็นโรคซึมเศร้าสูงกว่าผู้ชายตามสถิติจาก BMJ","options":[{"statement":"เพราะผู้หญิงมีสมองซีกซ้ายทำงานน้อยกว่าผู้ชาย","istrue":false},{"statement":"อาจเกิดจากปัจจัยทางฮอร์โมน บริบททางสังคม และการเปิดเผยข้อมูลเพื่อขอความช่วยเหลือ","istrue":true},{"statement":"เพราะผู้หญิงไม่สามารถสร้างสารโดพามีนได้เอง","istrue":false},{"statement":"เพราะผู้หญิงได้รับแสงแดดน้อยกว่าผู้ชายตามสถิติโลก","istrue":false}],"explanation":"แนวโน้มทางสถิติอาจสะท้อนถึงทั้งความแตกต่างทางชีวภาพ (ฮอร์โมน) และความเต็มใจในการเข้าสู่ระบบการรักษามากกว่าเพศชาย"},{"type":"multiple-choice","question":"เกณฑ์ขั้นต่ำในเชิง 'ระยะเวลา' ที่ใช้บ่งชี้ว่าบุคคลอาจมีภาวะซึมเศร้าคือข้อใด","options":[{"statement":"รู้สึกซึมเศร้าอย่างน้อย 3 วันติดต่อกัน","istrue":false},{"statement":"รู้สึกซึมเศร้าหรือหมดความสนใจต่อเนื่องกันอย่างน้อย 2 สัปดาห์","istrue":true},{"statement":"มีอาการท้องผูกสลับท้องเสียเป็นเวลา 1 เดือน","istrue":false},{"statement":"นอนไม่หลับติดต่อกันเกิน 5 วัน","istrue":false}],"explanation":"ทางการแพทย์ใช้เกณฑ์ 2 สัปดาห์ในการวินิจฉัยอาการเศร้าที่ต่อเนื่องเพื่อให้แยกออกจากการตอบสนองทางอารมณ์ชั่วคราว"},{"type":"multiple-choice","question":"สภาวะ 'Dysthymia' หรือโรคซึมเศร้าเรื้อรัง มีความแตกต่างจากซึมเศร้าทั่วไปอย่างไร","options":[{"statement":"มีอาการรุนแรงกว่าจนต้องเข้าห้องฉุกเฉินทุกวัน","istrue":false},{"statement":"มีอาการเศร้าไม่รุนแรงมากแต่เป็นต่อเนื่องยาวนานถึง 2 ปี","istrue":true},{"statement":"เป็นโรคที่เกิดขึ้นเฉพาะกับเด็กอายุต่ำกว่า 10 ปี","istrue":false},{"statement":"รักษาหายได้ด้วยการกินวิตามิน B6 เพียงอย่างเดียว","istrue":false}],"explanation":"Dysthymia เน้นที่ความเรื้อรังของอาการ (Chronic) แม้อาการจะไม่รุนแรงเท่า Major Depression แต่ส่งผลต่อคุณภาพชีวิตในระยะยาว"},{"type":"multiple-choice","question":"ความแตกต่างระหว่าง 'Relapse' และ 'Recurrence' ในบริบทของการรักษาโรคซึมเศร้าคือข้อใด","options":[{"statement":"Relapse คือหายแล้วเป็นใหม่ Recurrence คือยังไม่หายดีแต่ทรุดลง","istrue":false},{"statement":"Relapse คืออาการกำเริบขณะยังรักษาไม่หายขาด Recurrence คือการกลับมาเป็นซ้ำหลังจากหายสนิทแล้ว","istrue":true},{"statement":"ทั้งสองคำมีความหมายเหมือนกันทุกประการ","istrue":false},{"statement":"Recurrence ใช้เฉพาะกับโรคไบโพลาร์เท่านั้น","istrue":false}],"explanation":"Relapse หมายถึงอาการกลับมาแย่ลงในช่วงที่ยังไม่พ้นระยะการรักษา (Remission) ขณะที่ Recurrence คือการเกิดตอนใหม่ของโรคหลังจากหายดีแล้ว"},{"type":"multiple-choice","question":"ลักษณะเด่นของช่วง 'Mania' ในโรคไบโพลาร์ (Bipolar Disorder) ที่ต่างจากความดีใจทั่วไปคือข้อใด","options":[{"statement":"มีความสุขสงบและชอบนั่งสมาธิทั้งวัน","istrue":false},{"statement":"คึกคะนองผิดปกติ นอนน้อยแต่พลังเยอะ พูดเร็ว และอาจตัดสินใจเสี่ยงภัย","istrue":true},{"statement":"มีความต้องการนอนหลับมากกว่าปกติถึง 2 เท่า","istrue":false},{"statement":"จำเหตุการณ์ที่เกิดขึ้นไม่ได้เลยแม้แต่น้อย","istrue":false}],"explanation":"Mania เป็นสภาวะที่อารมณ์และพลังงานสูงเกินปกติอย่างรุนแรง จนมักจะกระทบต่อการตัดสินใจและหน้าที่การงาน"},{"type":"multiple-choice","question":"หลักฐานจากภาพสแกนสมอง (PET Scan) แสดงให้เห็นความต่างของสมองคนซึมเศร้าอย่างไร","options":[{"statement":"สมองคนซึมเศร้ามีขนาดใหญ่กว่าปกติ","istrue":false},{"statement":"กิจกรรมทางไฟฟ้าและเคมี (แสงสีเหลือง/แดง) ในสมองคนซึมเศร้าลดลงอย่างมาก","istrue":true},{"statement":"สมองคนซึมเศร้ามีการใช้กลูโคสสูงกว่าคนปกติ","istrue":false},{"statement":"ไม่มีความแตกต่างที่สังเกตเห็นได้จากภาพสแกน","istrue":false}],"explanation":"ภาพ PET Scan ยืนยันว่าคนซึมเศร้ามีการทำงานของสมอง (Metabolism) ที่ลดลง ซึ่งเป็นข้อพิสูจน์ว่าซึมเศร้าคือโรคทางกายภาพของสมอง"},{"type":"multiple-choice","question":"ยากลุ่ม SSRIs (เช่น Zoloft) ออกฤทธิ์ช่วยบรรเทาอาการซึมเศร้าด้วยกลไกใด","options":[{"statement":"การฉีดสารเซโรโทนินสังเคราะห์เข้าสู่สมองโดยตรง","istrue":false},{"statement":"ยับยั้งการดูดกลับ (Reuptake) ของเซโรโทนิน ทำให้สารนี้ค้างอยู่ที่ช่องว่างประสาทนานขึ้น","istrue":true},{"statement":"การทำลายเอนไซม์ที่ใช้สร้างโดพามีน","istrue":false},{"statement":"การเพิ่มความหนาของ Myelin sheath ในระบบประสาทพาราสิมพาเททิก","istrue":false}],"explanation":"SSRIs ช่วยให้เซโรโทนินที่มีอยู่น้อยในคนซึมเศร้า สามารถทำงานส่งสัญญาณความสุขได้ยาวนานและมีประสิทธิภาพมากขึ้น"},{"type":"multiple-choice","question":"เทคโนโลยี TMS (Transcranial Magnetic Stimulation) มีจุดเด่นในการรักษาอย่างไร","options":[{"statement":"ต้องผ่าตัดฝังชิปแม่เหล็กไว้ในสมอง","istrue":false},{"statement":"ใช้คลื่นแม่เหล็กไฟฟ้ากระตุ้นเซลล์ประสาทโดยไม่ต้องผ่าตัดหรือดมยาสลบ","istrue":true},{"statement":"ใช้กระแสไฟฟ้าแรงสูงเพื่อให้ร่างกายชักติดต่อกันหลายชั่วโมง","istrue":false},{"statement":"เป็นการรักษาที่เน้นการปรับเปลี่ยนพันธุกรรมผ่านแม่เหล็ก","istrue":false}],"explanation":"TMS เป็นนวัตกรรมการรักษาโรคซึมเศร้าที่เน้นความปลอดภัย มีผลข้างเคียงน้อย และไม่ต้องใช้ยาสลบเหมือนการรักษาด้วยไฟฟ้าแบบเดิม"},{"type":"multiple-choice","question":"เพราะเหตุใด 'สาหร่ายสไปรูลิน่า' หรือ 'เมล็ดฟักทอง' จึงถูกจัดเป็นอาหารบำรุงจิตใจ","options":[{"statement":"เพราะมีสารสีเขียวที่ช่วยลดระดับ Glutamate","istrue":false},{"statement":"เพราะเป็นแหล่งของ Tryptophan ซึ่งเป็นสารตั้งต้นในการสร้าง Serotonin","istrue":true},{"statement":"เพราะช่วยเพิ่มระดับไขมันอิ่มตัวในสมอง","istrue":false},{"statement":"เพราะสามารถเปลี่ยนเป็นวิตามิน D ได้โดยไม่ต้องโดนแดด","istrue":false}],"explanation":"ทริปโตแฟนเป็นกรดอะมิโนจำเป็นที่สมองใช้ผลิตเซโรโทนิน การกินอาหารที่มีสารนี้สูงจึงช่วยเสริมสร้างเคมีแห่งความสุข"},{"type":"multiple-choice","question":"วิตามินชนิดใดที่มีบทบาทเป็น Co-factor สำคัญในการสร้างสาร 'GABA' เพื่อความสงบของจิตใจ","options":[{"statement":"วิตามิน A","istrue":false},{"statement":"วิตามิน B6","istrue":true},{"statement":"วิตามิน E","istrue":false},{"statement":"วิตามิน K","istrue":false}],"explanation":"วิตามิน B6 จำเป็นต่อกระบวนการสังเคราะห์ GABA จาก Glutamate หากขาดวิตามินนี้อาจส่งผลให้เกิดความฟุ้งซ่านและวิตกกังวล"},{"type":"multiple-choice","question":"การนอนหลับที่เพียงพอส่งผลดีต่อระบบ 'เซโรโทนิน' ในสมองอย่างไร","options":[{"statement":"ช่วยลดการผลิตเซโรโทนินเพื่อประหยัดไว้ใช้ตอนกลางวัน","istrue":false},{"statement":"ช่วยให้ระบบรับสัญญาณ (Receptors) ทำงานได้ไวขึ้นและไม่ดื้อต่อความสุข","istrue":true},{"statement":"ช่วยเปลี่ยนเซโรโทนินให้กลายเป็นไขมันสะสม","istrue":false},{"statement":"ช่วยบล็อกการทำงานของ GABA เพื่อให้สมองตื่นตัว","istrue":false}],"explanation":"การนอนหลับช่วยฟื้นฟูความไวของตัวรับสารสื่อประสาท ทำให้ร่างกายสามารถตอบสนองต่อความสุขและอารมณ์ที่ดีได้อย่างมีประสิทธิภาพ"},{"type":"multiple-choice","question":"จากบทเรียน 'ความงามที่ยั่งยืน' เปรียบได้กับการดูแลสวนในลักษณะใด","options":[{"statement":"การซื้อดอกไม้ปลอมมาประดับสวน (ความงามภายนอก)","istrue":false},{"statement":"การพรวนดิน (อาหารดี/IF) และการให้แสงแดดที่พอเหมาะ (สมาธิ/จิตใจ)","istrue":true},{"statement":"การปิดสวนไม่ให้คนภายนอกเข้าชม (การเก็บตัว)","istrue":false},{"statement":"การใช้ยาฆ่าแมลงปริมาณสูง (การใช้ยาโดยไม่จำเป็น)","istrue":false}],"explanation":"ความงามที่ยั่งยืนเกิดจากการประสานกันของการดูแลร่างกาย (ชีวเคมีอาหาร) และการดูแลจิตใจ (ชีวเคมีสมอง)"},{"type":"multiple-choice","question":"เป้าหมายสูงสุดของการเรียนเรื่องสมองและสมาธิคือข้อใด","options":[{"statement":"การสามารถวินิจฉัยโรคจิตเวชให้ผู้อื่นได้","istrue":false},{"statement":"การเข้าใจกลไกตนเองเพื่อปรับปรุงและควบคุมพฤติกรรมสู่ความสำเร็จ","istrue":true},{"statement":"การจำชื่อสารสื่อประสาทให้ได้มากที่สุดเพื่อทำข้อสอบ","istrue":false},{"statement":"การพิสูจน์ว่าพันธุกรรมสำคัญกว่าสิ่งแวดล้อมเสมอ","istrue":false}],"explanation":"การรู้จักตนเอง (Self-discovery) ผ่านความเข้าใจกลไกสมอง ช่วยให้เราพัฒนาบุคลิกภาพและโชคชะตาตามแนวทางที strue":true},{"statement":"การมีสมองซีกซ้ายและขวาสมดุลกัน","istrue":false},{"statement":"การเป็นคนพูดเร็วและคิดเร็ว","istrue":false}],"explanation":"ลักษณะนิสัยและการมองโลก (Cognitive style) เป็นปัจจัยสำคัญที่ส่งผลต่อการตอบสนองทางอารมณ์และความเปราะบางต่อโรค"},{"type":"multiple-choice","question":"การใช้กระแสไฟฟ้าความเข้มต่ำผ่านสมองเพื่อให้เกิดอาการชักสั้นๆ ในการรักษาซึมเศร้าเรียกว่าอะไร","options":[{"statement":"TMS","istrue":false},{"statement":"ECT (Electroconvulsive Therapy)","istrue":true},{"statement":"MRI Scan","istrue":false},{"statement":"Biofeedback","istrue":false}],"explanation":"ECT เป็นการรักษาที่ใช้ในกรณีรุนแรงหรือดื้อต่อยา เพื่อปรับสมดุลเคมีในสมองผ่านการใช้กระแสไฟฟ้า"},{"type":"multiple-choice","question":"การกิน 'ดาร์กช็อกโกแลต' ส่งผลดีต่ออารมณ์อย่างไรตามเนื้อหาบทเรียน","options":[{"statement":"ช่วยลดปริมาณแคลอรี่ที่ร่างกายต้องการ","istrue":false},{"statement":"กระตุ้นการหลั่ง Endorphins และช่วยให้รู้สึกผ่อนคลาย","istrue":true},{"statement":"ช่วยเพิ่มระดับน้ำตาลในเลือดให้สูงตลอดวัน","istrue":false},{"statement":"ช่วยให้ระบบประสาทซิมพาเททิกทำงานแรงขึ้น","istrue":false}],"explanation":"ดาร์กช็อกโกแลตมีสารที่ช่วยกระตุ้นการหลั่งเอนดอร์ฟินและมีฟลาโวนอยด์ที่ส่งผลดีต่อสมอง"},{"type":"multiple-choice","question":"ข้อใดเป็นคุณสมบัติของ 'Blueberry' ที่ช่วยบำรุงสมอง","options":[{"statement":"เป็นแหล่งโปรตีนที่ช่วยสร้างกล้ามเนื้อสมอง","istrue":false},{"statement":"ป้องกันสมองจากความเครียดระดับเซลล์ (Oxidative stress)","istrue":true},{"statement":"ช่วยลดการดูดซึมวิตามิน B6","istrue":false},{"statement":"ช่วยเปลี่ยนไขมันเลวให้กลายเป็นโดพามีน","istrue":false}],"explanation":"บลูเบอร์รี่มีสารต้านอนุมูลอิสระสูง ซึ่งช่วยปกป้องเซลล์ประสาทจากการถูกทำลาย"},{"type":"multiple-choice","question":"การทำงานร่วมกันระหว่าง 'ร่างกาย' และ 'จิตใจ' (Mind-Body Connection) เห็นได้ชัดจากข้อใด","options":[{"statement":"ความเครียดในใจทำให้เกิดอาการปวดบ่าหรือปวดท้อง","istrue":true},{"statement":"ความคิดไม่มีผลใดๆ ต่ออาการเจ็บป่วยทางกาย","istrue":false},{"statement":"การออกกำลังกายไม่ช่วย iple-choice","question":"ลักษณะของ 'White Matter' ในสมองส่วนในที่มีสีขาวเด่นชัด เกิดจากองค์ประกอบของสารอาหารประเภทใดเป็นหลัก","options":[{"statement":"โปรตีนบริสุทธิ์ 90%","istrue":false},{"statement":"กรดโฟลิกเข้มข้น","istrue":false},{"statement":"ไขมัน (Lipids) ใน Myelin Sheath","istrue":true},{"statement":"กลูโคสที่ใช้เป็นพลังงาน","istrue":false}],"explanation":"White Matter ประกอบด้วยเส้นใยประสาทที่มี Myelin Sheath หุ้มอยู่ ซึ่งปลอกหุ้มนี้มีองค์ประกอบเป็นไขมันสูงถึง 60-75% ทำให้มองเห็นเป็นสีขาว"},{"type":"multiple-choice","question":"ในเชิงการวิเคราะห์พฤติกรรม หากบุคคลหนึ่งมีอาการ 'มือซ้ายและมือขวาทำงานไม่ประสานกัน' มีแนวโน้มว่าสมองส่วนใดเกิดความบกพร่อง","options":[{"statement":"Occipital Lobe","istrue":false},{"statement":"Corpus Callosum","istrue":true},{"statement":"Hippocampus","istrue":false},{"statement":"Amygdala","istrue":false}],"explanation":"Corpus Callosum ทำหน้าที่เป็นสะพานเชื่อมมัดเส้นใยประสาทระหว่างสมองซีกซ้ายและซีกขวา เพื่อให้สมองทั้งสองซีกสามารถสื่อสารและประสานงานกันได้"},{"type":"multiple-choice","question":"เหตุใดพูสมองส่วนท้ายทอย (Occipital Lobe) จึงมีความสำคัญมากเมื่อเราเดินในที่มืดและพยายามมองหาทางออก","options":[{"statement":"เพราะเป็นศูนย์กลางควบคุมการได้ยินเสียงรอบข้าง","istrue":false},{"statement":"เพราะทำหน้าที่ประมวลผลข้อมูลการมองเห็นจากดวงตา","istrue":true},{"statement":"เพราะเป็นส่วนที่ใช้คุมสติและความกลัว","istrue":false},{"statement":"เพราะช่วยในการทรงตัวไม่ให้ล้ม","istrue":false}],"explanation":"Occipital Lobe เป็นพูสมองที่ทำหน้าที่เป็นหน้าจอประมวลผลข้อมูลที่รับมาจากดวงตาเพื่อแปลงเป็นภาพการมองเห็น"},{"type":"multiple-choice","question":"สภาวะ 'Reflex' เมื่อเห็นวัตถุพุ่งมาที่ตาแล้วเราหลับตาทันที เป็นการทำงานร่วมกันของสมองส่วนใด","options":[{"statement":"สมองส่วนหน้า (Telencephalon)","istrue":false},{"statement":"สมองส่วนกลาง (Midbrain)","istrue":true},{"statement":"สมองส่วนท้าย (Metencephalon)","istrue":false},{"statement":"ไขสันหลังเพียงอย่างเดียว","istrue":false}],"explanation":"Midbrain หรือสมองส่วนกลางเป็นศูนย์กลางของปฏิกิริยาตอบสนอง (Reflex) เกี่ยวกับการมองเห็นและได้ยิน"},{"type":"multiple-choice","question":"บุคคลที่ดื่มแอลกอฮอล์แล้วเกิดอาการเดินเซหรือทรงตัวไม่อยู่ เป็นเพราะแอลกอฮอล์ไปส่งผลกระทบต่อการทำงานของสมองส่วนใด","options":[{"statement":"Cerebrum","istrue":false},{"statement":"Pons","istrue":false},{"statement":"Cerebellum","istrue":true},{"statement":"Reticular Formation","istrue":false}],"explanation":"Cerebellum หรือสมองน้อยมีหน้าที่หลักในการควบคุมการทรงตัวและประสานงานการเคลื่อนไหวของกล้ามเนื้อ"},{"type":"multiple-choice","question":"ในสถานการณ์ที่เราต้องแยกความต่างระหว่างสี 'ชมพูกลีบบัว' และ 'ชมพูนู้ด' ตามที่เนื้อหาระบุ สมองส่วนใดของผู้หญิงที่ทำงานได้ละเอียดกว่าผู้ชายถึง 3 เท่า","options":[{"statement":"ระบบประมวลผลการมองเห็นในซีกสมอง","istrue":true},{"statement":"ระบบความจำในฮิปโปแคมปัส","istrue":false},{"statement":"ระบบควบคุมอารมณ์ในอะมิกดาลา","istrue":false},{"statement":"ระบบตรรกะในสมองซีกซ้าย","istrue":false}],"explanation":"งานวิจัยระบุว่าผู้หญิงมักมีความสามารถในการมองเห็นและแยกแยะความละเอียดของสีสันได้ดีกว่าผู้ชายอย่างชัดเจน"},{"type":"multiple-choice","question":"จากทฤษฎีความเครียดสะสมในสมอง หากสังเกตว่าบุคคลหนึ่งมักมีการเคลื่อนไหวของลูกตาไปทาง 'ซ้าย' บ่อยขึ้นขณะถูกกระตุ้นทางอารมณ์ สะท้อนถึงการทำงานของสมองซีกใด","options":[{"statement":"สมองซีกซ้าย เพราะคุมซีกขวาของร่างกาย","istrue":false},{"statement":"สมองซีกขวา เพราะเป็นส่วนที่สะสมความเครียดและอารมณ์มากกว่า","istrue":true},{"statement":"สมองส่วนหน้า เพราะกำลังใช้ความคิด","istrue":false},{"statement":"สมองส่วนกลาง เพราะเป็นปฏิกิริยารีเฟล็กซ์","istrue":false}],"explanation":"สมองซีกขวาเกี่ยวข้องกับการประมวลผลอารมณ์และความเครียด ซึ่งจะส่งผลต่อการเคลื่อนไหวของอวัยวะซีกซ้ายของร่างกาย รวมถึงทิศทางการมอง"},{"type":"multiple-choice","question":"ช่วงเวลาใดในครรภ์มารดาที่ถือเป็นจุดสูงสุดของการเจริญเติบโตของเซลล์ประสาทในทารก","options":[{"statement":"3 สัปดาห์แรก","istrue":false},{"statement":"อายุครรภ์ 4 เดือน","istrue":false},{"statement":"อายุครรภ์ 7 เดือน","istrue":true},{"statement":"ช่วงสัปดาห์ก่อนคลอด","istrue":false}],"explanation":"ทารกอายุ 7 เดือนในครรภ์จะมีการเจริญเติบโตของเซลล์ประสาทในสมองมากที่สุด ก่อนที่จะเข้าสู่ช่วงการสร้างปลอกหุ้มประสาทในเวลาต่อมา"},{"type":"multiple-choice","question":"ข้อใดอธิบายปรากฏการณ์ 'Neurogenesis' ในวัยผู้ใหญ่ได้ถูกต้องที่สุดตามเนื้อหา","options":[{"statement":"เซลล์ประสาททั่วทั้งสมองสามารถแบ่งตัวเพิ่มจำนวนได้ตลอดเวลา","istrue":false},{"statement":"เซลล์ประสาทหยุดการทำงานทั้งหมดเมื่ออายุเกิน 20 ปี","istrue":false},{"statement":"สมองยังสามารถสร้างเซลล์ใหม่ได้ในบางพื้นที่ เช่น ฮิปโปแคมปัส และโอเลแฟกทอรีบัลบ์","istrue":true},{"statement":"การสร้างเซลล์ใหม่จะเกิดขึ้นได้เฉพาะตอนที่เราออกกำลังกายหนักเท่านั้น","istrue":false}],"explanation":"แม้เซลล์ประสาทส่วนใหญ่จะไม่แบ่งตัวเพิ่มหลังคลอด แต่พื้นที่อย่างฮิปโปแคมปัส (ความจำ) และโอเลแฟกทอรีบัลบ์ (การดมกลิ่น) ยังสามารถสร้างเซลล์ใหม่ได้"},{"type":"multiple-choice","question":"เด็กที่มีช่วงอายุ 19-24 เดือน มักจะแสดงพฤติกรรม 'Language Explosion' อย่างไร","options":[{"statement":"เริ่มร้องไห้เพื่อสื่อสารความหิว","istrue":false},{"statement":"เริ่มถามคำถาม 'นี่อะไร?' และซึมซับคำศัพท์ได้อย่างรวดเร็ว","istrue":true},{"statement":"เริ่มแต่งเรื่องราวที่ซับซ้อนเกี่ยวกับอนาคต","istrue":false},{"statement":"เริ่มใช้ตรรกะเหตุผลในการโต้เถียงกับผู้ใหญ่","istrue":false}],"explanation":"ช่วงระเบิดภาษาเป็นช่วงที่เด็กมีความกระหายในการเรียนรู้ชื่อเรียกสิ่งของรอบตัวและซึมซับคำศัพท์ใหม่ๆ ได้อย่างรวดเร็วมาก"},{"type":"multiple-choice","question":"ปัจจัยที่สำคัญที่สุดที่ทำให้สมองของผู้ใหญ่ 'ฉลาดขึ้น' และมีความจำที่ดีขึ้นคือข้อใด","options":[{"statement":"การเพิ่มจำนวนเซลล์ประสาทจาก 100 พันล้านเป็น 200 พันล้านเซลล์","istrue":false},{"statement":"การแตกกิ่งก้านของเดนไดรต์ (Dendrites) จากการเรียนรู้และประสบการณ์","istrue":true},{"statement":"การลดปริมาณการใช้กลูโคสในสมอง","istrue":false},{"statement":"การหยุดใช้สมองซีกขวาเพื่อเน้นสมองซีกซ้ายเพียงด้านเดียว","istrue":false}],"explanation":"ความฉลาดไม่ได้ขึ้นอยู่กับจำนวนเซลล์ประสาทที่มีจำกัดเท่าเดิม แต่ขึ้นอยู่กับการแตกกิ่งก้านสาขาของเดนไดรต์เพื่อสร้างเครือข่ายเชื่อมโยงข้อมูลใหม่ๆ"},{"type":"multiple-choice","question":"เหตุใดการรับประทาน 'น้ำมันมะกอก' หรือ 'อะโวคาโด' จึงส่งผลดีต่อความเร็วในการประมวลผลของสมอง","options":[{"statement":"เพราะช่วยเพิ่มปริมาณน้ำในสมอง","istrue":false},{"statement":"เพราะมีกรดโอเลอิก (Omega-9) ที่ช่วยบำรุงปลอกประสาท (Myelin)","istrue":true},{"statement":"เพราะช่วยลดการสะสมของออกซิเจนในสมอง","istrue":false},{"statement":"เพราะช่วยกระตุ้นการทำงานของพูท้ายทอย","istrue":false}],"explanation":"กรดโอเลอิกเป็นองค์ประกอบสำคัญในการสร้างและซ่อมแซมปลอกประสาทไมอีลิน ซึ่งทำหน้าที่เหมือนทางด่วนในการส่งกระแสประสาท"},{"type":"multiple-choice","question":"บุคคลที่มีค่าสติปัญญา (IQ) สูง มักจะมีโครงสร้างทางชีวภาพของสมองลักษณะใดเด่นชัด","options":[{"statement":"มีพื้นที่ว่างในสมองมากกว่าคนทั่วไป","istrue":false},{"statement":"มีความซับซ้อนของกิ่งก้านเซลล์ประสาท (Dendritic Arbor) และหนามประสาทหนาแน่น","istrue":true},{"statement":"มีจำนวนหลอดเลือดในสมองน้อยกว่าปกติเพื่อประหยัดพลังงาน","istrue":false},{"statement":"มีสมองซีกขวาที่มีขนาดใหญ่กว่าซีกซ้าย 2 เท่า","istrue":false}],"explanation":"ระดับ IQ มีความสัมพันธ์โดยตรงกับความหนาแน่นและความซับซ้อนของเครือข่ายการเชื่อมต่อระหว่างเซลล์ประสาท"},{"type":"multiple-choice","question":"ความจำระยะยาวประเภท 'Procedural Memory' (ความจำที่เป็นขั้นตอน) มักเกี่ยวข้องกับกิจกรรมในข้อใด","options":[{"statement":"การจำชื่อเมืองหลวงของประเทศไทย","istrue":false},{"statement":"การจำเหตุการณ์วันเกิดเมื่อ 10 ปีที่แล้ว","istrue":false},{"statement":"ทักษะการปั่นจักรยานหรือการว่ายน้ำ","istrue":true},{"statement":"การจำสูตรฟิสิกส์ที่ใช้ในการสอบ","istrue":false}],"explanation":"Procedural Memory คือความจำเกี่ยวกับทักษะและขั้นตอนการทำกิจกรรมต่างๆ ที่เกิดจากความเคยชินและไม่ต้องอาศัยการนึกรู้อย่างตั้งใจ"},{"type":"multiple-choice","question":"ศูนย์กลางการจดจำเกี่ยวกับ 'อารมณ์ความรู้สึก' โดยเฉพาะความรู้สึกกลัว คือส่วนประกอบใดของสมอง","options":[{"statement":"Hippocampus","istrue":false},{"statement":"Amygdala","istrue":true},{"statement":"Cerebellum","istrue":false},{"statement":"Medulla","istrue":false}],"explanation":"อะมิกดาลา (Amygdala) ทำหน้าที่ประมวลผลและเก็บความจำที่เกี่ยวข้องกับอารมณ์ โดยเฉพาะอารมณ์ที่ตอบสนองต่อภัยอันตรายและความกลัว"},{"type":"multiple-choice","question":"สภาวะคลื่นสมอง 'Alpha' (9-13 Hz) มีความสำคัญอย่างไรต่อการเรียนรู้ของมนุษย์","options":[{"statement":"เป็นสภาวะที่เกิดความเครียดสูงสุดทำให้สมองตื่นตัว","istrue":false},{"statement":"เป็นสภาวะที่จิตใจสงบ ผ่อนคลาย และเหมาะแก่การเปิดรับข้อมูลใหม่ที่สุด","istrue":true},{"statement":"เป็นสภาวะที่เกิดความง่วงนอนจนไม่สามารถเรียนรู้ได้","istrue":false},{"statement":"เป็นคลื่นที่เกิดขึ้นเฉพาะตอนที่เราหลับสนิทโดยไม่ฝัน","istrue":false}],"explanation":"คลื่นอัลฟาเกิดขึ้นเมื่อจิตใจผ่อนคลายแต่ยังมีสติ เป็นช่วงที่สมองเปิดรับการเรียนรู้ได้ดีที่สุด"},{"type":"multiple-choice","question":"การฟังเพลงของ 'โมซาร์ท' (Mozart Effect) ตามงานวิจัยของ Dr. Hughes ส่งผลดีต่อผู้ป่วยโรคลมชักอย่างไร","options":[{"statement":"ช่วยให้หายจากโรคขาดสารอาหาร","istrue":false},{"statement":"ช่วยลดความผิดปกติของคลื่นสมองได้ถึง 79%","istrue":true},{"statement":"ช่วยเพิ่มความสามารถในการทรงตัวทันที","istrue":false},{"statement":"ช่วยให้ความจำระยะยาวกลับมาดีขึ้น 100%","istrue":false}],"explanation":"การฟังเพลงโมซาร์ทอย่างสม่ำเสมอช่วยปรับจูนคลื่นสมองให้มีความเป็นระเบียบและลดสภาวะผิดปกติที่เป็นสาเหตุของอาการลมชัก"},{"type":"multiple-choice","question":"ความจำในส่วน 'Hippocampus' (ฮิปโปแคมปัส) มีหน้าที่หลักโดดเด่นในด้านใด","options":[{"statement":"ความจำระยะสั้น และความจำเกี่ยวกับระยะทาง/สถานที่","istrue":true},{"statement":"ความจำเกี่ยวกับจังหวะดนตรี","istrue":false},{"statement":"ความจำเกี่ยวกับการรับรสชาติอาหาร","istrue":false},{"statement":"ความจำเกี่ยวกับพฤติกรรมจิตใต้สำนึกอัตโนมัติ","istrue":false}],"explanation":"ฮิปโปแคมปัสเป็นพื้นที่สำคัญในการสร้างความจำระยะสั้นและทำหน้าที่เหมือน GPS ในการจัดการความจำเชิงพื้นที่"},{"type":"multiple-choice","question":"ตามการเชื่อมโยงลายนิ้วมือกับสมอง 'นิ้วก้อย' มีความสัมพันธ์กับการทำงานของพูสมองส่วนใด","options":[{"statement":"Frontal Lobe (พูหน้า)","istrue":false},{"statement":"Temporal Lobe (พูขมับ)","istrue":false},{"statement":"Occipital Lobe (พูท้ายทอย)","istrue":true},{"statement":"Parietal Lobe (พูขม่อม)","istrue":false}],"explanation":"ศาสตร์ Dermatoglyphics เชื่อว่านิ้วก้อยมีความสัมพันธ์กับการมองเห็นและการสังเกต ซึ่งเป็นหน้าที่หลักของพูท้ายทอย"},{"type":"multiple-choice","question":"คลื่นสมองประเภท 'Delta' (1-3 Hz) มีบทบาทสำคัญต่อร่างกายมนุษย์ในลักษณะใด","options":[{"statement":"ใช้ในการคำนวณเลขคณิตที่ยากและซับซ้อน","istrue":false},{"statement":"เกิดขึ้นขณะหลับสนิทและเป็นช่วงที่ร่างกายซ่อมแซมส่วนที่สึกหรอได้ดีที่สุด","istrue":true},{"statement":"ช่วยในการจินตนาการศิลปะแนวใหม่","istrue":false},{"statement":"เกิดขึ้นเมื่อมีความตื่นเต้นจากการออกกำลังกาย","istrue":false}],"explanation":"คลื่นเดลต้าเป็นคลื่นสมองที่มีความถี่ต่ำสุด เกิดขึ้นในช่วงการหลับลึกที่ร่างกายเข้าสู่โหมดการฟื้นฟูและหลั่งโกรทฮอร์โมน"},{"type":"multiple-choice","question":"พยาธิสภาพของสมองผู้ป่วยโรค 'อัลไซเมอร์' ที่เห็นได้ชัดเจนที่สุดคือข้อใด","options":[{"statement":"สมองมีขนาดใหญ่ขึ้นจากน้ำหล่อเลี้ยง","istrue":false},{"statement":"สมองฝ่อตัวลงอย่างรุนแรง โดยเฉพาะส่วน Hippocampus","istrue":true},{"statement":"มีการขยายตัวของกิ่งก้านเดนไดรต์มากเกินไป","istrue":false},{"statement":"สมองเปลี่ยนสีจากสีเทาเป็นสีชมพู","istrue":false}],"explanation":"โรคอัลไซเมอร์ทำให้เซลล์สมองตายและเกิดการฝ่อตัวของเนื้อสมอง ส่งผลโดยตรงต่อความสามารถในการจดจำและการเรียกใช้ข้อมูล"},{"type":"multiple-choice","question":"สารอาหาร 'DHA' มีความสำคัญต่อสมองและดวงตาอย่างไรตามข้อมูลในสไลด์","options":[{"statement":"เป็นแหล่งพลังงานเพียงอย่างเดียวของสมอง","istrue":false},{"statement":"เป็นองค์ประกอบหลักของไขมันโอเมก้า-3 ในสมองถึง 97% และในดวงตา 93%","istrue":true},{"statement":"ช่วยลดการทำงานของสมองส่วนกลางให้ช้าลง","istrue":false},{"statement":"ช่วยเปลี่ยนความจำระยะสั้นเป็นความจำระยะยาวได้ทันที","istrue":false}],"explanation":"DHA เป็นกรดไขมันโครงสร้างที่สำคัญที่สุดในระบบประสาทและจอประสาทตา"},{"type":"multiple-choice","question":"ในกระบวนการความจำ (Memory Process) ขั้นตอน 'Encoding' หมายถึงกิจกรรมในข้อใด","options":[{"statement":"การนำข้อมูลที่บันทึกไว้กลับมาใช้งาน","istrue":false},{"statement":"การบันทึกข้อมูลถาวรลงในสมองส่วนหลัง","istrue":false},{"statement":"การรับข้อมูลผ่านประสาทสัมผัสและรวบรวมข้อมูลเพื่อเข้ารหัส","istrue":true},{"statement":"การเปรียบเทียบข้อมูลใหม่กับข้อมูลเก่าในอดีต","istrue":false}],"explanation":"Encoding คือขั้นตอนแรกของกระบวนการความจำ เป็นการแปลงข้อมูลที่ได้รับมาให้อยู่ในรูปแบบที่สมองจะนำไปจัดเก็บได้"},{"type":"multiple-choice","question":"เด็กในช่วงอายุ 0-3 ปี (Absorption Period) ตามแนวคิด Montessori มีลักษณะการทำงานของสมองอย่างไร","options":[{"statement":"สมองซีกซ้ายทำงานเป็นหลักเพื่อเรียนรู้คณิตศาสตร์","istrue":false},{"statement":"สมองซีกขวาทำงานเด่นชัดและซึมซับข้อมูลมหาศาลเหมือนฟองน้ำ","istrue":true},{"statement":"สมองส่วนหน้าเริ่มใช้เหตุผลในการตัดสินใจอย่างรอบคอบ","istrue":false},{"statement":"สมองหยุดการพัฒนาเพื่อรอการเติบโตทางร่างกาย","istrue":false}],"explanation":"ในช่วงปฐมวัยตอนต้น เด็กจะซึมซับสภาพแวดล้อมผ่านสมองซีกขวาเป็นหลัก ซึ่งเป็นพื้นฐานของการเรียนรู้โดยไม่รู้ตัว"},{"type":"multiple-choice","question":"การพักสมองที่แท้จริงคือการนำพาตัวเองเข้าสู่สภาวะคลื่นสมองประเภทใด","options":[{"statement":"Beta Wave","istrue":false},{"statement":"Alpha หรือ Theta Wave","istrue":true},{"statement":"Gamma Wave","istrue":false},{"statement":"High Frequency Beta","istrue":false}],"explanation":"การเปลี่ยนจากโหมดวุ่นวาย (Beta) มาเป็นโหมดผ่อนคลาย (Alpha/Theta) ผ่านการทำสมาธิหรือการผ่อนคลายคือการพักสมองที่มีประสิทธิภาพ"},{"type":"multiple-choice","question":"สมองส่วน 'Pons' (พอนส์) มีหน้าที่ควบคุมกิจกรรมใดในชีวิตประจำวัน","options":[{"statement":"การแก้โจทย์เลขคณิตขั้นสูง","istrue":false},{"statement":"การเคี้ยวอาหาร การหลั่งน้ำลาย และการเคลื่อนไหวบนใบหน้า","istrue":true},{"statement":"การรับภาพจากดวงตา","istrue":false},{"statement":"การจำกลิ่นน้ำหอม","istrue":false}],"explanation":"พอนส์เป็นส่วนหนึ่งของสมองส่วนท้ายที่ทำหน้าที่เป็นทางผ่านของสัญญาณประสาทและควบคุมการทำงานของกล้ามเนื้อบริเวณใบหน้าและการเคี้ยว"},{"type":"multiple-choice","question":"เหตุใดทารกแรกเกิดจึงมองเห็นเพียงสีขาว ดำ และเทา ในระยะใกล้ๆ เท่านั้น","options":[{"statement":"เพราะดวงตายังไม่มีเลนส์ตา","istrue":false},{"statement":"เพราะสมองส่วน Occipital และเซลล์รับสีในดวงตายังพัฒนาไม่สมบูรณ์","istrue":true},{"statement":"เพราะทารกไม่ต้องการมองเห็นสีจนกว่าจะอายุ 1 ขวบ","istrue":false},{"statement":"เพราะไขมันไมอีลินยังไม่ถูกสร้างขึ้นเลยในสมอง","istrue":false}],"explanation":"พัฒนาการด้านการมองเห็นของทารกจะค่อยๆ สมบูรณ์ขึ้นหลังคลอด โดยเริ่มเห็นสีแดงได้เป็นสีแรกเมื่ออายุประมาณ 3 เดือน"},{"type":"multiple-choice","question":"บุคคลที่จำเหตุการณ์เฉพาะเกี่ยวกับบริบท เวลา และสถานที่ได้แม่นยำ (เช่น จำได้ว่ากินอะไรที่ไหนเมื่อวาน) คือการทำงานของความจำประเภทใด","options":[{"statement":"Semantic Memory","istrue":false},{"statement":"Episodic Memory","istrue":true},{"statement":"Procedural Memory","istrue":false},{"statement":"Implicit Memory","istrue":false}],"explanation":"Episodic Memory เป็นความจำเกี่ยวกับเหตุการณ์หรือประสบการณ์ส่วนตัวที่ระบุเวลาและสถานที่ได้ชัดเจน"},{"type":"multiple-choice","question":"ความอัศจรรย์ของสมอง 'อัลเบิร์ต ไอน์สไตน์' ที่พบจากการศึกษาวิจัยคือข้อใด","options":[{"statement":"มีจำนวนเซลล์ประสาทมากกว่าคนปกติ 10 เท่า","istrue":false},{"statement":"มี Glial cells (เซลล์พี่เลี้ยง) สูงกว่าคนปกติมากในส่วนที่เกี่ยวกับการวางแผนและการเชื่อมโยงความหมาย","istrue":true},{"statement":"มีสมองซีกซ้ายเพียงซีกเดียวที่ทำงาน","istrue":false},{"statement":"ไม่มีรอยหยักบน Cerebral Cortex เลย","istrue":false}],"explanation":"Glial cells ทำหน้าที่สนับสนุนการทำงานของเซลล์ประสาท ซึ่งพบว่าในสมองของไอน์สไตน์มีปริมาณเซลล์เหล่านี้หนาแน่นกว่าปกติในพื้นที่สำคัญ"},{"type":"multiple-choice","question":"การฝึกบีบ 'Stress Ball' สลับไปมามีวัตถุประสงค์เพื่ออะไรในเชิงพัฒนาการสมอง","options":[{"statement":"เพื่อเพิ่มขนาดของนิ้วมือ","istrue":false},{"statement":"เพื่อกระตุ้นการทำงานของสมองและลดความเครียดผ่านเส้นประสาทที่มือนิ้ว","istrue":true},{"statement":"เพื่อรักษาโรคอัลไซเมอร์ให้หายขาด","istrue":false},{"statement":"เพื่อเปลี่ยนคลื่นสมองจาก Delta เป็น Beta","istrue":false}],"explanation":"การเคลื่อนไหวนิ้วมือมีความสัมพันธ์โดยตรงกับพื้นที่ควบคุมในสมอง การบริหารมือจึงช่วยกระตุ้นการตื่นตัวและผ่อนคลายความเครียดได้"},{"type":"multiple-choice","question":"สมองส่วน 'Prefrontal Cortex' (สมองส่วนหน้า) มีความสำคัญโดดเด่นอย่างไรเมื่อเทียบกับส่วนอื่น","options":[{"statement":"ใช้เวลานานที่สุดในการพัฒนา และใช้ควบคุมสติ เหตุผล และบุคลิกภาพ","istrue":true},{"statement":"พัฒนาสมบูรณ์ตั้งแต่อยู่ในครรภ์ 3 สัปดาห์","istrue":false},{"statement":"ใช้ควบคุมระบบหายใจเป็นหลัก","istrue":false},{"statement":"ทำหน้าที่เป็นคลังเก็บความจำระยะยาวเพียงอย่างเดียว","istrue":false}],"explanation":"Prefrontal Cortex เป็นสมองส่วนที่พัฒนามากที่สุดในมนุษย์และใช้เวลานานกว่าจะพัฒนาสมบูรณ์ ซึ่งทำหน้าที่ควบคุมหน้าที่ระดับสูง (Executive Functions)"},{"type":"multiple-choice","question":"คลื่นสมองประเภท 'Theta' (4-8 Hz) มักจะปรากฏขึ้นในช่วงเวลาใดและส่งผลอย่างไร","options":[{"statement":"ตอนที่โกรธจัดและต้องการต่อสู้","istrue":false},{"statement":"ตอนที่เริ่มง่วงนอนหรือทำสมาธิลึกๆ ซึ่งมักจะเกิดความคิดสร้างสรรค์","istrue":true},{"statement":"ตอนที่กำลังวิ่งมาราธอน","istrue":false},{"statement":"ตอนที่ตกใจสุดขีดจากเสียงดัง","istrue":false}],"explanation":"คลื่นเธต้าเกี่ยวข้องกับจิตใต้สำนึก การทำสมาธิลึก และสภาวะที่เกิดความคิดสร้างสรรค์หรือไอเดียใหม่ๆ"},{"type":"multiple-choice","question":"การทำ 'สมาธิ' (Meditation) ส่งผลต่อโครงสร้าง Cerebrum ในเชิงบวกอย่างไร","options":[{"statement":"ช่วยลดปริมาณไขมันไมอีลินให้เหลือน้อยลง","istrue":false},{"statement":"ช่วยจัดระเบียบการทำงานของคลื่นสมองและดึงศักยภาพของกองบัญชาการออกมาสูงสุด","istrue":true},{"statement":"ช่วยเพิ่มจำนวนรอยหยักบนผิวสมองให้มีสีขาวมากขึ้น","istrue":false},{"statement":"ช่วยปิดการทำงานของสมองส่วนหน้าชั่วคราว","istrue":false}],"explanation":"การฝึกสมาธิเป็นการฝึกฝนสมองเพื่อให้เกิดสภาวะที่จิตใจจดจ่อและสงบ ส่งผลให้กระบวนการคิดและอารมณ์มีระเบียบมากขึ้น"},{"type":"multiple-choice","question":"ความจำประเภท 'Semantic Memory' เกี่ยวข้องกับข้อมูลลักษณะใด","options":[{"statement":"ความจำเกี่ยวกับเหตุการณ์ไปเที่ยวทะเลครั้งแรก","istrue":false},{"statement":"ความจำเกี่ยวกับความจริง ตรรกะ หรือความรู้เชิงนามธรรม เช่น สูตรคณิตศาสตร์","istrue":true},{"statement":"ความจำเกี่ยวกับการขยับนิ้วเล่นดนตรี","istrue":false},{"statement":"ความจำเกี่ยวกับความรู้สึกกลัวงู","istrue":false}],"explanation":"Semantic Memory เป็นความจำเกี่ยวกับข้อเท็จจริงและความรู้ทั่วไปที่ไม่มีบริบทของเหตุการณ์ส่วนตัวมาเกี่ยวข้อง"},{"type":"multiple-choice","question":"ศูนย์กลางที่ทำหน้าที่เหมือน 'สวิตช์ไฟ' คอยควบคุมการตื่นตัวหรือการนอนหลับในก้านสมองคืออะไร","options":[{"statement":"Reticular Formation","istrue":true},{"statement":"Parietal Lobe","istrue":false},{"statement":"Corpus Callosum","istrue":false},{"statement":"Temporal Lobe","istrue":false}],"explanation":"Reticular Formation เป็นเครือข่ายของเซลล์ประสาทในก้านสมองที่มีบทบาทสำคัญในการควบคุมระดับความรู้สึกตัวและการตื่นตัว"},{"type":"multiple-choice","question":"เหตุใดเหตุการณ์ที่ส่งผลกระทบต่ออารมณ์รุนแรง (เช่น ดีใจมากหรือเสียใจมาก) จึงมักถูกจดจำได้แม่นยำกว่าเหตุการณ์ปกติ","options":[{"statement":"เพราะอารมณ์ช่วยเพิ่มจำนวนเซลล์ประสาทในทันที","istrue":false},{"statement":"เพราะอารมณ์เป็นตัวช่วยประทับตราข้อมูลให้ฝังลึกผ่านการทำงานของ Amygdala และ Hippocampus","istrue":true},{"statement":"เพราะอารมณ์รุนแรงทำให้สมองหยุดการเข้ารหัสข้อมูลอื่น","istrue":false},{"statement":"เพราะอารมณ์รุนแรงช่วยลดการทำงานของคลื่น Beta","istrue":false}],"explanation":"ระบบอารมณ์มีการเชื่อมโยงอย่างใกล้ชิดกับระบบความจำ ทำให้ประสบการณ์ที่มีความสำคัญทางอารมณ์ถูกบันทึกไว้อย่างแน่นหนา"},{"type":"multiple-choice","question":"ส่วนของสมองที่ชื่อว่า 'Basal ganglia' มีหน้าที่เฉพาะในการเก็บรักษาความจำประเภทใด","options":[{"statement":"ความจำเกี่ยวกับชื่อของคนรู้จัก","istrue":false},{"statement":"ความจำเกี่ยวกับความเคยชินและพฤติกรรมอัตโนมัติ","istrue":true},{"statement":"ความจำเกี่ยวกับภาพสีที่เคยเห็น","istrue":false},{"statement":"ความจำเกี่ยวกับกลิ่นดอกไม้","istrue":false}],"explanation":"Basal ganglia เกี่ยวข้องกับการควบคุมการเคลื่อนไหวและการเรียนรู้พฤติกรรมที่เป็นนิสัยหรืออัตโนมัติ"},{"type":"multiple-choice","question":"กรดไขมัน 'Omega-9' ที่พบในน้ำมันมะกอกมีประโยชน์โดยตรงต่อส่วนประกอบใดของเซลล์ประสาท","options":[{"statement":"Nucleus","istrue":false},{"statement":"Dendrite Spine","istrue":false},{"statement":"Myelin Sheath (ปลอกหุ้มประสาท)","istrue":true},{"statement":"Synaptic Gap","istrue":false}],"explanation":"กรดโอเลอิกหรือโอเมก้า-9 เป็นวัตถุดิบสำคัญที่ร่างกายใช้ในการสร้างและบำรุงรักษาไมอีลิน"},{"type":"multiple-choice","question":"ทักษะการแยกแยะทิศทางและตำแหน่งพื้นที่ (Spatial Memory) ถูกจัดเก็บและจัดการโดยสมองส่วนใดเป็นหลัก","options":[{"statement":"Occipital Lobe","istrue":false},{"statement":"Parietal Lobe และ Hippocampus","istrue":true},{"statement":"Medulla Oblongata","istrue":false},{"statement":"Pons","istrue":false}],"explanation":"การรับรู้พื้นที่ทิศทางเป็นหน้าที่ของพูขม่อมร่วมกับฮิปโปแคมปัสที่ทำหน้าที่จดจำแผนที่ภายใน"},{"type":"multiple-choice","question":"ในแบบจำลอง Multi-Store Model หากเรา 'ตั้งใจ' (Attention) ข้อมูลจะถูกย้ายจากความจำที่รับความรู้สึกไปสู่ที่ใด","options":[{"statement":"ความจำระยะยาวทันที","istrue":false},{"statement":"ความจำระยะสั้น (Short-term/Working Memory)","istrue":true},{"statement":"ฮิปโปแคมปัสเพื่อทำลายทิ้ง","istrue":false},{"statement":"สมองส่วนพอนส์","istrue":false}],"explanation":"ความตั้งใจเป็นตัวกรองข้อมูลที่ทำให้เราสามารถบันทึกข้อมูลเข้าสู่ระบบความจำระยะสั้นเพื่อประมวลผลต่อได้"},{"type":"multiple-choice","question":"ความจำประเภท 'Procedural Memory' ถูกจัดเป็นลักษณะความจำแบบใดตามเนื้อหา","options":[{"statement":"ความจำชัดแจ้งที่ต้องใช้สตินึกย้อนกลับ","istrue":false},{"statement":"ความจำที่เกิดจากความเคยชิน ไม่ต้องอาศัยการระลึกรู้ (Implicit)","istrue":true},{"statement":"ความจำเกี่ยวกับตรรกะเหตุผลขั้นสูง","istrue":false},{"statement":"ความจำที่เกี่ยวกับกลิ่นเพียงอย่างเดียว","istrue":false}],"explanation":"ความจำที่เป็นขั้นตอนมักเกิดขึ้นโดยอัตโนมัติเมื่อเราทำกิจกรรมนั้นจนชำนาญ โดยที่สมองไม่ต้องใช้สตินึกถึงขั้นตอนอย่างละเอียด"},{"type":"multiple-choice","question":"สารอาหารประเภทใดที่มีความจำเป็นต่อสมองเนื่องจากเป็นองค์ประกอบถึง 93% ในดวงตา","options":[{"statement":"วิตามินซี","istrue":false},{"statement":"DHA","istrue":true},{"statement":"ธาตุเหล็ก","istrue":false},{"statement":"แคลเซียม","istrue":false}],"explanation":"DHA เป็นกรดไขมันที่มีความเข้มข้นสูงมากในจอประสาทตาและเนื้อเยื่อสมอง"},{"type":"multiple-choice","question":"สภาวะสมองที่จดจ่อในการทำงานแต่ยังคงความผ่อนคลาย (Bright state) เกิดจากการผสมผสานของคลื่นสมองคู่ใด","options":[{"statement":"Delta และ Theta","istrue":false},{"statement":"Beta และ Alpha","istrue":true},{"statement":"Alpha และ Delta","istrue":false},{"statement":"Theta และ Gamma","istrue":false}],"explanation":"การผสมผสานระหว่างคลื่นเบต้า (ความจดจ่อ) และคลื่นอัลฟา (ความผ่อนคลาย/ไหลลื่น) ช่วยให้สมองทำงานได้เต็มประสิทธิภาพและไม่เครียดจนเกินไป"},{"type":"multiple-choice","question":"พูขมับ (Temporal Lobe) เปรียบเสมือนแผนกใดในกองบัญชาการสมอง","options":[{"statement":"แผนกออกแบบภาพวาด","istrue":false},{"statement":"แผนกห้องสมุดเสียงและกลิ่น","istrue":true},{"statement":"แผนกคำนวณสถิติ","istrue":false},{"statement":"แผนกควบคุมพละกำลัง","istrue":false}],"explanation":"Temporal Lobe ทำหน้าที่หลักในการควบคุมการได้ยิน การดมกลิ่น และมีส่วนสำคัญในเรื่องความจำและภาษา"},{"type":"multiple-choice","question":"จากข้อมูลเรื่อง 'นิ้วมือกับซีกสมอง' นิ้วมือซีก 'ซ้าย' จะส่งสัญญาณไปยังสมองซีกใด","options":[{"statement":"สมองซีกซ้ายด้านหน้า","istrue":false},{"statement":"สมองซีกขวา (จินตนาการ)","istrue":true},{"statement":"สมองส่วนท้ายเมดัลลา","istrue":false},{"statement":"สมองส่วนกลางมิดเบรน","istrue":false}],"explanation":"การทำงานของระบบประสาทสั่งการและการรับความรู้สึกมีการทำงานแบบไขว้ซีกกันระหว่างร่างกายและสมอง"},{"type":"multiple-choice","question":"เด็กในช่วงอายุ 7-14 ปี ควรเน้นพัฒนาการด้านใดเป็นสำคัญตามเนื้อหาในบทเรียน","options":[{"statement":"การคิดตรรกะเหตุผลที่ซับซ้อน","istrue":false},{"statement":"ความรู้สึกและหัวใจ (Heart) ผ่านความสัมพันธ์และศิลปะ","istrue":true},{"statement":"การฝึกเดินและกล้ามเนื้อมัดใหญ่เพียงอย่างเดียว","istrue":false},{"statement":"การท่องจำคำศัพท์ต่างประเท
