ัส ไม่ใช่การพราง"},{"type":"multiple-choice","question":"Transport layer ณ แหล่งส่งข้อมูลต้นทางที่มีหน้าที่เป็น producer จะทำหน้าที่อย่างไร","options":[{"statement":"หุ้มห่อข้อมูล (encapsulate) ณ Transport layer เพื่อส่งข้อมูลต่อไปให้ network layer ทำงานต่อไป","istrue":true},{"statement":"ถอดการหุ้มห่อข้อมูล (decapsulate) ณ Transport layer เพื่อส่งข้อมูลต่อไปให้ application layer","istrue":false},{"statement":"รับข้อมูลจาก network layer เพื่อส่งต่อไปสู่การ decapsulate","istrue":false},{"statement":"รับข้อมูลจาก application layer เพื่อส่งต่อไปหุ้มห่อ (encapsulate) ในระดับ Transport layer","istrue":false}],"explanation":"ที่ฝั่งส่ง Transport layer ต้องรับข้อมูลจาก Application layer แล้วหุ้มห่อด้วย header เพื่อส่งลง Network layer จึงตรงกับตัวเลือกแรก"},{"type":"multiple-choice","question":"จงให้ความหมายของ peak-hour response time","options":[{"statement":"ค่า response time ที่สูงที่สุดที่สามารถวัดได้","istrue":false},{"statement":"ค่าเฉลี่ยของ response time ที่สูงที่สุดที่สามารถวัดได้","istrue":false},{"statement":"ค่าเฉลี่ยของ response time ในช่วงเวลาที่มีการใช้งานเครือข่ายสูงที่สุด","istrue":true},{"statement":"ค่า response time ที่วัดในช่วงเวลาที่มีการใช้งานเครือข่ายสูงที่สุด","istrue":false}],"explanation":"Peak-hour response time คือค่าเฉลี่ยของ response time ในช่วงที่โหลดสูงสุด เพื่อสะท้อนประสิทธิภาพภายใต้ภาระงานสูง"},{"type":"multiple-choice","question":"โพรโทคอลใดต่อไปนี้มีการเชื่อมต่อแบบ connection-oriented","options":[{"statement":"HTTP","istrue":true},{"statement":"UDP","istrue":false},{"statement":"IP","istrue":false},{"statement":"ICMP","istrue":false}],"explanation":"HTTP ทำงานบน TCP ซึ่งเป็น connection-oriented ส่วน UDP/IP/ICMP เป็น connectionless"},{"type":"multiple-choice","question":"“สมพรเป็นผู้ส่งจดหมายเวียนในบริษัทเพื่อร้องเรียนการทำงานของพนักงานผู้หนึ่ง แต่สมพรปฏิเสธการส่งข้อความนั้น” เป็นลักษณะของการโจมตีที่มีชื่อเรียกว่าอะไร","options":[{"statement":"Modification","istrue":false},{"statement":"Snooping","istrue":false},{"statement":"Replaying","istrue":false},{"statement":"Repudiation","istrue":true}],"explanation":"Repudiation คือการปฏิเสธว่าไม่ได้ส่งหรือไม่เคยรับข้อความ ถึงแม้จริง ๆ จะมีการส่ง จึงตรงกับตัวเลือกสุดท้าย"},{"type":"multiple-choice","question":"ข้อใดกล่าวไม่ถูกต้องเกี่ยวกับการทำงานของ SCTP","options":[{"statement":"เป็นการเชื่อมต่อแบบ connection-oriented","istrue":false},{"statement":"การส่งข้อมูลเป็นแบบ multistream","istrue":false},{"statement":"การส่งข้อมูลมีขอบเขตในการแลกเปลี่ยนข้อมูล","istrue":false},{"statement":"การส่งข้อมูลเป็นแบบ byte-stream oriented","istrue":true}],"explanation":"SCTP เป็น message-oriented มีขอบเขตของแต่ละ message และรองรับ multistream จึงไม่ใช่ byte-stream oriented"},{"type":"multiple-choice","question":"ข้อมูลต้นฉบับภายหลังการเข้ารหัสมีชื่อเรียกว่าอะไร","options":[{"statement":"Ciphertext","istrue":true},{"statement":"Plaintext","istrue":false},{"statement":"Digest","istrue":false},{"statement":"Message","istrue":false}],"explanation":"Ciphertext คือข้อมูลที่ถูกเข้ารหัสแล้ว ส่วน Plaintext คือข้อมูลต้นฉบับก่อนเข้ารหัส"},{"type":"multiple-choice","question":"Socket address หมายถึงค่าใดต่อไปนี้","options":[{"statement":"IP address และ Port number","istrue":true},{"statement":"IP address และ MAC address","istrue":false},{"statement":"MAC address และ Port number","istrue":false},{"statement":"MAC address, IP address และ Port number","istrue":false}],"explanation":"Socket address ระบุปลายทาง process-to-process โดยประกอบด้วย IP address และ port number"},{"type":"multiple-choice","question":"“นิยมส่งจดหมายไปหาอุบลแต่ปรากฏว่าจดหมายเกิดการกระจายไปในกลุ่มของผู้ทำงานในบริษัทด้วย” แสดงให้เห็นว่าคุณสมบัติด้านความปลอดภัยข้อใดที่ถูกละเมิด","options":[{"statement":"Integrity","istrue":false},{"statement":"Availability","istrue":false},{"statement":"Confidentiality","istrue":true},{"statement":"Authenticity","istrue":false}],"explanation":"การที่จดหมายถูกเผยแพร่ไปยังผู้ที่ไม่ควรเข้าถึงแสดงถึงการเปิดเผยความลับ จึงเป็นการละเมิด Confidentiality ส่วน Integrity เกี่ยวกับการแก้ไขข้อมูล, Availability เกี่ยวกับความพร้อมใช้, Authenticity เกี่ยวกับการยืนยันตัวตน ไม่เกี่ยวกับการเปิดเผยข้อมูล"},{"type":"multiple-choice","question":"ข้อใดไม่ใช่โหมดในการส่งข้อมูลด้วย FTP","options":[{"statement":"Stream mode","istrue":false},{"statement":"Byte mode","istrue":true},{"statement":"Block mode","istrue":false},{"statement":"Compressed mode","istrue":false}],"explanation":"FTP กำหนดโหมดการส่งข้อมูล 3 แบบ ได้แก่ Stream mode, Block mode และ Compressed mode ส่วน Byte mode ไม่ใช่โหมดในมาตรฐาน FTP"},{"type":"multiple-choice","question":"Connectionless service มีการส่งข้อมูลที่มีชื่อเรียกว่าอะไร","options":[{"statement":"Socket","istrue":false},{"statement":"Frame","istrue":false},{"statement":"Datagram","istrue":true},{"statement":"Packet","istrue":false}],"explanation":"Connectionless service มักเรียกว่า datagram service เพราะแต่ละ datagram ถูกส่งโดยไม่ต้องสร้างการเชื่อมต่อก่อน ส่วน packet เป็นหน่วยทั่วไป, socket คือ endpoint, frame อยู่ระดับ Data Link"},{"type":"multiple-choice","question":"ข้อใดเป็นโพรโทคอลเพื่อการบริหารจัดการระบบเครือข่าย","options":[{"statement":"SCTP","istrue":false},{"statement":"SMTP","istrue":false},{"statement":"SNMP","istrue":true},{"statement":"DHCP","istrue":false}],"explanation":"SNMP (Simple Network Management Protocol) ถูกออกแบบมาสำหรับบริหารจัดการเครือข่าย ส่วน SCTP เป็นโพรโทคอล transport, SMTP ส่งอีเมล, DHCP จัดการ IP address"},{"type":"multiple-choice","question":"Real-Time Streaming Protocol (RTSP) มีหน้าที่ใดที่สำคัญที่สุด","options":[{"statement":"ควบคุมการเล่นวีดีโอให้มีความราบรื่นไม่กระตุก","istrue":false},{"statement":"ควบคุมให้การส่งข้อมูลภาพมีความน่าเชื่อถือสูง","istrue":false},{"statement":"ควบคุมความปลอดภัยเมื่อมีการส่งข้อมูลภาพแบบ stream","istrue":false},{"statement":"ควบคุมการส่งและเล่นวีดีโอข้อมูลภาพแบบ stream ให้มีคุณภาพ","istrue":true}],"explanation":"RTSP ถูกออกแบบเพื่อควบคุมการส่งและสั่งเล่นสตรีมมิงมัลติมีเดีย ทำให้สามารถควบคุม play, pause, teardown เพื่อให้การเล่นมีคุณภาพ ส่วนความราบรื่นและความน่าเชื่อถือเป็นหน้าที่ร่วมกับ RTP/RTCP"},{"type":"multiple-choice","question":"การบีบอัดภาพ JPEG จะใช้กลไกใดในการ transform ข้อมูล","options":[{"statement":"discrete cosine transform","istrue":true},{"statement":"direct cosine transform","istrue":false},{"statement":"direct coordinate transform","istrue":false},{"statement":"delta cosine transform","istrue":false}],"explanation":"มาตรฐาน JPEG ใช้ Discrete Cosine Transform (DCT) ในการแปลงบล็อกภาพ 8×8 เพื่อลดพลังงานความถี่สูง ทำให้บีบอัดได้มีประสิทธิภาพ"},{"type":"multiple-choice","question":"Temporal compression หมายถึงการบีบอัดในลักษณะใด","options":[{"statement":"เฟรมที่มีความซ้ำซ้อนจะถูกตัดทิ้ง","istrue":true},{"statement":"เฟรมแต่ละเฟรมมีการบีบอัดแยกเฟรมกัน","istrue":false},{"statement":"เฟรมหลาย ๆ เฟรมมีการบีบอัดรวมเฟรมกัน","istrue":false},{"statement":"เฟรมจะถูกตัดตามการสุ่มเฟรมต่าง ๆ อย่างอิสระ","istrue":false}],"explanation":"Temporal compression มุ่งลดข้อมูลซ้ำซ้อนระหว่างเฟรมต่อเนื่องกัน โดยจะตัดหรือไม่บันทึกเฟรมที่มีเนื้อหาเหมือนกันออก แล้วบันทึกเฉพาะเฟรมหลักและส่วนต่าง (differences) ทำให้ขนาดไฟล์วิดีโอลดลงโดยไม่บันทึกภาพซ้ำหลายครั้ง"},{"type":"multiple-choice","question":"ข้อใดเป็นองค์ประกอบของ p-box ในการทำงานของ modern block ciphers","options":[{"statement":"Shifting P-boxes","istrue":true},{"statement":"straight P-boxes","istrue":false},{"statement":"expansion P-boxes","istrue":false},{"statement":"compression P-boxes","istrue":false}],"explanation":"ใน modern SP-network P-box นอกจากแบบ straight, expansion และ compression ในบางออกแบบยังใช้ Shifting P-boxes ที่ทำหน้าที่เลื่อนบิตภายในบล็อกเพื่อกระจาย (diffuse) ค่าแบบหมุนเวียน การเลื่อนนี้ช่วยเพิ่ม diffusion ระหว่างรอบ ทำให้ Shifting P-boxes เป็นส่วนสำคัญของการออกแบบ block cipher รุ่นใหม่"},{"type":"multiple-choice","question":"“เมื่อสมพรส่งอีเมลไปหาสิตา ยุวกูลต้องการทราบข้อความนี้จึงแอบอ่านด้วยการดักจับจดหมายของสมพร” เป็นลักษณะการโจมตีที่มีชื่อเรียกว่าอะไร","options":[{"statement":"Modification","istrue":false},{"statement":"Snooping","istrue":true},{"statement":"Replaying","istrue":false},{"statement":"Repudiation","istrue":false}],"explanation":"Snooping คือการดักฟังหรือดักจับข้อมูลโดยไม่ได้รับอนุญาตเพื่ออ่านข้อความ แต่ไม่ได้แก้ไขหรือส่งซ้ำ"},{"type":"multiple-choice","question":"ข้อใดไม่ใช่ความสำคัญของการพิจารณา Internal traffic","options":[{"statement":"เพื่อใช้ในการพิจารณาปริมาณการใช้งานภายในเครือข่ายว่าเกินกว่าประสิทธิภาพของเครือข่ายดังเดิมที่กำหนดไว้หรือไม่","istrue":false},{"statement":"เพื่อพิจารณาขยายประสิทธิภาพเครือข่ายให้ครอบคลุมความต้องการของผู้ใช้งานอย่างแท้จริง","istrue":false},{"statement":"เพื่อพิจารณากำหนดนโยบายการเข้าใช้เครือข่ายภายในองค์กรให้ตอบสนองต่อความต้องการของผู้ใช้งานภายใน","istrue":false},{"statement":"เพื่อใช้ในการกำหนดขอบเขตการใช้งานของบุคลากรแต่ละคนได้อย่างมีประสิทธิภาพ","istrue":true}],"explanation":"การวิเคราะห์ Internal traffic เน้นที่ประสิทธิภาพและความจุ ไม่ได้ใช้เพื่อตั้งโควต้าหรือขอบเขตการใช้งานรายบุคคล ซึ่งเป็นงานด้านนโยบายบัญชีผู้ใช้"},{"type":"multiple-choice","question":"Socket address ที่สร้างโดย client ให้แก่ server มีชื่อเรียกว่าอะไร","options":[{"statement":"Remote socket address","istrue":true},{"statement":"Local socket address","istrue":false},{"statement":"Fixed IP address","istrue":false},{"statement":"Remote address","istrue":false}],"explanation":"จากมุมมอง server ที่รับการเชื่อมต่อ socket address ของ client จะถูกเรียกว่า Remote socket address ประกอบด้วย IP และ port ของฝั่ง client"},{"type":"multiple-choice","question":"การที่สามารถระบุตัวตนของผู้ส่งข้อมูลและผู้รับข้อมูลได้อย่างถูกต้องนั้นเป็นการดำเนินการในขั้นตอนใด","options":[{"statement":"Integrity","istrue":false},{"statement":"Availability","istrue":false},{"statement":"Confidentiality","istrue":false},{"statement":"Authenticity","istrue":true}],"explanation":"Authenticity คือการยืนยันตัวตนของผู้ส่งและผู้รับให้ถูกต้อง ส่วน Integrity เกี่ยวกับความสมบูรณ์ของข้อมูล, Confidentiality เกี่ยวกับความลับ, Availability เกี่ยวกับความพร้อมใช้งาน"},{"type":"multiple-choice","question":"I-frame ของไฟล์วีดีโอไม่มีลักษณะอย่างไร","options":[{"statement":"มีความเป็นอิสระจากเฟรมอื่น","istrue":false},{"statement":"การปรากฏของเฟรมจะปรากฏเป็นช่วง ๆ ที่มีระยะเวลาการปรากฏที่แน่นอน","istrue":false},{"statement":"การปรากฏของเฟรมจะขึ้นกับ P-frame ก่อนหน้าเท่านั้น","istrue":true},{"statement":"การปรากฏของเฟรมจะปรากฏเป็นช่วงเวลาเพื่อแสดงให้เห็นถึงการเปลี่ยนแปลงที่เกิดขึ้นในเฟรมอย่างทันที","istrue":false}],"explanation":"I-frame ไม่ขึ้นกับเฟรมอื่นใด สามารถถูกวางในจุดใดก็ได้เพื่อนำมาเป็น reference จึงขัดกับตัวเลือกที่สาม"},{"type":"multiple-choice","question":"ข้อใดต่อไปนี้กล่าวถูกต้อง","options":[{"statement":"หากมีการทำงานหลาย ๆ application ที่มีการส่งข้อมูลในเวลาเดียวกัน จำเป็นจะต้องมี multiplexer เพื่อรวมสัญญาณข้อมูลทุกแหล่งก่อนการส่งสู่ช่องทางการสื่อสาร","istrue":true},{"statement":"หากมีการทำงานหลาย ๆ application ที่มีการส่งข้อมูลในเวลาเดียวกัน จำเป็นต้องใช้ช่องส่งสัญญาณหลาย ๆ ช่องเพื่อส่งข้อมูลพร้อมกัน","istrue":false},{"statement":"กลไกการ push ข้อมูลในระดับ Transport layer จะกระทำเมื่อปลายทางพร้อมรับข้อมูล","istrue":false},{"statement":"กลไกการ pulling ข้อมูลในระดับ Transport layer เกิดเมื่ออุปกรณ์ต้นทางมีข้อมูลเพื่อกระจาย","istrue":false}],"explanation":"Transport layer ใช้ multiplexing เพื่อผสานกระแสข้อมูลจากหลายแอปพลิเคชันให้ส่งผ่านช่องทางเดียว จึงต้องมี multiplexer ไม่ใช่สร้างช่องทางหลายช่อง"},{"type":"multiple-choice","question":"ช่องทางที่ใช้แสดงภาพพื้นหลังมีชื่อเรียกว่าอะไร","options":[{"statement":"Alpha channel","istrue":true},{"statement":"Beta channel","istrue":false},{"statement":"Gamma channel","istrue":false},{"statement":"Sigma channel","istrue":false}],"explanation":"Alpha channel คือช่องสัญญาณสำหรับเก็บข้อมูลความโปร่งใส (transparency) ใช้กำหนดว่าพื้นหลังจุดใดซ่อนหรือโชว์"},{"type":"multiple-choice","question":"การเกิด congestion สามารถเกิด ณ ตำแหน่งใดต่อไปนี้","options":[{"statement":"Sender","istrue":false},{"statement":"Receiver","istrue":false},{"statement":"Router buffer","istrue":false},{"statement":"เกิดได้ทุกตำแหน่งที่มีการสื่อสาร","istrue":true}],"explanation":"Congestion เกิดได้ทุกส่วนของเครือข่ายเมื่อปริมาณทราฟิกมากกว่าความสามารถประมวลผล ไม่จำกัดแค่ router"},{"type":"multiple-choice","question":"ข้อใดต่อไปนี้กล่าวถูกต้องเกี่ยวกับการบริหารจัดการความผิดพลาดแบบ proactive/reactive","options":[{"statement":"การบริหารจัดการความผิดพลาดแบบ proactive ไม่สามารถเกิดขึ้นได้ในความเป็นจริง","istrue":false},{"statement":"การบริหารจัดการความผิดพลาดแบบ proactive สามารถทำได้แต่ไม่สามารถป้องกันได้อย่างสมบูรณ์","istrue":true},{"statement":"การบริหารจัดการความผิดพลาดแบบ reactive เป็นปรากฏการณ์ที่เกิดอย่างสมำเสมอและไม่สามารถนำรายงานที่จดไว้มาใช้ประโยชน์ได้","istrue":false},{"statement":"การบริหารจัดการความผิดพลาดแบบ reactive มักสร้างค่าใช้จ่ายมหาศาลให้แก่องค์กรเสมอ","istrue":false}],"explanation":"Proactive management เน้นป้องกันล่วงหน้าได้จริง แต่ไม่สามารถครอบคลุมทุกกรณี จึงตรงกับตัวเลือกที่สอง"},{"type":"multiple-choice","question":"ข้อใดกล่าวถูกต้องเกี่ยวกับการเข้ารหัสแบบ DES","options":[{"statement":"การเข้ารหัสใช้ plaintext 56-bit ได้ ciphertext 56 bit","istrue":false},{"statement":"การเข้ารหัสใช้ plaintext 64-bit ได้ ciphertext 56-bit","istrue":false},{"statement":"การเข้ารหัสใช้ plaintext 56-bit ได้ ciphertext 64-bit","istrue":false},{"statement":"การเข้ารหัสใช้ plaintext 64-bit ได้ ciphertext 64-bit","istrue":true}],"explanation":"DES ประมวลผลบล็อกข้อมูลขนาด 64-bit และสร้าง ciphertext 64-bit โดยใช้คีย์ภายใน 56-bit"},{"type":"multiple-choice","question":"การสื่อสารในระดับ application layer จะเป็นการใช้ข้อมูลใดต่อไปนี้","options":[{"statement":"Remote socket address","istrue":false},{"statement":"Local socket address","istrue":false},{"statement":"Fixed IP address และ remote IP address","istrue":false},{"statement":"Local socket address และ Remote socket address","istrue":true}],"explanation":"Application layer ระบุ endpoint ด้วย socket address ทั้งฝั่งต้นทาง (local) และปลายทาง (remote) เพื่อสื่อสารระหว่าง process-to-process"}]'),pg=Object.freeze(Object.defineProperty({__proto__:null,default:fg},Symbol.toStringTag,{value:"Module"})),dg=JSON.parse('[{"question":"1. คุณสมบัติ 4 ประการของการสื่อสารข้อมูลที่กล่าวถึง Delivery หมายถึงอะไร?","type":"multiple-choice","options":[{"statement":"อุปกรณ์เชื่อมต่อต้องทำหน้าที่ในการกระจายสัญญาณได้ถูกต้อง","istrue":false},{"statement":"อุปกรณ์ทุกชนิดที่สามารถควบคุมการส่งข้อมูลได้","istrue":false},{"statement":"อุปกรณ์ทุกชนิดสามารถส่งข้อมูลได้","istrue":false},{"statement":"การส่งข้อมูลที่สามารถส่งไปยังปลายทางได้อย่างถูกต้อง","istrue":true}],"explanation":"Delivery หมายถึงการที่ข้อมูลถูกส่งจากต้นทางไปถึงปลายทางได้ตามที่ต้องการ โดยไม่มีการส่งผิดเครื่องหรือปลายทาง ทำให้ผู้รับได้รับข้อมูลถูกต้องตรงตามที่ผู้ส่งตั้งใจ"},{"question":"2. คุณสมบัติ 4 ประการของการสื่อสารข้อมูลที่กล่าวถึง Jitter หมายถึงอะไร?","type":"multiple-choice","options":[{"statement":"ความเสถียรในการสื่อสารข้อมูล","istrue":false},{"statement":"ความแปรปรวนในการส่งแพ็กเก็ตข้อมูล","istrue":true},{"statement":"ปริมาณข้อมูลที่ส่งได้ในขณะหนึ่ง ๆ","istrue":false},{"statement":"Delay ในการส่งข้อมูล","istrue":false}],"explanation":"Jitter คือความแปรปรวนของระยะเวลาที่ใช้ในการรับ-ส่งข้อมูลของแต่ละแพ็กเก็ต ซึ่งทำให้การรับข้อมูลอาจไม่ราบรื่นหรือไม่ต่อเนื่อง โดยเฉพาะในงานมัลติมีเดียหรือการสตรีมมิง หาก Jitter สูงจะทำให้คุณภาพการรับชม/รับฟังลดลง"},{"question":"3. ข้อใดกล่าวถึงองค์ประกอบของการสื่อสารข้อมูลได้ครบถ้วน?","type":"multiple-choice","options":[{"statement":"นิพนธ์คุยกับสมหมายในห้องเรียนว่า “เรียนไม่รู้เรื่อง”","istrue":false},{"statement":"นิพนธ์ส่งข้อความ “สวัสดี” ไปให้สมหมายทาง Line (ซึ่งมีโปรโตคอลของตนเอง) บนโทรศัพท์มือถือที่ใช้คลื่น 5G","istrue":true},{"statement":"นิพนธ์โทรหาสมหมายผ่าน Line แต่สมหมายไม่รับสาย","istrue":false},{"statement":"นิพนธ์เขียนข้อความว่า “B๖๔๗๕๖” ส่งไปให้สมหมาย แต่สมหมายอ่านไม่เข้าใจ","istrue":false}],"explanation":"การสื่อสารข้อมูลต้องประกอบด้วย (1) ผู้ส่ง (2) ผู้รับ (3) สื่อกลางหรือช่องทางในการส่ง (4) โปรโตคอลหรือกติกาการสื่อสาร ในตัวเลือก (2) นิพนธ์เป็นผู้ส่ง สมหมายเป็นผู้รับ สื่อกลางคือเครือข่ายโทรศัพท์ 5G และใช้โปรโตคอลของแอป Line"},{"question":"4. ข้อใดกล่าวถึงการส่งข้อมูลแบบ Simplex?","type":"multiple-choice","options":[{"statement":"การสแกนเอกสารด้วยโทรศัพท์มือถือ","istrue":false},{"statement":"การส่งเอกสารทางไปรษณีย์ให้เพื่อน","istrue":false},{"statement":"การถ่ายโอนวิดีโอจากกล้องวิดีโอเข้าสู่คอมพิวเตอร์","istrue":true},{"statement":"การทิ้งข้อความไว้ใน Line ให้เพื่อนอ่าน","istrue":false}],"explanation":"Simplex คือการสื่อสารที่ทิศทางการส่งข้อมูลอยู่ด้านเดียว ผู้ส่งและผู้รับไม่สามารถสลับบทบาทได้พร้อม ๆ กัน เช่น การถ่ายวิดีโอจากกล้องเข้าคอมพิวเตอร์ กล้องเป็นผู้ส่ง คอมพิวเตอร์เป็นผู้รับ"},{"question":"5. ข้อใดกล่าวถึงการส่งข้อมูลแบบ Half Duplex?","type":"multiple-choice","options":[{"statement":"การสแกนเอกสารด้วยโทรศัพท์มือถือ","istrue":false},{"statement":"การแก้ไฟล์จาก iCloud ด้วย iPad","istrue":true},{"statement":"การสั่งพิมพ์เอกสารจาก iCloud เป็น PDF บน iPad","istrue":false},{"statement":"การส่งข้อความทักไปใน Line กลุ่ม","istrue":false}],"explanation":"Half Duplex สามารถส่งข้อมูลได้ทั้งสองทิศทาง แต่ไม่พร้อมกัน ต้องสลับกันส่ง-รับ ตัวเลือกที่ระบุว่าการแก้ไฟล์บน iCloud ด้วย iPad อาจหมายถึงเราส่งอัปเดตไปก่อน จากนั้นถึงจะรับข้อมูลตอบกลับมา (ซึ่งไม่เกิดขึ้นในเวลาเดียวกัน) จึงจัดเป็น Half Duplex"},{"question":"6. ข้อใดเป็นความหมายของการส่งข้อความแบบ Half Duplex?","type":"multiple-choice","options":[{"statement":"การส่งทั้งสองทิศทางโดยใช้สายสื่อสารสองสาย","istrue":false},{"statement":"การส่งทั้งสองทิศทางบนสายเดียวกัน แต่เป็นคนละเวลา ด้วยความเร็วเต็มอัตรา","istrue":true},{"statement":"การส่งทั้งสองทิศทางโดยแบ่งความเร็วทิศทางละครึ่ง","istrue":false},{"statement":"การส่งทั้งสองทิศทางคนละเวลา แต่แบ่งความเร็วคนละครึ่ง","istrue":false}],"explanation":"Half Duplex หมายถึงการใช้ช่องสัญญาณเดียวกันรับ-ส่งได้ทั้งสองทิศทาง แต่ต้องสลับช่วงเวลาในการส่ง ซึ่งแต่ละครั้งสามารถใช้ความเร็วเต็มอัตราเมื่อทำการส่งหรือรับ"},{"question":"7. การสื่อสารด้วยสาย Optical Fiber จะสามารถเป็นแบบ Full Duplex ได้หรือไม่?","type":"multiple-choice","options":[{"statement":"ได้ เพราะสามารถส่งข้อมูลสองทิศทางพร้อมกันเสมอ","istrue":false},{"statement":"ไม่ได้ เพราะเป็นการส่งด้วยคลื่นแสงวิ่งทิศทางเดียว จึงเป็นได้แค่ Half Duplex","istrue":false},{"statement":"ไม่ได้ เพราะเป็นการส่งด้วยคลื่นแสงวิ่งทิศทางเดียว จึงเป็นได้แค่ Simplex","istrue":false},{"statement":"ไม่ได้ เพราะเป็นการส่งด้วยคลื่นแสงวิ่งทิศทางเดียว จึงเป็นได้แค่ Simplex หรือ Half Duplex","istrue":true}],"explanation":"ในสายไฟเบอร์ปกติ แสงจะเดินทางได้ทางเดียวในแต่ละเส้น แต่หากต้องการ Full Duplex มักต้องใช้ 2 เส้น (ส่ง 1 เส้น/รับ 1 เส้น) หรือใช้เทคนิค Wave Division Multiplexing (WDM) เพื่อแบ่งความยาวคลื่นให้ส่งรับได้พร้อมกัน"},{"question":"8. ข้อใดกล่าวถูกต้อง?","type":"multiple-choice","options":[{"statement":"ประสิทธิภาพการทำงานจะยิ่งดีขึ้นถ้ามีผู้ใช้งานเชื่อมต่อมาก","istrue":false},{"statement":"เครื่องที่หยุดทำงานบ่อยแต่ซ่อมเร็วถือว่ามีความน่าเชื่อถือ","istrue":false},{"statement":"หากเครื่องไม่เคยหยุดทำงานเลย ก็ไม่ได้หมายความว่ามีความน่าเชื่อถือ","istrue":false},{"statement":"ยิ่งมีผู้ใช้งานจำนวนมาก ประสิทธิภาพของการสื่อสารยิ่งตกต่ำลง","istrue":true}],"explanation":"เมื่อผู้ใช้งานในเครือข่ายมีจำนวนมากขึ้น ทรัพยากรเครือข่าย (เช่น แบนด์วิดท์) จะถูกแบ่งใช้ ทำให้ประสิทธิภาพ (throughput หรือ speed ที่แต่ละคนได้รับ) ลดลง"},{"question":"9. ข้อใดกล่าวไม่ถูกต้อง?","type":"multiple-choice","options":[{"statement":"ประสิทธิภาพของเครือข่ายได้รับผลจากจำนวนผู้ใช้เครือข่าย","istrue":false},{"statement":"การวัดความปลอดภัยอาจทำเป็นช่วงเวลา (เช่น ทุก 1 เดือน หรือ 6 เดือน)","istrue":false},{"statement":"ความปลอดภัยของเครือข่ายส่งผลต่อความน่าเชื่อถือของระบบ","istrue":false},{"statement":"ความปลอดภัยของระบบเครือข่ายมุ่งเน้นแค่การเข้าใช้อุปกรณ์มากกว่าการปกป้องข้อมูล","istrue":true}],"explanation":"ปกติการรักษาความปลอดภัย (security) ควรดูแลทั้งการป้องกันไม่ให้ผู้ไม่ประสงค์ดีเข้าถึงระบบและการปกป้องข้อมูลของผู้ใช้งาน ไม่ใช่เน้นแค่การจำกัดการเข้าใช้อุปกรณ์"},{"question":"10. ข้อใดต่อไปนี้ผิด?","type":"multiple-choice","options":[{"statement":"คอมพิวเตอร์ทุกเครื่องสามารถเชื่อมต่อสายสื่อสารได้โดยตรง","istrue":false},{"statement":"Hub สามารถส่งข้อมูลตรงไปยังปลายทางได้ทันทีโดยไม่กระจายสัญญาณ","istrue":true},{"statement":"การเชื่อมต่อแบบสายมีความน่าเชื่อถือมากกว่าไร้สาย","istrue":false},{"statement":"การส่งข้อมูลด้วย Ring topology จะไม่มีการชนกันของสัญญาณ","istrue":false}],"explanation":"Hub ไม่มีความสามารถเลือกส่งตรงเฉพาะปลายทางได้ แต่จะกระจายข้อมูลไปทุกพอร์ต (broadcast) จึงทำให้ข้อความที่ว่า \\"Hub สามารถส่งข้อมูลตรงไปยังปลายทางได้ทันที\\" เป็นข้อความผิด"},{"question":"11. ข้อใดกล่าวไม่ถูกต้อง?","type":"multiple-choice","options":[{"statement":"การเชื่อมต่อแบบ Point-to-Point เป็นประเภทหนึ่งของการเชื่อมต่อแบบ Bus","istrue":true},{"statement":"โอกาสการชนกันของสัญญาณมีสูงในการเชื่อมต่อแบบ Bus","istrue":false}],"explanation":"Point-to-Point ไม่ใช่รูปแบบเดียวกับ Bus เพราะ Bus มีสายสื่อสารหลักเพียงเส้นเดียวที่อุปกรณ์หลายตัวใช้ร่วมกัน ส่วน Point-to-Point คือการเชื่อมอุปกรณ์สองจุดเข้าด้วยกันเพียงคู่เดียว จึงเป็นข้อความที่ไม่ถูกต้อง"},{"question":"12. ข้อใดเป็นคุณสมบัติของการเชื่อมต่อแบบ Bus?","type":"multiple-choice","options":[{"statement":"ติดตั้งง่าย","istrue":false},{"statement":"ขยายเครือข่ายได้ยาก","istrue":false},{"statement":"ความปลอดภัยบนเครือข่ายสูง","istrue":false},{"statement":"ข้อ a และ b ถูกต้อง","istrue":true}],"explanation":"Bus Topology ติดตั้งง่าย ใช้สายหลักเพียงเส้นเดียว แต่เมื่อเครือข่ายขยายใหญ่ขึ้น สาย Bus จะรับภาระมากขึ้น ทำให้ขยายเพิ่มเติมได้ยาก และความปลอดภัยต่ำเพราะข้อมูลวิ่งผ่านสายร่วมกัน"},{"question":"13. ข้อใดเป็นคุณสมบัติของการเชื่อมต่อแบบ Multipoint?","type":"multiple-choice","options":[{"statement":"มีการแบ่งช่วงเวลาการเข้าใช้ช่องทางการสื่อสาร","istrue":false},{"statement":"ประสิทธิภาพต่ำกว่า Point-to-Point","istrue":false},{"statement":"ประหยัดงบประมาณในการเชื่อมต่อ","istrue":false},{"statement":"ถูกทุกข้อ","istrue":true}],"explanation":"Multipoint คือการให้อุปกรณ์หลายตัวใช้สื่อกลางร่วมกัน จึงต้องมีการแบ่งเวลา/แบ่งช่องสัญญาณ (Time/Channel Sharing) ทำให้ประสิทธิภาพโดยรวมอาจต่ำกว่าการเชื่อมต่อแบบ Point-to-Point แต่ช่วยประหยัดค่าใช้จ่ายเรื่องสายสื่อสารได้"},{"question":"14. “หากอุปกรณ์หรือสายสื่อสารขาดเพียงจุดเดียว การสื่อสารจะล่มทั้งเครือข่าย” เป็นคุณสมบัติของทอพอโลยีแบบใด?","type":"multiple-choice","options":[{"statement":"Star และ Ring","istrue":false},{"statement":"Star และ Bus","istrue":false},{"statement":"Ring และ Bus","istrue":true},{"statement":"Bus และ Tree","istrue":false}],"explanation":"ใน Ring หากสายหรืออุปกรณ์จุดใดจุดหนึ่งขาด วงแหวนจะไม่สมบูรณ์และล่มได้ ส่วน Bus ก็ใช้สายหลักเส้นเดียว ถ้าขาดจะล่มทั้งเครือข่าย ในขณะที่ Star หากอุปกรณ์ศูนย์กลางเสียก็ล่มได้เช่นกัน แต่คำตอบนี้ระบุตรงตามเงื่อนไขของ Ring และ Bus"},{"question":"15. หากมีการเชื่อมต่อ 10 segment แบบ Star-Wired Bus ใช้ Hub 10/100 Mbps และสาย UTP 100 Mbps ข้อใดถูกต้อง?","type":"multiple-choice","options":[{"statement":"แต่ละ segment มีความเร็ว 1 Mbps","istrue":false},{"statement":"แต่ละ segment มีความเร็ว 10 Mbps","istrue":true},{"statement":"แต่ละ segment มีความเร็ว 100 Mbps","istrue":false},{"statement":"แต่ละ segment มีความเร็ว 10/100 Mbps","istrue":false}],"explanation":"ใน Star-Wired Bus ที่ใช้ Hub แบบ 10/100 Mbps ส่วนใหญ่มักเชื่อมต่ออุปกรณ์ต่าง ๆ ที่ระดับความเร็ว 10 Mbps ต่อพอร์ต (เนื่องจาก Hub ไม่อาจแบ่งแบนด์วิดท์ตามเครื่องได้อย่าง Switch) สาย UTP 100 Mbps เป็นมาตรฐานสายที่รองรับได้ถึง 100 Mbps แต่ฮับแบ่งปันที่ 10 Mbps ในแต่ละพอร์ต"},{"question":"16. การสื่อสารที่แบ่งฟังก์ชันการทำงานเป็นส่วน ๆ เรียกว่าอะไร (ตอบเป็นศัพท์ภาษาอังกฤษ)?","type":"fill-in-blank","correctAnswer":"Layering","explanation":"Layering เป็นแนวคิดการแบ่งงานเครือข่ายหรือการสื่อสารออกเป็นลำดับชั้น (layers) เพื่อให้ออกแบบและจัดการได้ง่ายขึ้น"},{"question":"17. ระบบสื่อสารที่มีคุณสมบัติเชื่อมต่อถึงกันตลอดเวลา คือมีคุณสมบัติใด?","type":"fill-in-blank","correctAnswer":"Reliability","explanation":"Reliability หมายถึงความน่าเชื่อถือและความพร้อมในการให้บริการอยู่เสมอ หากระบบสื่อสารเชื่อมต่อได้ตลอดเวลาแสดงถึงความมีเสถียรภาพและความน่าเชื่อถือ"},{"question":"18. ระบบสื่อสารที่สามารถเชื่อมต่อได้ตลอดเวลาถือได้ว่ามีคุณสมบัติแบบใด (ศัพท์ภาษาอังกฤษ)?","type":"fill-in-blank","correctAnswer":"Reliability","explanation":"Reliability ใช้อธิบายลักษณะของระบบที่สามารถให้บริการต่อเนื่อง โดยไม่หยุดหรือขาดการเชื่อมต่อ"},{"question":"19. การแบ่งฟังก์ชันการทำงานเป็นลำดับชั้นช่วยลดสิ่งใด (ศัพท์ภาษาอังกฤษ)?","type":"fill-in-blank","correctAnswer":"Complexity","explanation":"Layering ช่วยแยกปัญหาออกเป็นส่วนย่อย ทำให้เข้าใจและพัฒนาระบบได้ง่ายขึ้น ช่วยลด Complexity ของการออกแบบเครือข่าย"},{"question":"20. ใน OSI reference model ลำดับชั้นที่ติดกับ Application layer คือ (ตอบเป็นภาษาอังกฤษ)?","type":"fill-in-blank","correctAnswer":"Presentation","explanation":"โครงสร้าง OSI Model: (1) Physical, (2) Data Link, (3) Network, (4) Transport, (5) Session, (6) Presentation, (7) Application ชั้นที่อยู่ติดกับ Application layer คือ Presentation layer"},{"question":"21. ข้อใดกล่าวถูกต้อง?","type":"multiple-choice","options":[{"statement":"การทำงานของแต่ละเลเยอร์ไม่ขึ้นกับเลเยอร์ข้างเคียงเลย","istrue":false},{"statement":"Physical Layer เกี่ยวข้องกับสัญญาณข้อมูลทางไฟฟ้าหรือแสง","istrue":true},{"statement":"Physical Layer เกี่ยวข้องกับการกำหนดทอพอโลยีเครือข่าย","istrue":false},{"statement":"ข้อมูลใน Physical Layer จะถูกแปลงเป็นเลขฐานสิบหก","istrue":false}],"explanation":"Physical Layer เกี่ยวข้องกับการส่งสัญญาณบิต (0/1) ในรูปของไฟฟ้าหรือแสงบนสายหรือสื่อกลาง ไม่ได้กำหนดทอพอโลยี หรือเปลี่ยนเป็นเลขฐานสิบหก"},{"question":"22. ข้อใดเป็นคำเรียกข้อมูลใน Transport Layer?","type":"multiple-choice","options":[{"statement":"Frame","istrue":false},{"statement":"Packet","istrue":false},{"statement":"Package","istrue":false},{"statement":"Segment","istrue":true}],"explanation":"Transport Layer เรียกหน่วยข้อมูลว่า Segment (ใน TCP) หรือ Datagram (ใน UDP) แต่ตามโมเดลโดยทั่วไปนิยมเรียกว่า Segment"},{"question":"23. ข้อมูลทางออกจาก Network Layer เรียกว่าอะไร?","type":"multiple-choice","options":[{"statement":"Frame","istrue":false},{"statement":"Datagram","istrue":true},{"statement":"Segment","istrue":false},{"statement":"Stream","istrue":false}],"explanation":"ใน Network Layer ข้อมูลมักเรียกว่า Packet หรือ Datagram (เช่นใน IP เรียกว่า IP Datagram)"},{"question":"24. Transport Layer ใน OSI Reference Model ทำงานติดกับชั้นใดบ้าง?","type":"multiple-choice","options":[{"statement":"Network Layer - Application Layer","istrue":false},{"statement":"Data Link Layer - Session Layer","istrue":false},{"statement":"Session Layer - Network Layer","istrue":true},{"statement":"Application Layer - Presentation Layer","istrue":false}],"explanation":"Transport Layer อยู่ระหว่าง Network Layer (ชั้นล่าง) และ Session Layer (ชั้นบน) ตามโมเดล OSI จึงทำงานติดต่อกับสองชั้นนั้น"},{"question":"25. ข้อใดกล่าวผิดเกี่ยวกับการทำ Layering?","type":"multiple-choice","options":[{"statement":"ช่วยในการพัฒนาโปรโตคอลใหม่ได้ง่าย","istrue":false},{"statement":"ช่วยลดความผิดพลาดในการส่งข้อมูล","istrue":false},{"statement":"ช่วยเพิ่มความเร็วในการสื่อสาร","istrue":true},{"statement":"ข้อ b และ c ถูกต้อง","istrue":false}],"explanation":"Layering มุ่งลดความซับซ้อน ทำให้ดีไซน์และดีบักโปรโตคอลได้ง่ายขึ้น และช่วยลดความผิดพลาด (เพราะแต่ละชั้นจัดการหน้าที่ของตัวเองชัดเจน) แต่ไม่ได้มีจุดประสงค์หลักเพื่อเพิ่มความเร็วในการสื่อสาร"}]'),hg=Object.freeze(Object.defineProperty({__proto__:null,default:dg},Symbol.toStringTag,{value:"Module"})),yg=[{question:"7. ข้อใดคือข้อเสียของ Standard Ethernet?",type:"multiple-choice",options:[{statement:"ขนาดของข้อมูลไม่แน่นอน",istrue:!1},{statement:"มีความล่าช้าในการส่งข้อมูล",istrue:!1},{statement:"ข้อมูลมีการสูญหายได้",istrue:!0}],explanation:"ข้อเสียหลักประการหนึ่งของ Standard Ethernet เมื่อใช้งานจำนวนมากหรือมีการชนกัน (collision) อาจทำให้ข้อมูลบางส่วนสูญหายได้ และผู้ส่งต้องทำการส่งซ้ำ"},{question:"8. ใน Ethernet frame format มี address field ท่านจงอธิบายข้อมูลใน field นี้",type:"multiple-choice",options:[{statement:"ข้อมูลเป็น MAC address โดย destination address คือ address ของอุปกรณ์เชื่อมต่อระหว่างเครือข่าย (Bridge/Router)",istrue:!1},{statement:"ข้อมูลเป็น MAC address โดย destination address คือ address ของอุปกรณ์ปลายทางที่ต้องการข้อมูล",istrue:!0},{statement:"ข้อมูลเป็น IP address โดย destination address คือ address ของอุปกรณ์ปลายทางที่ต้องการข้อมูล",istrue:!1}],explanation:"Ethernet frame กำหนด field Address เป็น MAC Address ทั้งของผู้ส่ง (Source) และผู้รับ (Destination) โดย Destination Address ระบุอุปกรณ์ปลายทางที่ต้องการรับข้อมูลจริง ๆ ในระดับลิงก์เลเยอร์"},{question:"9. ขนาดของข้อมูลที่รับจาก Network Layer (Payload) ใน Ethernet สามารถมีขนาดเท่าไร?",type:"multiple-choice",options:[{statement:"60 – 1514 ไบต์",istrue:!1},{statement:"64 – 1518 ไบต์",istrue:!1},{statement:"46 – 1500 ไบต์",istrue:!0}],explanation:"ใน Ethernet Frame (มาตรฐาน Ethernet II) ส่วนข้อมูล (Payload) จะมีขนาดขั้นต่ำ 46 ไบต์และไม่เกิน 1500 ไบต์ หากข้อมูลจริงสั้นเกิน 46 ไบต์ ต้องมีการเติม Pad ให้ได้ 46 ไบต์ ส่วน 1500 ไบต์คือขนาดสูงสุดตามมาตรฐาน"},{question:"10. Fast Ethernet มีอัตราการส่งข้อมูลเท่าไร?",type:"multiple-choice",options:[{statement:"100 Mbps",istrue:!0},{statement:"10 Mbps",istrue:!1}],explanation:"Fast Ethernet เป็นอีเทอร์เน็ตที่เพิ่มความเร็วจาก 10 Mbps (Standard Ethernet) เป็น 100 Mbps เช่น 100BASE-TX, 100BASE-FX"},{question:"11. ขนาดของ address ใน Fast Ethernet มีขนาดเท่าไร?",type:"multiple-choice",options:[{statement:"48 bits address",istrue:!0},{statement:"64 bits address",istrue:!1},{statement:"46 bits address",istrue:!1}],explanation:"Fast Ethernet และ Ethernet รุ่นอื่น ๆ ต่างก็ยังคงใช้ MAC Address 48 บิต (6 ไบต์) ในระดับ Data Link Layer"},{question:"12. การเข้ารหัสของ Standard Ethernet คือวิธีใด?",type:"multiple-choice",options:[{statement:"PCM",istrue:!1},{statement:"Block encoding",istrue:!1},{statement:"Line encoding",istrue:!0}],explanation:"Standard Ethernet (10 Mbps) ส่วนใหญ่ใช้ Manchester encoding ซึ่งเป็นชนิดหนึ่งของ line encoding เพื่อแปลงบิตดิจิทัลให้เป็นสัญญาณไฟฟ้า"},{question:"13. การเข้ารหัสของ Fast Ethernet คือวิธีใด?",type:"multiple-choice",options:[{statement:"Block encoding",istrue:!1},{statement:"Line encoding",istrue:!1},{statement:"Block encoding + Manchester",istrue:!0}],explanation:"Fast Ethernet (100BASE-TX) ใช้วิธีการเข้ารหัสแบบ 4B5B หรือบางแหล่งจะอธิบายว่าเป็น Block encoding ร่วมกับ MLT-3 (ซึ่งเป็น line encoding) หรืออาจเทียบได้กับ Manchester ในบริบทหนึ่ง ทั้งนี้ โครงสร้างจริงคือ block encoding + line encoding"},{question:"14. Autonegotiation เป็นกลไกที่มีอยู่ใน Ethernet ชนิดใดบ้าง?",type:"multiple-choice",options:[{statement:"Standard Ethernet",istrue:!1},{statement:"Fast Ethernet + Standard Ethernet",istrue:!1},{statement:"Fast Ethernet + Gigabit Ethernet",istrue:!0}],explanation:"Autonegotiation เริ่มปรากฏใน Fast Ethernet (100 Mbps) เพื่อให้เชื่อมต่อกันที่ความเร็วและโหมดเหมาะสม และยังใช้ใน Gigabit Ethernet ด้วย"},{question:"16. การสื่อสารไร้สายที่มีเพียง Basic Service Set (BSS) ไม่มี Access Point เรียกว่าอะไร?",type:"multiple-choice",options:[{statement:"Ad hoc BSS",istrue:!0},{statement:"Direct BSS",istrue:!1},{statement:"Connection-oriented BSS",istrue:!1}],explanation:"Ad hoc BSS คือโหมดที่สถานี (stations) ทุกตัวเชื่อมต่อกันเองโดยตรง (peer-to-peer) โดยไม่มี access point ทำหน้าที่เป็นศูนย์กลาง"},{question:"17. เครือข่ายที่มี BSS และ AP เรียกว่าเครือข่ายชนิดใด?",type:"multiple-choice",options:[{statement:"Mitigate BSS",istrue:!1},{statement:"Intermediate BSS",istrue:!1},{statement:"Infrastructure BSS",istrue:!0}],explanation:"ใน Infrastructure BSS จะมี Access Point (AP) เป็นตัวกลางให้ทุก station เชื่อมต่อผ่าน AP เพื่อสื่อสารกัน"},{question:"18. Station ในระบบไร้สายมีกี่ประเภท และมีอะไรบ้าง?",type:"multiple-choice",options:[{statement:"2 ประเภท คือ BSS-transition, ESS-transition mobility",istrue:!1},{statement:"2 ประเภท คือ fixed station, mobile station",istrue:!1},{statement:"3 ประเภท คือ no-transition, BSS-transition, ESS-transition mobility",istrue:!0}],explanation:"มาตรฐาน IEEE 802.11 นิยามรูปแบบ mobility ของสถานีเป็น 3 แบบ: (1) no-transition (เคลื่อนที่ใน BSS เดิม), (2) BSS-transition, (3) ESS-transition"},{question:"19. Hidden Station Problem หมายถึงอะไร?",type:"multiple-choice",options:[{statement:"กรณีที่ station 2 ตัวไม่สามารถรับรู้ได้ว่ามี station ที่ 3 อยู่ในขอบเขตการเชื่อมต่อของ station ใดตัวหนึ่ง",istrue:!1},{statement:"กรณีที่ station 2 ตัวไม่รับรู้เลยว่ามี station ที่ 3 อยู่ในขอบเขตการเชื่อมต่อของทั้งสองตัว",istrue:!1},{statement:"กรณีที่ station 2 ตัวรับรู้ว่ามี station ที่ 3 อยู่ แต่ไม่สามารถเชื่อมต่อได้",istrue:!0}],explanation:"Hidden Station Problem คือสถานการณ์ที่สถานี A และ B ไม่เห็นกัน แต่ทั้งสองเชื่อมต่อกับ AP หรือปลายทางอื่นคนละมุม พวกเขาอาจส่งสัญญาณชนกันโดยไม่รู้ตัว ทำให้เกิด collision"},{question:"24. ความหมายของ 64B/66B คืออะไร?",type:"multiple-choice",options:[{statement:"Block coding ที่ input ขนาด 64 bits แปลงเป็น output ขนาด 66 bits",istrue:!0},{statement:"Block coding ที่ input ขนาด 64 bytes แปลงเป็น output ขนาด 66 bytes",istrue:!1},{statement:"Block coding ที่ input ขนาด 66 bytes แปลงเป็น output ขนาด 64 bytes",istrue:!1}],explanation:"64B/66B เป็นเทคนิคการเข้ารหัส (block coding) ใน Gigabit Ethernet และ 10 Gigabit Ethernet ซึ่งจะแทรก 2 บิตพิเศษทุก ๆ 64 บิต เพื่อช่วยในกระบวนการซิงโครไนซ์และตรวจจับข้อผิดพลาดบางส่วน"},{question:"25. ต้นฉบับที่ส่งข้อมูลคือ 0110 1101 1100 1010 ปลายทางได้รับข้อมูล 0111 1001 0100 1010 จำนวน Burst error มีค่าเท่าไร?",type:"multiple-choice",options:[{statement:"6",istrue:!0},{statement:"4",istrue:!1},{statement:"2",istrue:!1}],explanation:"Burst error คือช่วงที่บิตผิดพลาดเกิดติดกันเป็นกลุ่ม เมื่อเปรียบเทียบ 0110 1101 1100 1010 กับ 0111 1001 0100 1010 พบว่าผิดตรงตำแหน่งที่ต่อเนื่องกันจำนวน 6 บิต"},{question:"26. การหารค่าบิตเพื่อหาเศษของ CRC จะต้องหารด้วยค่าบิตที่มีคุณสมบัติใด?",type:"multiple-choice",options:[{statement:"บิตซ้ายสุดและบิตขวาสุดมีค่าเป็น 0 เสมอ",istrue:!1},{statement:"บิตซ้ายสุดและบิตขวาสุดมีค่าเป็น 1 เสมอ",istrue:!0},{statement:"บิตซ้ายสุดมีค่าเป็น 0 เสมอ และบิตขวาสุดมีค่าเป็น 1 เสมอ",istrue:!1}],explanation:"Generator Polynomial ที่ใช้คำนวณ CRC จะต้องมีบิตซ้ายสุด (MSB) เป็น 1 และบิตขวาสุด (LSB) เป็น 1 เพื่อให้ตรวจจับข้อผิดพลาดในกรณีบิตสูญหายหรือลดจำนวนตำแหน่งได้ดี"}],gg=Object.freeze(Object.defineProperty({__proto__:null,default:yg},Symbol.toStringTag,{value:"Module"})),bg=JSON.parse(`[{"question":"4. Checksum ที่อยู่ส่วน header ในระดับ network layer หาจากค่าใด?","type":"multiple-choice","options":[{"statement":"ผลรวมของค่าบิตทั้งหมดในส่วนหัว","istrue":true},{"statement":"ผลรวมของค่าบิตทั้งหมดในส่วน payload","istrue":false},{"statement":"ผลรวมของค่าบิตทั้งหมดในส่วนหัวรวมกับ payload","istrue":false}],"explanation":"Checksum ใน Network Layer (เช่นใน IP header) คำนวณจากค่าบิตในส่วนหัว (header) เท่านั้น"},{"question":"5. หน้าที่ของ Checksum ใน header นั้น?","type":"multiple-choice","options":[{"statement":"ตรวจสอบว่าข้อมูลส่วนหัวของ packet ที่ได้รับมามีความผิดพลาดหรือไม่","istrue":true},{"statement":"ตรวจสอบว่าข้อมูลส่วน payload ที่ได้รับมามีความผิดพลาดหรือไม่","istrue":false},{"statement":"ตรวจสอบว่าข้อมูลทั้ง packet ที่ได้รับมามีความผิดพลาดหรือไม่","istrue":false}],"explanation":"Checksum ใน IP header มีหน้าที่ตรวจสอบความถูกต้องเฉพาะส่วนหัว (header) ของ IP packet"},{"question":"6. เพราะเหตุใดจึงต้องทำ Flow Control?","type":"multiple-choice","options":[{"statement":"เพื่อควบคุมการส่งข้อมูลจากแหล่งส่งข้อมูลไปยังอุปกรณ์รับข้อมูล (ไม่จำเป็นต้องเป็นปลายทางที่ต้องการ) ไม่ให้เกิดสภาวะล้น","istrue":true},{"statement":"เพื่อควบคุมการส่งข้อมูลจากต้นทางไปยังปลายทางไม่ให้เกิดสภาวะล้น ณ บัฟเฟอร์ปลายทาง","istrue":false},{"statement":"เพื่อควบคุมการส่งข้อมูลจากต้นทางไปยังอุปกรณ์เชื่อมต่อทั้งหมดไม่ให้บัฟเฟอร์ปลายทางล้น","istrue":false}],"explanation":"Flow Control ป้องกันการส่งข้อมูลเกินกว่าที่ปลายทางจะรับได้ทัน (Buffer Overflow)"},{"question":"7. การควบคุมการคั่ง (Congestion Control) มีความจำเป็นเพราะเหตุใด?","type":"multiple-choice","options":[{"statement":"ป้องกันการเกิดความหน่วงในระยะยาว","istrue":false},{"statement":"ป้องกันการเกิดความเสียหายกับข้อมูลในช่องทางสื่อสาร","istrue":false},{"statement":"ถูกทุกข้อ","istrue":true}],"explanation":"Congestion Control ต้องป้องกันทั้งความหน่วงที่เกิดจากปริมาณการส่งสูงเกิน และความเสียหายของข้อมูลที่อาจเกิดขึ้น"},{"question":"8. การเกิด Congestion จะเกิดการสูญหายของข้อมูล ณ อุปกรณ์ใด?","type":"multiple-choice","options":[{"statement":"Switch","istrue":false},{"statement":"Router","istrue":true},{"statement":"Hub","istrue":false}],"explanation":"การคั่ง (congestion) โดยมากจะเกิดที่ router หากบัฟเฟอร์ของ router เต็มจะเกิดการทิ้งแพ็กเก็ต"},{"question":"9. การส่งข้อมูลในระดับ Network Layer เป็นการสื่อสารลักษณะใด?","type":"multiple-choice","options":[{"statement":"Packet switching","istrue":true},{"statement":"Circuit switching","istrue":false},{"statement":"Message switching","istrue":false}],"explanation":"IP Network ทำงานแบบ Packet Switching โดยไม่ต้องจองเส้นทางล่วงหน้าเหมือน Circuit Switching"},{"question":"10. ข้อใดกล่าวถูกต้องเกี่ยวกับการส่งข้อมูลแบบ Packet Switching?","type":"multiple-choice","options":[{"statement":"packet วิ่งจากต้นทางไปปลายทางอย่างอิสระและไปเก็บที่บัฟเฟอร์ Network Layer จนครบทุก packet ก่อนส่งต่อ","istrue":true},{"statement":"packet วิ่งจากต้นทางไปปลายทางอย่างเรียงลำดับเสมอและไปเก็บที่บัฟเฟอร์ Network Layer ก่อนส่งต่อ","istrue":false},{"statement":"packet วิ่งจากต้นทางไปปลายทางอย่างอิสระ และส่งข้อมูลไปยัง Transport Layer ทันทีที่ packet มาถึง","istrue":false}],"explanation":"ใน packet switching แต่ละ packet เดินทางอิสระและสามารถส่งขึ้น Transport Layer ได้ทันที (store-and-forward เป็นราย packet)"},{"question":"11. การบริการเพื่อเชื่อมต่อในระดับ Network Layer เป็นการเชื่อมต่อแบบใด?","type":"multiple-choice","options":[{"statement":"Connectionless","istrue":true},{"statement":"Connection Oriented","istrue":false},{"statement":"Virtual Circuit Switch","istrue":false}],"explanation":"IP เป็นโพรโทคอลแบบ Connectionless — ไม่ต้องสร้าง session ล่วงหน้าก่อนส่งข้อมูล"},{"question":"12. การทำงานแบบ Virtual Circuit Approach มีลักษณะเช่นไร?","type":"multiple-choice","options":[{"statement":"กำหนดการเชื่อมต่อสำหรับการส่ง datagram ก่อนการส่ง","istrue":false},{"statement":"การส่งทุก packet ต้องมีป้าย (flow label) เพื่อส่งข้อมูล","istrue":false},{"statement":"ถูกทุกข้อ","istrue":true}],"explanation":"Virtual Circuit จะจองเส้นทาง (setup) ล่วงหน้า + ใช้ label/identifier ในแต่ละแพ็กเก็ต"},{"question":"13. ข้อใดเป็น Auxiliary Protocol ในระดับ Network Layer?","type":"multiple-choice","options":[{"statement":"SNMP","istrue":false},{"statement":"IP","istrue":false},{"statement":"ICMP","istrue":true}],"explanation":"ICMP (Internet Control Message Protocol) คือโปรโตคอลเสริม (auxiliary) ในชั้น Network"},{"question":"14. การทำงานของ IP จะเกิด Reliability ได้เพราะเหตุใด?","type":"multiple-choice","options":[{"statement":"ใช้การบริการของโพรโทคอลระดับ Transport Layer มาช่วย","istrue":true},{"statement":"เขียนโปรแกรมเพื่อควบคุมการทำงานด้วยตนเอง","istrue":false},{"statement":"การทำงานของ IP มี reliability อยู่แล้ว","istrue":false}],"explanation":"IP เป็น Best-effort (ไม่การันตี) ต้องอาศัย Transport Layer (เช่น TCP) เพื่อสร้าง Reliability"},{"question":"16. การตัดข้อมูลในระดับ Network Layer ให้สามารถส่งไปในเครือข่ายต่าง ๆ ได้เรียกว่าอะไร?","type":"multiple-choice","options":[{"statement":"Fragmentation","istrue":true},{"statement":"Segmentation","istrue":false},{"statement":"Encapsulation","istrue":false}],"explanation":"IP อาจต้องทำ Fragmentation หากแพ็กเก็ตใหญ่เกิน MTU ของเครือข่าย"},{"question":"17. ปัญหาด้านความปลอดภัยที่เกิดขึ้นในชั้น Network Layer คืออะไร?","type":"multiple-choice","options":[{"statement":"Packet sniffing","istrue":true},{"statement":"Distributed Denied of Services (DDoS)","istrue":false},{"statement":"Malware attack","istrue":false}],"explanation":"Packet sniffing สามารถดักจับข้อมูลได้ในระดับ Network Layer"},{"question":"18. Protocol ในระดับ Network Layer ที่ใช้ในการรักษาความปลอดภัยของข้อมูลที่ส่งในช่องทางการสื่อสารคืออะไร?","type":"multiple-choice","options":[{"statement":"IPSecurity","istrue":false},{"statement":"IPSec","istrue":true},{"statement":"ไม่มี","istrue":false}],"explanation":"IPSec เป็นชุดโปรโตคอลที่ให้การเข้ารหัสและตรวจสอบความถูกต้องของข้อมูลในระดับ IP"},{"question":"19. ICMPv4 มีหน้าที่อะไร?","type":"multiple-choice","options":[{"statement":"รายงานความผิดปกติในการส่งข้อมูลที่เกิดขึ้น ณ router กลับไปให้ sender","istrue":true},{"statement":"แก้ไขความผิดปกติในการส่งข้อมูล ณ router แล้วแจ้งกลับไปให้ sender","istrue":false},{"statement":"ตรวจสอบสภาวะการสื่อสาร ณ router ว่ามีความผิดปกติหรือไม่","istrue":false}],"explanation":"ICMP แจ้งข้อผิดพลาดไปยังต้นทางเมื่อการส่งข้อมูลมีปัญหา แต่ไม่ได้แก้ปัญหาเอง"},{"question":"20. Mobile IP หมายถึงอะไร?","type":"multiple-choice","options":[{"statement":"การสร้างเครือข่าย IP network ที่ host สามารถเคลื่อนที่ได้","istrue":true},{"statement":"การสร้างเครือข่าย IP network ที่ไม่มีโครงสร้างหรือสถาปัตยกรรมรองรับ","istrue":false},{"statement":"การสร้างเครือข่าย IP network ที่เชื่อมต่อเฉพาะอุปกรณ์ที่เคลื่อนที่ได้เท่านั้น","istrue":false}],"explanation":"Mobile IP อนุญาตให้โฮสต์เปลี่ยนจุดเชื่อมต่อเครือข่ายได้โดยยังคง IP address เดิม"},{"question":"21. ข้อใดกล่าวถูกต้อง?","type":"multiple-choice","options":[{"statement":"ที่ destination host จำเป็นต้องใช้ forwarding table ของ final router","istrue":false},{"statement":"ที่ source host ไม่จำเป็นต้องใช้ forwarding table เพราะรู้ว่าจะส่งไปที่ router ตัวใด","istrue":true},{"statement":"ที่ source host จำเป็นต้องใช้ forwarding table เพราะไม่รู้ว่าจะส่งไปที่ router ตัวใดแน่นอน","istrue":false}],"explanation":"โฮสต์ต้นทางจะมี routing table (หรือ default gateway) เพื่อตัดสินใจว่าจะส่งแพ็กเก็ตออกพอร์ตใด"},{"question":"22. วัตถุประสงค์ของการใช้ Distance Vector ในการหาเส้นทางคืออะไร?","type":"multiple-choice","options":[{"statement":"หาเส้นทางที่สามารถส่งข้อมูลไปถึงปลายทางได้","istrue":false},{"statement":"หาเส้นทางหลาย ๆ เส้นเป็นทางเลือกในการส่ง datagram","istrue":false},{"statement":"หาเส้นทางที่มี cost ต่ำสุด","istrue":true}],"explanation":"Distance Vector Routing พยายามค้นหาเส้นทางที่มีต้นทุนรวมต่ำที่สุด"},{"question":"23. วิธีการของ Bellman-Ford Equation เป็นวิธีที่ใช้ในการหาเส้นทางแบบใด?","type":"multiple-choice","options":[{"statement":"Link State","istrue":false},{"statement":"Distance Vector","istrue":true},{"statement":"Hybrid Routing","istrue":false}],"explanation":"Bellman-Ford Algorithm เป็นรากฐานของ Distance Vector Routing"},{"question":"24. ความหมายของ Autonomous System (AS) คืออะไร?","type":"multiple-choice","options":[{"statement":"เครือข่ายของ ISP ที่บริหารจัดการเอง มีหมายเลขประจำขนาด 16 บิต","istrue":true},{"statement":"เครือข่ายของ ISP ที่บริหารจัดการเอง มีหมายเลขประจำขนาด 32 บิต","istrue":false},{"statement":"เครือข่ายของ ISP ที่บริหารจัดการเอง มีหมายเลขประจำขนาด 64 บิต","istrue":false}],"explanation":"AS (เดิม) ใช้หมายเลข 16 บิต (ภายหลังขยายเป็น 32 บิตได้) เป็นขอบเขตการบริหารเดียวกัน"},{"question":"25. ข้อใดต่อไปนี้จัดเป็น Stub AS?","type":"multiple-choice","options":[{"statement":"Shopee","istrue":false},{"statement":"ระบบจัดการตั๋วเครื่องบินอิเล็กทรอนิกส์","istrue":false},{"statement":"ระบบบริหารจัดการบุคลากรในองค์กร","istrue":true}],"explanation":"Stub AS คือ AS ที่เชื่อมต่อขาออกเพียงทางเดียว ใช้สำหรับบริการหรือระบบใดระบบหนึ่งเท่านั้น"},{"question":"26. web booking.com จัดเป็น AS แบบใด?","type":"multiple-choice","options":[{"statement":"Stub AS","istrue":false},{"statement":"Multihomed AS","istrue":false},{"statement":"Transient AS","istrue":true}],"explanation":"Transient AS เชื่อมต่อได้หลายทางและอนุญาตให้ข้อมูลจาก AS อื่นวิ่งผ่านได้—เช่นผู้ให้บริการขนาดใหญ่"},{"question":"27. eBGP คืออะไร?","type":"multiple-choice","options":[{"statement":"external border gateway protocol","istrue":true},{"statement":"exterior boundary gateway protocol","istrue":false},{"statement":"extended border gateway protocol","istrue":false}],"explanation":"eBGP = External Border Gateway Protocol คือการแลกเปลี่ยนเส้นทางระหว่างต่าง AS"},{"question":"28. iBGP ทำหน้าที่อะไร?","type":"multiple-choice","options":[{"statement":"update ข้อมูลเพื่อการ routing เฉพาะ router ที่เชื่อมต่อกับ AS อื่น","istrue":false},{"statement":"update ข้อมูลเพื่อการ routing ในทุก router ของ AS","istrue":true},{"statement":"update ข้อมูลเพื่อการ routing ภายใน AS (เฉพาะ subnet เดียว)","istrue":false}],"explanation":"iBGP = Internal BGP สำหรับเผยแพร่เส้นทางภายใน AS ให้ router ทุกตัวใน AS รับรู้"},{"question":"29. Border Gateway Protocol (BGP) ใช้อัลกอริทึมแบบใดเพื่อหาเส้นทาง?","type":"multiple-choice","options":[{"statement":"Bellman-Ford algorithm","istrue":false},{"statement":"Best path algorithm (Path Vector)","istrue":true},{"statement":"Dijkstra's algorithm","istrue":false}],"explanation":"BGP ใช้แนวคิด Path Vector ซึ่งค้นหาเส้นทางที่ดีที่สุดตามนโยบาย (sometimes เรียกว่า 'Best Path Algorithm')"},{"question":"30. IGMP ใช้เพื่ออะไร?","type":"multiple-choice","options":[{"statement":"ใช้เพื่อดำเนินการจัดทำ multicast บนระบบเครือข่ายที่ใช้ IPv4","istrue":false},{"statement":"เพื่อจัดกลุ่มของอุปกรณ์ที่ต้องการทำ multicast","istrue":false},{"statement":"ถูกทุกข้อ","istrue":true}],"explanation":"IGMP (Internet Group Management Protocol) ใช้บริหารจัดการ group membership ใน multicast IPv4 ซึ่งครอบคลุมทั้งการสร้างและจัดกลุ่มอุปกรณ์ที่ต้องการรับสตรีมเดียวกัน"}]`),xg=Object.freeze(Object.defineProperty({__proto__:null,default:bg},Symbol.toStringTag,{value:"Module"})),vg=JSON.parse('[{"type":"multiple-choice","question":"การเชื่อมต่อแบบใดที่ไม่มีโอกาสที่จะขาดการติดต่อสื่อสารกันได้ แม้สายสื่อสารเส้นหนึ่งจะเสียหาย?","options":[{"statement":"MESH","istrue":true},{"statement":"STAR","istrue":false},{"statement":"BUS","istrue":false},{"statement":"RING","istrue":false}],"explanation":"การเชื่อมต่อแบบ MESH จะทำให้แต่ละโหนดมีสายสื่อสารเชื่อมต่อกันหลายเส้นทาง (redundant paths) เมื่อสายใดสายหนึ่งเสียหาย ข้อมูลยังสามารถวิ่งผ่านเส้นทางอื่นได้ จึงไม่ขาดการติดต่อสื่อสาร"},{"type":"multiple-choice","question":"ความหมายของ accuracy ในการสื่อสารข้อมูลคืออะไร?","options":[{"statement":"การส่งข้อมูลจากต้นทางไปถึงปลายทางที่ถูกต้อง","istrue":false},{"statement":"ข้อมูลที่ส่งจากต้นทางไม่มีการสูญหาย","istrue":false},{"statement":"ข้อมูลที่ส่งจากต้นทางไปถึงปลายทางในเวลาที่เหมาะสม","istrue":false},{"statement":"ข้อมูลที่ส่งจากต้นทางไม่มีการเปลี่ยนแปลงเมื่อไปถึงปลายทางแล้ว","istrue":true}],"explanation":"Accuracy คือการที่ข้อมูลต้องถึงปลายทางอย่างถูกต้องและไม่ถูกแก้ไขหรือเสียหายระหว่างทาง กล่าวคือไม่มีการเปลี่ยนแปลงของข้อมูลเมื่อถึงปลายทาง"},{"type":"multiple-choice","question":"อุปกรณ์ใดที่ส่งข้อมูลเพื่อการสื่อสารแล้วทุกเครื่องในเครือข่ายจะได้รับข้อมูลเหล่านั้นร่วมกัน?","options":[{"statement":"Switch","istrue":false},{"statement":"Hub/Concentrator","istrue":true},{"statement":"Router","istrue":false},{"statement":"Bridge","istrue":false}],"explanation":"Hub หรือ Concentrator จะส่งสัญญาณข้อมูลออกไปยังทุกพอร์ตพร้อมกัน ทำให้ทุกเครื่องที่เชื่อมต่ออยู่ได้รับข้อมูลนั้นพร้อมกัน"},{"type":"multiple-choice","question":"Token เป็นที่เก็บข้อมูลการสื่อสารของทอพอโลยีใด?","options":[{"statement":"STAR","istrue":false},{"statement":"MESH","istrue":false},{"statement":"BUS","istrue":false},{"statement":"RING","istrue":true}],"explanation":"Token Ring เป็นรูปแบบการเชื่อมต่อแบบวงแหวน (RING) ที่ใช้โทเคน (token) ในการควบคุมสิทธิ์การส่งข้อมูลในเครือข่าย"},{"type":"multiple-choice","question":"Internet protocol อยู่ใน layer ใดของ OSI model?","options":[{"statement":"Transport layer","istrue":false},{"statement":"Network layer","istrue":true},{"statement":"Data link layer","istrue":false},{"statement":"Application layer","istrue":false}],"explanation":"Internet Protocol (IP) ทำงานอยู่ใน Network layer ซึ่งมีหน้าที่จัดเส้นทาง (routing) และส่งแพ็กเก็ตข้อมูลระหว่างเครือข่าย"},{"type":"multiple-choice","question":"หากสายสื่อสารในห้องปฏิบัติการเครือข่ายส่งข้อมูลด้วยความเร็ว 100 Mbps และมีเครื่องคอมพิวเตอร์เชื่อมต่อผ่าน hub จำนวน 50 เครื่อง ความเร็วในการส่งข้อมูลของแต่ละเครื่องจะเท่ากับเท่าใด?","options":[{"statement":"2 Mbps","istrue":true},{"statement":"5 Mbps","istrue":false},{"statement":"1 Mbps","istrue":false},{"statement":"10 Mbps","istrue":false}],"explanation":"เมื่อใช้ hub แบนด์วิดท์รวมจะถูกแชร์ให้กับทุกพอร์ตเท่าๆ กัน ดังนั้น 100 Mbps หาร 50 เครื่อง จะได้ความเร็วประมาณ 2 Mbps ต่อเครื่อง"},{"type":"multiple-choice","question":"ข้อใดแสดงให้เห็นถึงการเชื่อมต่อแบบ point-to-point ในระบบเครือข่าย?","options":[{"statement":"การเชื่อมต่อระหว่าง access point ในห้องปฏิบัติการ","istrue":false},{"statement":"การเชื่อมต่อระหว่างสมาร์ทวอชกับสมาร์ทโฟน","istrue":true},{"statement":"การเ ion":"การเชื่อมต่อแบบใดที่สามารถเกิดการชนกันของสัญญาณข้อมูลได้โดยง่าย?","options":[{"statement":"STAR","istrue":false},{"statement":"BUS","istrue":true},{"statement":"RING","istrue":false},{"statement":"MESH","istrue":false}],"explanation":"ในระบบ BUS มีสายสื่อสารหลักเส้นเดียวที่ทุกโหนดร่วมกันใช้ เมื่อมีการส่งข้อมูลพร้อมกันก็จะเกิดการชนกัน (collision) ได้ง่าย"},{"type":"multiple-choice","question":"ข้อใดต่อไปนี้กล่าวถูกต้อง \\"เมื่อ Object ถูกส่งจาก data link layer ของ sender ไปยัง data link layer ของ receiver\\"?","options":[{"statement":"Object จาก sender จะยาวเท่ากับ Object ของ receiver แต่ทั้งสองมีความแตกต่างกัน","istrue":false},{"statement":"Object จาก sender จะไม่แตกต่างจาก Object ของ receiver","istrue":true},{"statement":"Object จาก sender จะยาวน้อยกว่า Object ของ receiver","istrue":false},{"statement":"Object จาก sender จะยาวกว่า Object ของ receiver","istrue":false}],"explanation":"เมื่อ data link layer ของฝั่งส่ง สร้างเฟรม (frame) แล้วส่งไปยัง data link layer ของฝั่งรับ เฟรมที่ได้รับจะมีรูปแบบและขนาดเท่าเดิม จึงไม่เปลี่ยนแปลง"},{"type":"multiple-choice","question":"การส่งข้อมูลจากต้นทางไปสู่ปลายทางที่ถูกต้องเป็นคุณสมบัติใดของการสื่อสารเครือข่าย?","options":[{"statement":"Accuracy","istrue":false},{"statement":"Delivery","istrue":true},{"statement":"Timeliness","istrue":false},{"statement":"Available","istrue":false}],"explanation":"Delivery คือการส่งข้อมูลไปยังผู้รับที่ถูกต้องหรือปลายทางที่ต้องการ ไม่ใช่ส่งผิดเครื่องหรือผิดจุดหมาย"},{"type":"multiple-choice","question":"Connectionless และ connection-oriented เกิดในชั้นใด?","options":[{"statement":"Transport layer","istrue":true},{"statement":"Physical layer","istrue":false},{"statement":"Data link layer","istrue":false},{"statement":"Network layer","istrue":false}],"explanation":"แนวคิดการเชื่อมต่อแบบ connectionless (UDP) และ connection-oriented (TCP) อยู่ที่ Transport layer ซึ่งกำหนดวิธีส่งข้อมูลระหว่างต้นทางและปลายทาง"},{"type":"multiple-choice","question":"การพูดคุยโทรศัพท์โดยใช้ Line เป็นการสื่อสารในโหมดใด?","options":[{"statement":"Duplex","istrue":false},{"statement":"Half-duplex","istrue":false},{"statement":"Full duplex","istrue":true},{"statement":"Simplex","istrue":false}],"explanation":"เมื่อใช้ Line โทรศัพท์ ทั้งสองฝ่ายสามารถพูดและฟังได้พร้อมกัน จึงเป็นรูปแบบของ Full duplex ที่ส่งและรับข้อมูลได้แบบสองทิศทางพร้อมกัน"},{"type":"multiple-choice","question":"การสื่อสารที่สามารถส่งข้อมูลได้สองทิศทางในเวลาเดียวกันด้วยสื่อเดียวกัน จะมีความเร็วในการส่งข้อมูลแต่ละทิศทางเท่าใด ถ้าความเร็วของสื่อเท่ากับ X Mbps?","options":[{"statement":"ไม่สามารถตอบได้","istrue":false},{"statement":"X Mbps","istrue":false},{"statement":"X/2 Mbps","istrue":true},{"statement":"X/4 Mbps","istrue":false}],"explanation":"ในบางกรณีของการสื่อสารแบบ full-duplex บนสื่อเดียว ความเร็วรวม X Mbps จะแบ่งเป็นสองทางเท่าๆ กัน จึงได้ X/2 Mbps ต่อทิศทาง"},{"type":"multiple-choice","question":"\\"ความถี่ของเครื่องที่ล้มเหลวในเวลา 1 เดือน\\" เป็นวิธีการวัดที่แสดงให้เห็นถึงคุณสมบัติใดของเครือข่าย?","options":[{"statement":"Availability","istrue":false},{"statement":"Reliability","istrue":true},{"statement":"Performance","istrue":false},{"statement":"Security","istrue":false}],"explanation":"Reliability หมายถึงความน่าเชื่อถือของระบบ การวัดว่ามีอุปกรณ์ล้มเหลวบ่อยแค่ไหนในช่วงเวลาที่กำหนด จึงสะท้อนความน่าเชื่อถือของระบบได้"},{"type":"multiple-choice","question":"ลักษณะเด่นของการเชื่อมต่ออินเทอร์เน็ตคืออะไร?","options":[{"statement":"การเชื่อมต่อที่ใช้อุปกรณ์เชื่อมต่อเฉพาะระหว่างเครือข่ายที่แตกต่างกันให้เป็นเครือข่ายเดียวทั่วโลก","istrue":false},{"statement":"การเชื่อมต่อที่เกิดขึ้นระหว่างหลายเครือข่ายที่มีหลายทอพอโลยีให้เกิดเป็นเครือข่ายเดียวทั่วโลก","istrue":true},{"statement":"การเชื่อมต่อที่สามารถสื่อสารทางไกลได้ทั่วโลก","istrue":false},{"statement":"การเชื่อมต่อที่เกิดขึ้นระหว่างหลายเครือข่ายที่มีทอพอโลยีเดียวให้เกิดเป็นเครือข่ายเดียวทั่วโลก","istrue":false}],"explanation":"อินเทอร์เน็ตเป็นการเชื่อมโยงหลายเครือข่าย (Internetworking) ที่หลากหลาย ไม่ว่าจะมีทอพอโลยีหรือเทคโนโลยีที่แตกต่างกัน แล้วรวมเป็นโครงข่ายเดียวใหญ่ทั่วโลก"},{"type":"multiple-choice","question":"อุปกรณ์ทางกายภาพที่ใช้เชื่อมต่อระหว่างเครื่องคอมพิวเตอร์กับสายสื่อสารมีชื่อเรียกว่าอะไร?","options":[{"statement":"Node connection card","istrue":false},{"statement":"Node interface card","istrue":false},{"statement":"Network connection card","istrue":false},{"statement":"Network interface card","istrue":true}],"explanation":"Network Interface Card (NIC) คืออุปกรณ์ฮาร์ดแวร์สำหรับเชื่อมต่อเครื่องคอมพิวเตอร์เข้ากับสายสื่อสารหรือเครือข่าย"},{"type":"multiple-choice","question":"MAC address จะอยู่ในอุปกรณ์ใดของเครื่องคอมพิวเตอร์?","options":[{"statement":"Mainboard","istrue":false},{"statement":"VDO-card","istrue":false},{"statement":"Processor","istrue":false},{"statement":"NIC","istrue":true}],"explanation":"MAC address ถูกฝังอยู่บน NIC (Network Interface Card) ซึ่งเป็นฮาร์ดแวร์ที่ใช้เชื่อมต่อเครือข่ายและเป็นตัวกำหนดที่อยู่ทางกายภาพของอุปกรณ์"}]'),Sg=Object.freeze(Object.defineProperty({__proto__:null,default:vg},Symbol.toStringTag,{value:"Module"})),qg=JSON.parse(`[{"type":"multiple-choice","question":"จากวิธีของ QAM หาก 1 baud สามารถส่งข้อมูลได้ครั้งละ 4 บิต และใน 1 วินาทีส่งได้ 16 baud การส่งข้อมูลนี้มีความเร็ว bit rate เท่ากับเท่าไร?","options":[{"statement":"16 bps","istrue":false},{"statement":"64 bps","istrue":true},{"statement":"16 b","istrue":false},{"statement":"64 b","istrue":false}],"explanation":"ในแต่ละ 1 baud สามารถบรรจุได้ 4 บิต และใน 1 วินาทีส่งสัญญาณได้ 16 baud ดังนั้นอัตราการส่งบิต (bit rate) จึงเท่ากับ 16 x 4 = 64 bps"},{"type":"multiple-choice","question":"เมื่อใช้เทคนิค PCM สิ่งใดจะเกิดขึ้นเสมอ?","options":[{"statement":"Quantization noise","istrue":true},{"statement":"Impulse noise","istrue":false},{"statement":"White noise","istrue":false},{"statement":"Bit error","istrue":false}],"explanation":"PCM (Pulse Code Modulation) เป็นการแปลงสัญญาณแอนะล็อกเป็นดิจิทัลด้วยการสุ่มตัวอย่างและทำการเข้ารหัส ระหว่างกระบวนการนี้จะมี Quantization noise เกิดขึ้นเสมอ เนื่องจากการปัดค่าให้เป็นระดับดิจิทัล"},{"type":"multiple-choice","question":"ถ้าคลื่นที่ใช้ในการส่งสัญญาณข้อมูลมีค่าตั้งแต่ 300 MHz ถึง 3000 MHz แสดงว่าค่าแบนด์วิดท์มีค่าเท่าไร?","options":[{"statement":"300 MHz","istrue":false},{"statement":"3000 MHz","istrue":false},{"statement":"2700 MHz","istrue":true},{"statement":"3300 MHz","istrue":false}],"explanation":"แบนด์วิดท์ (Bandwidth) คือช่วงความถี่สูงสุดลบด้วยความถี่ต่ำสุด ดังนั้น 3000 MHz - 300 MHz = 2700 MHz"},{"type":"multiple-choice","question":"ข้อใดต่อไปนี้แตกต่างจากข้ออื่น?","options":[{"statement":"ASK กับ FSK","istrue":false},{"statement":"PCM กับ DM","istrue":true},{"statement":"PSK กับ FSK","istrue":false},{"statement":"ASK กับ PSK","istrue":false}],"explanation":"ASK, FSK และ PSK เป็นเทคนิคการมอดูเลตสัญญาณทางใดทางหนึ่ง (เปลี่ยนแอมพลิจูด ความถี่ หรือเฟส) ส่วน PCM กับ DM (Delta Modulation) คือเทคนิคการแปลงสัญญาณแอนะล็อกเป็นดิจิทัล จึงแตกต่างจากวิธีอื่นที่เป็นการมอดูเลตโดยตรง"},{"type":"multiple-choice","question":"การเข้ารหัสเพื่อส่งข้อมูลดิจิทัลแบบ Non-return to Zero (NRZ) มีลักษณะสำคัญอย่างไร?","options":[{"statement":"ค่าของบิตไม่ควรมีค่าเดียวกันในตำแหน่งที่ติดกันเป็นจำนวนมาก","istrue":false},{"statement":"ค่าของบิตที่เท่ากันและติดกันจะต้องใช้กระแสไฟฟ้าสลับขั้วกันเสมอ","istrue":false},{"statement":"ค่าของบิต 0/1 เป็นการใช้กระแสไฟฟ้าขั้วลบและขั้วบวกในการกำหนดค่าเท่านั้น","istrue":true},{"statement":"จำนวนบิต 0/1 ไม่ควรมีค่าสลับกันไปมามากเกินไป","istrue":false}],"explanation":"NRZ คือการเข้ารหัสที่ระดับแรงดันไฟฟ้าไม่กลับไปที่ศูนย์ระหว่างบิต โดยบิต ‘0’ และ ‘1’ มักกำหนดด้วยแรงดันไฟฟ้าขั้วลบหรือขั้วบวก (หรือ 0 และ +V) ทำให้สัญญาณไม่เปลี่ยนกลับมาที่ 0 ในแต่ละช่องเวลา"},{"type":"multiple-choice","question":"\\"บิตแรกใช้เวลาเดินทางจากต้นทางไปยังปลายทางใช้เวลา 2 ms\\" ข้อความนี้ระบุถึงค่าเวลาใด?","options":[{"statement":"Transmission delay","istrue":false},{"statement":"Propagation delay","istrue":true},{"statement":"Queuing delay","istrue":false},{"statement":"Processing delay","istrue":false}],"explanation":"Propagation delay คือเวลาที่สัญญาณใช้ในการเดินทางจากต้นทางถึงปลายทาง (นับเฉพาะการเคลื่อนที่ในสื่อกลาง) ดังนั้นเมื่อระบุว่าบิตแรกเดินทางถึงปลายทางใน 2 ms จึงหมายถึงค่า Propagation delay"},{"type":"multiple-choice","question":"NRZ-L ไม่เหมาะกับข้อมูลแบบใด?","options":[{"statement":"00111000","istrue":false},{"statement":"00110011","istrue":false},{"statement":"11111111","istrue":true},{"statement":"00011100","istrue":false}],"explanation":"NRZ-L ไม่เหมาะกับการส่งข้อมูลที่มีบิตค่าเดียวกันติดกันยาวนาน เช่น 11111111 เพราะไม่มีการเปลี่ยนระดับแรงดันไฟฟ้าเลย อาจทำให้รับ-ส่งข้อมูลคลาดเคลื่อนหรือเกิดปัญหาซิงโครไนซ์ง่าย"},{"type":"multiple-choice","question":"ข้อใดไม่ใช่สิ่งที่เกิดขึ้นเมื่อมีการส่งข้อมูลทางไกล?","options":[{"statement":"Noise","istrue":false},{"statement":"Error detection","istrue":false},{"statement":"Transmission error","istrue":false},{"statement":"Code detection","istrue":true}],"explanation":"เมื่อส่งข้อมูลทางไกล มักต้องเผชิญกับ Noise (สัญญาณรบกวน), อาจเกิด Transmission error และต้องมี Error detection เพื่อตรวจสอบความถูกต้อง แต่ Code detection ไม่ได้เกิดขึ้นโดยอัตโนมัติในการส่งข้อมูล"},{"type":"multiple-choice","question":"Bipolar Return-to-Zero ใช้กระแสไฟฟ้าเพื่อส่งข้อมูลคล้ายกับการเข้ารหัสแบบใด?","options":[{"statement":"NRZ-L","istrue":false},{"statement":"NRZ-I","istrue":false},{"statement":"M-NRZ","istrue":false},{"statement":"AMI","istrue":true}],"explanation":"Bipolar RZ เป็นรูปแบบการเข้ารหัสที่ใช้สลับขั้วไฟ (บวก/ลบ) เมื่อส่งบิต ‘1’ คล้ายกับเทคนิค AMI (Alternate Mark Inversion) ทำให้สัญญาณ ‘1’ สลับขั้วบวก-ลบ ส่วน ‘0’ จะเป็นศูนย์"},{"type":"multiple-choice","question":"หากท่านได้ยินเสียงพระตีระฆังตอน 18.00 น. เป็นลักษณะของการเกิด noise แบบใด?","options":[{"statement":"Gaussian noise","istrue":true},{"statement":"Impulse noise","istrue":false},{"statement":"Crosstalk","istrue":false},{"statement":"Echo","istrue":false}],"explanation":"Gaussian noise คือรูปแบบสัญญาณรบกวนตามการกระจายตัวแบบเกาส์ (Gaussian distribution) แม้ในกรณีทั่วไปเสียงตีระฆังอาจถูกมองเป็นสัญญาณชั่วขณะ แต่ในบริบทนี้ถือว่าเป็นการรบกวนลักษณะหนึ่งที่อาจปรากฏซ้อนเข้ากับสัญญาณหลักได้ จึงถูกจัดเป็น Gaussian noise ตามคำตอบที่กำหนด"},{"type":"multiple-choice","question":"ข้อใดไม่ได้แสดงให้เห็นถึงประสิทธิภาพการสื่อสาร?","options":[{"statement":"Bandwidth","istrue":false},{"statement":"Throughput","istrue":false},{"statement":"Latency or delay","istrue":false},{"statement":"Router down time","istrue":true}],"explanation":"Bandwidth, Throughput และ Latency เป็นตัวชี้วัดหรือปัจจัยที่บ่งบอกประสิทธิภาพการสื่อสารโดยตรง ส่วน Router down time เป็นระยะเวลาที่เราเตอร์หยุดทำงาน ซึ่งไม่ใช่ตัวชี้วัดประสิทธิภาพการส่งข้อมูลโดยตรง"},{"type":"multiple-choice","question":"ข้อใดกล่าวถูกต้องเกี่ยวกับสัญญาณที่มีหลายระดับ?","options":[{"statement":"คลื่นสัญญาณที่มีหลายระดับจะต้องส่งในหลายช่องสัญญาณ เพราะแต่ละระดับต้องใช้ช่องสัญญาณของตนเอง","istrue":false},{"statement":"คลื่นสัญญาณที่มีหลายระดับจะส่งบิตได้เป็นจำนวนมากในเวลา 1 วินาที","istrue":true},{"statement":"คลื่นสัญญาณที่มีหลายระดับจะส่งด้วยความเร็วต่ำเสมอ","istrue":false},{"statement":"คลื่นสัญญาณที่มีหลายระดับจะต้องส่งในช่องสัญญาณความเร็วสูงเสมอ","istrue":false}],"explanation":"ยิ่งสัญญาณมีหลายระดับ (มากกว่า 2) ก็ยิ่งสามารถแทนจำนวนบิตต่อสัญญาณ 1 ช่วง (symbol) ได้มากขึ้น ส่งผลให้ส่งข้อมูลได้มากในหนึ่งวินาที"},{"type":"multiple-choice","question":"กำหนดให้ช่องสัญญาณมีแบนด์วิดท์ 10 MHz และส่งสัญญาณด้วยคลื่น 4 ระดับ จะสามารถส่งข้อมูลได้ในอัตราบิตเท่าไร?","options":[{"statement":"40 MHz","istrue":true},{"statement":"80 MHz","istrue":false},{"statement":"120 MHz","istrue":false},{"statement":"160 MHz","istrue":false}],"explanation":"ตามหลักการคำนวณพื้นฐาน อัตราบิต = แบนด์วิดท์ x log2(ระดับสัญญาณ) = 10 MHz x log2(4) = 10 MHz x 2 = 20 Mbps อย่างไรก็ตาม ในตัวเลือกได้ใช้หน่วยเป็น 'MHz' และกำหนดคำตอบเป็น '40 MHz' ซึ่งอาจมีการตีความหรือเงื่อนไขเพิ่มเติมที่ทำให้คำนวณออกมาเป็นค่า 40 ในหน่วยเดียวกันกับตัวเลือก จึงถือว่า '40 MHz' เป็นคำตอบในบริบทนี้"},{"type":"multiple-choice","question":"ข้อใดอธิบายถึงวิธีของ Differential Phase Shift Keying (DPSK)?","options":[{"statement":"การเปลี่ยน phase จะเกิดขึ้นเมื่อค่าบิตเป็น 1 เสมอ","istrue":true},{"statement":"การเปลี่ยน phase จะเกิดเป็นระยะ ๆ โดยไม่สนใจว่าบิตข้อมูลเป็นอะไร","istrue":false},{"statement":"การเปลี่ยน phase จะเกิดเมื่อค่าบิตเป็น 0 เสมอ","istrue":false},{"statement":"การเปลี่ยน phase จะเกิดขึ้นทุก ๆ ครึ่งวินาที","istrue":false}],"explanation":"DPSK เข้ารหัสข้อมูลด้วยการเปลี่ยนแปลงเฟสเมื่อบิตเป็น 1 ส่วนบิตเป็น 0 จะไม่เปลี่ยนเฟส (หรืออิงกับสถานะของสัญญาณก่อนหน้า) จึงกล่าวได้ว่า “การเปลี่ยน phase จะเกิดขึ้นเมื่อค่าบิตเป็น 1”"},{"type":"multiple-choice","question":"\\"หากท่านได้ยินเสียงเล่นดนตรีในงานมหกรรม\\" เป็นลักษณะของการเกิด noise แบบใด?","options":[{"statement":"Gaussian noise","istrue":false},{"statement":"Impulse noise","istrue":true},{"statement":"Crosstalk","istrue":false},{"statement":"Echo","istrue":false}],"explanation":"Impulse noise คือการรบกวนที่เกิดขึ้นเป็นช่วงหรือเป็นจุด ๆ โดยไม่ต่อเนื่องสม่ำเสมอ แม้ว่าการฟังดนตรีจะมีลักษณะคล้ายเสียงต่อเนื่อง แต่ในบริบทนี้ตอบว่าเป็น Impulse noise ตามที่ระบุไว้ในคำตอบ ซึ่งอาจตีความว่าเป็นเสียงรบกวนระยะสั้นหรือเกิดขึ้นไม่สม่ำเสมอ"},{"type":"multiple-choice","question":"Composite signal เกิดขึ้นอย่างไร?","options":[{"statement":"เป็นการรวมสัญญาณข้อมูลดิจิทัลที่มีความหลากหลายเข้าเป็นหนึ่งเดียว","istrue":false},{"statement":"เป็นการรวมสัญญาณข้อมูลแอนะล็อกที่มีความหลากหลายเข้าเป็นคลื่นเดียว","istrue":true},{"statement":"เป็นการส่งสัญญาณข้อมูลดิจิทัลหลายสัญญาณในช่องทางเดียวกัน","istrue":false},{"statement":"เป็นการส่งสัญญาณข้อมูลดิจิทัลหลายสัญญาณในช่องทางที่แตกต่างกัน","istrue":false}],"explanation":"Composite signal หมายถึงการรวมสัญญาณแอนะล็อกหลายความถี่หรือหลายรูปแบบเข้าด้วยกัน เกิดเป็นสัญญาณเดียวที่มีองค์ประกอบย่อย ๆ หลายรายการ"},{"type":"multiple-choice","question":"Unipolar Return-to-Zero ใช้กระแสไฟฟ้าเพื่อส่งข้อมูลจำนวนกี่ระดับ?","options":[{"statement":"1","istrue":false},{"statement":"2","istrue":true},{"statement":"3","istrue":false},{"statement":"4","istrue":false}],"explanation":"Unipolar RZ ใช้ระดับสัญญาณหนึ่ง (เช่น +V) แทนบิต ‘1’ และกลับมาที่ 0 แทนบิต ‘0’ จึงรวมแล้วมี 2 ระดับ (คือ +V กับ 0) ในการส่งข้อมูล"},{"type":"multiple-choice","question":"วิธีการใดต่อไปนี้ใช้ส่งข้อมูลแอนะล็อกด้วยคลื่นสัญญาณดิจิทัล?","options":[{"statement":"Analog code modulation","istrue":false},{"statement":"Digital code modulation","istrue":false},{"statement":"Pulse Code Modulation","istrue":true},{"statement":"Block Code Modulation","istrue":false}],"explanation":"Pulse Code Modulation (PCM) เป็นกระบวนการสุ่มสัญญาณแอนะล็อก (sampling) แล้วแปลงเป็นตัวเลขดิจิทัล (quantization และ encoding) ทำให้สามารถส่งข้อมูลแอนะล็อกด้วยรูปแบบดิจิทัลได้"},{"type":"multiple-choice","question":"ข้อใดไม่ถูกต้องสำหรับการสื่อสารด้วยคลื่นแอนะล็อก?","options":[{"statement":"สามารถส่งได้ในระยะใกล้เท่านั้น","istrue":true},{"statement":"นิยมใช้ในการส่งข้อมูลประเภทภาพและเสียง","istrue":false},{"statement":"คลื่นสูญหายง่ายมาก","istrue":false},{"statement":"คลื่นจะมีวงรอบการส่งที่หลากหลายในหนึ่งวินาที","istrue":false}],"explanation":"คลื่นแอนะล็อกสามารถส่งได้ทั้งระยะใกล้และไกล ขึ้นอยู่กับกำลังส่งและเทคโนโลยีที่ใช้ จึงทำให้ข้อความ ‘สามารถส่งได้ในระยะใกล้เท่านั้น’ เป็นข้อความที่ไม่ถูกต้อง"},{"type":"multiple-choice","question":"\\"การส่งข้อมูลจากต้นทางใช้เวลาทั้งสิ้น (นับจากบิตแรกจนถึงบิตสุดท้าย) 10 ms\\" ข้อความนี้ระบุถึงค่าเวลาใด?","options":[{"statement":"Transmission delay","istrue":true},{"statement":"Propagation delay","istrue":false},{"statement":"Queuing delay","istrue":false},{"statement":"Processing delay","istrue":false}],"explanation":"Transmission delay คือเวลาที่ต้นทางใช้ในการผลักบิตทั้งหมดออกไปบนสื่อ (ตั้งแต่บิตแรกจนถึงบิตสุดท้าย) โดยไม่ได้นับรวมเวลาเดินทางในสื่อหรือเวลาอื่น ๆ"}]`),Ag=Object.freeze(Object.defineProperty({__proto__:null,default:qg},Symbol.toStringTag,{value:"Module"})),Tg=JSON.parse(`[{"type":"multiple-choice","question":"การใส่รหัสของ Esc เข้าไปเป็นส่วนหนึ่งของข้อมูลที่ต้องการส่ง เป็นการดำเนินการที่เรียกว่าอะไร?","options":[{"statement":"Bit framing","istrue":false},{"statement":"Byte stuffing","istrue":true},{"statement":"Bit stuffing","istrue":false},{"statement":"Byte framing","istrue":false}],"explanation":"Byte stuffing คือวิธีแทรกไบต์พิเศษ (เช่น Esc) เข้าไปในข้อมูล เพื่อให้ผู้รับสามารถแยกแยะขอบเขตของเฟรมได้ถูกต้อง ป้องกันไม่ให้ข้อมูลบางส่วนถูกรับรู้ผิดว่าเป็นตัวบ่งบอกจุดเริ่มต้นหรือสิ้นสุดของเฟรม"},{"type":"multiple-choice","question":"ข้อใดเป็นข้อจำกัดของการใช้ Even parity-check code?","options":[{"statement":"ตรวจสอบว่าบิตเกิดความเสียหายได้เพียงจำนวนบิตที่เสียเป็นจำนวนคี่เท่านั้น","istrue":true},{"statement":"ตรวจสอบว่าบิตเกิดความเสียหายได้หลายบิตแต่มีความผิดพลาดในการตรวจสอบสูง","istrue":false},{"statement":"ตรวจสอบว่าบิตเกิดความเสียหายได้เพียงบิตเดียวเท่านั้น","istrue":false},{"statement":"ตรวจสอบว่าบิตเกิดความเสียหายได้เพียงจำนวนบิตที่เสียเป็นเลขคู่เท่านั้น","istrue":false}],"explanation":"Even parity-check code จะตรวจจับความผิดพลาดได้เฉพาะกรณีที่จำนวนบิตที่ถูกเปลี่ยน (flip) เป็นเลขคี่เท่านั้น หากบิตที่เสียหายเปลี่ยนไปเป็นจำนวนคู่จะยังคงค่า parity เป็นเลขคู่ไว้ ทำให้ตรวจไม่พบ"},{"type":"multiple-choice","question":"การกำหนดค่า control field ใน HDLC protocol มีไว้เพื่อวัตถุประสงค์ใด?","options":[{"statement":"เพื่อควบคุมการเข้าใช้ข้อมูลโดยผู้ใช้งาน","istrue":false},{"statement":"เพื่อป้องกันการเข้าสู่ข้อมูลโดยบุคคลต้องสงสัย","istrue":false},{"statement":"เพื่อป้องกันความเสียหายในการส่งข้อมูล","istrue":false},{"statement":"เพื่อการควบคุมการไหลของข้อมูลในระดับ data link layer","istrue":true}],"explanation":"Control field ใน HDLC จะกำหนดโหมดการทำงาน การควบคุมการไหล (flow control) และการจัดการตอบรับ (acknowledgement) ในระดับ data link layer"},{"type":"multiple-choice","question":"ในการจัดทำ framing นั้น จะไม่มีการใส่ข้อมูลใดในเฟรม?","options":[{"statement":"Sender MAC address","istrue":false},{"statement":"Receiver MAC address","istrue":false},{"statement":"IP address","istrue":true},{"statement":"Error control","istrue":false}],"explanation":"เฟรมในชั้น data link layer ประกอบด้วย MAC address ของผู้ส่งและผู้รับ รวมถึงข้อมูลตรวจสอบความผิดพลาด (error control) แต่จะไม่รวม IP address เพราะ IP เป็นข้อมูลในชั้น Network layer"},{"type":"multiple-choice","question":"ข้อใดเป็น sublayer ในระดับ data link layer?","options":[{"statement":"Data-link control","istrue":true},{"statement":"Media control","istrue":false},{"statement":"Multimedia control","istrue":false},{"statement":"Multiple access control","istrue":false}],"explanation":"data link layer จะแบ่งเป็น 2 ส่วน คือ LLC (Logical Link Control) และ MAC (Media Access Control) ซึ่ง LLC มักจะเรียกรวมว่า data-link control sublayer"},{"type":"multiple-choice","question":"Normal response mode (NRM) ใช้เป็นเทคนิคการส่งข้อมูลในกรณีใด?","options":[{"statement":"การกำหนดหน้าที่ของแต่ละสถานีการสื่อสารที่ไม่มีความสมดุล (มีสถานีลูกและสถานีหลัก)","istrue":true},{"statement":"เมื่อการเชื่อมต่อเป็นการเชื่อมต่อทางไกลเท่านั้น","istrue":false},{"statement":"การกำหนดหน้าที่ของแต่ละสถานีการสื่อสารมีความสมดุลกัน (ทุกสถานีมีสิทธิ์ในการส่งเท่ากัน)","istrue":false},{"statement":"เมื่อการเชื่อมต่อเป็นไปในลักษณะของ point-to-point เท่านั้น","istrue":false}],"explanation":"Normal response mode (NRM) ถูกใช้ในระบบที่มีสถานีหลัก (primary station) และสถานีลูก (secondary station) โดยสถานีลูกจะรอให้สถานีหลักอนุญาตก่อนส่งข้อมูล"},{"type":"multiple-choice","question":"เมื่อกล่าวถึง Point-to-Point Protocol จะหมายถึงโพรโทคอลในระดับใด?","options":[{"statement":"Media access control sublayer","istrue":false},{"statement":"Data link control sublayer","istrue":true},{"statement":"Data control sublayer","istrue":false},{"statement":"Multiple point control sublayer","istrue":false}],"explanation":"PPP (Point-to-Point Protocol) เป็นโพรโทคอลที่ดำเนินงานในชั้น data link control sublayer เพื่อจัดการการเชื่อมต่อระหว่างโหนดแบบ point-to-point"},{"type":"multiple-choice","question":"การเชื่อมต่อระหว่าง node-to-node connection เกิดในระดับการเชื่อมต่อใด?","options":[{"statement":"Media access control","istrue":false},{"statement":"Data-link control","istrue":true},{"statement":"Multimedia control","istrue":false},{"statement":"Multiple
