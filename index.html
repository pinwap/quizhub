xplanation":"แม้จะเป็นผู้นำที่มีสุขภาพดูดี แต่ค่า BMI ก็ระบุว่าเขาเริ่มมีน้ำหนักเกินเกณฑ์มาตรฐาน"},{"type":"multiple-choice","question":"การทำ 'CBT' (จิตบำบัดทางความคิด) มีบทบาทอย่างไรในการรักษาโรคการกิน","options":[{"statement":"ช่วยสอนวิธีทำอาหารที่อร่อยที่สุด","istrue":false},{"statement":"ช่วยปรับเปลี่ยนทัศนคติที่ผิดเพี้ยนต่อรูปร่างและการกินอาหาร","istrue":true},{"statement":"ช่วยลดขนาดของกระเพาะอาหารโดยไม่ต้องผ่าตัด","istrue":false},{"statement":"ช่วยให้จำสูตรอาหารได้แม่นยำขึ้น","istrue":false}],"explanation":"เป็นการรักษาทางใจที่มุ่งเป้าแก้ที่ 'สาเหตุ' ความคิดที่นำไปสู่พฤติกรรมการกินที่ผิดปกติ"},{"type":"multiple-choice","question":"น้ำตาลประเภทใดที่ร่างกายต้องการ 'ใยอาหาร' มากำกับความเร็วในการดูดซึมมากที่สุด","options":[{"statement":"แป้งเชิงซ้อน","istrue":false},{"statement":"ฟรุกโตส (Fructose)","istrue":true},{"statement":"โปรตีนจากถั่ว","istrue":false},{"statement":"ไขมันโอเมก้า-3","istrue":false}],"explanation":"ฟรุกโตสที่ดูดซึมเร็วเกินไปจะสร้างภาระหนักให้ตับและเพิ่มระดับไตรกลีเซอไรด์ทันที"},{"type":"multiple-choice","question":"สมองส่วน 'Reward System' ถูกกระตุ้นด้วยสารประเภทใดในอาหารขยะ","options":[{"statement":"น้ำตาลและไขมันเลว","istrue":true},{"statement":"ใยอาหารและแคลเซียม","istrue":false},{"statement":"วิตามินบี 12 และธาตุเหล็ก","istrue":false},{"statement":"น้ำเปล่าบริสุทธิ์","istrue":false}],"explanation":"อาหารขยะให้รางวัลสมองด้วยพลังงานสูง ทำให้เรารู้สึกพึงพอใจและอยากกลับไปกินอีก"},{"type":"multiple-choice","question":"โรคอ้วนระดับ Class II (BMI 35.0 – 39.9) ส่งผลต่องบประมาณสาธารณสุขอย่างไร","options":[{"statement":"ช่วยประหยัดเงินเพราะคนกินน้อยลง","istrue":false},{"statement":"เพิ่มภาระค่าใช้จ่ายในการรักษาโรคแทรกซ้อนอย่างมหาศาล","istrue":true},{"statement":"ไม่มีผลต่องบประมาณรัฐ","istrue":false},{"statement":"ทำให้ประชาชนแข็งแรงจนไม่ต้องไปโรงพยาบาล","istrue":false}],"explanation":"ภาวะอ้วนระดับสูงนำไปสู่โรคหัวใจ เบาหวาน และอัมพาต ซึ่งมีค่าใช้จ่ายในการรักษาสูงมาก"},{"type":"multiple-choice","question":"คำแนะนำ 'Don't remain unoccupied' ใช้แก้ปัญหาการกินในเวลาใดได้ดีที่สุด","options":[{"statement":"เวลาที่มีงานยุ่งจนไม่ได้กินข้าว","istrue":false},{"statement":"เวลาเย็นที่ว่างงานและมักจะหาขนมกินเพื่อแก้เหงา","istrue":true},{"statement":"เวลาที่กำลังออกกำลังกาย","istrue":false},{"statement":"เวลาที่กำลังนอนหลับลึก","istrue":false}],"explanation":"ช่วงเวลาที่ไม่มีกิจกรรมทำมักนำไปสู่พฤติกรรมการกินจุกจิกโดยไม่มีความหิวจริง"},{"type":"multiple-choice","question":"การมี 'ทัศนคติเชิงบวก' ต่อการเลือกอาหารช่วยการลดน้ำหนักอย่างไร","options":[{"statement":"ทำให้แคลอรี่ในอาหารหายไปเอง","istrue":false},{"statement":"ทำให้การลดน้ำหนักเป็นเรื่องที่สนุกและทำได้ต่อเนื่องไม่ทรมาน","istrue":true},{"statement":"ทำให้ร่างกายไม่ต้องนอนหลับ","istrue":false},{"statement":"ช่วยให้กินฟาสต์ฟู้ดได้มากขึ้น","istrue":false}],"explanation":"สุขภาพจิตที่ดีช่วยให้เรารักษาวินัยการกินได้ยาวนานโดยไม่รู้สึกกดดัน"},{"type":"multiple-choice","question":"ผลพลอยได้ (By-product) ของฟรุกโตสที่ตับเปลี่ยนเป็นไขมันคือสารใดที่เพิ่มขึ้นในกระแสเลือด","options":[{"statement":"ออกซิเจน","istrue":false},{"statement":"ไตรกลีเซอไรด์ (Triglycerides)","istrue":true},{"statement":"เม็ดเลือดแดง","istrue":false},{"statement":"วิตามินซี","istrue":false}],"explanation":"การกินหวานจัดจากฟรุกโตสเพิ่มระดับไขมันไตรกลีเซอไรด์ในเลือดโดยตรง"},{"type":"multiple-choice","question":"อาหารชนิดใดจัดเป็น 'Natural Food' ตามคำแนะนำในบทเรียน","options":[{"statement":"น้ำอัดลมสูตรน้ำตาลศูนย์","istrue":false},{"statement":"แอปเปิลสดและผักใบเขียวที่ไม่ผ่านการแปรรูป","istrue":true},{"statement":"มันฝรั่งทอดกรอบในซอง","istrue":false},{"statement":"ขนมปังขาวที่เติมสารเสริมคุณภาพ","istrue":false}],"explanation":"อาหารธรรมชาติคืออาหารที่อยู่คงสภาพเดิมจากแหล่งผลิต ไม่เติมน้ำตาลหรือสารเคมี"},{"type":"multiple-choice","question":"สถาบันวิจัย Warwick Medical School พบความเสี่ยงของคนนอนน้อยในลักษณะใด","options":[{"statement":"มีโอกาสผอมกว่าคนปกติ 2 เท่า","istrue":false},{"statement":"ความเสี่ยงในการเป็นโรคอ้วนเพิ่มขึ้นเป็น 2 เท่า","istrue":true},{"statement":"มีความจำดีขึ้น 50%","istrue":false},{"statement":"มีระดับน้ำตาลในเลือดคงที่กว่าคนนอนมาก","istrue":false}],"explanation":"การอดนอนเพิ่มพฤติกรรมการกินและรบกวนระบบเผาผลาญจนเพิ่มโอกาสเป็นโรคอ้วน"},{"type":"multiple-choice","question":"ฮอร์โมน 'ออกซีโทซิน' (Oxytocin) สัมพันธ์อย่างไรกับการลดพฤติกรรมการกินชดเชย","options":[{"statement":"ช่วยให้เรารู้สึกผูกพันและมีความสุข ลดความโหยหาอาหารเพื่อคลายเครียด","istrue":true},{"statement":"ทำหน้าที่ย่อยไขมันในกระเพาะ","istrue":false},{"statement":"เพิ่มความอยากอาหารรสเค็ม","istrue":false},{"statement":"ไม่มีความเกี่ยวข้อง","istrue":false}],"explanation":"ฮอร์โมนความรักและความผูกพันช่วยเติมเต็มทางอารมณ์ ลดการใช้ 'การกิน' แก้เหงา"},{"type":"multiple-choice","question":"การลดปริมาณอาหารแปรรูป (Processed Foods) ช่วยลดพฤติกรรมการกินเกินได้อย่างไร","options":[{"statement":"เพราะอาหารแปรรูปมักมีสารกระตุ้นให้กินไม่หยุด","istrue":true},{"statement":"เพราะอาหารแปรรูปมีรสชาติไม่อร่อย","istrue":false},{"statement":"เพราะอาหารแปรรูปทำจากใยอาหารพลาสติก","istrue":false},{"statement":"เพราะอาหารแปรรูปให้วิตามินมากเกินไปจนอิ่ม","istrue":false}],"explanation":"อาหารแปรรูปถูกออกแบบมาให้มีรสชาติจัดจ้านและมักไปกระตุ้นระบบรางวัลในสมองให้เรากินได้เรื่อยๆ"},{"type":"multiple-choice","question":"สัญญาณใดบ่งชี้ว่าบุคคลเริ่มเข้าสู่ภาวะโรคอ้วนลงพุง (Central Obesity)","options":[{"statement":"การมีเส้นรอบเอวที่เพิ่มขึ้นเกินมาตรฐาน (Waist circumference)","istrue":true},{"statement":"การมีส่วนสูงลดลง","istrue":false},{"statement":"การมีลายนิ้วมือที่จางลง","istrue":false},{"statement":"การมองเห็นในที่มืดดีขึ้น","istrue":false}],"explanation":"รอบเอวเป็นตัวบ่งชี้ปริมาณไขมันในช่องท้องที่แม่นยำกว่าการดูแค่น้ำหนักตัว"},{"type":"multiple-choice","question":"ลักษณะรูปร่าง (Silhouettes) ในคนอ้วนมีความสำคัญอย่างไรในทางการแพทย์","options":[{"statement":"ช่วยในการวินิจฉัยปริมาณกล้ามเนื้อแขน","istrue":false},{"statement":"ช่วยประเมินการสะสมของไขมันส่วนเกินที่ส่งผลต่อสุขภาพเบื้องต้น","istrue":true},{"statement":"ช่วยในการระบุสายพันธุ์ของมนุษย์","istrue":false},{"statement":"ไม่มีความสำคัญใดๆ","istrue":false}],"explanation":"รูปร่างภายนอกสะท้อนระดับความรุนแรงของโรคอ้วนและสภาวะทุพโภชนาการแบบเกิน"},{"type":"multiple-choice","question":"ข้อใดเป็นผลดีของการดื่มชาเขียวสม่ำเสมอต่อรูปร่าง","options":[{"statement":"ช่วยเพิ่มมวลกระดูกทันที","istrue":false},{"statement":"มีสารต้านอนุมูลอิสระช่วยเพิ่มการเผาผลาญและจิตใจสดชื่น","istrue":true},{"statement":"ช่วยให้น้ำตาลในเลือดพุ่งสูงขึ้น","istrue":false},{"statement":"ช่วยเปลี่ยนไขมันเลวให้เป็นฟรุกโตส","istrue":false}],"explanation":"สารคาเทชินในชาเขียวช่วยเสริมระบบเมแทบอลิซึมให้ทำงานได้ดีขึ้น"},{"type":"multiple-choice","question":"ความว่างเปล่าทางอารมณ์มักถูกเติมเต็มด้วยสิ่งใดในพฤติกรรมคนอ้วน","options":[{"statement":"การนอนหลับ","istrue":false},{"statement":"การกินปริมาณมหาศาล (Binge eating)","istrue":true},{"statement":"การออกกำลังกายแบบคาร์ดิโอ","istrue":false},{"statement":"การนั่งสมาธิเพียงลำพัง","istrue":false}],"explanation":"คนจำนวนมากใช้ความสุขชั่วคราวจากการกินเพื่อกลบความรู้สึกว่างเปล่าในใจ"},{"type":"multiple-choice","question":"การบริโภคน้ำตาลไม่ควรเกินกี่กรัมต่อวันตามเกณฑ์เพื่อสุขภาพตับ","options":[{"statement":"10 กรัม","istrue":false},{"statement":"50 กรัม","istrue":true},{"statement":"100 กรัม","istrue":false},{"statement":"500 กรัม","istrue":false}],"explanation":"การจำกัดน้ำตาลช่วยลดภาระของตับในการเปลี่ยนน้ำตาลเป็นไขมันส่วนเกิน"},{"type":"multiple-choice","question":"ปัจจัยด้าน 'สิ่งแวดล้อม' ใดที่แก้ไขได้ยากที่สุดในการลดน้ำหนักในสังคมเมือง","options":[{"statement":"การมีอากาศที่เย็นสบายเกินไป","istrue":false},{"statement":"การเข้าถึงอาหารขยะที่ราคาถูกกว่าอาหารสุขภาพได้ง่ายทุกที่","istrue":true},{"statement":"การไม่มีน้ำประปาที่สะอาด","istrue":false},{"statement":"การมีทางเดินเท้าที่กว้างเกินไป","istrue":false}],"explanation":"สภาพแวดล้อมที่เอื้อต่อการกินอาหารที่ไม่เป็นมิตรต่อสุขภาพเป็นความท้าทายหลักของผู้ลดน้ำหนัก"},{"type":"multiple-choice","question":"ฮอร์โมน 'คอร์ติซอล' จะหลั่งออกมาสูงสุดในช่วงเวลาใดหากเราเครียดเรื้อรัง","options":[{"statement":"เฉพาะตอนออกกำลังกาย","istrue":false},{"statement":"ตลอดทั้งวันซึ่งส่งผลให้ร่างกายกักเก็บไขมันหน้าท้องต่อเนื่อง","istrue":true},{"statement":"ตอนที่เรากำลังมีความสุขกับการฟังเพลง","istrue":false},{"statement":"ไม่มีการหลั่งออกมาในสภาวะปกติ","istrue":false}],"explanation":"ความเครียดสะสมทำให้ระดับฮอร์โมนนี้ค้างอยู่ในเลือดนานเกินไปจนทำลายระบบเผาผลาญ"},{"type":"multiple-choice","question":"จุดประสงค์ของการ 'ฝึกสมาธิ' ในรายวิชานี้เพื่อการลดน้ำหนักคืออะไร","options":[{"statement":"เพื่อให้น้ำหนักลดลงทันทีขณะนั่ง","istrue":false},{"statement":"เพื่อสร้างสติในการรับรู้ความหิวจริงและความอยาก และคุมอารมณ์ได้ดีขึ้น","istrue":true},{"statement":"เพื่อประหยัดเงินค่าอาหาร","istrue":false},{"statement":"เพื่อเพิ่มระดับคาร์โบไฮเดรตในเลือด","istrue":false}],"explanation":"การมีสมาธิและสติช่วยให้เราไม่ตกเป็นทาสของอารมณ์ที่นำไปสู่การกินเกิน"},{"type":"multiple-choice","question":"ทำไมคนที่มีค่า BMI สูงถึง 40.6 (Jorge Garcia) จึงต้องได้รับการดูแลพิเศษ","options":[{"statement":"เพราะเขามีมวลกล้ามเนื้อมากเกินไป","istrue":false},{"statement":"เพราะจัดอยู่ในกลุ่มอ้วนระดับวิกฤตที่มีความเสี่ยงต่อการหยุดหายใจและโรคหัวใจสูง","istrue":true},{"statement":"เพราะเขาไม่มีฮอร์โมนอินซูลินเหลืออยู่เลย","istrue":false},{"statement":"เพราะร่างกายของเขาสามารถทนต่อฟรุกโตสได้ดีกว่าคนอื่น","istrue":false}],"explanation":"BMI ระดับ 40 ขึ้นไปคือโรคอ้วนขั้นสูงสุดซึ่งส่งผลวิกฤตต่อระบบการทำงานทุกอย่างในร่างกาย"},{"type":"multiple-choice","question":"ความเชื่อที่ว่า 'กินน้อยๆ ออกกำลังกายให้หนักๆ' อาจใช้ไม่ได้ผลกับทุกคนเพราะปัจจัยใด","options":[{"statement":"เพราะลืมดื่มน้ำเปล่า","istrue":false},{"statement":"เพราะความเครียดและฮอร์โมนที่แปรปรวนอาจไปขัดขวางการเผาผลาญไขมัน","istrue":true},{"statement":"เพราะออกกำลังกายผิดเวลา","istrue":false},{"statement":"เพราะเลือกใช้รองเท้าวิ่งที่ไม่เหมาะสม","istrue":false}],"explanation":"ระบบฮอร์โมนมีความซับซ้อนกว่าแค่การคำนวณตัวเลขแคลอรี่เพียงอย่างเดียว"},{"type":"multiple-choice","question":"การจัดการสภาวะ 'ดื้อเลปติน' เบื้องต้นควรเริ่มจากข้อใด","options":[{"statement":"การลดอาหารแปรรูปและฟรุกโตสเพื่อลดการอักเสบในสมอง","istrue":true},{"statement":"การเพิ่มการกินขนมหวานเพื่อให้เลปตินสูงขึ้นอีก","istrue":false},{"statement":"การงดนอนหลับเพื่อให้ร่างกายตื่นตัว","istrue":false},{"statement":"การดื่มเครื่องดื่มแอลกอฮอล์เพื่อผ่อนคลาย","istrue":false}],"explanation":"การลดปัจจัยก่อการอักเสบช่วยให้สมองกลับมารับสัญญาณความอิ่มได้ดีขึ้น"},{"type":"multiple-choice","question":"ทำไมการกินอาหารที่เป็น 'Natural Food' จึงช่วยคุมแคลอรี่ได้โดยธรรมชาติ","options":[{"statement":"เพราะอาหารเหล่านี้รสชาติแย่จนเราไม่อยากกินเยอะ","istrue":false},{"statement":"เพราะมีความหนาแน่นของสารอาหารสูงแต่อิ่มเร็วจากใยอาหารและน้ำ","istrue":true},{"statement":"เพราะไม่มีแคลอรี่อยู่เลย","istrue":false},{"statement":"เพราะถูกบรรจุในภาชนะที่เล็กลง","istrue":false}],"explanation":"กากใยและโครงสร้างธรรมชาติช่วยให้เราอิ่มเร็วและอิ่มนานกว่าอาหารแปรรูป"},{"type":"multiple-choice","question":"พฤติกรรมใดจัดเป็น 'Self-care' ที่ดีในการควบคุมน้ำหนัก","options":[{"statement":"การนอนหลับพักผ่อนให้เพียงพอและจัดการอารมณ์ตนเอง","istrue":true},{"statement":"การอดอาหารเช้าเพื่อประหยัดพลังงาน","istrue":false},{"statement":"การชั่งน้ำหนักทุก 1 ชั่วโมง","istrue":false},{"statement":"การกินวิตามินทดแทนมื้ออาหารทุกมื้อ","istrue":false}],"explanation":"การดูแลองค์รวมทั้งกายและใจคือพื้นฐานของสุขภาพที่ดีอย่างยั่งยืน"},{"type":"multiple-choice","question":"ภาวะไขมันพอกตับในระยะแรกสามารถแก้ไขได้ด้วยวิธีใด","options":[{"statement":"การผ่าตัดเอาตับออกมาล้างไขมัน","istrue":false},{"statement":"การปรับลดน้ำตาลฟรุกโตสและออกกำลังกายอย่างสม่ำเสมอ","istrue":true},{"statement":"การกินอาหารที่มีไขมันสูงเพื่อขับไขมันเก่าออก","istrue":false},{"statement":"การหยุดดื่มน้ำเปล่า","istrue":false}],"explanation":"ไขมันพอกตับในระยะต้นสามารถย้อนกลับคืนสู่ภาวะปกติได้ด้วยการเปลี่ยนโภชนาการ"},{"type":"multiple-choice","question":"บทสรุปของรายวิชานี้เน้นย้ำเรื่อง 'ความสวยงาม' ว่าเริ่มต้นที่จุดใด","options":[{"statement":"เริ่มต้นที่เครื่องสำอางชั้นนำ","istrue":false},{"statement":"เริ่มต้นที่จิตใจที่แจ่มใสและร่างกายที่มีระบบเผาผลาญสมบูรณ์","istrue":true},{"statement":"เริ่มต้นที่การลดน้ำหนักให้เร็วที่สุด","istrue":false},{"statement":"เริ่มต้นที่การทำศัลยกรรมตกแต่ง","istrue":false}],"explanation":"ความงามที่ยั่งยืนเกิดจากสุขภาพภายในที่ดีและสมดุล"},{"type":"multiple-choice","question":"เหตุใดการวัดรอบเอว (Waist circumference) จึงเป็นตัวบ่งชี้ความเสี่ยงโรคอ้วนที่ดีกว่า BMI ในบางกรณี","options":[{"statement":"เพราะใช้สายวัดได้ง่ายกว่าเครื่องชั่ง","istrue":false},{"statement":"เพราะบ่งบอกถึงปริมาณไขมันในช่องท้องซึ่งเป็นอันตรายต่อหัวใจ","istrue":true},{"statement":"เพราะรอบเอวเปลี่ยนยากกว่าน้ำหนักตัว","istrue":false},{"statement":"ไม่มีความสำคัญที่ต่างกัน","istrue":false}],"explanation":"ไขมันสะสมที่หน้าท้อง (ลงพุง) เป็นต้นเหตุหลักของโรคเมแทบอลิซึม"},{"type":"multiple-choice","question":"สารอาหารใดที่พบมากในปลาแซลมอนและช่วยลดการอักเสบในร่างกาย","options":[{"statement":"โอเมก้า-3 (DHA/EPA)","istrue":true},{"statement":"น้ำตาลซูโครส","istrue":false},{"statement":"แป้งสาลีขัดสี","istrue":false},{"statement":"วิตามินดีสังเคราะห์","istrue":false}],"explanation":"โอเมก้า-3 เป็นกรดไขมันดีที่มีคุณสมบัติต้านการอักเสบและบำรุงหัวใจ"},{"type":"multiple-choice","question":"คำแนะนำสุดท้ายสำหรับผู้ที่ต้องการมีสุขภาพและจิตใจแจ่มใสคือข้อใด","options":[{"statement":"ความสม่ำเสมอในการปรับเปลี่ยนวิถีชีวิตอย่างสมดุล","istrue":true},{"statement":"การเปลี่ยนอาหารทุกชนิดเป็นอาหารเหลว","istrue":false},{"statement":"การยกเลิกการกินทุกประเภทในตอนกลางคืน","istrue":false},{"statement":"การรอให้ป่วยก่อนค่อยเริ่มดูแลตนเอง","istrue":false}],"explanation":"ความสม่ำเสมอและสมดุลเป็นกุญแจสำคัญสู่ความสำเร็จที่ยั่งยืน"},{"type":"multiple-choice","question":"เหตุใดผู้ป่วย Bulimia Nervosa จึงมักจะมีระดับเกลือแร่ในเลือด (Electrolytes) ผิดปกติ","options":[{"statement":"เพราะการรับประทานอาหารที่มีรสเค็มจัดในปริมาณมาก","istrue":false},{"statement":"เพราะการล้วงคออาเจียนหรือใช้ยาถ่ายทำให้สูญเสียแร่ธาตุอย่างรวดเร็ว","istrue":true},{"statement":"เพราะร่างกายหยุดการดูดซึมแร่ธาตุจากลำไส้เล็ก","istrue":false},{"statement":"เพราะการออกกำลังกายที่หนักเกินไปเพียงอย่างเดียว","istrue":false}],"explanation":"พฤติกรรมการกำจัดอาหารออกจากร่างกาย (Purging) ส่งผลให้เสียสมดุลของน้ำและแร่ธาตุที่สำคัญ เช่น โพแทสเซียม ซึ่งอันตรายต่อการทำงานของหัวใจ"},{"type":"multiple-choice","question":"ความแตกต่างในด้าน 'การยอมรับความจริง' ระหว่าง Anorexia และ Bulimia คือข้อใด","options":[{"statement":"ผู้ป่วย Anorexia มักไม่รู้ตัวว่าผิดปกติ แต่ผู้ป่วย Bulimia มักรู้ตัวและรู้สึกผิด","istrue":true},{"statement":"ผู้ป่วย Bulimia มักจะภูมิใจในพฤติกรรมการล้วงคอของตนเอง","istrue":false},{"statement":"ทั้งสองโรคไม่มีความแตกต่างกันในด้านการรับรู้","istrue":false},{"statement":"ผู้ป่วย Anorexia จะพยายามขอความช่วยเหลือจากแพทย์ด้วยตนเองเสมอ","istrue":false}],"explanation":"ผู้ป่วย Anorexia มักมีทัศนคติที่ปฏิเสธความเจ็บป่วย (Ego-syntonic) ในขณะที่ผู้ป่วย Bulimia มักทรมานและรู้สึกผิดกับวงจรการกินของตนเอง"},{"type":"multiple-choice","question":"ในการรักษาโรคการกิน ข้อใดคือบทบาทสำคัญของ 'โภชนาการบำบัด' (Nutrition Therapy)","options":[{"statement":"การบังคับให้ผู้ป่วยกินอาหารแคลอรี่สูงที่สุดในทุกมื้อ","istrue":false},{"statement":"การให้ความรู้และฝึกทัศนคติใหม่ในการรับประทานอาหารที่สมดุล","istrue":true},{"statement":"การสั่งยาถ่ายเพื่อลดความเครียดของผู้ป่วย","istrue":false},{"statement":"การห้ามไม่ให้ผู้ป่วยออกกำลังกายตลอดชีวิต","istrue":false}],"explanation":"โภชนาการบำบัดมุ่งเน้นการสร้างพฤติกรรมการกินที่เป็นปกติและให้ความรู้เรื่องพลังงานที่ร่างกายต้องการจริง"},{"type":"multiple-choice","question":"เพราะเหตุใด 'ความเครียดเรื้อรัง' จึงเป็นตัวขัดขวางการลดไขมันหน้าท้องได้ดีที่สุด","options":[{"statement":"เพราะทำให้ร่างกายหลั่งคอร์ติซอล ซึ่งไปยับยั้งการสลายไขมันและสั่งให้สะสมเพิ่มที่พุง","istrue":true},{"statement":"เพราะทำให้ร่างกายต้องการใยอาหารน้อยลง","istrue":false},{"statement":"เพราะความเครียดช่วยเพิ่มการทำงานของฮอร์โมนเลปติน","istrue":false},{"statement":"เพราะทำให้ร่างกายเผาผลาญกล้ามเนื้อแทนไขมันเพียงอย่างเดียว","istrue":false}],"explanation":"คอร์ติซอล (Cortisol) มีหน้าที่ส่งเสริมการกักเก็บไขมันไว้ที่ช่องท้องเพื่อเป็นพลังงานสำรองยามวิกฤต ซึ่งเป็นกลไกการตอบสนองต่อความเครียด"},{"type":"multiple-choice","question":"จากข้อมูลเรื่อง 'Natural Foods' ข้อใดจัดเป็นหัวใจสำคัญของการเลือกอาหารเพื่อลดน้ำหนัก","options":[{"statement":"การเลือกอาหารที่มีสารปรุงแต่งเพื่อให้รสชาติอร่อย","istrue":false},{"statement":"การเลือกอาหารที่ผ่านกระบวนการแปรรูปน้อยที่สุดและคงสภาพธรรมชาติไว้","istrue":true},{"statement":"การเลือกกินเฉพาะอาหารเหลวที่บรรจุขวดขายทั่วไป","istrue":false},{"statement":"การเน้นกินผลไม้กวนและผลไม้แช่อิ่มเป็นหลัก","istrue":false}],"explanation":"อาหารธรรมชาติมีสารอาหารที่สมบูรณ์และไม่มีน้ำตาลหรือไขมันส่วนเกินที่มักแฝงมากับขั้นตอนการแปรรูป"},{"type":"multiple-choice","question":"การจัดการสภาวะ 'Emotional Eating' ควรเริ่มต้นด้วยวิธีใดตามแนวทางจิตวิทยา","options":[{"statement":"การดื่มกาแฟดำปริมาณมากเพื่อกดประสาท","istrue":false},{"statement":"การฝึกแยกแยะระหว่าง 'ความหิวทางกาย' และ 'ความหิวทางอารมณ์'","istrue":true},{"statement":"การขังตัวเองไว้ในห้องที่ไม่มีอาหาร","istrue":false},{"statement":"การกินยาชุดลดน้ำหนักเพื่อระงับความอยาก","istrue":false}],"explanation":"การมีสติ (Mindfulness) จะช่วยให้เรารู้เท่าทันว่าเรากินเพราะหิวจริงๆ หรือกินเพื่อลดความเครียด/ความเหงา"},{"type":"multiple-choice","question":"ฮอร์โมน 'เลปติน' ทำงานร่วมกับสมองส่วนใดเพื่อควบคุมความอิ่ม","options":[{"statement":"Cerebellum","istrue":false},{"statement":"Hypothalamus","istrue":true},{"statement":"Medulla Oblongata","istrue":false},{"statement":"Temporal Lobe","istrue":false}],"explanation":"ไฮโปทาลามัสทำหน้าที่เป็นศูนย์ควบคุมความสมดุลของร่างกาย รวมถึงการสั่งการเรื่องความหิวและความอิ่มผ่านสัญญาณฮอร์โมน"},{"type":"multiple-choice","question":"หากบุคคลหนึ่งนอนหลับเพียง 4 ชั่วโมงต่อคืน จะส่งผลอย่างไรต่อการเลือกอาหารในวันรุ่งขึ้น","options":[{"statement":"จะอยากกินผักและผลไม้สดมากขึ้น","istrue":false},{"statement":"จะโหยหาอาหารที่มีแป้งและน้ำตาลสูงเพื่อชดเชยพลังงานที่ล้า","istrue":true},{"statement":"จะไม่มีความรู้สึกหิวเลยตลอดทั้งวัน","istrue":false},{"statement":"ร่างกายจะดึงไขมันออกมาใช้ได้ดีขึ้น","istrue":false}],"explanation":"การอดนอนทำให้สมองส่วนที่ควบคุมการยับยั้งชั่งใจทำงานลดลง และฮอร์โมนเกรลินกระตุ้นให้อยากอาหารพลังงานสูง"},{"type":"multiple-choice","question":"กลุ่มอาการ 'Metabolic Syndrome' เกี่ยวข้องโดยตรงกับความเสี่ยงในข้อใด","options":[{"statement":"โรคหลอดเลือดสมอง (Stroke) และหัวใจวาย","istrue":true},{"statement":"โรคกระดูกอ่อนในเด็ก","istrue":false},{"statement":"ภาวะเลือดแข็งตัวช้า","istrue":false},{"statement":"โรคทางเดินปัสสาวะอักเสบ","istrue":false}],"explanation":"ความผิดปกติของระบบเผาผลาญในกลุ่มอาการนี้ทำลายผนังหลอดเลือดและก่อให้เกิดการอุดตันของไขมัน"},{"type":"multiple-choice","question":"พฤติกรรม 'ล้วงคออาเจียน' ส่งผลเสียต่อต่อมใดในร่างกายอย่างเห็นได้ชัด","options":[{"statement":"ต่อมไทรอยด์ทำงานหนักขึ้น","istrue":false},{"statement":"ต่อมน้ำลายเกิดการบวมโต (Sialadenosis)","istrue":true},{"statement":"ต่อมใต้สมองหยุดการผลิตโกรทฮอร์โมน","istrue":false},{"statement":"ต่อมเหงื่อทำงานผิดปกติ","istrue":false}],"explanation":"การอาเจียนบ่อยๆ กระตุ้นให้ต่อมน้ำลายผลิตน้ำลายมากขึ้นจนเกิดการอักเสบและบวมโตบริเวณข้างแก็ม"},{"type":"multiple-choice","question":"ทำไมน้ำตาลฟรุกโตสจึงถูกเรียกว่า 'สารรบกวนระบบเผาผลาญ' (Metabolic Disruptor)","options":[{"statement":"เพราะมันสามารถเปลี่ยนเป็นกล้ามเนื้อได้โดยไม่ต้องออกกำลังกาย","istrue":false},{"statement":"เพราะมันข้ามขั้นตอนการควบคุมพลังงานในเซลล์และมุ่งตรงไปสร้างไขมันที่ตับ","istrue":true},{"statement":"เพราะมันช่วยเพิ่มประสิทธิภาพของอินซูลิน","istrue":false},{"statement":"เพราะมันทำหน้าที่เหมือนวิตามินดีในการบำรุงกระดูก","istrue":false}],"explanation":"ฟรุกโตสมีเส้นทางการย่อยที่ต่างจากกลูโคส โดยจะถูกตับจัดการเกือบทั้งหมดและเปลี่ยนเป็นไขมันได้ง่ายหากปริมาณเกินพิกัด"},{"type":"multiple-choice","question":"ข้อใดเป็นผลดีของการลด BMI ให้มาอยู่ในเกณฑ์ปกติ (18.5 - 24.9)","options":[{"statement":"เพิ่มอัตราการหลั่งคอร์ติซอล","istrue":false},{"statement":"ลดความเสี่ยงต่อโรคเบาหวานประเภทที่ 2 และภาวะความดันโลหิตสูง","istrue":true},{"statement":"ทำให้ร่างกายไม่ต้องได้รับใยอาหารอีกต่อไป","istrue":false},{"statement":"ช่วยให้ระบบประสาทซิมพาเททิกทำงานแรงขึ้น","istrue":false}],"explanation":"การมีน้ำหนักตัวตามเกณฑ์ช่วยลดภาระของอวัยวะภายในและรักษาสมดุลของระบบเผาผลาญ"},{"type":"multiple-choice","question":"ในโปรแกรมลดน้ำหนัก การรับประทานอาหารที่มี 'ใยอาหารสูง' ในมื้อเย็นส่งผลอย่างไร","options":[{"statement":"ทำให้นอนไม่หลับเพราะลำไส้ทำงานหนัก","istrue":false},{"statement":"ช่วยให้อิ่มนานขึ้นและลดการดูดซึมน้ำตาลแฝงก่อนนอน","istrue":true},{"statement":"ทำให้ร่างกายขาดน้ำอย่างรุนแรง","istrue":false},{"statement":"ช่วยเร่งการหลั่งฮอร์โมนเกรลินในตอนเช้า","istrue":false}],"explanation":"ใยอาหารช่วยเพิ่มมวลอาหารและชะลอการดูดซึมสารอาหาร ทำให้ระดับน้ำตาลในเลือดคงที่ขณะนอนหลับ"},{"type":"multiple-choice","question":"ปัจจัยด้าน 'พันธุกรรม' ส่งผลต่อภาวะโรคอ้วนอย่างไรตามข้อมูลในสไลด์","options":[{"statement":"พันธุกรรมเป็นตัวกำหนดความชอบรสชาติอาหารเพียงอย่างเดียว","istrue":false},{"statement":"พันธุกรรมกำหนดอัตราการเผาผลาญพื้นฐาน (Basal Metabolic Rate) ของแต่ละคน","istrue":true},{"statement":"พันธุกรรมสามารถป้องกันโรคอ้วนได้ 100% แม้จะกินฟาสต์ฟู้ดปริมาณมาก","istrue":false},{"statement":"พันธุกรรมมีผลเฉพาะในเพศชายเท่านั้น","istrue":false}],"explanation":"พันธุกรรมมีผลต่อการทำงานของเซลล์ไขมันและการใช้พลังงานของร่างกาย ซึ่งเป็นปัจจัยหนึ่งที่ทำให้อัตราการลดน้ำหนักของแต่ละคนต่างกัน"},{"type":"multiple-choice","question":"ภาวะ 'Hyperinsulinemia' (อินซูลินในเลือดสูง) ในคนอ้วนส่งผลต่อตับอย่างไร","options":[{"statement":"ช่วยให้ตับผลิตวิตามินได้มากขึ้น","istrue":false},{"statement":"กระตุ้นให้ตับเปลี่ยนน้ำตาลเป็นไขมันสะสมเพิ่มขึ้น (De novo lipogenesis)","istrue":true},{"statement":"ช่วยดีท็อกซ์สารพิษออกจากตับ","istrue":false},{"statement":"ทำให้ตับมีขนาดเล็กลงและแข็งแรงขึ้น","istrue":false}],"explanation":"ระดับอินซูลินที่สูงตลอดเวลาเป็นสัญญาณสั่งการให้ตับสะสมพลังงานในรูปของไขมันอย่างต่อเนื่อง"},{"type":"multiple-choice","question":"เพราะเหตุใด 'ความเหงา' จึงถูกจัดเป็นปัจจัยเสี่ยงต่อน้ำหนักเกิน","options":[{"statement":"เพราะความเหงาทำให้ร่างกายขาดสารอาหาร","istrue":false},{"statement":"เพราะคนมักใช้การกินอาหารที่ให้ความสุข (Comfort food) เพื่อชดเชยความรู้สึกอ้างว้าง","istrue":true},{"statement":"เพราะความเหงาทำให้อัตราการเต้นของหัวใจช้าลงจนไม่เผาผลาญ","istrue":false},{"statement":"เพราะความเหงาเพิ่มการดูดซึมฟรุกโตสที่ลำไส้","istrue":false}],"explanation":"ปัจจัยด้านอารมณ์มีความสัมพันธ์อย่างยิ่งกับพฤติกรรมการกิน การจัดการอารมณ์จึงเป็นส่วนหนึ่งของโปรแกรมลดน้ำหนัก"},{"type":"multiple-choice","question":"เครื่องดื่มที่มีส่วนผสมของ High-Fructose Corn Syrup (HFCS) ส่งผลเสียต่อฮอร์โมนเลปตินอย่างไร","options":[{"statement":"ทำให้เลปตินหลั่งออกมาเร็วขึ้นจนอิ่มทิพย์","istrue":false},{"statement":"รบกวนสัญญาณของเลปติน ทำให้สมองไม่ได้รับสัญญาณความอิ่ม","istrue":true},{"statement":"ช่วยให้เลปตินทำงานร่วมกับอินซูลินได้ดีขึ้น","istrue":false},{"statement":"เปลี่ยนเลปตินให้กลายเป็นกลูโคส","istrue":false}],"explanation":"งานวิจัยพบว่าฟรุกโตสปริมาณสูงมีส่วนทำให้เกิดภาวะดื้อเลปติน (Leptin resistance)"},{"type":"multiple-choice","question":"ข้อแนะนำ 'Don't remain unoccupied' สอดคล้องกับหลักการลดน้ำหนักในด้านใด","options":[{"statement":"การลดเวลาการนอนให้น้อยลง","istrue":false},{"statement":"การจัดการพฤติกรรมเพื่อลดการกินเพราะความเบื่อ","istrue":true},{"statement":"การออกกำลังกายให้หนักจนไม่มีเวลาพัก","istrue":false},{"statement":"การทำงานล่วงเวลาเพื่อประหยัดเงินค่าอาหาร","istrue":false}],"explanation":"การหากิจกรรมทำ (Unoccupied = ว่าง) ช่วยลดโอกาสในการหยิบของจุกจิกกินโดยไม่ได้หิวจริง"},{"type":"multiple-choice","question":"หากต้องการตรวจสอบว่าตนเองมี 'ความอ้วนลงพุง' หรือไม่ ควรใช้วิธีวัดผลตามข้อใดจึงจะแม่นยำที่สุด","options":[{"statement":"การชั่งน้ำหนักตอนเย็น","istrue":false},{"statement":"การวัดเส้นรอบเอว (Waist circumference)","istrue":true},{"statement":"การนับจำนวนแคลอรี่ที่กินต่อวัน","istrue":false},{"statement":"การสังเกตสีของปัสสาวะ","istrue":false}],"explanation":"เส้นรอบเอวสะท้อนปริมาณไขมันในช่องท้อง (Visceral fat) ซึ่งเป็นตัวบ่งชี้ความเสี่ยงโรคกลุ่มเมแทบอลิซึมได้ดีกว่าน้ำหนักรวม"},{"type":"multiple-choice","question":"สารอาหารใดที่เป็นส่วนประกอบหลักของ 'ปลอกหุ้มเส้นประสาท' (Myelin) ในสมอง ซึ่งลดลงได้หากทุพโภชนาการ","options":[{"statement":"คาร์โบไฮเดรตเชิงเดี่ยว","istrue":false},{"statement":"ไขมัน (Lipids) และโปรตีน","istrue":true},{"statement":"วิตามินซีเข้มข้น","istrue":false},{"statement":"ธาตุเหล็กและไอโอดีน","istrue":false}],"explanation":"ไมอีลินประกอบด้วยไขมันเป็นส่วนใหญ่ การได้รับไขมันดีไม่เพียงพอจะส่งผลต่อการทำงานของระบบประสาท"},{"type":"multiple-choice","question":"โรค Anorexia Nervosa ส่งผลต่อ 'ระบบกระดูก' อย่างไร","options":[{"statement":"ทำให้กระดูกหนาตัวขึ้นเพื่อรองรับน้ำหนัก","istrue":false},{"statement":"ทำให้เกิดภาวะกระดูกพรุน (Osteoporosis) เนื่องจากขาดแคลเซียมและฮอร์โมนผิดปกติ","istrue":true},{"statement":"ทำให้กระดูกมีความยืดหยุ่นสูงขึ้น","istrue":false},{"statement":"ไม่มีผลกระทบต่อกระดูก","istrue":false}],"explanation":"การขาดสารอาหารอย่างหนักรวมถึงการหยุดมีประจำเดือนในผู้หญิงทำให้อัตราการสลายกระดูกสูงกว่าการสร้าง"},{"type":"multiple-choice","question":"เป้าหมายเบื้องต้นของการลดน้ำหนักเพื่อสุขภาพคือการลดน้ำหนักลงประมาณกี่เปอร์เซ็นต์ของน้ำหนักตัวเดิม","options":[{"statement":"1% ภายใน 1 ปี","istrue":false},{"statement":"5-10% ภายใน 6 เดือน","istrue":true},{"statement":"50% ภายใน 1 เดือน","istrue":false},{"statement":"ต้องลดให้เหลือเท่ากับน้ำหนักตอนเด็ก","istrue":false}],"explanation":"การลดน้ำหนักเพียง 5-10% ก็เพียงพอที่จะช่วยปรับปรุงความดันโลหิตและระดับน้ำตาลในเลือดให้ดีขึ้นอย่างเห็นได้ชัด"},{"type":"multiple-choice","question":"ข้อใดเป็นวิธีจัดการน้ำตาลฟรุกโตสในร่างกายที่ถูกต้องที่สุด","options":[{"statement":"งดกินผลไม้ทุกชนิดตลอดชีวิต","istrue":false},{"statement":"เลือกกินผลไม้สดที่มีใยอาหาร และเลี่ยงเครื่องดื่มที่เติมน้ำเชื่อม","istrue":true},{"statement":"เปลี่ยนมากินน้ำผลไม้กล่องแทนมื้ออาหาร","istrue":false},{"statement":"กินขนมหวานพร้อมกับดื่มน้ำเปล่าปริมาณมาก","istrue":false}],"explanation":"ใยอาหารในผลไม้สดจะหน่วงการดูดซึมฟรุกโตส ช่วยให้ตับจัดการน้ำตาลได้ทันโดยไม่เปลี่ยนเป็นไขมันสะสม"},{"type":"multiple-choice","question":"ในระดับโมเลกุล 'ภาวะดื้ออินซูลิน' ส่งผลให้เกิดโรคเบาหวานประเภทที่ 2 ได้อย่างไร","options":[{"statement":"ร่างกายผลิตอินซูลินไม่ได้เลย","istrue":false},{"statement":"เซลล์ไม่ตอบสนองต่ออินซูลิน ทำให้น้ำตาลค้างในเลือดสูง","istrue":true},{"statement":"อินซูลินไปทำลายเซลล์ตับ","istrue":false},{"statement":"น้ำตาลถูกเปลี่ยนเป็นวิตามินจนหมด","istrue":false}],"explanation":"เมื่อเซลล์ดื้อต่อนักนำทาง (อินซูลิน) น้ำตาลก็เข้าสู่เซลล์เพื่อเผาผลาญไม่ได้ จึงตกค้างในกระแสเลือดจนสูงเกินเกณฑ์"},{"type":"multiple-choice","question":"ทำไมการลดน้ำหนักจึงควรเริ่มที่ 'การปรับพฤติกรรม' มากกว่าการพึ่งพายาเพียงอย่างเดียว","options":[{"statement":"เพราะยาไม่มีประสิทธิภาพในการลดน้ำหนัก","istrue":false},{"statement":"เพราะหากไม่ปรับพฤติกรรม เมื่อหยุดยาจะมีโอกาสกลับมาอ้วนใหม่ (Yoyo effect) สูง","istrue":true},{"statement":"เพราะยาแพงกว่าอาหารธรรมชาติ","istrue":false},{"statement":"เพราะยาจะไปทำลายยีนที่ทำให้อ้วน","istrue":false}],"explanation":"พฤติกรรมเป็นสาเหตุที่แท้จริงของความอ้วน การแก้ที่พฤติกรรมจึงเป็นการแก้ปัญหาที่ยั่งยืนที่สุด"},{"type":"multiple-choice","question":"สารอาหารประเภทใดที่ช่วย 'ซ่อมแซมกล้ามเนื้อ' หลังการออกกำลังกายและทำให้อิ่มนาน","options":[{"statement":"คาร์โบไฮเดรตเชิงเดี่ยว","istrue":false},{"statement":"โปรตีนคุณภาพดี","istrue":true},{"statement":"ไขมันทรานส์","istrue":false},{"statement":"น้ำตาลฟรุกโตสสกัด","istrue":false}],"explanation":"โปรตีนจำเป็นต่อการสร้างกล้ามเนื้อ และใช้เวลาย่อยนานกว่าคาร์โบไฮเดรต ทำให้ความรู้สึกอิ่มคงอยู่ได้นาน"},{"type":"multiple-choice","question":"กรณีศึกษาคนอเมริกันบริโภคฟาสต์ฟู้ดสูง สะท้อนถึงปัญหาในระดับนโยบายใด","options":[{"statement":"นโยบายการห้ามส่งออกอาหารสุขภาพ","istrue":false},{"statement":"นโยบายเงินอุดหนุนสินค้าเกษตรที่ทำให้แป้งและน้ำตาลราคาถูกเกินจริง","istrue":true},{"statement":"นโยบายการเก็บภาษีคนผอม","istrue":false},{"statement":"นโยบายการส่งเสริมให้คนนอนดึก","istrue":false}],"explanation":"โครงสร้างราคาอาหารที่ผิดเพี้ยนจากการอุดหนุนของรัฐ ทำให้อาหารขยะเข้าถึงง่ายกว่าอาหารที่มีคุณค่าทางโภชนาการ"},{"type":"multiple-choice","question":"ในโรค Bulimia พฤติกรรม 'Binge' มักจะเกิดขึ้นเพื่อตอบสนองต่อสิ่งใด","options":[{"statement":"การออกกำลังกายที่หนักเกินไป","istrue":false},{"statement":"ความเครียด ความวิตกกังวล หรือความรู้สึกว่างเปล่าในใจ","istrue":true},{"statement":"ความต้องการประหยัดเงินค่าอาหาร","istrue":false},{"statement":"คำแนะนำจากโภชนาการบำบัด","istrue":false}],"explanation":"การกินปริมาณมหาศาลมักถูกใช้เป็นกลไกการรับมือ (Coping mechanism) ต่อสภาวะทางอารมณ์ที่ไม่คงที่"},{"type":"multiple-choice","question":"ลักษณะใบหน้า 'หน้าบวม' ในผู้ป่วย Bulimia เกิดจากการอักเสบของอวัยวะใด","options":[{"statement":"ต่อมไทรอยด์","istrue":false},{"statement":"ต่อมน้ำลาย (Salivary glands)","istrue":true},{"statement":"ต่อมเหงื่อบริเวณใบหน้า","istrue":false},{"statement":"ต่อมน้ำเหลืองที่คอ","istrue":false}],"explanation":"การอาเจียนซ้ำๆ ทำให้ต่อมน้ำลายระคายเคืองและอักเสบจนบวมโตเห็นชัดจากภายนอก"},{"type":"multiple-choice","question":"เพราะเหตุใด 'ความอ้วน' จึงถูกจัดว่าเป็น 'โรคเรื้อรัง' (Chronic disease)","options":[{"statement":"เพราะเป็นแล้วรักษาไม่หาย","istrue":false},{"statement":"เพราะต้องใช้การดูแลระยะยาวและสัมพันธ์กับการทำงานที่ผิดปกติของหลายระบบ","istrue":true},{"statement":"เพราะเป็นโรคที่ติดต่อกันได้ผ่านการสัมผัส","istrue":false},{"statement":"เพราะเกิดจากไวรัสชนิดหนึ่งในอาหารขยะ","istrue":false}],"explanation":"โรคอ้วนส่งผลต่อระบบฮอร์โมน หลอดเลือด และอวัยวะภายใน ซึ่งต้องใช้การปรับเปลี่ยนวิถีชีวิตอย่างต่อเนื่องเพื่อควบคุม"},{"type":"multiple-choice","question":"เกณฑ์ BMI มากกว่า 40 kg/m² มักจะสัมพันธ์กับสภาวะใดในทางการแพทย์","options":[{"statement":"น้ำหนักเกินปกติเล็กน้อย","istrue":false},{"statement":"โรคอ้วนระดับวิกฤต (Morbid Obesity) ที่มีโอกาสเสียชีวิตสูง","istrue":true},{"statement":"การมีสุขภาพแข็งแรงที่สุดตามเกณฑ์นักกีฬา","istrue":false},{"statement":"ภาวะการขาดสารอาหารรุนแรง","istrue":false}],"explanation":"BMI ระดับนี้บ่งบอกถึงความเสี่ยงขั้นสูงต่อการหยุดหายใจ โรคหัวใจวาย และเบาหวานขั้นรุนแรง"},{"type":"multiple-choice","question":"พฤติกรรม 'Sedentary' ส่งผลต่อการใช้พลังงานของกล้ามเนื้ออย่างไร","options":[{"statement":"ช่วยให้กล้ามเนื้อดึงน้ำตาลไปใช้ได้ดีขึ้น","istrue":false},{"statement":"ลดประสิทธิภาพการดึงพลังงานจากกลูโคสและไขมัน ทำให้เกิดการสะสมง่ายขึ้น","istrue":true},{"statement":"ช่วยเพิ่มมวลกล้ามเนื้อโดยอัตโนมัติ","istrue":false},{"statement":"เพิ่มอัตราการหลั่งโกรทฮอร์โมน","istrue":false}],"explanation":"การอยู่นิ่งๆ นานๆ ทำให้ระบบเผาผลาญ 'เข้าโหมดประหยัด' และสะสมพลังงานส่วนเกินไว้ในรูปไขมัน"},{"type":"multiple-choice","question":"ทำไมการกินอาหารที่เป็น 'Complex Carbohydrates' (คาร์โบไฮเดรตเชิงซ้อน) จึงดีต่อการคุมน้ำหนัก","options":[{"statement":"เพราะมันมีรสชาติหวานกว่าน้ำตาลทราย","istrue":false},{"statement":"เพราะมันย่อยยากและมีใยอาหาร ช่วยรักษาระดับน้ำตาลในเลือดให้นิ่ง","istrue":true},{"statement":"เพราะมันช่วยเพิ่มระดับฟรุกโตสในร่างกาย","istrue":false},{"statement":"เพราะร่างกายไม่ต้องใช้เอนไซม์ในการย่อย","istrue":false}],"explanation":"ความซับซ้อนของโมเลกุลทำให้น้ำตาลถูกปล่อยออกมาอย่างช้าๆ ส่งผลดีต่อระดับอินซูลินและพลังงาน"},{"type":"multiple-choice","question":"ฮอร์โมนใดที่ช่วยลดความอยากอาหารและส่งสัญญาณไปยังไฮโปทาลามัสว่า 'อิ่มแล้ว'","options":[{"statement":"เกรลิน (Ghrelin)","istrue":false},{"statement":"เลปติน (Leptin)","istrue":true},{"statement":"อะดรีนาลีน","istrue":false},{"statement":"ฟรุกโตส","istrue":false}],"explanation":"เลปตินผลิตจากเซลล์ไขมันเพื่อบอกสมองว่ามีพลังงานสำรองเพียงพอแล้ว ให้ลดความอยากกินลง"},{"type":"multiple-choice","question":"ลักษณะอาการ 'ประจำเดือนขาด' ในผู้ป่วย Anorexia เกิดจากสาเหตุใด","options":[{"statement":"ร่างกายได้รับแคลเซียมมากเกินไป","istrue":false},{"statement":"ร่างกายมีไขมันสะสมต่ำเกินไปจนระบบฮอร์โมนสืบพันธุ์หยุดทำงาน","istrue":true},{"statement":"มวลกล้ามเนื้อที่มากเกินไปขัดขวางฮอร์โมน","istrue":false},{"statement":"การนอนหลับที่เพียงพอเกินไป","istrue":false}],"explanation":"ร่างกายจะปิดระบบที่ไม่จำเป็นต่อการมีชีวิตรอด (เช่น ระบบสืบพันธุ์) เมื่อเข้าสู่ภาวะขาดแคลนพลังงานอย่างรุนแรง"},{"type":"multiple-choice","question":"การใช้ 'Mindful Eating' (การกินอย่างมีสติ) ช่วยป้องกันภาวะ Overeating ได้อย่างไร","options":[{"statement":"ช่วยให้เรากินอาหารได้เร็วขึ้น","istrue":false},{"statement":"ช่วยให้เรารับรู้สัญญาณความอิ่มจากกระเพาะสู่สมองได้ทันท่วงที","istrue":true},{"statement":"ช่วยเพิ่มแคลอรี่ในอาหารธรรมชาติ","istrue":false},{"statement":"ช่วยลดการทำงานของลำไส้ใหญ่","istrue":false}],"explanation":"การกินช้าๆ และสังเกตรสชาติ/ความอิ่ม ช่วยให้สมองส่วนรับความรู้สึกอิ่มทำงานได้ทันก่อนที่เราจะกินเกิน"},{"type":"multiple-choice","question":"การเลือก 'อาหารธรรมชาติ' (Natural Food) มีผลอย่างไรต่อตับเมื่อเทียบกับ 'อาหารแปรรูป'","options":[{"statement":"ตับทำงานหนักกว่าเดิมเพื่อย่อยใยอาหาร","istrue":false},{"statement":"ตับได้รับภาระน้ำตาลน้อยลงและมีความเสี่ยงต่อไขมันพอกตับลดลง","istrue":true},{"statement":"ตับเปลี่ยนอาหารธรรมชาติให้เป็นไขมันเลวได้เร็วขึ้น","istrue":false},{"statement":"ไม่มีผลที่แตกต่างกัน","istrue":false}],"explanation":"อาหารธรรมชาติขาดสารปรุงแต่งและน้ำตาลสังเคราะห์ จึงเป็นมิตรต่อระบบล้างพิษและเผาผลาญของตับ"},{"type":"multiple-choice","question":"ข้อใดเป็นผลกระทบของการดื่มน้ำอัดลมที่มี 'High-Fructose Corn Syrup' เป็นประจำ","options":[{"statement":"ช่วยเพิ่มความแข็งแรงของฟัน","istrue":false},{"statement":"เพิ่มระดับไตรกลีเซอไรด์และไขมันหน้าท้องอย่างรวดเร็ว","istrue":true},{"statement":"ช่วยลดภาวะดื้ออินซูลิน","istrue":false},{"statement":"ทำให้ร่างกายตื่นตัวและสมาธิดีขึ้นในระยะยาว","istrue":false}],"explanation":"HFCS เป็นฟรุกโตสเข้มข้นที่ตับจะเปลี่ยนเป็นไขมันเกือบทั้งหมดหากร่างกายไม่ได้ขาดแคลนพลังงาน"},{"type":"multiple-choice","question":"ทำไมการลดน้ำหนักจึงควรให้ความสำคัญกับ 'สุขภาพจิต' พอๆ กับโภชนาการ","options":[{"statement":"เพราะความจำที่ดีช่วยให้นับแคลอรี่ได้แม่นยำ","istrue":false},{"statement":"เพราะอารมณ์ที่มั่นคงช่วยลดพฤติกรรมการกินชดเชย (Compulsive eating)","istrue":true},{"statement":"เพราะสุขภาพจิตดีจะช่วยให้น้ำหนักลดเองโดยไม่ต้องกินอาหาร","istrue":false},{"statement":"เพราะคนสุขภาพจิตดีมักไม่หิวอาหาร","istrue":false}],"explanation":"พฤติกรรมการกินมีความสัมพันธ์ลึกซึ้งกับสภาวะจิตใจ การรักษาที่ใจจึงช่วยให้ควบคุมกายได้สำเร็จ"},{"type":"multiple-choice","question":"สภาวะ 'Central Obesity' (อ้วนลงพุง) มีผลอย่างไรต่อการเกิดมะเร็งบางชนิด","options":[{"statement":"ไม่มีความเกี่ยวข้องใดๆ","istrue":false}
